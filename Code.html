<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur d'Activité de Club Chess.com</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #262522;
            color: #ffffff;
            border-radius: 8px;
        }
        h2 { color: #81b64c; text-align: center; }
        .input-group {
            display: flex;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: none;
            border-radius: 4px 0 0 4px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #81b64c;
            color: white;
            border: none;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #a3d96c; }
        .result-box {
            background-color: #312e2b;
            padding: 20px;
            border-radius: 4px;
            display: none;
        }
        .metric {
            font-size: 18px;
            margin: 10px 0;
            display: flex;
            justify-content: space-between;
        }
        .highlight {
            font-size: 24px;
            color: #81b64c;
            font-weight: bold;
        }
        .error { color: #ff5f5f; text-align: center; margin-bottom: 15px; }
        .loading { color: #f7c631; text-align: center; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <h2>Activité de Club Chess.com</h2>
    
    <div class="input-group">
        <input type="text" id="clubInput" placeholder="Ex: hot-chilli-checkmate" value="hot-chilli-checkmate">
        <button onclick="calculateActivity()">Calculer</button>
    </div>

    <div id="loading" class="loading">Connexion à Chess.com en cours... (via proxy anti-blocage)</div>
    <div id="error" class="error"></div>

    <div id="result" class="result-box">
        <div class="metric">
            <span>Taux d'Activité Hebdomadaire :</span>
            <span id="activityRate" class="highlight">0%</span>
        </div>
        <hr style="border-color: #403c39;">
        <div class="metric"><span>Membres Actifs (7 jours) :</span> <span id="weeklyCount">0</span></div>
        <div class="metric"><span>Membres Actifs (30 jours) :</span> <span id="monthlyCount">0</span></div>
        <div class="metric"><span>Membres Inactifs :</span> <span id="inactiveCount">0</span></div>
        <div class="metric"><strong>Total des Membres :</strong> <strong id="totalCount">0</strong></div>
    </div>

    <script>
        async function calculateActivity() {
            const clubInput = document.getElementById('clubInput').value.trim();
            const errorDiv = document.getElementById('error');
            const loadingDiv = document.getElementById('loading');
            const resultDiv = document.getElementById('result');
            
            errorDiv.innerText = '';
            loadingDiv.style.display = 'block';
            resultDiv.style.display = 'none';

            if (!clubInput) {
                errorDiv.innerText = "Veuillez entrer l'identifiant du club.";
                loadingDiv.style.display = 'none';
                return;
            }

            let clubId = clubInput.toLowerCase();
            clubId = clubId.replace('https://chess.com', '');
            clubId = clubId.replace('https://www.chess.com/club/', '');
            clubId = clubId.split('/')[0];

            // Utilisation d'un proxy CORS public pour injecter les bons en-têtes requis par Chess.com
            const proxyUrl = 'https://allorigins.win';
            const targetUrl = encodeURIComponent(`https://chess.com{clubId}/members`);

            try {
                const response = await fetch(`${proxyUrl}${targetUrl}`);
                
                if (!response.ok) {
                    throw new Error("Erreur de connexion avec le serveur proxy.");
                }

                const proxyData = await response.json();
                
                // Allorigins encapsule la réponse dans proxyData.contents au format texte
                const data = JSON.parse(proxyData.contents);

                if (!data || (!data.weekly && !data.monthly && !data.all_time)) {
                    throw new Error("Données introuvables. Vérifiez le nom du club.");
                }

                const weekly = data.weekly ? data.weekly.length : 0;
                const monthly = data.monthly ? data.monthly.length : 0;
                const allTime = data.all_time ? data.all_time.length : 0;

                const totalMembers = weekly + monthly + allTime;

                if (totalMembers === 0) {
                    throw new Error("Ce club ne possède aucun membre.");
                }

                const activityRate = ((weekly / totalMembers) * 100).toFixed(2);

                document.getElementById('weeklyCount').innerText = weekly;
                document.getElementById('monthlyCount').innerText = monthly;
                document.getElementById('inactiveCount').innerText = allTime;
                document.getElementById('totalCount').innerText = totalMembers;
                document.getElementById('activityRate').innerText = `${activityRate}%`;
                
                resultDiv.style.display = 'block';

            } catch (err) {
                errorDiv.innerText = err.message + " Erreur de récupération. Le club existe-t-il bien ?";
            } finally {
                loadingDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
