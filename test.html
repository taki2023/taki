<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club of 195 Countries – Match Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;600;700;900&family=Fredoka+One&display=swap" rel="stylesheet">
  
  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ── TOKENS ───────────────────────────────────────────────────────────── */
    :root {
      --bg-void: #080b14;
      --bg-base: #0d1220;
      --bg-card: #111827;
      --bg-cell: #0f1520;
      --bg-cell-hover: #162035;
      --globe-blue: #3b82f6;
      --globe-mid: #6366f1;
      --globe-purple: #8b5cf6;
      --piece-violet: #7c3aed;
      --accent-cyan: #22d3ee;
      --accent-gold: #f59e0b;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --text-head: #e2e8f0;
      --text-body: #94a3b8;
      --text-dim: #475569;
      --text-white: #f8fafc;
      --border-subtle: rgba(99,102,241,.18);
      --border-mid: rgba(99,102,241,.35);
      --border-hot: rgba(139,92,246,.6);
      --radius: 12px;
      --radius-sm: 8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background: var(--bg-void);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      width: 100%;
    }
    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    #root {
      width: 100%;
      max-width: 900px;
      display: flex;
      justify-content: center;
    }
    /* ── ANIMATIONS ───────────────────────────────────────────────────────── */
    @keyframes spinBorder {
      to { transform: rotate(360deg); }
    }
    @keyframes pulse-green {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .6; transform: scale(1.3); }
    }
    @keyframes barPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }
    @keyframes cdPulse {
      0%, 100% { box-shadow: none; }
      50% { box-shadow: 0 0 10px currentColor; }
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -100% 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes enrichSlide {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    /* ── SKELETON ─────────────────────────────────────────────────────────── */
    .skel {
      background: linear-gradient(90deg, #0d1220 0%, #141d35 40%, #0d1220 100%);
      background-size: 300% 100%;
      animation: shimmer 1.4s ease-in-out infinite;
      border-radius: 4px;
    }
    /* ── HEADER ──────────────────────────────────────────────────────────── */
    .cal-header {
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid rgba(99,102,241,.18);
      background: linear-gradient(160deg, #0d1a35 0%, #111228 50%, #0e0d22 100%);
      padding: 20px 20px 16px;
    }
    .header-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(99,102,241,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,.06) 1px, transparent 1px);
      background-size: 32px 32px;
    }
    .header-glow {
      position: absolute;
      top: -40px;
      left: 50%;
      transform: translateX(-50%);
      width: 280px;
      height: 140px;
      background: radial-gradient(ellipse, rgba(99,102,241,.25) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-top {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .globe-icon {
      position: relative;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--globe-blue), var(--globe-purple));
      box-shadow: 0 0 24px rgba(99,102,241,.5), 0 0 8px rgba(99,102,241,.3) inset;
    }
    .globe-ring {
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 1px solid rgba(139,92,246,.35);
      animation: spinBorder 8s linear infinite;
    }
    .header-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .header-title {
      font-family: 'Orbitron', monospace;
      font-size: 15px;
      font-weight: 700;
      color: var(--text-white);
      letter-spacing: 0.5px;
      line-height: 1.2;
    }
    .header-sub {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-body);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(99,102,241,.12);
      border: 1px solid var(--border-subtle);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-cyan);
      letter-spacing: 0.5px;
    }
    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 6px var(--accent-green);
      animation: pulse-green 2s ease-in-out infinite;
    }
    .header-divider {
      position: relative;
      z-index: 2;
      height: 1px;
      margin-top: 12px;
      background: linear-gradient(90deg, transparent, var(--border-mid), transparent);
    }
    .header-deco {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding-top: 8px;
    }
    .header-deco .pawn {
      font-size: 13px;
      opacity: 0.35;
    }
    .header-deco .text {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    /* ── WRAPPER ─────────────────────────────────────────────────────────── */
    .cal-wrap {
      width: 100%;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
      border-radius: 0;
      overflow: hidden;
      border: none;
      border-bottom: 1.5px solid var(--border-mid);
      background: var(--bg-base);
      box-shadow: 0 0 60px rgba(99,102,241,.08) inset;
      position: relative;
      animation: fadeIn 0.4s ease-out;
    }
    .cal-content {
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.3s ease-out;
    }
    /* ── NAV ─────────────────────────────────────────────────────────────── */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 0;
      gap: 12px;
    }
    .nav-btn {
      width: 40px;
      height: 40px;
      border-radius: var(--radius);
      border: 1.5px solid var(--border-mid);
      background: rgba(99,102,241,.12);
      color: var(--text-body);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s cubic-bezier(.34,1.56,.64,1);
      font-size: 16px;
      flex-shrink: 0;
    }
    .nav-btn:hover {
      border-color: var(--border-hot);
      background: rgba(139,92,246,.2);
      color: var(--text-white);
      box-shadow: 0 0 12px rgba(139,92,246,.25);
      transform: scale(1.08);
    }
    .nav-btn:active {
      transform: scale(0.95);
    }
    .nav-btn svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    .month-label {
      flex: 1;
      text-align: center;
      font-family: 'Orbitron', monospace;
      font-size: 20px;
      font-weight: 700;
      color: var(--text-white);
      letter-spacing: 1.5px;
    }
    .month-label .yr {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-body);
      margin-left: 8px;
    }
    /* ── DAY HEADERS ─────────────────────────────────────────────────────── */
    .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      padding: 12px 16px 6px;
    }
    .day-hdr {
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-body);
      padding: 6px 0;
      background: rgba(99,102,241,.08);
      border-radius: 6px;
    }
    .day-hdr.weekend {
      color: var(--globe-purple);
      background: rgba(139,92,246,.1);
    }
    /* ── GRID ────────────────────────────────────────────────────────────── */
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      padding: 0 16px 16px;
    }
    .cal-cell {
      background: var(--bg-cell);
      border-radius: 8px;
      border: 1.5px solid rgba(99,102,241,.12);
      min-height: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 4px 6px;
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: background .15s, border-color .15s, box-shadow .15s, transform .15s;
      min-width: 0;
    }
    .cal-cell.has-event {
      cursor: pointer;
      border-color: var(--border-subtle);
      background: linear-gradient(160deg, #111a2e, #0f1428);
    }
    .cal-cell.has-event:hover {
      background: linear-gradient(160deg, #162040, #131835);
      border-color: var(--border-hot);
      box-shadow: 0 0 16px rgba(139,92,246,.18);
      transform: translateY(-1px);
    }
    .cal-cell.has-event:active {
      transform: scale(0.97);
    }
    .cal-cell.adj {
      opacity: .35;
      pointer-events: none;
      border-color: transparent;
    }
    .cal-cell.today {
      border-color: var(--accent-cyan);
      border-width: 2px;
      background: linear-gradient(160deg, #0f1d3a, #0d1830);
      box-shadow: 
        0 0 0 2px rgba(34,211,238,.15) inset,
        0 0 20px rgba(34,211,238,.15);
    }
    .cal-cell.has-event::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139,92,246,.5), transparent);
    }
    .cell-num {
      font-family: 'Orbitron', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--text-body);
      line-height: 1;
      align-self: flex-end;
      margin-right: 4px;
      width: 100%;
      text-align: right;
    }
    .cal-cell.today .cell-num {
      color: var(--accent-cyan);
      text-shadow: 0 0 10px rgba(34,211,238,.5);
      font-weight: 900;
    }
    .cal-cell.adj .cell-num {
      color: var(--text-dim);
      opacity: 0.5;
    }
    .today-dot {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--globe-blue);
      box-shadow: 0 0 6px var(--globe-blue);
    }
    .cell-icon-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: 4px;
    }
    .match-badge-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .match-badge {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, rgba(99,102,241,.3), rgba(139,92,246,.25));
      border: 1.5px solid rgba(139,92,246,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: transform .2s, box-shadow .2s;
      position: relative;
      box-shadow: 0 3px 12px rgba(0,0,0,.4);
    }
    .cal-cell.has-event:hover .match-badge {
      transform: scale(1.15);
      box-shadow: 0 0 20px rgba(139,92,246,.4);
    }
    .status-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      border-radius: 0 0 6px 6px;
    }
    .status-bar.upcoming {
      background: linear-gradient(90deg, var(--globe-blue), var(--globe-purple));
    }
    .status-bar.soon {
      background: linear-gradient(90deg, var(--accent-gold), #f97316);
      animation: barPulse 1.5s ease-in-out infinite;
    }
    .status-bar.live {
      background: linear-gradient(90deg, var(--accent-red), #f97316);
      animation: barPulse .8s ease-in-out infinite;
    }
    .status-bar.ended {
      background: rgba(99,102,241,.15);
    }
    .count-bubble {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-red), #f97316);
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', monospace;
      border: 2px solid var(--bg-cell);
      box-shadow: 0 2px 8px rgba(239,68,68,.4);
      z-index: 10;
    }
    /* ── LEGEND ──────────────────────────────────────────────────────────── */
    .cal-legend {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      gap: 16px;
      padding: 12px 16px 14px;
      border-top: 1px solid var(--border-subtle);
      background: rgba(0,0,0,.15);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .5px;
      color: var(--text-body);
    }
    .legend-bar {
      width: 18px;
      height: 3px;
      border-radius: 2px;
    }
    .legend-bar.upcoming {
      background: linear-gradient(90deg, var(--globe-blue), var(--globe-purple));
    }
    .legend-bar.soon {
      background: linear-gradient(90deg, var(--accent-gold), #f97316);
    }
    .legend-bar.live {
      background: var(--accent-red);
    }
    .legend-bar.ended {
      background: rgba(99,102,241,.25);
    }
    /* ── ERROR ───────────────────────────────────────────────────────────── */
    .load-err {
      margin: 8px 16px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.25);
      font-size: 13px;
      font-weight: 600;
      color: #fca5a5;
    }
    /* ── FOOTER ──────────────────────────────────────────────────────────── */
    .cal-foot {
      padding: 8px 16px 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .foot-dot {
      opacity: .4;
    }
    /* ── ENRICHING BAR ───────────────────────────────────────────────────── */
    .enriching-bar {
      height: 3px;
      background: rgba(99,102,241,.1);
      margin: 0 16px;
      border-radius: 2px;
      overflow: hidden;
    }
    .enriching-progress {
      height: 100%;
      width: 40%;
      background: linear-gradient(90deg, var(--globe-blue), var(--globe-purple));
      border-radius: 2px;
      animation: enrichSlide 1.2s ease-in-out infinite;
    }
    /* ── TOOLTIP ─────────────────────────────────────────────────────────── */
    .tip-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.65);
      z-index: 500;
      display: none;
      animation: fadeIn 0.15s ease-out;
    }
    .tip-backdrop.show {
      display: block;
    }
    .tip-panel {
      position: fixed;
      z-index: 600;
      background: #111827;
      border: 1.5px solid var(--border-hot);
      border-radius: 14px;
      padding: 0;
      min-width: 260px;
      max-width: min(340px, 90vw);
      box-shadow:
        0 0 0 1px rgba(139,92,246,.12),
        0 24px 60px rgba(0,0,0,.9),
        0 0 30px rgba(99,102,241,.12) inset;
      display: none;
      flex-direction: column;
      overflow: hidden;
      animation: scaleIn 0.2s ease-out;
    }
    .tip-panel.show {
      display: flex;
    }
    .tip-panel.mobile-center {
      left: 50% !important;
      top: 50% !important;
      transform: translate(-50%, -50%) !important;
      max-width: min(380px, calc(100vw - 24px));
      max-height: 85vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .tip-strip {
      background: linear-gradient(135deg, #141d35, #111228);
      padding: 14px 14px 12px;
      border-bottom: 1px solid var(--border-subtle);
      position: relative;
    }
    .tip-strip::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--globe-blue), var(--globe-purple), var(--piece-violet));
    }
    .tip-close {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(99,102,241,.2);
      border: 1px solid var(--border-mid);
      color: var(--text-body);
      font-size: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all .15s;
      z-index: 5;
    }
    .tip-close:hover {
      background: rgba(139,92,246,.35);
      color: #fff;
      transform: scale(1.1);
    }
    .tip-hdr-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .tip-globe {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: linear-gradient(135deg, rgba(99,102,241,.3), rgba(139,92,246,.25));
      border: 1px solid var(--border-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .tip-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
      padding-right: 26px;
    }
    .tip-title {
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-white);
      line-height: 1.2;
    }
    .tip-date {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-body);
      letter-spacing: .3px;
    }
    .tip-body {
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      max-height: calc(85vh - 90px);
      scrollbar-width: thin;
      scrollbar-color: var(--border-mid) transparent;
    }
    .tip-body::-webkit-scrollbar {
      width: 6px;
    }
    .tip-body::-webkit-scrollbar-track {
      background: transparent;
    }
    .tip-body::-webkit-scrollbar-thumb {
      background: var(--border-mid);
      border-radius: 3px;
    }
    .tip-body::-webkit-scrollbar-thumb:hover {
      background: var(--border-hot);
    }
    .tip-countdown {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .3px;
      padding: 5px 11px;
      border-radius: 999px;
      border: 1px solid;
      width: fit-content;
    }
    .tip-countdown .cd-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
      flex-shrink: 0;
    }
    .cd-upcoming {
      color: var(--accent-cyan);
      background: rgba(34,211,238,.07);
      border-color: rgba(34,211,238,.3);
    }
    .cd-soon {
      color: var(--accent-gold);
      background: rgba(245,158,11,.07);
      border-color: rgba(245,158,11,.3);
      animation: cdPulse 1.8s ease-in-out infinite;
    }
    .cd-live {
      color: var(--accent-red);
      background: rgba(239,68,68,.08);
      border-color: rgba(239,68,68,.3);
      animation: cdPulse .9s ease-in-out infinite;
    }
    .cd-ended {
      color: var(--text-dim);
      background: rgba(255,255,255,.03);
      border-color: rgba(255,255,255,.08);
    }
    .tip-match-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-head);
      line-height: 1.4;
    }
    .tip-sep {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--border-mid), var(--globe-purple), var(--border-mid), transparent);
      margin: 8px 0;
      border-radius: 1px;
    }
    .tip-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .tip-opp {
      display: flex;
      align-items: center;

      border: 1px solid rgba(239,68,68,.25);

      background: rgba(148,163,184,.08);
      color: #94a3b8;
      border: 1px solid rgba(148,163,184,.2);

    /* ── SCORE DISPLAY ───────────────────────────────────────────────────── */
    .score-display {
      background: rgba(99,102,241,.08);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .score-teams {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.3;
    }
    .score-team-name {
      color: var(--text-body);
      flex: 1;
      min-width: 0;
    }
    .score-team-name.our-team {
      color: var(--accent-cyan);
      text-align: left;
    }
    .score-team-name.their-team {
      color: var(--text-body);
      text-align: right;
    }
    .score-vs {
      color: var(--text-dim);
      font-size: 9px;
      letter-spacing: 1px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .score-numbers {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .score-num {
      font-family: 'Orbitron', monospace;
      font-size: 18px;
      font-weight: 700;
      color: var(--text-white);
      min-width: 36px;
      text-align: center;
    }
    .score-num.winning {
      color: var(--accent-green);
      text-shadow: 0 0 10px rgba(16,185,129,.4);
    }
    .score-num.losing {
      color: var(--accent-red);
      text-shadow: 0 0 10px rgba(239,68,68,.3);
    }
    .score-dash {
      color: var(--text-dim);
      font-size: 16px;
      font-weight: 700;
    }
    /* ── SKELETON LAYOUT ─────────────────────────────────────────────────── */
    .skel-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 12px;
    }
    .skel-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .skel-days {
      display: flex;
      gap: 3px;
    }
    .skel-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;
    // ══════════════════════════════════════════════════════════════════════
    // CONSTANTS & UTILITIES
    // ══════════════════════════════════════════════════════════════════════
    const MONTHS = [
      'January','February','March','April','May','June',
      'July','August','September','October','November','December'
    ];
    const MONTH_SHORT = [
      'Jan','Feb','Mar','Apr','May','Jun',
      'Jul','Aug','Sep','Oct','Nov','Dec'
    ];
    const DAYS = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
    const ordinal = (d) => {
      const s = ['th','st','nd','rd'];
      const v = d % 100;
      return d + (s[(v - 20) % 10] || s[v] || s[0]);
    };
    const pad = (n) => String(n).padStart(2, '0');
    const dateKey = (y, m, d) => `${y}-${pad(m + 1)}-${pad(d)}`;
    // ══════════════════════════════════════════════════════════════════════
    // PHASE LOGIC
    // ══════════════════════════════════════════════════════════════════════
    function getPhase(ev) {
      const now = Date.now();
      const startMs = ev.startTs * 1000;
      if (ev._status === 'finished' || (ev.endTs && now > ev.endTs * 1000)) {
        return { status: 'ended', text: 'Ended', cls: 'cd-ended' };
      }
      if (ev._status === 'live' || now >= startMs) {
        return { status: 'live', text: '🔴 In Progress', cls: 'cd-live' };
      }
      const ms = startMs - now;
      const dd = Math.floor(ms / 86400000);
      const hh = Math.floor((ms % 86400000) / 3600000);
      const mm = Math.floor((ms % 3600000) / 60000);
      let txt = 'In ';
      if (dd > 0) txt += `${dd}d ${hh}h`;
      else if (hh > 0) txt += `${hh}h ${mm}m`;
      else txt += `${mm}m`;
      const isSoon = ms <= 3600000;
      return {
        status: isSoon ? 'soon' : 'upcoming',
        text: txt,
        cls: isSoon ? 'cd-soon' : 'cd-upcoming',
      };
    }
    function bestPhase(events) {
      const rank = { ended: 1, upcoming: 2, soon: 3, live: 4 };
      let best = null;
      for (const ev of events) {
        const ph = getPhase(ev);
        if (!best || rank[ph.status] > rank[best.status]) best = ph;
      }
      return best;
    }
    // ══════════════════════════════════════════════════════════════════════
    // API
    // ══════════════════════════════════════════════════════════════════════
    const CLUB_ID = 'the-club-of-195-countries';
    const CLUB_API = `https://api.chess.com/pub/club/${CLUB_ID}/matches`;
    const OUR_CLUB_SLUGS = ['the-club-of-195-countries', 'the-club-of-129-countries'];
    function isOurClub(teamId) {
      return OUR_CLUB_SLUGS.some(slug => teamId.includes(slug));
    }
    async function fetchJSON(url) {
      try {
        const r = await fetch(url, { cache: 'no-store' });
        if (r.ok) return r.json();
        throw new Error('HTTP ' + r.status);
      } catch (_e) {
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
        const r2 = await fetch(proxy);
        if (!r2.ok) throw new Error('Proxy ' + r2.status);
        return JSON.parse((await r2.json()).contents);
      }
    }
    function extractMatchId(apiUrl) {
      const m = apiUrl.match(/\/match\/(\d+)$/);
      return m ? m[1] : '';
    }
    function opponentNameFromSlug(slug) {
      return slug
        .replace(/-/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase());
    }
    async function loadMatchList() {
      const data = await fetchJSON(CLUB_API);
      const all = [];
      (data.registered || []).forEach(m => all.push({ ...m, _status: 'upcoming' }));
      (data.in_progress || []).forEach(m => all.push({ ...m, _status: 'live' }));
      (data.finished || []).forEach(m => all.push({ ...m, _status: 'finished' }));
      const eventMap = {};
      const matchIds = [];
      all.forEach(m => {
        if (!m.start_time) return;
        const matchId = extractMatchId(m['@id']);
        if (!matchId) return;
        const d = new Date(m.start_time * 1000);
        const y = d.getUTCFullYear(), mo = d.getUTCMonth(), dy = d.getUTCDate();
        const oppParts = (m.opponent || '').split('/');
        const oppSlug = oppParts[oppParts.length - 1] || '';
        const oppName = opponentNameFromSlug(oppSlug);
        const ev = {
          id: matchId,
          title: m.name || 'Team Match',
          opponent: oppName,
          opponentSlug: oppSlug,
          link: `https://www.chess.com/club/matches/${matchId}`,
          _status: m._status,
          result: m.result || undefined,
          startTs: m.start_time,
          endTs: m.end_time || undefined,
          timeClass: m.time_class || 'daily',
        };
        const key = dateKey(y, mo, dy);
        if (!eventMap[key]) eventMap[key] = [];
        eventMap[key].push(ev);
        matchIds.push(matchId);
      });
      return { eventMap, matchIds };
    }
    async function enrichMatches(eventMap, matchIds, onProgress) {
      const eventsById = new Map();
      for (const key of Object.keys(eventMap)) {
        for (const ev of eventMap[key]) {
          if (!eventsById.has(ev.id)) eventsById.set(ev.id, []);
          eventsById.get(ev.id).push(ev);
        }
      }
      const batchSize = 8;
      for (let i = 0; i < matchIds.length; i += batchSize) {
        const batch = matchIds.slice(i, i + batchSize);
        const results = await Promise.allSettled(
          batch.map(id => fetchJSON(`https://api.chess.com/pub/match/${id}`))
        );
        let anyUpdate = false;
        results.forEach((res, idx) => {
          if (res.status === 'fulfilled') {
            const detail = res.value;
            const id = batch[idx];
            const evs = eventsById.get(id) || [];
            evs.forEach(ev => {
              if (detail.url) {
                ev.matchDetailUrl = detail.url;
                ev.link = detail.url;
              }
              if (detail.teams) {
                const { team1, team2 } = detail.teams;
                let ourTeam, theirTeam;
                if (isOurClub(team1['@id'])) {
                  ourTeam = team1;
                  theirTeam = team2;
                } else if (isOurClub(team2['@id'])) {
                  ourTeam = team2;
                  theirTeam = team1;
                } else {
                  ourTeam = team1;
                  theirTeam = team2;
                }
                ev.ourName = ourTeam.name;
                ev.theirName = theirTeam.name;
                ev.ourScore = ourTeam.score;
                ev.theirScore = theirTeam.score;
                ev.boards = detail.boards;
                ev.opponent = theirTeam.name;
              }
              anyUpdate = true;
            });
          }
        });
        if (anyUpdate) {
          onProgress({ ...eventMap });
        }
      }
    }
    // ══════════════════════════════════════════════════════════════════════
    // COMPONENTS
    // ══════════════════════════════════════════════════════════════════════
    function Header() {
      return (
        <div className="cal-header">
          <div className="header-grid" />
          <div className="header-glow" />
          <div className="header-top">
            <div className="header-left">
              <div className="globe-icon">
                🌍
                <div className="globe-ring" />
              </div>
              <div className="header-info">
                <div className="header-title">Club of 195 Countries</div>
                <div className="header-sub">Chess.com · Est. March 2026</div>
              </div>
            </div>
            <div className="live-badge">
              <span className="live-dot" />
              LIVE
            </div>
          </div>
          <div className="header-divider" />
          <div className="header-deco">
            <span className="pawn">♟</span>
            <span className="text">Play · Learn · Compete · Grow</span>
            <span className="pawn">♟</span>
          </div>
        </div>
      );
    }
    function Skeleton() {
      return (
        <div className="skel-wrap">
          <div className="skel-nav">
            <div className="skel" style={{ width: 30, height: 30, borderRadius: 6 }} />
            <div className="skel" style={{ flex: 1, height: 20, borderRadius: 4 }} />
            <div className="skel" style={{ width: 30, height: 30, borderRadius: 6 }} />
          </div>
          <div className="skel-days">
            {Array.from({ length: 7 }).map((_, i) => (
              <div
                key={i}
                className="skel"
                style={{ flex: 1, height: 18, borderRadius: 4, animationDelay: `${i * 0.05}s` }}
              />
            ))}
          </div>
          <div className="skel-grid">
            {Array.from({ length: 42 }).map((_, i) => (
              <div
                key={i}
                className="skel"
                style={{ height: 62, borderRadius: 6, animationDelay: `${i * 0.02}s` }}
              />
            ))}
          </div>
        </div>
      );
    }
    function CountdownBadge({ ev }) {
      const [phase, setPhase] = useState(getPhase(ev));
      useEffect(() => {
        setPhase(getPhase(ev));
        const timer = setInterval(() => {
          setPhase(getPhase(ev));
        }, 15000);
        return () => clearInterval(timer);
      }, [ev]);
      return (
        <div className={`tip-countdown ${phase.cls}`}>
          <span className="cd-dot" />
          {phase.text}
        </div>
      );
    }
    function ScoreBadge({ ev }) {
      if (ev.ourScore === undefined || ev.theirScore === undefined) return null;
      return (
        <div className="score-display">
          <div className="score-teams">
            <span className="score-team-name our-team">{ev.ourName || 'Club of 195 Countries'}</span>
            <span className="score-vs">vs</span>
            <span className="score-team-name their-team">{ev.theirName || ev.opponent}</span>
          </div>
          <div className="score-numbers">
            <span className={`score-num ${ev.ourScore > ev.theirScore ? 'winning' : ev.ourScore < ev.theirScore ? 'losing' : ''}`}>
              {ev.ourScore}
            </span>
            <span className="score-dash">–</span>
            <span className={`score-num ${ev.theirScore > ev.ourScore ? 'winning' : ev.theirScore < ev.ourScore ? 'losing' : ''}`}>
              {ev.theirScore}
            </span>
          </div>
        </div>
      );
    }
    function MatchBlock({ ev, showSep }) {
      const phase = getPhase(ev);
      let resultBadge = null;
      if (ev._status === 'finished' && ev.result) {
        if (ev.result === 'win') {
          resultBadge = <span className="result-badge badge-win">✓ WIN</span>;
        } else if (ev.result === 'lose' || ev.result === 'loss') {
          resultBadge = <span className="result-badge badge-loss">✗ LOSS</span>;
        } else {
          resultBadge = <span className="result-badge badge-draw">⬛ DRAW</span>;
        }
      }
      let button = null;
      if (ev.link) {
        if (phase.status === 'ended') {
          button = (
            <a href={ev.link} target="_blank" rel="noopener noreferrer" className="tip-btn btn-ended-link">
              VIEW
            </a>
          );
        } else if (phase.status === 'live') {
          button = (
            <a href={ev.link} target="_blank" rel="noopener noreferrer" className="tip-btn btn-watch">
              👁 WATCH
            </a>
          );
        } else {
          button = (
            <a href={ev.link} target="_blank" rel="noopener noreferrer" className="tip-btn btn-join">
              🌍 JOIN
            </a>
          );
        }
      }
      const matchDisplayName = ev.theirName
        ? `${ev.ourName || 'The Club Of 195 Countries'} vs ${ev.theirName}`
        : ev.title;
      return (
        <>
          {showSep && <div className="tip-sep" />}
          <div className="match-block">
            <CountdownBadge ev={ev} />
            <div className="tip-match-name">{matchDisplayName}</div>
            <ScoreBadge ev={ev} />
            {resultBadge}
            <div className="tip-bottom">
              <div className="tip-opp">
                ☀️ {ev.timeClass === 'daily' ? 'Daily' : ev.timeClass}
                {ev.boards ? ` · ${ev.boards} boards` : ''}
              </div>
              {button}
            </div>
          </div>
        </>
      );
    }
    function Tooltip({ events, year, month, day, onClose }) {
      const panelRef = useRef(null);
      const handleBackdropClick = useCallback((e) => {
        e.stopPropagation();
        onClose();
      }, [onClose]);
      useEffect(() => {
        const handleEsc = (e) => {
          if (e.key === 'Escape') onClose();
        };
        document.addEventListener('keydown', handleEsc);
        return () => document.removeEventListener('keydown', handleEsc);
      }, [onClose]);
      return (
        <>
          <div className="tip-backdrop show" onClick={handleBackdropClick} />
          <div
            ref={panelRef}
            className="tip-panel show mobile-center"
            onClick={(e) => e.stopPropagation()}
          >
            <div className="tip-strip">
              <div className="tip-close" onClick={onClose}>✕</div>
              <div className="tip-hdr-row">
                <div className="tip-globe">
                  {events.every(e => e.timeClass === 'daily') ? '☀️' : '🌍'}
                </div>
                <div className="tip-info">
                  <div className="tip-title">
                    {events.length === 1
                      ? (events[0].timeClass === 'daily' ? 'Daily Team Match' : 'Team Match')
                      : `${events.length} Team Matches`
                    }
                  </div>
                  <div className="tip-date">
                    {MONTH_SHORT[month]} {ordinal(day)}, {year}
                  </div>
                </div>
              </div>
            </div>
            <div className="tip-body">
              {events.map((ev, idx) => (
                <MatchBlock key={ev.id + '-' + idx} ev={ev} showSep={idx > 0} />
              ))}
            </div>
          </div>
        </>
      );
    }
    // ══════════════════════════════════════════════════════════════════════
    // MAIN APP
    // ══════════════════════════════════════════════════════════════════════
    function App() {
      const today = new Date();
      const [viewYear, setViewYear] = useState(today.getFullYear());
      const [viewMonth, setViewMonth] = useState(today.getMonth());
      const [eventMap, setEventMap] = useState({});
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [enriching, setEnriching] = useState(false);
      const [tipData, setTipData] = useState(null);
      useEffect(() => {
        async function init() {
          try {
            const { eventMap: em, matchIds } = await loadMatchList();
            setEventMap(em);
            setLoading(false);
            setEnriching(true);
            await enrichMatches(em, matchIds, (updatedMap) => {
              setEventMap({ ...updatedMap });
            });
            setEnriching(false);
          } catch (e) {
            console.error(e);
            setError('⚠ Could not load matches. Showing calendar.');
            setLoading(false);
          }
        }
        init();
      }, []);
      const goNext = useCallback(() => {
        setTipData(null);
        setViewMonth(m => {
          if (m >= 11) {
            setViewYear(y => y + 1);
            return 0;
          }
          return m + 1;
        });
      }, []);
      const goPrev = useCallback(() => {
        setTipData(null);
        setViewMonth(m => {
          if (m <= 0) {
            setViewYear(y => y - 1);
            return 11;
          }
          return m - 1;
        });
      }, []);
      const showTip = useCallback((events, y, m, d) => {
        setTipData({ events, year: y, month: m, day: d });
      }, []);
      const closeTip = useCallback(() => {
        setTipData(null);
      }, []);
      // Build calendar cells
      const firstDow = (new Date(viewYear, viewMonth, 1).getDay() + 6) % 7;
      const lastDate = new Date(viewYear, viewMonth + 1, 0).getDate();
      const prevMonth = viewMonth === 0 ? 11 : viewMonth - 1;
      const prevYear = viewMonth === 0 ? viewYear - 1 : viewYear;
      const prevLast = new Date(prevYear, prevMonth + 1, 0).getDate();
      const nextMonth = viewMonth === 11 ? 0 : viewMonth + 1;
      const nextYear = viewMonth === 11 ? viewYear + 1 : viewYear;
      const cells = [];
      for (let i = 0; i < 42; i++) {
        let cy, cm, cd, adj = false;
        if (i < firstDow) {
          cd = prevLast - firstDow + 1 + i;
          cm = prevMonth;
          cy = prevYear;
          adj = true;
        } else if (i >= firstDow + lastDate) {
          cd = i - firstDow - lastDate + 1;
          cm = nextMonth;
          cy = nextYear;
          adj = true;
        } else {
          cd = i - firstDow + 1;
          cm = viewMonth;
          cy = viewYear;
        }
        const isToday2 = !adj && cd === today.getDate() && cm === today.getMonth() && cy === today.getFullYear();
        const events = !adj ? (eventMap[dateKey(cy, cm, cd)] || []) : [];
        cells.push({ day: cd, month: cm, year: cy, isAdj: adj, isToday: isToday2, events });
      }
      return (
        <div className="cal-wrap">
          <Header />
          {loading ? (
            <Skeleton />
          ) : (
            <div className="cal-content">
              {error && (
                <div className="load-err">{error}</div>
              )}
              {enriching && (
                <div className="enriching-bar">
                  <div className="enriching-progress" />
                </div>
              )}
              <div className="cal-nav">
                <button className="nav-btn" onClick={goPrev} aria-label="Previous month">
                  <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6" /></svg>
                </button>
                <div className="month-label">
                  {MONTHS[viewMonth]} <span className="yr">{viewYear}</span>
                </div>
                <button className="nav-btn" onClick={goNext} aria-label="Next month">
                  <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6" /></svg>
                </button>
              </div>
              <div className="cal-days">
                {DAYS.map((d, i) => (
                  <div key={d} className={`day-hdr ${i >= 5 ? 'weekend' : ''}`}>
                    {d}
                  </div>
                ))}
              </div>
              <div className="cal-grid">
                {cells.map((cell, i) => {
                  const hasEvent = cell.events.length > 0;
                  const phase = hasEvent ? bestPhase(cell.events) : null;
                  let cellClass = 'cal-cell';
                  if (cell.isAdj) cellClass += ' adj';
                  if (cell.isToday) cellClass += ' today';
                  if (hasEvent) cellClass += ' has-event';
                  return (
                    <div
                      key={i}
                      className={cellClass}
                      onClick={() => {
                        if (hasEvent) showTip(cell.events, cell.year, cell.month, cell.day);
                      }}
                    >
                      <div className="cell-num">{cell.day}</div>
                      {cell.isToday && <div className="today-dot" />}
                      {hasEvent && (
                        <div className="cell-icon-wrap">
                          <div className="match-badge-container">
                            <div className="match-badge">
                              {cell.events.every(e => e.timeClass === 'daily') ? '☀️' : '⚡'}
                            </div>
                            {cell.events.length > 1 && (
                              <div className="count-bubble">{cell.events.length}</div>
                            )}
                          </div>
                        </div>
                      )}
                      {phase && <div className={`status-bar ${phase.status}`} />}
                    </div>
                  );
                })}
              </div>
              <div className="cal-legend">
                <div className="legend-item"><div className="legend-bar upcoming" />Upcoming</div>
                <div className="legend-item"><div className="legend-bar soon" />Soon</div>
                <div className="legend-item"><div className="legend-bar live" />Live</div>
                <div className="legend-item"><div className="legend-bar ended" />Ended</div>
              </div>
              <div className="cal-foot">
                <span>🌍 195 Countries</span>
                <span className="foot-dot">·</span>
                <span>@Stellar_Endgame</span>
              </div>
            </div>
          )}
          {tipData && (
            <Tooltip
              events={tipData.events}
              year={tipData.year}
              month={tipData.month}
              day={tipData.day}
              onClose={closeTip}
            />
          )}
        </div>
      );
    }
    // ══════════════════════════════════════════════════════════════════════
    // RENDER
    // ══════════════════════════════════════════════════════════════════════
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
