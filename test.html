<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club of 195 Countries – Match Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800;900&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-void:#06090f;--bg-base:#0a0f1c;--bg-cell:#0d1525;
      --globe-blue:#3b82f6;--globe-mid:#6366f1;--globe-purple:#8b5cf6;--piece-violet:#7c3aed;
      --accent-cyan:#22d3ee;--accent-gold:#f59e0b;--accent-green:#10b981;--accent-red:#ef4444;
      --text-head:#e2e8f0;--text-body:#b0b8cc;--text-dim:#5a6a84;--text-white:#f8fafc;
      --border-subtle:rgba(99,102,241,.22);--border-mid:rgba(99,102,241,.40);--border-hot:rgba(139,92,246,.65);
      --radius:12px;--radius-sm:8px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg-void);font-family:'Barlow Condensed',sans-serif;min-height:100vh;width:100%;color:var(--text-body)}
    body{display:flex;justify-content:center}
    #root{width:100%}

    @keyframes spinBorder{to{transform:rotate(360deg)}}
    @keyframes spinGlobe{to{transform:rotate(360deg)}}
    @keyframes pulse-green{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
    @keyframes barPulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-100% 0}}

    .skel{background:linear-gradient(90deg,#0a0f1c 0%,#141d35 40%,#0a0f1c 100%);background-size:300% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:4px}

    /* ── HEADER ── */
    .cal-header{position:relative;overflow:hidden;border-bottom:1px solid rgba(99,102,241,.2);background:linear-gradient(160deg,#0b1830 0%,#0e1228 50%,#09091e 100%);padding:22px 20px 18px}
    .header-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(99,102,241,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.05) 1px,transparent 1px);background-size:28px 28px}
    .header-glow{position:absolute;top:-50px;left:50%;transform:translateX(-50%);width:300px;height:150px;background:radial-gradient(ellipse,rgba(99,102,241,.22) 0%,transparent 70%);pointer-events:none}
    .header-top{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .header-left{display:flex;align-items:center;gap:14px}
    .globe-icon{position:relative;width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:52px;flex-shrink:0;background:linear-gradient(135deg,var(--globe-blue),var(--globe-purple));box-shadow:0 0 28px rgba(99,102,241,.5),0 0 10px rgba(99,102,241,.3) inset;overflow:hidden}
    .globe-emoji{display:block;line-height:1;animation:spinGlobe 10s linear infinite;transform-origin:center center}
    .globe-ring{position:absolute;inset:-4px;border-radius:50%;border:1.5px solid rgba(139,92,246,.35);animation:spinBorder 8s linear infinite}
    .header-info{display:flex;flex-direction:column;gap:3px}
    .header-title{font-family:'Bebas Neue',cursive;font-size:22px;color:var(--text-white);letter-spacing:2px;line-height:1}
    .header-sub{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--text-body);letter-spacing:3px;text-transform:uppercase}
    .live-badge{display:flex;align-items:center;gap:5px;background:rgba(99,102,241,.12);border:1px solid var(--border-subtle);border-radius:999px;padding:4px 10px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:1.5px;color:var(--accent-cyan)}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-green);box-shadow:0 0 6px var(--accent-green);animation:pulse-green 2s ease-in-out infinite}

    /* ── WRAPPER ── */
    .cal-wrap{width:100%;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-base);position:relative}

    /* ── NAV ── */
    .cal-nav{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 0;gap:12px}
    .nav-btn{width:38px;height:38px;border-radius:var(--radius-sm);border:1.5px solid var(--border-mid);background:rgba(99,102,241,.12);color:var(--text-head);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s cubic-bezier(.34,1.56,.64,1);flex-shrink:0}
    .nav-btn:hover{border-color:var(--border-hot);background:rgba(139,92,246,.25);color:var(--text-white);box-shadow:0 0 12px rgba(139,92,246,.3);transform:scale(1.08)}
    .nav-btn:active{transform:scale(.95)}
    .nav-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none}
    .month-label{flex:1;text-align:center;font-family:'Bebas Neue',cursive;font-size:28px;color:var(--text-white);letter-spacing:2.5px;line-height:1;text-shadow:0 0 30px rgba(99,102,241,.4)}
    .month-label .yr{font-size:22px;background:linear-gradient(90deg,var(--globe-blue),var(--globe-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-left:7px}

    /* ── DAY HEADERS ── */
    .cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:14px 16px 6px}
    .day-hdr{text-align:center;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:var(--text-head);padding:6px 0;background:rgba(99,102,241,.10);border-radius:5px;border:1px solid rgba(99,102,241,.15)}
    .day-hdr.weekend{color:#a78bfa;background:rgba(139,92,246,.14);border-color:rgba(139,92,246,.22)}

    /* ── GRID ── */
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 16px 16px}
    .cal-cell{background:var(--bg-cell);border-radius:8px;border:1.5px solid rgba(99,102,241,.14);min-height:80px;display:flex;flex-direction:column;align-items:center;padding:6px 4px;position:relative;overflow:visible;cursor:default;transition:border-color .15s;min-width:0}
    .cal-cell.has-event{border-color:var(--border-subtle);background:linear-gradient(160deg,#101a2c,#0e1326)}
    .cal-cell.adj{opacity:.25;pointer-events:none;border-color:transparent}
    .cal-cell.today{border-color:var(--accent-cyan);border-width:2px;background:linear-gradient(160deg,#0e1c38,#0c1630);box-shadow:0 0 0 2px rgba(34,211,238,.14) inset,0 0 18px rgba(34,211,238,.14)}
    .cal-cell.has-event::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(139,92,246,.6),transparent)}
    .cell-num{font-family:'Bebas Neue',cursive;font-size:18px;color:var(--text-head);line-height:1;align-self:flex-end;margin-right:4px;width:100%;text-align:right;letter-spacing:.5px}
    .cal-cell.today .cell-num{color:var(--accent-cyan);text-shadow:0 0 10px rgba(34,211,238,.6)}
    .cal-cell.adj .cell-num{color:var(--text-dim);opacity:.5}
    .today-dot{position:absolute;top:4px;left:4px;width:5px;height:5px;border-radius:50%;background:var(--globe-blue);box-shadow:0 0 6px var(--globe-blue)}

    /* ── ICON WRAP ── */
    .cell-icon-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;gap:3px;flex-wrap:wrap;overflow:visible}

    /* ── CHESS MATCH BADGE ── */
    .match-badge-container{position:relative;display:flex;align-items:center;justify-content:center}
    .match-badge{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,rgba(99,102,241,.32),rgba(139,92,246,.26));border:1.5px solid rgba(139,92,246,.5);display:flex;align-items:center;justify-content:center;font-size:17px;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;position:relative;box-shadow:0 2px 10px rgba(0,0,0,.4);cursor:pointer}
    .match-badge:hover{transform:scale(1.22);box-shadow:0 0 18px rgba(139,92,246,.55);z-index:10}
    .count-bubble{position:absolute;top:-6px;right:-6px;width:17px;height:17px;border-radius:50%;background:linear-gradient(135deg,var(--accent-red),#f97316);color:#fff;font-size:9px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;border:2px solid var(--bg-cell);box-shadow:0 2px 8px rgba(239,68,68,.4);z-index:11;pointer-events:none}

    /* ── SHEET EVENT BADGE ── */
    .sheet-badge{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,rgba(34,211,238,.2),rgba(99,102,241,.18));border:1.5px solid rgba(34,211,238,.35);display:flex;align-items:center;justify-content:center;font-size:15px;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;box-shadow:0 2px 8px rgba(0,0,0,.35);cursor:pointer;position:relative}
    .sheet-badge:hover{transform:scale(1.22);box-shadow:0 0 14px rgba(34,211,238,.45);z-index:10}
    .sheet-badge-count{position:absolute;top:-5px;right:-5px;width:14px;height:14px;border-radius:50%;background:rgba(34,211,238,.85);color:#06090f;font-size:8px;font-weight:900;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;border:1.5px solid var(--bg-cell);z-index:11;pointer-events:none}

    /* ── STATUS BAR ── */
    .status-bar{position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0 0 6px 6px}
    .status-bar.upcoming{background:linear-gradient(90deg,var(--globe-blue),var(--globe-purple))}
    .status-bar.soon{background:linear-gradient(90deg,var(--accent-gold),#f97316);animation:barPulse 1.5s ease-in-out infinite}
    .status-bar.live{background:linear-gradient(90deg,var(--accent-red),#f97316);animation:barPulse .8s ease-in-out infinite}
    .status-bar.ended{background:rgba(99,102,241,.18)}

    /* ── LEGEND ── */
    .cal-legend{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:14px;padding:10px 16px 12px;border-top:1px solid var(--border-subtle);background:rgba(0,0,0,.12)}
    .legend-item{display:flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.5px;color:var(--text-head)}
    .legend-bar{width:18px;height:3px;border-radius:2px}
    .legend-bar.upcoming{background:linear-gradient(90deg,var(--globe-blue),var(--globe-purple))}
    .legend-bar.soon{background:linear-gradient(90deg,var(--accent-gold),#f97316)}
    .legend-bar.live{background:var(--accent-red)}
    .legend-bar.ended{background:rgba(99,102,241,.28)}
    .cal-foot{padding:7px 16px 14px;display:flex;align-items:center;justify-content:center;gap:7px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--text-body)}

    /* ══════════════════════════════════════════
       SHARED TOOLTIP BASE
    ══════════════════════════════════════════ */
    .tip-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:500;opacity:0;transition:opacity .15s ease;pointer-events:none}
    .tip-backdrop.show{opacity:1;pointer-events:auto}

    /* both tooltip types share sizing */
    .c195-tip{
      position:fixed;z-index:600;
      border-radius:14px;padding:0;
      min-width:260px;max-width:min(360px,calc(100vw - 24px));
      box-shadow:0 24px 60px rgba(0,0,0,.92);
      opacity:0;transform:translate(-50%,-50%) scale(.95);
      transition:opacity .15s ease,transform .15s ease;
      pointer-events:none;flex-direction:column;overflow:hidden;
      display:flex;left:50%;top:50%;
      max-height:300px;
    }
    .c195-tip.show{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}

    /* ── MATCH TOOLTIP (chess — purple theme) ── */
    .match-tip{
      background:#0f1828;
      border:1.5px solid var(--border-hot);
      box-shadow:0 0 0 1px rgba(139,92,246,.12),0 24px 60px rgba(0,0,0,.92);
    }
    .match-tip-bar{height:2px;background:linear-gradient(90deg,var(--globe-blue),var(--globe-purple),var(--piece-violet));flex-shrink:0}
    .match-tip-hdr{background:linear-gradient(135deg,#131e38,#101530);padding:12px 14px 10px;border-bottom:1px solid var(--border-subtle);position:relative;flex-shrink:0}
    .match-tip-close{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:rgba(99,102,241,.22);border:1px solid var(--border-mid);color:var(--text-head);font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;z-index:5}
    .match-tip-close:hover{background:rgba(139,92,246,.4);color:#fff;transform:scale(1.1)}
    .match-tip-hdr-row{display:flex;align-items:center;gap:10px}
    .match-tip-icon{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,rgba(99,102,241,.32),rgba(139,92,246,.26));border:1px solid var(--border-mid);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .match-tip-info{display:flex;flex-direction:column;gap:2px;min-width:0;padding-right:26px}
    .match-tip-title{font-family:'Bebas Neue',cursive;font-size:17px;color:var(--text-white);line-height:1.1;letter-spacing:1px}
    .match-tip-date{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--text-head);opacity:.8}
    .match-tip-body{padding:10px 14px 12px;display:flex;flex-direction:column;gap:9px;overflow-y:auto;flex:1;min-height:0;scrollbar-width:thin;scrollbar-color:var(--border-mid) transparent}
    .match-tip-body::-webkit-scrollbar{width:5px}
    .match-tip-body::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:3px}

    /* ── SHEET EVENT TOOLTIP (cyan theme) ── */
    .sheet-tip{
      background:#091520;
      border:1.5px solid rgba(34,211,238,.45);
      box-shadow:0 0 0 1px rgba(34,211,238,.08),0 24px 60px rgba(0,0,0,.92);
    }
    .sheet-tip-bar{height:2px;background:linear-gradient(90deg,var(--accent-cyan),var(--globe-blue),var(--globe-purple));flex-shrink:0}
    .sheet-tip-hdr{background:linear-gradient(135deg,#0c1e2e,#091828);padding:12px 14px 10px;border-bottom:1px solid rgba(34,211,238,.18);position:relative;flex-shrink:0}
    .sheet-tip-close{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:rgba(34,211,238,.12);border:1px solid rgba(34,211,238,.3);color:var(--accent-cyan);font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;z-index:5}
    .sheet-tip-close:hover{background:rgba(34,211,238,.25);color:#fff;transform:scale(1.1)}
    .sheet-tip-hdr-row{display:flex;align-items:center;gap:10px}
    .sheet-tip-logo{width:34px;height:34px;border-radius:9px;background:rgba(34,211,238,.12);border:1px solid rgba(34,211,238,.3);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .sheet-tip-info{display:flex;flex-direction:column;gap:2px;min-width:0;padding-right:26px}
    .sheet-tip-title{font-family:'Bebas Neue',cursive;font-size:17px;color:var(--text-white);line-height:1.1;letter-spacing:1px}
    .sheet-tip-date{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--accent-cyan);opacity:.8}
    .sheet-tip-body{overflow-y:auto;flex:1;min-height:0;scrollbar-width:thin;scrollbar-color:rgba(34,211,238,.3) transparent;display:flex;flex-direction:column}
    .sheet-tip-body::-webkit-scrollbar{width:5px}
    .sheet-tip-body::-webkit-scrollbar-thumb{background:rgba(34,211,238,.3);border-radius:3px}

    /* event block inside sheet tooltip */
    .sheet-evt-block{padding:10px 14px 11px;display:flex;flex-direction:column;gap:6px;flex-shrink:0}
    .sheet-evt-block+.sheet-evt-block{border-top:1px solid rgba(34,211,238,.12)}
    .sheet-evt-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--text-white);line-height:1.3}
    .sheet-evt-time{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;color:var(--accent-cyan);opacity:.75}
    .sheet-evt-detail{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;color:var(--text-head);line-height:1.5}
    .sheet-evt-msg{background:rgba(34,211,238,.06);border:1px solid rgba(34,211,238,.18);border-radius:7px;padding:7px 10px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;color:var(--text-head);line-height:1.55}
    .sheet-evt-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .sheet-evt-organizer{display:inline-flex;align-items:center;gap:4px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:.5px;color:var(--accent-cyan);background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.25);border-radius:999px;padding:3px 10px;text-decoration:none;transition:all .15s}
    .sheet-evt-organizer:hover{background:rgba(34,211,238,.16)}

    /* ── SHARED ELEMENTS ── */
    .tip-countdown{display:flex;align-items:center;gap:7px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:.5px;padding:4px 10px;border-radius:999px;border:1px solid;width:fit-content}
    .tip-countdown .cd-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
    .cd-upcoming{color:#60a5fa;background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.35)}
    .cd-soon{color:#fbbf24;background:rgba(251,191,36,.1);border-color:rgba(251,191,36,.38)}
    .cd-live{color:#f87171;background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.35)}
    .cd-ended{color:#94a3b8;background:rgba(148,163,184,.06);border-color:rgba(148,163,184,.18)}
    .tip-sep{height:1px;background:linear-gradient(90deg,transparent,var(--border-mid),var(--globe-purple),var(--border-mid),transparent);margin:2px 0}
    .tip-btn{display:inline-flex;align-items:center;gap:5px;font-family:'Bebas Neue',cursive;font-size:13px;letter-spacing:1.5px;text-decoration:none;padding:5px 14px;border-radius:5px;white-space:nowrap;flex-shrink:0;transition:all .15s;cursor:pointer;border:none}
    .btn-join{background:linear-gradient(135deg,var(--globe-blue),var(--globe-purple));color:#fff;box-shadow:0 2px 12px rgba(99,102,241,.38)}
    .btn-join:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(99,102,241,.55)}
    .btn-watch{background:linear-gradient(135deg,rgba(239,68,68,.85),rgba(249,115,22,.85));color:#fff;box-shadow:0 2px 12px rgba(239,68,68,.28)}
    .btn-watch:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(239,68,68,.4)}
    .btn-ended-link{background:rgba(255,255,255,.06);color:var(--text-head);border:1px solid var(--border-subtle) !important}
    .btn-ended-link:hover{background:rgba(99,102,241,.14);border-color:var(--border-mid);color:var(--text-white)}
    .btn-sheet-join{background:linear-gradient(135deg,var(--accent-cyan),var(--globe-blue));color:#fff;box-shadow:0 2px 10px rgba(34,211,238,.25)}
    .btn-sheet-join:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(34,211,238,.4)}

    /* match card inside match tooltip */
    .match-block{display:flex;flex-direction:column;gap:7px}
    .match-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--text-white);line-height:1.4}
    .score-display{background:rgba(99,102,241,.09);border:1px solid var(--border-subtle);border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:5px}
    .score-teams{display:flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;line-height:1.3}
    .score-team-name{color:var(--text-head);flex:1;min-width:0}
    .score-team-name.our-team{color:var(--accent-cyan);text-align:left}
    .score-team-name.their-team{color:var(--text-head);text-align:right}
    .score-vs{color:var(--text-dim);font-size:9px;letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
    .score-numbers{display:flex;align-items:center;justify-content:center;gap:10px}
    .score-num{font-family:'Bebas Neue',cursive;font-size:26px;color:var(--text-white);min-width:32px;text-align:center;letter-spacing:1px}
    .score-num.winning{color:var(--accent-green);text-shadow:0 0 12px rgba(16,185,129,.45)}
    .score-num.losing{color:var(--accent-red);text-shadow:0 0 12px rgba(239,68,68,.35)}
    .score-dash{color:var(--text-dim);font-size:20px;font-family:'Bebas Neue',cursive}
    .result-badge{display:inline-flex;align-items:center;gap:4px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:1.5px;padding:3px 9px;border-radius:4px;width:fit-content}
    .badge-win{background:rgba(16,185,129,.18);color:#6ee7b7;border:1px solid rgba(16,185,129,.35)}
    .badge-loss{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
    .badge-draw{background:rgba(148,163,184,.10);color:#cbd5e1;border:1px solid rgba(148,163,184,.25)}
    .match-meta{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--text-body);opacity:.8}
    .match-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .match-meta-pill{display:flex;align-items:center;gap:5px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:800;letter-spacing:.5px;color:var(--text-head);background:rgba(99,102,241,.10);border:1px solid var(--border-subtle);border-radius:999px;padding:3px 9px}

    .skeleton-wrap{padding:12px;display:flex;flex-direction:column;gap:8px}
  </style>
</head>
<body>
  <div id="root">
    <div class="cal-wrap">
      <div class="cal-header">
        <div class="header-grid"></div>
        <div class="header-glow"></div>
        <div class="header-top">
          <div class="header-left">
            <div class="globe-icon"><span class="globe-emoji">🌍</span><div class="globe-ring"></div></div>
            <div class="header-info">
              <div class="header-title">Club of 195 Countries</div>
              <div class="header-sub">Chess.com · Est. March 2026</div>
            </div>
          </div>
          <div class="live-badge"><span class="live-dot"></span>LIVE</div>
        </div>
      </div>
      <div id="cal-content"></div>
    </div>
  </div>

  <!-- Backdrop (shared) -->
  <div class="tip-backdrop" id="tip-backdrop"></div>

  <!-- Match tooltip (chess API) -->
  <div class="c195-tip match-tip" id="matchTipEl">
    <div class="match-tip-bar"></div>
    <div class="match-tip-hdr" id="matchTipHdr">
      <div class="match-tip-close" id="matchTipClose">✕</div>
      <div class="match-tip-hdr-row">
        <div class="match-tip-icon">☀️</div>
        <div class="match-tip-info">
          <div class="match-tip-title" id="matchTipTitle">Team Matches</div>
          <div class="match-tip-date" id="matchTipDate"></div>
        </div>
      </div>
    </div>
    <div class="match-tip-body" id="matchTipBody"></div>
  </div>

  <!-- Sheet event tooltip (one per group, reused) -->
  <div class="c195-tip sheet-tip" id="sheetTipEl">
    <div class="sheet-tip-bar"></div>
    <div class="sheet-tip-hdr" id="sheetTipHdr">
      <div class="sheet-tip-close" id="sheetTipClose">✕</div>
      <div class="sheet-tip-hdr-row">
        <div class="sheet-tip-logo" id="sheetTipLogo"></div>
        <div class="sheet-tip-info">
          <div class="sheet-tip-title" id="sheetTipTitle"></div>
          <div class="sheet-tip-date" id="sheetTipDate"></div>
        </div>
      </div>
    </div>
    <div class="sheet-tip-body" id="sheetTipBody"></div>
  </div>

  <script>
    var SHEET_API_URL='https://script.google.com/macros/s/AKfycbyQRC0v7VuR2zIygBFJJaDc49r-xkRe2pxaVWpnpqcY-wAlo0ChettGdCl8gkHEtSXF/exec';
    var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
    var MONTH_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var DAY_NAMES=['MON','TUE','WED','THU','FRI','SAT','SUN'];

    function ordinal(d){var s=['th','st','nd','rd'],v=d%100;return d+(s[(v-20)%10]||s[v]||s[0]);}
    function pad(n){return String(n).padStart(2,'0');}
    function dateKey(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d);}
    function formatDate(y,m,d){return MONTH_SHORT[m]+' '+ordinal(d)+', '+y;}

    // ── Chess phase ──
    function getChessPhase(ev){
      var now=Date.now(),startMs=ev.startTs*1000;
      if(ev._status==='finished'||(ev.endTs&&now>ev.endTs*1000))return{status:'ended',text:'Ended',cls:'cd-ended'};
      if(ev._status==='live'||now>=startMs)return{status:'live',text:'🔴 In Progress',cls:'cd-live'};
      var ms=startMs-now,dd=Math.floor(ms/86400000),hh=Math.floor((ms%86400000)/3600000),mm=Math.floor((ms%3600000)/60000);
      var txt='In ';if(dd>0)txt+=dd+'d '+hh+'h';else if(hh>0)txt+=hh+'h '+mm+'m';else txt+=mm+'m';
      return{status:ms<=3600000?'soon':'upcoming',text:txt,cls:ms<=3600000?'cd-soon':'cd-upcoming'};
    }

    // ── Sheet phase ──
    function getSheetPhase(ev){
      if(!ev.timeObj||!ev.dateObj)return{status:'upcoming',text:'Upcoming',cls:'cd-upcoming'};
      var s=new Date(Date.UTC(ev.dateObj.y,ev.dateObj.m,ev.dateObj.d,ev.timeObj.h,ev.timeObj.min,0));
      var e=ev.duration>0?new Date(s.getTime()+ev.duration*3600000):null;
      var now=Date.now();
      if(now<s.getTime()){
        var ms=s-now,dd=Math.floor(ms/86400000),hh=Math.floor((ms%86400000)/3600000),mm2=Math.floor((ms%3600000)/60000);
        var txt='In ';if(dd>0)txt+=dd+'d '+hh+'h';else if(hh>0)txt+=hh+'h '+mm2+'m';else txt+=mm2+'m';
        var soon=ms<=3600000;
        return{status:soon?'soon':'upcoming',text:txt,cls:soon?'cd-soon':'cd-upcoming'};
      }else if(e&&now<e.getTime()){
        return{status:'live',text:'🔴 Live',cls:'cd-live'};
      }else if(!e&&now>=s.getTime()){
        return{status:'live',text:'🔴 Live',cls:'cd-live'};
      }
      return{status:'ended',text:'✅ Ended',cls:'cd-ended'};
    }

    function bestPhaseStatus(chessEvts,sheetGroups){
      var rank={ended:1,upcoming:2,soon:3,live:4},best=null;
      chessEvts.forEach(function(ev){var ph=getChessPhase(ev);if(!best||rank[ph.status]>rank[best])best=ph.status;});
      sheetGroups.forEach(function(g){g.events.forEach(function(ev){var ph=getSheetPhase(ev);if(!best||rank[ph.status]>rank[best])best=ph.status;});});
      return best;
    }

    function isCancelled(ev){
      return ev._status==='finished'&&ev.timeClass==='daily'
        &&ev.ourScore!==undefined&&ev.theirScore!==undefined
        &&Number(ev.ourScore)===0&&Number(ev.theirScore)===0;
    }

    // ── Chess API ──
    var CLUB_API='https://api.chess.com/pub/club/the-club-of-195-countries/matches';
    var OUR_SLUGS=['the-club-of-195-countries','the-club-of-129-countries'];
    function isOurClub(id){for(var i=0;i<OUR_SLUGS.length;i++)if(id.indexOf(OUR_SLUGS[i])!==-1)return true;return false;}
    function fetchJSON(url){
      return fetch(url,{cache:'no-store'}).then(function(r){if(r.ok)return r.json();throw new Error(r.status);})
        .catch(function(){
          return fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url))
            .then(function(r2){if(!r2.ok)throw new Error('Proxy');return r2.json();})
            .then(function(d){return JSON.parse(d.contents);});
        });
    }
    function extractMatchId(u){var m=u.match(/\/match\/(\d+)$/);return m?m[1]:'';}
    function slugToName(s){return s.replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase();});}

    function loadMatchList(){
      return fetchJSON(CLUB_API).then(function(data){
        var all=[];
        (data.registered||[]).forEach(function(m){all.push(Object.assign({},m,{_status:'upcoming'}));});
        (data.in_progress||[]).forEach(function(m){all.push(Object.assign({},m,{_status:'live'}));});
        (data.finished||[]).forEach(function(m){all.push(Object.assign({},m,{_status:'finished'}));});
        var map={},ids=[];
        all.forEach(function(m){
          if(!m.start_time)return;
          var id=extractMatchId(m['@id']);if(!id)return;
          var d=new Date(m.start_time*1000);
          var pp=(m.opponent||'').split('/'),slug=pp[pp.length-1]||'';
          var ev={id:id,title:m.name||'Team Match',opponent:slugToName(slug),opponentSlug:slug,
            link:'https://www.chess.com/club/matches/'+id,_status:m._status,result:m.result||undefined,
            startTs:m.start_time,endTs:m.end_time||undefined,timeClass:m.time_class||'daily',_type:'chess'};
          var key=dateKey(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate());
          if(!map[key])map[key]=[];map[key].push(ev);ids.push(id);
        });
        return{eventMap:map,matchIds:ids};
      });
    }

    function enrichMatches(eventMap,matchIds,onDone){
      var byId={};
      Object.keys(eventMap).forEach(function(k){eventMap[k].forEach(function(ev){if(!byId[ev.id])byId[ev.id]=[];byId[ev.id].push(ev);});});
      var bs=8,i=0;
      function next(){
        if(i>=matchIds.length)return Promise.resolve();
        var batch=matchIds.slice(i,i+bs);i+=bs;
        return Promise.allSettled(batch.map(function(id){return fetchJSON('https://api.chess.com/pub/match/'+id);}))
          .then(function(results){
            results.forEach(function(res,idx){
              if(res.status!=='fulfilled')return;
              var det=res.value,id=batch[idx],evs=byId[id]||[];
              evs.forEach(function(ev){
                if(det.url)ev.link=det.url;
                if(det.teams){
                  var t1=det.teams.team1,t2=det.teams.team2,our,their;
                  if(isOurClub(t1['@id'])){our=t1;their=t2;}
                  else if(isOurClub(t2['@id'])){our=t2;their=t1;}
                  else{our=t1;their=t2;}
                  ev.ourName=our.name;ev.theirName=their.name;ev.ourScore=our.score;ev.theirScore=their.score;ev.boards=det.boards;ev.opponent=their.name;
                }
              });
            });
            return next();
          });
      }
      return next().then(function(){
        Object.keys(eventMap).forEach(function(k){
          eventMap[k]=eventMap[k].filter(function(ev){return!isCancelled(ev);});
          if(!eventMap[k].length)delete eventMap[k];
        });
        onDone();
      });
    }

    // ── Sheet events — grouped by logo ──
    // sheetGroupMap: dateKey → [{logoKey, logo, events:[]}]
    var sheetGroupMap={};

    function parseSheetDate(raw){
      if(!raw)return null;var s=String(raw).trim();
      if(/^\d{4}-\d{2}-\d{2}$/.test(s)){var p=s.split('-').map(Number);return{y:p[0],m:p[1]-1,d:p[2]};}
      if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)){var q=s.split('/').map(Number);return{y:q[2],m:q[0]-1,d:q[1]};}
      var dt=new Date(s);if(!isNaN(dt))return{y:dt.getFullYear(),m:dt.getMonth(),d:dt.getDate()};
      return null;
    }
    function parseSheetTime(raw){
      if(!raw)return null;var s=String(raw).trim();
      if(/^\d{1,2}$/.test(s)){var h=parseInt(s);return(h>=0&&h<=23)?{h:h,min:0}:null;}
      var m=s.match(/^(\d{1,2}):(\d{2})(?::\d{2})?(?:\s*(am|pm))?$/i);if(!m)return null;
      var h=parseInt(m[1]),min=parseInt(m[2]);
      if(m[3]){if(m[3].toLowerCase()==='pm'&&h<12)h+=12;if(m[3].toLowerCase()==='am'&&h===12)h=0;}
      return{h:h,min:min};
    }

    function loadSheetEvents(){
      return fetch(SHEET_API_URL,{cache:'no-store'})
        .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
        .then(function(data){
          if(!Array.isArray(data))throw new Error('not array');
          var rawMap={};
          data.forEach(function(row){
            var title=String(row.title||'').trim();
            var dateObj=parseSheetDate(row.date);
            if(!title||!dateObj)return;
            var timeRaw=row.time;
            if(typeof timeRaw==='number'&&timeRaw>0&&timeRaw<1){
              var tm=Math.round(timeRaw*1440);timeRaw=pad(Math.floor(tm/60))+':'+pad(tm%60);
            }
            var ev={
              _type:'sheet',dateObj:dateObj,timeObj:parseSheetTime(timeRaw),
              duration:parseFloat(String(row.duration||'0'))||0,
              title:title,details:String(row.details||'').trim(),
              link:String(row.link||'').trim(),logo:String(row.logo||'🌍').trim(),
              organizer:String(row.organizer||'').trim().replace(/^@/,''),
              message:String(row.message||'').trim()
            };
            var k=dateKey(dateObj.y,dateObj.m,dateObj.d);
            if(!rawMap[k])rawMap[k]=[];rawMap[k].push(ev);
          });
          // Group by logo key per day
          sheetGroupMap={};
          Object.keys(rawMap).forEach(function(k){
            var groups=[],logoToIdx={};
            rawMap[k].forEach(function(ev){
              var lk=ev.logo||'__none__';
              if(logoToIdx[lk]===undefined){logoToIdx[lk]=groups.length;groups.push({logoKey:lk,logo:ev.logo,events:[]});}
              groups[logoToIdx[lk]].events.push(ev);
            });
            sheetGroupMap[k]=groups;
          });
        })
        .catch(function(e){console.warn('Sheet load error:',e.message);});
    }

    // ── State ──
    var today=new Date();
    var viewYear=today.getFullYear(),viewMonth=today.getMonth();
    var matchEventMap={};

    // ── Render ──
    function renderContent(){
      var slot=document.getElementById('cal-content');
      var html='';

      html+='<div class="cal-nav">'+
        '<button class="nav-btn" id="btn-prev"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button>'+
        '<div class="month-label">'+MONTHS[viewMonth]+'<span class="yr"> '+viewYear+'</span></div>'+
        '<button class="nav-btn" id="btn-next"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>'+
        '</div>';

      html+='<div class="cal-days">';
      for(var di=0;di<7;di++)html+='<div class="day-hdr'+(di>=5?' weekend':'')+'">'+DAY_NAMES[di]+'</div>';
      html+='</div>';

      var firstDow=(new Date(viewYear,viewMonth,1).getDay()+6)%7;
      var lastDate=new Date(viewYear,viewMonth+1,0).getDate();
      var pM=viewMonth===0?11:viewMonth-1,pY=viewMonth===0?viewYear-1:viewYear;
      var prevLast=new Date(pY,pM+1,0).getDate();
      var nM=viewMonth===11?0:viewMonth+1,nY=viewMonth===11?viewYear+1:viewYear;

      html+='<div class="cal-grid" id="calGrid">';
      for(var i=0;i<42;i++){
        var cy,cm,cd,adj=false;
        if(i<firstDow){cd=prevLast-firstDow+1+i;cm=pM;cy=pY;adj=true;}
        else if(i>=firstDow+lastDate){cd=i-firstDow-lastDate+1;cm=nM;cy=nY;adj=true;}
        else{cd=i-firstDow+1;cm=viewMonth;cy=viewYear;}
        var isToday=!adj&&cd===today.getDate()&&cm===today.getMonth()&&cy===today.getFullYear();
        var k=dateKey(cy,cm,cd);
        var chessEvts=!adj?(matchEventMap[k]||[]):[];
        var sheetGroups=!adj?(sheetGroupMap[k]||[]):[];
        var hasChess=chessEvts.length>0,hasSheet=sheetGroups.length>0,has=hasChess||hasSheet;
        var barStatus=has?bestPhaseStatus(chessEvts,sheetGroups):null;

        var cls='cal-cell'+(adj?' adj':'')+(isToday?' today':'')+(has?' has-event':'');
        html+='<div class="'+cls+'" data-key="'+k+'"><div class="cell-num">'+cd+'</div>';
        if(isToday)html+='<div class="today-dot"></div>';
        if(has){
          html+='<div class="cell-icon-wrap">';
          // Chess badge
          if(hasChess){
            var chessIcon=chessEvts.every(function(e){return e.timeClass==='daily';})? '☀️':'⚡';
            html+='<div class="match-badge-container">'+
              '<div class="match-badge" data-action="chess" data-key="'+k+'">'+chessIcon+'</div>';
            if(chessEvts.length>1)html+='<div class="count-bubble">'+chessEvts.length+'</div>';
            html+='</div>';
          }
          // Sheet group badges — one per group
          sheetGroups.forEach(function(g,gi){
            var logoChar=g.logo&&g.logo.trim()?g.logo:'🌍';
            html+='<div class="sheet-badge" data-action="sheet" data-key="'+k+'" data-gi="'+gi+'">'+logoChar;
            if(g.events.length>1)html+='<span class="sheet-badge-count">'+g.events.length+'</span>';
            html+='</div>';
          });
          html+='</div>';
          html+='<div class="status-bar '+barStatus+'"></div>';
        }
        html+='</div>';
      }
      html+='</div>';

      html+='<div class="cal-legend">'+
        '<div class="legend-item"><div class="legend-bar upcoming"></div>Upcoming</div>'+
        '<div class="legend-item"><div class="legend-bar soon"></div>Soon</div>'+
        '<div class="legend-item"><div class="legend-bar live"></div>Live</div>'+
        '<div class="legend-item"><div class="legend-bar ended"></div>Ended</div>'+
        '</div>';
      html+='<div class="cal-foot"><span>🌍 195 Countries</span><span>·</span><span>@Stellar_Endgame</span></div>';

      slot.innerHTML=html;

      document.getElementById('btn-prev').onclick=function(){viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}hideAll();renderContent();};
      document.getElementById('btn-next').onclick=function(){viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}hideAll();renderContent();};

      // Delegated click on grid
      document.getElementById('calGrid').addEventListener('click',function(e){
        var mb=e.target.closest('[data-action="chess"]');
        if(mb){var k=mb.getAttribute('data-key'),pts=k.split('-');showMatchTip(matchEventMap[k]||[],parseInt(pts[0]),parseInt(pts[1])-1,parseInt(pts[2]));return;}
        var sb=e.target.closest('[data-action="sheet"]');
        if(sb){var k=sb.getAttribute('data-key'),gi=parseInt(sb.getAttribute('data-gi'));var groups=sheetGroupMap[k]||[];if(groups[gi]){var pts=k.split('-');showSheetTip(groups[gi],parseInt(pts[0]),parseInt(pts[1])-1,parseInt(pts[2]));}}
      });
    }

    // ── Skeleton ──
    function renderSkeleton(){
      var slot=document.getElementById('cal-content');
      var html='<div class="skeleton-wrap">';
      html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'+
        '<div class="skel" style="width:28px;height:28px;border-radius:6px"></div>'+
        '<div class="skel" style="flex:1;height:22px;border-radius:4px"></div>'+
        '<div class="skel" style="width:28px;height:28px;border-radius:6px"></div></div>';
      html+='<div style="display:flex;gap:4px">';
      for(var i=0;i<7;i++)html+='<div class="skel" style="flex:1;height:18px;border-radius:4px"></div>';
      html+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">';
      for(var j=0;j<42;j++)html+='<div class="skel" style="height:62px;border-radius:6px"></div>';
      html+='</div></div>';
      slot.innerHTML=html;
    }

    // ══════════════════════════════════════════
    // MATCH TOOLTIP
    // ══════════════════════════════════════════
    var matchTipEl=document.getElementById('matchTipEl');
    var matchTipTitle=document.getElementById('matchTipTitle');
    var matchTipDate=document.getElementById('matchTipDate');
    var matchTipBody=document.getElementById('matchTipBody');
    var backdropEl=document.getElementById('tip-backdrop');

    document.getElementById('matchTipClose').onclick=function(){hideMatchTip();};

    function showMatchTip(evts,y,m,d){
      hideSheetTip();
      matchTipTitle.textContent=evts.length===1?'Team Match':'Team Matches ('+evts.length+')';
      matchTipDate.textContent=formatDate(y,m,d);
      matchTipBody.innerHTML='';
      evts.forEach(function(ev,idx){
        if(idx>0){var sep=document.createElement('div');sep.className='tip-sep';matchTipBody.appendChild(sep);}
        var block=document.createElement('div');block.className='match-block';
        var phase=getChessPhase(ev);
        // Phase pill
        var cd=document.createElement('div');cd.className='tip-countdown '+phase.cls;
        cd.innerHTML='<span class="cd-dot"></span>'+phase.text;block.appendChild(cd);
        // Match name
        var nm=document.createElement('div');nm.className='match-name';
        nm.textContent=ev.theirName?(ev.ourName||'Club of 195')+' vs '+ev.theirName:ev.title;block.appendChild(nm);
        // Score
        if(ev.ourScore!==undefined&&ev.theirScore!==undefined){
          var oc=ev.ourScore>ev.theirScore?' winning':(ev.ourScore<ev.theirScore?' losing':'');
          var tc=ev.theirScore>ev.ourScore?' winning':(ev.theirScore<ev.ourScore?' losing':'');
          var sd=document.createElement('div');sd.className='score-display';
          sd.innerHTML='<div class="score-teams"><span class="score-team-name our-team">'+(ev.ourName||'Club of 195')+'</span><span class="score-vs">vs</span><span class="score-team-name their-team">'+(ev.theirName||ev.opponent)+'</span></div>'+
            '<div class="score-numbers"><span class="score-num'+oc+'">'+ev.ourScore+'</span><span class="score-dash">–</span><span class="score-num'+tc+'">'+ev.theirScore+'</span></div>';
          block.appendChild(sd);
        }
        // Result badge
        if(ev._status==='finished'&&ev.result){
          var rb=document.createElement('span');
          if(ev.result==='win'){rb.className='result-badge badge-win';rb.textContent='✓ WIN';}
          else if(ev.result==='lose'||ev.result==='loss'){rb.className='result-badge badge-loss';rb.textContent='✗ LOSS';}
          else{rb.className='result-badge badge-draw';rb.textContent='⬛ DRAW';}
          block.appendChild(rb);
        }
        // Bottom row
        var bot=document.createElement('div');bot.className='match-bottom';
        var meta=document.createElement('div');meta.className='match-meta-pill';
        meta.textContent=(ev.timeClass==='daily'?'☀️ Daily':ev.timeClass)+(ev.boards?' · '+ev.boards+' boards':'');
        bot.appendChild(meta);
        if(ev.link){
          var a=document.createElement('a');a.target='_blank';a.rel='noopener noreferrer';a.href=ev.link;
          if(phase.status==='ended'){a.className='tip-btn btn-ended-link';a.textContent='VIEW';}
          else if(phase.status==='live'){a.className='tip-btn btn-watch';a.textContent='👁 WATCH';}
          else{a.className='tip-btn btn-join';a.textContent='🌍 JOIN';}
          bot.appendChild(a);
        }
        block.appendChild(bot);
        matchTipBody.appendChild(block);
      });
      backdropEl.classList.add('show');
      matchTipEl.classList.add('show');
      document.addEventListener('keydown',escHandler);
    }

    function hideMatchTip(){matchTipEl.classList.remove('show');checkBackdrop();document.removeEventListener('keydown',escHandler);}

    // ══════════════════════════════════════════
    // SHEET TOOLTIP
    // ══════════════════════════════════════════
    var sheetTipEl=document.getElementById('sheetTipEl');
    var sheetTipLogo=document.getElementById('sheetTipLogo');
    var sheetTipTitle=document.getElementById('sheetTipTitle');
    var sheetTipDate=document.getElementById('sheetTipDate');
    var sheetTipBody=document.getElementById('sheetTipBody');

    document.getElementById('sheetTipClose').onclick=function(){hideSheetTip();};

    function showSheetTip(group,y,m,d){
      hideMatchTip();
      // Header
      sheetTipLogo.textContent=group.logo&&group.logo.trim()?group.logo:'🌍';
      sheetTipTitle.textContent=group.events.length>1?'Events':group.events[0].title;
      sheetTipDate.textContent=formatDate(y,m,d);
      // Body — one block per event
      sheetTipBody.innerHTML='';
      group.events.forEach(function(ev){
        var block=document.createElement('div');block.className='sheet-evt-block';
        // Event name (shown even when single event, since it's in header already it looks redundant — only show if multi)
        if(group.events.length>1){
          var nm=document.createElement('div');nm.className='sheet-evt-name';nm.textContent=ev.title;block.appendChild(nm);
        }
        // Time
        if(ev.timeObj){
          var tm=document.createElement('div');tm.className='sheet-evt-time';
          tm.textContent=pad(ev.timeObj.h)+':'+pad(ev.timeObj.min)+' UTC'+(ev.duration>0?' · '+ev.duration+'h':'');block.appendChild(tm);
        }
        // Phase
        var ph=getSheetPhase(ev);
        var cd=document.createElement('div');cd.className='tip-countdown '+ph.cls;
        cd.innerHTML='<span class="cd-dot"></span>'+ph.text;block.appendChild(cd);
        // Details
        if(ev.details){var det=document.createElement('div');det.className='sheet-evt-detail';det.textContent=ev.details;block.appendChild(det);}
        // Message
        if(ev.message){var msg=document.createElement('div');msg.className='sheet-evt-msg';msg.textContent=ev.message;block.appendChild(msg);}
        // Bottom row
        if(ev.organizer||ev.link){
          var bot=document.createElement('div');bot.className='sheet-evt-bottom';
          if(ev.organizer){
            var org=document.createElement('a');org.className='sheet-evt-organizer';
            org.href='https://www.chess.com/member/'+ev.organizer;org.target='_blank';org.rel='noopener noreferrer';
            org.textContent='♟ @'+ev.organizer;bot.appendChild(org);
          }
          if(ev.link){
            var a=document.createElement('a');a.className='tip-btn btn-sheet-join';
            a.href=ev.link;a.target='_blank';a.rel='noopener noreferrer';a.textContent='JOIN';bot.appendChild(a);
          }
          block.appendChild(bot);
        }
        sheetTipBody.appendChild(block);
      });
      backdropEl.classList.add('show');
      sheetTipEl.classList.add('show');
      document.addEventListener('keydown',escHandler);
    }

    function hideSheetTip(){sheetTipEl.classList.remove('show');checkBackdrop();document.removeEventListener('keydown',escHandler);}
    function checkBackdrop(){if(!matchTipEl.classList.contains('show')&&!sheetTipEl.classList.contains('show'))backdropEl.classList.remove('show');}
    function hideAll(){hideMatchTip();hideSheetTip();}
    function escHandler(e){if(e.key==='Escape')hideAll();}

    backdropEl.onclick=function(){hideAll();};
    matchTipEl.onclick=function(e){e.stopPropagation();};
    sheetTipEl.onclick=function(e){e.stopPropagation();};

    // ── Init ──
    renderSkeleton();
    Promise.all([loadMatchList(),loadSheetEvents()])
      .then(function(results){
        matchEventMap=results[0].eventMap;
        var matchIds=results[0].matchIds;
        renderContent();
        return enrichMatches(matchEventMap,matchIds,function(){renderContent();});
      })
      .catch(function(e){console.error(e);renderContent();});
  </script>
</body>
</html>
