<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MCA Standings</title>
<style>
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: transparent;
}

/* Outer card gradient */
.card {
  width: 100%;
  border-radius: 20px;
  padding: 2px;
  background: linear-gradient(45deg, rgba(255,176,120,.45), rgba(190,90,60,.45), rgba(255,176,120,.45));
}

/* Inner dark overlay */
.inner {
  background: rgba(10,14,12,.55);
  border-radius: 18px;
  padding: 16px;
  box-shadow: inset 0 0 14px rgba(0,0,0,.45);
}

/* Title & subtitle */
.title {
  text-align: center;
  font-size: 18px;
  font-weight: 900;
  color: #ffb37a;
  margin-bottom: 6px;
}

.subtitle {
  text-align: center;
  font-size: 13px;
  color: #f2ebe7;
  margin-bottom: 14px;
}

/* Players grid with 2 columns */
.players {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px 14px;
}

/* Individual player */
.player {
  display: flex;
  align-items: center;
  justify-content: space-between; /* push points/cheers right */
  gap: 10px;
  padding: 6px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05); /* slight highlight */
}

/* Avatar */
.avatar {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 2px solid rgba(255,176,120,.6);
  flex-shrink: 0;
}

/* Player info */
.info {
  display: flex;
  flex-direction: column;
}

.name {
  font-size: 13px;
  font-weight: bold;
  color: #6ecbff;
}

.points {
  font-size: 12px;
  color: #cfc6c1;
  text-align: right; /* align to the right */
}
</style>
</head>

<body>

<div class="card">
  <div class="inner">
    <div class="title">🏆 MCA Arena Standings</div>
    <div class="subtitle">Hot Chilli CheckMate 🌶️</div>
    <div class="players" id="players"></div>
  </div>
</div>

<script>
let players = [
  ["StrategicBrit",111],
  ["Nat-2024",98],
  ["ahad5389",67],
  ["Daniel2040",58],
  ["vednu",46],
  ["Taki",37],
  ["Milgoze",29],
  ["solarsystem3105",19],
  ["TrofAndy",19],
  ["ResurgenceOfVoid",17],
  ["secondacountofacupcake",5],
  ["Tengen_Uzuui",3],
  ["N-H-13",2],
  ["Scorapo_Va",2],
  ["BlitzNyx",2],
  ["AlonebyQ3",2],
  ["CheXmaster15",2],
  ["pistachio-nut1",2]
];

// Sort leaderboard
players.sort((a,b) => b[1] - a[1]);

const container = document.getElementById("players");

const maxScore = players[0][1];

async function render() {
  for (let i=0; i<players.length; i++) {
    let rank = i+1;
    let user = players[i][0];
    let pts = players[i][1];

    let cheers = 5;
    let medal = "🏅";
    if(rank == 1){cheers=20; medal="🥇";}
    else if(rank == 2){cheers=15; medal="🥈";}
    else if(rank == 3){cheers=10; medal="🥉";}

    let avatar = "https://www.chess.com/bundles/web/images/noavatar_l.84a92436.gif";

    try {
      let r = await fetch(`https://api.chess.com/pub/player/${user}`);
      let d = await r.json();
      if(d.avatar) avatar = d.avatar;
    } catch{}

    // Create player element
    let row = document.createElement("div");
    row.className = "player";
    row.innerHTML = `
      <img class="avatar" src="${avatar}">
      <div class="info">
        <div class="name">${medal} #${rank} @${user}</div>
      </div>
      <div class="points">${pts} pts • ${cheers} Cheers 🎉</div>
    `;
    container.appendChild(row);
  }
}

render();
</script>

</body>
</html>
