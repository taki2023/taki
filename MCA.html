<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCA Standings</title>

<style>

body{
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:transparent;
}

/* CARD */
.card{
  width:100%;
  border-radius:20px;
  padding:0.1px;
  background: linear-gradient(45deg, rgba(255,176,120,.45), rgba(190,90,60,.45), rgba(255,176,120,.45));
  box-sizing:border-box;
}

.inner{
  background: rgba(10,14,12,0.85);
  border-radius:18px;
  padding:14px;
  box-shadow: inset 0 0 14px rgba(0,0,0,.45);
}

/* TITLE */
.title{
  text-align:center;
  font-size:17px;
  font-weight:900;
  color:#ffb37a;
  letter-spacing:.6px;
  margin-bottom:8px;
}

.subtitle{
  text-align:center;
  font-size:13px;
  font-weight:600;
  color:#f2ebe7;
  margin-bottom:14px;
}

/* PLAYERS GRID */
.players{
  display:grid;
  grid-template-columns: repeat(2, minmax(0,1fr));
  gap:12px 14px;
}

.player{
  display:flex;
  align-items:center;
  gap:10px;
  min-width:0;
}

/* AVATAR */
.avatar{
  width:44px;
  height:44px;
  border-radius:50%;
  border:2px solid rgba(255,176,120,.6);
  flex-shrink:0;
  cursor:pointer;
}

/* INFO */
.info{
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-width:0;
}

.name{
  font-size:14px;
  font-weight:bold;
  color:#6ecbff;
  text-decoration:none;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:130px;
}

.name:hover{
  text-decoration:underline;
}

.points{
  font-size:12px;
  color:#cfc6c1;
  white-space:nowrap;
}

/* DIVIDER */
hr{
  border:0;
  height:1px;
  background: linear-gradient(90deg,transparent,rgba(255,176,120,.35),transparent);
  margin:10px 0;
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:13px;
  font-weight:bold;
  color:#f2ebe7;
  margin-top:10px;
}

/* ========================= */
/* PHONE ONLY FIX */
/* ========================= */

@media screen and (max-width:480px){

body{
  height:686px;
  overflow:hidden;
}

.card{
  height:686px;
}

.inner{
  height:100%;
  display:flex;
  flex-direction:column;
}

.players{
  gap:6px 10px;
}

/* smaller avatars */
.avatar{
  width:28px;
  height:28px;
  border-width:1.5px;
}

/* smaller usernames */
.name{
  font-size:11px;
  max-width:85px;
}

/* smaller points */
.points{
  font-size:9px;
}

.player{
  gap:6px;
}

.title{
  font-size:15px;
}

.subtitle{
  font-size:12px;
}

.footer{
  margin-top:auto;
}

}

</style>
</head>

<body>

<div class="card">
<div class="inner">

<div class="title">🏆 MCA Standings</div>
<div class="subtitle">Hot Chilli CheckMate 🌶️</div>

<div class="players" id="players"></div>

<hr>

<div class="footer">🎉 Thank you and let's conquer chess.com together 🌶️</div>

</div>
</div>

<script>

let players=[
["StrategicBrit",111],
["Nat-2024",98],
["ahad5389",67],
["Daniel2040",58],
["vednu",46],
["Taki",37],
["Milgoze",29],
["solarsystem3105",19],
["TrofAndy",19],
["ResurgenceOfVoid",17],
["secondacountofacupcake",5],
["Tengen_Uzuui",3],
["N-H-13",2],
["Scorapo_Va",2],
["BlitzNyx",2],
["AlonebyQ3",2],
["CheXmaster15",2],
["pistachio-nut1",2]
];

players.sort((a,b)=>b[1]-a[1]);

const container=document.getElementById("players");

async function render(){

const avatars=await Promise.all(players.map(async([user,pts])=>{
try{
let res=await fetch(`https://api.chess.com/pub/player/${user}`);
let data=await res.json();
return data.avatar || "https://www.chess.com/bundles/web/images/noavatar_l.84a92436.gif";
}catch{
return "https://www.chess.com/bundles/web/images/noavatar_l.84a92436.gif";
}
}));

let html='';

for(let i=0;i<players.length;i++){

let rank=i+1;
let user=players[i][0];
let pts=players[i][1];

let cheers=5;
let medal="🏅";

if(rank==1){cheers=20; medal="🥇"}
else if(rank==2){cheers=15; medal="🥈"}
else if(rank==3){cheers=10; medal="🥉"}
else if(rank==4 || rank==5){cheers=7; medal="🏅"}

html+=`

<div class="player">

<a href="https://www.chess.com/member/${user}" target="_blank">
<img class="avatar" src="${avatars[i]}" alt="@${user}">
</a>

<div class="info">

<a class="name" href="https://www.chess.com/member/${user}" target="_blank">
#${rank} ${medal} @${user}
</a>

<div class="points">
${pts} pts • ${cheers} Cheers 🎉
</div>

</div>

</div>

`;

}

container.innerHTML=html;

}

render();

</script>

</body>
</html>
