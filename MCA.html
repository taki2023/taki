<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MCA Standings</title>
<style>
body {
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:transparent;
}

.card {
  width:100%;
  margin: 12px auto;
  border-radius:20px;
  padding:0.1px;
  background: linear-gradient(45deg, rgba(255,176,120,.45), rgba(190,90,60,.45), rgba(255,176,120,.45));
}

.inner {
  background: rgba(10,14,12,.55);
  border-radius: 18px;
  padding: 14px;
  box-shadow: inset 0 0 14px rgba(0,0,0,.45);
}

.title {
  text-align:center;
  font-size:17px;
  font-weight:900;
  color:#ffb37a;
  letter-spacing:.6px;
  margin-bottom:8px;
}

.subtitle {
  text-align:center;
  font-size:13px;
  font-weight:600;
  color:#f2ebe7;
  margin-bottom:14px;
}

.players {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:12px 14px;
}

.player {
  display:flex;
  align-items:center;
  gap:10px;
}

.avatar {
  width:44px;
  height:44px;
  border-radius:50%;
  border:2px solid rgba(255,176,120,.6);
  flex-shrink:0;
  cursor:pointer;
}

.info {
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.name {
  font-size:14px;
  font-weight:bold;
  color:#6ecbff;
  cursor:pointer;
}

.points {
  font-size:12px;
  color:#cfc6c1;
}

hr {
  border:0;
  height:1px;
  background: linear-gradient(90deg,transparent,rgba(255,176,120,.35),transparent);
  margin:10px 0;
}

.footer {
  text-align:center;
  font-size:13px;
  font-weight:bold;
  color:#f2ebe7;
  margin-top:10px;
}
</style>
</head>
<body>

<div class="card">
  <div class="inner">
    <!-- Title -->
    <div class="title">🏆 MCA Standings</div>
    <!-- Subtitle -->
    <div class="subtitle">Hot Chilli CheckMate 🌶️</div>
    <!-- Players Grid -->
    <div class="players" id="players"></div>
    <hr />
    <div class="footer">🎉 Thank you and let's conquer chess.com together 🌶️</div>
  </div>
</div>

<script>
let players=[
  ["StrategicBrit",111],
  ["Nat-2024",98],
  ["ahad5389",67],
  ["Daniel2040",58],
  ["vednu",46],
  ["Taki",37],
  ["Milgoze",29],
  ["solarsystem3105",19],
  ["TrofAndy",19],
  ["ResurgenceOfVoid",17],
  ["secondacountofacupcake",5],
  ["Tengen_Uzuui",3],
  ["N-H-13",2],
  ["Scorapo_Va",2],
  ["BlitzNyx",2],
  ["AlonebyQ3",2],
  ["CheXmaster15",2],
  ["pistachio-nut1",2]
];

players.sort((a,b)=>b[1]-a[1]);

const container=document.getElementById("players");

async function render(){
  for(let i=0;i<players.length;i++){
    let rank=i+1;
    let user=players[i][0];
    let pts=players[i][1];
    let cheers=5;
    let medal="🏅";
    if(rank==1){cheers=20; medal="🥇"}
    else if(rank==2){cheers=15; medal="🥈"}
    else if(rank==3){cheers=10; medal="🥉"}
    else if(rank==4 || rank==5){cheers=7; medal="🏅"}

    let avatar="https://www.chess.com/bundles/web/images/noavatar_l.84a92436.gif";
    try{
      let r=await fetch(`https://api.chess.com/pub/player/${user}`);
      let d=await r.json();
      if(d.avatar) avatar=d.avatar;
    }catch{}

    let playerDiv=document.createElement("div");
    playerDiv.className="player";
    playerDiv.innerHTML=`
      <img class="avatar" src="${avatar}" data-username="${user}">
      <div class="info">
        <div class="name" data-username="${user}">${medal} @${user}</div>
        <div class="points">${pts} pts • ${cheers} Cheers 🎉</div>
      </div>
    `;
    container.appendChild(playerDiv);
  }

  const clickable = document.querySelectorAll('.avatar, .name');
  clickable.forEach(el=>{
    el.addEventListener('click', ()=>{
      const username = el.getAttribute('data-username');
      const event = new CustomEvent('chesscomProfile', {detail: {username}});
      window.dispatchEvent(event);
    });
  });
}

render();
</script>

</body>
</html>
