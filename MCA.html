<style>
body {
  margin:0;
  font-family:Arial,Helvetica,sans-serif;
  background:transparent;
}

.card {
  width:100%;
  border-radius:20px;
  padding:2px;
  background:linear-gradient(45deg,rgba(255,176,120,.45),rgba(190,90,60,.45),rgba(255,176,120,.45));
}

.inner {
  background:rgba(10,14,12,.65);
  border-radius:18px;
  padding:16px;
  box-shadow:inset 0 0 14px rgba(0,0,0,.5);
}

.title {
  text-align:center;
  font-size:20px; /* slightly bigger */
  font-weight:900;
  color:#ffb37a;
  margin-bottom:6px;
}

.subtitle {
  text-align:center;
  font-size:14px; /* slightly bigger */
  color:#e6ded8;
  margin-bottom:14px;
}

.players {
  display:flex;
  flex-direction:column;
  gap:10px;
}

.player {
  display:flex;
  align-items:center;
  position:relative;
  padding:6px;
  border-radius:10px;
  overflow:hidden;
}

.bar {
  position:absolute;
  left:0;
  top:0;
  height:100%;
  border-radius:10px;
  background:linear-gradient(90deg,#ff944d,#ff5c33);
  opacity:.35;
  width:0%;
  transition:width 1.2s ease;
  z-index:1;
}

.player:nth-child(1) .bar { background:linear-gradient(90deg,#ffd700,#ffb300);}
.player:nth-child(2) .bar { background:linear-gradient(90deg,#cfd8dc,#90a4ae);}
.player:nth-child(3) .bar { background:linear-gradient(90deg,#ffb74d,#ff8f00);}

.avatar {
  width:42px;
  height:42px;
  border-radius:50%;
  border:2px solid rgba(255,176,120,.6);
  z-index:2;
  flex-shrink:0;
}

.info {
  flex:1;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:2;
  padding-left:10px;
}

.name {
  font-size:16px; /* bigger for medal and rank */
  font-weight:bold;
  color:#6ecbff;
}

.points {
  font-size:14px; /* bigger points and cheers */
  color:#d7ccc7;
  white-space:nowrap;
}
</style>
