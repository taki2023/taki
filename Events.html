<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>Hot Chilli CheckMate – Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:ital,wght@0,400;0,700;0,800;0,900;1,700;1,800&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
<style>
:root{
  --red-dark:#d93020;--red-mid:#e85535;--red-border:#e8553a;
  --bg:#fff5f0;--card:#fff;--border:#f5c5b8;--shadow:#e8aa98;
  --text-dark:#c73520;--text-mid:#9a2010;
  --fs-xs:10px;--fs-sm:11px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{color-scheme:light;}
html,body{width:100%;background:transparent;font-family:'Nunito',sans-serif;}

.page-sb{
  width:100%;background:var(--bg);
  border-radius:28px;border:3px solid var(--red-border);
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 8px 32px rgba(217,48,32,.12);
  height:492px;transition:height .3s ease;
}
.page-sb.loaded{height:auto;}

/* ── SKELETON ── */
.cal-skeleton{display:flex;flex-direction:column;gap:8px;padding:10px 10px 12px;flex:1;}
.skel-nav{display:flex;align-items:center;gap:8px;height:34px;}
.skel-circle{width:34px;height:34px;min-width:34px;border-radius:50%;background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;flex-shrink:0;}
.skel-label{flex:1;height:20px;border-radius:8px;background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;}
.skel-head{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;}
.skel-head-cell{height:28px;border-radius:8px;background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;}
.skel-head-cell:nth-child(odd){animation-delay:.1s;}
.skel-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;flex:1;}
.skel-cell{border-radius:9px;background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;min-height:46px;}
.skel-cell:nth-child(3n){animation-delay:.12s;}
.skel-cell:nth-child(5n){animation-delay:.22s;}
.skel-cell:nth-child(7n){animation-delay:.07s;}
.skel-cell.empty{background:#fff5f0;animation:none;border:1.5px dashed #f5c5b8;}
.skel-legend{display:flex;align-items:center;justify-content:center;gap:12px;padding:6px 4px 2px;margin-top:auto;}
.skel-legend-item{height:12px;width:60px;border-radius:6px;background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;}
.skel-legend-item:nth-child(2){animation-delay:.1s;}
.skel-legend-item:nth-child(3){animation-delay:.2s;}
.skel-legend-item:nth-child(4){animation-delay:.3s;}
.skel-footer{height:14px;width:60%;border-radius:6px;margin:4px auto 0;background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-100% 0;}}

.page-sb.loaded .cal-skeleton{display:none;}
.cal-real{display:none;}
.page-sb.loaded .cal-real{display:flex;flex-direction:column;}

/* ── BANNER ── */
.page-top{background:linear-gradient(135deg,#d93020 0%,#e85535 60%,#ef6640 100%);border-radius:24px 24px 0 0;padding:8px 16px 14px;text-align:center;position:relative;overflow:hidden;flex-shrink:0;}
.page-top::before{content:'';position:absolute;bottom:-10px;left:-10%;width:120%;height:20px;background:var(--bg);border-radius:50%;}
.page-top::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-55deg,transparent,transparent 14px,rgba(255,255,255,.04) 14px,rgba(255,255,255,.04) 28px);pointer-events:none;}
.page-title{font-family:'Fredoka One',cursive;font-size:18.5px;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.22),0 4px 10px rgba(0,0,0,.15);position:relative;z-index:1;}
.page-sub{font-size:var(--fs-sm);font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.9px;text-transform:uppercase;margin-top:1px;position:relative;z-index:1;}
.inner{padding:10px 10px 12px;display:flex;flex-direction:column;gap:0;}

/* ── NAV ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
.cal-month-label{font-family:'Fredoka One',cursive;font-size:clamp(14px,3.8vw,19px);background:linear-gradient(135deg,#d93020,#ef6640);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;flex:1;white-space:nowrap;filter:drop-shadow(0 1px 0 rgba(217,48,32,.18));letter-spacing:.5px;}
.nav-btn{width:34px;height:34px;min-width:34px;border-radius:50%;border:2px solid rgba(217,48,32,.3);outline:none;background:rgba(255,255,255,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);user-select:none;flex-shrink:0;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(217,48,32,.1),inset 0 1px 0 rgba(255,255,255,.8);}
.nav-btn::before{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 0%,rgba(255,255,255,.5) 0%,transparent 65%);pointer-events:none;}
.nav-btn svg{width:14px;height:14px;stroke:#d93020;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none;position:relative;z-index:1;transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
.nav-btn:hover{background:rgba(255,255,255,.95);border-color:rgba(217,48,32,.6);box-shadow:0 4px 16px rgba(217,48,32,.2),inset 0 1px 0 rgba(255,255,255,.9);transform:scale(1.1);}
.nav-btn:hover svg{stroke:#c42818;}
.nav-btn#prevBtn:hover svg{transform:translateX(-1.5px);}
.nav-btn#nextBtn:hover svg{transform:translateX(1.5px);}
.nav-btn:active{transform:scale(.93);}

/* ── DAY HEADERS — label only, no emoji ── */
.cal-head{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:3px;margin-bottom:6px;}
.cal-head-cell{
  display:flex;align-items:center;justify-content:center;
  padding:5px 2px;
  background:linear-gradient(160deg,#fff0eb 0%,#ffe4da 100%);
  border-radius:8px;
  border:1.5px solid rgba(232,85,53,.2);
  box-shadow:0 1px 3px rgba(217,48,32,.08),inset 0 1px 0 rgba(255,255,255,.7);
}
.cal-head-label{
  font-family:'Fredoka One',cursive;
  font-size:clamp(9px,2.2vw,12px);
  letter-spacing:.8px;
  background:linear-gradient(135deg,#c42818 0%,#e85535 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  line-height:1;
  text-transform:uppercase;
}
.cal-head-cell:nth-child(6) .cal-head-label,
.cal-head-cell:nth-child(7) .cal-head-label{
  background:linear-gradient(135deg,#a01808,#d93020);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
}
.cal-head-cell:nth-child(6),
.cal-head-cell:nth-child(7){
  background:linear-gradient(160deg,#ffe8e0 0%,#ffd6c8 100%);
  border-color:rgba(217,48,32,.28);
}

/* ── GRID ── */
.cal-body{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;overflow:visible;}
.cal-cell{background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:2px;display:flex;flex-direction:column;align-items:flex-start;gap:0;overflow:visible;height:46px;position:relative;min-width:0;width:100%;transition:border-color .15s,box-shadow .15s;}
.cal-cell:not(.empty):not(.overflow):hover{border-color:var(--red-mid);box-shadow:0 2px 10px rgba(217,48,32,.12);}
.cal-cell.empty{background:transparent;border-color:transparent;}
.cal-cell.overflow{opacity:.3;pointer-events:none;}
.cal-cell.today{background:linear-gradient(135deg,rgba(217,48,32,.08),rgba(239,102,64,.04));border-color:var(--red-dark);box-shadow:0 2px 8px rgba(217,48,32,.1);}

/* ── DAY NUM ROW ── */
.day-num-wrap{height:18px;width:100%;display:flex;align-items:center;flex-shrink:0;padding-left:2px;padding-right:3px;justify-content:space-between;min-width:0;overflow:visible;}
.day-num{font-family:'Fredoka One',cursive;font-size:11px;color:var(--text-dark);line-height:1;display:flex;align-items:center;}
.cal-cell.today .day-num{display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#d93020,#e85535);color:#fff;border-radius:50%;width:17px;height:17px;min-width:17px;padding:0;font-size:11px;}

/* status dots */
.status-dot{width:7px;height:7px;border-radius:50%;border:1.5px solid rgba(255,255,255,.9);flex-shrink:0;pointer-events:none;}
.status-dot.dot-live{background:radial-gradient(circle at 35% 35%,#ff6b6b,#e53935);box-shadow:0 0 0 2.5px rgba(229,57,53,.35);animation:dot-pulse 1s ease-in-out infinite;}
.status-dot.dot-before{background:radial-gradient(circle at 35% 35%,#64b5f6,#1e88e5);box-shadow:0 0 0 2.5px rgba(30,136,229,.25);animation:dot-glow-blue 2.5s ease-in-out infinite;}
.status-dot.dot-soon{background:radial-gradient(circle at 35% 35%,#81c784,#43a047);box-shadow:0 0 0 2.5px rgba(67,160,71,.25);animation:dot-glow-green 1.8s ease-in-out infinite;}
.status-dot.dot-ended{background:radial-gradient(circle at 35% 35%,#757575,#212121);box-shadow:0 1px 3px rgba(0,0,0,.35);}
@keyframes dot-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
@keyframes dot-glow-blue{0%,100%{box-shadow:0 0 0 2.5px rgba(30,136,229,.25);}50%{box-shadow:0 0 0 4px rgba(30,136,229,.12);}}
@keyframes dot-glow-green{0%,100%{box-shadow:0 0 0 2.5px rgba(67,160,71,.25);}50%{box-shadow:0 0 0 4.5px rgba(67,160,71,.12);}}

/* ── EVT ICONS ── */
.evt-icons{display:flex;flex-direction:row;flex-wrap:nowrap;align-items:center;justify-content:center;gap:0;width:100%;flex:1;min-height:0;min-width:0;overflow:visible;padding:0 0 3px;box-sizing:border-box;}
.evt{
  --ico:20px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  width:var(--ico);height:var(--ico);min-width:var(--ico);min-height:var(--ico);
  flex-shrink:0;border-radius:4px;font-size:calc(var(--ico)*0.76);
  transform-origin:center center;transition:transform .18s cubic-bezier(.34,1.56,.64,1);
  z-index:1;border:1.5px solid rgba(217,48,32,.22);background:rgba(255,243,224,.7);
  overflow:hidden;line-height:1;position:relative;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  box-shadow:0 1px 3px rgba(217,48,32,.08);
}
.evt:hover{transform:scale(1.3);z-index:100;box-shadow:0 3px 10px rgba(217,48,32,.2);}
.evt.evt-match{background:rgba(255,240,235,.9);border-color:rgba(217,48,32,.3);}
.evt img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;border-radius:3px;display:block;opacity:0;transition:opacity .25s;padding:1px;}
.evt img.loaded{opacity:1;}
.evt-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:inherit;line-height:1;user-select:none;}
.evt-skeleton,.tip-logo-skeleton{position:absolute;inset:0;border-radius:4px;background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;z-index:2;}
.tip-logo-skeleton{border-radius:6px;}

/* ── LEGEND ── */
.legend{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px 12px;padding:6px 4px 2px;margin-top:5px;}
.legend-item{display:flex;align-items:center;gap:5px;font-family:'Fredoka One',cursive;font-size:clamp(9px,2vw,11px);letter-spacing:.4px;white-space:nowrap;}
.legend-item:nth-child(1) .legend-label{color:#1565c0;}
.legend-item:nth-child(2) .legend-label{color:#2e7d32;}
.legend-item:nth-child(3) .legend-label{color:#b71c1c;}
.legend-item:nth-child(4) .legend-label{color:#424242;}
.legend-item:nth-child(5) .legend-label{color:#8a6500;}
.legend-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(255,255,255,.9);flex-shrink:0;}
.legend-dot.dot-before{background:radial-gradient(circle at 35% 35%,#64b5f6,#1e88e5);animation:dot-glow-blue 2.5s ease-in-out infinite;}
.legend-dot.dot-soon{background:radial-gradient(circle at 35% 35%,#81c784,#43a047);animation:dot-glow-green 1.8s ease-in-out infinite;}
.legend-dot.dot-live{background:radial-gradient(circle at 35% 35%,#ff6b6b,#e53935);animation:dot-pulse 1s ease-in-out infinite;}
.legend-dot.dot-ended{background:radial-gradient(circle at 35% 35%,#757575,#212121);}

/* ══════════════════════════════════════════
   SHARED TOOLTIP BASE — max 300px, scrollable
══════════════════════════════════════════ */
.evt-tip, .match-tip {
  position:fixed;
  background:var(--card);
  border:2px solid var(--red-dark);
  border-radius:14px;
  box-shadow:0 8px 28px rgba(217,48,32,.22);
  pointer-events:auto;
  opacity:0;transition:opacity .12s;
  z-index:99999;
  min-width:210px;
  max-width:300px;
  width:280px;
  white-space:normal;
  font-family:'Nunito',sans-serif;
  display:none;
  flex-direction:column;
  max-height:300px;
  overflow:hidden;
}
.evt-tip.show, .match-tip.show{opacity:1;display:flex;}

/* accent bar */
.tip-top-bar{
  height:3px;
  background:linear-gradient(90deg,#d93020,#ef6640);
  border-radius:12px 12px 0 0;
  flex-shrink:0;
}

/* fixed header */
.tip-header{
  padding:9px 13px 8px;
  flex-shrink:0;
  border-bottom:1.5px solid var(--border);
  background:linear-gradient(135deg,rgba(217,48,32,.05),rgba(239,102,64,.02));
  position:relative;
}
.tip-header-row{display:flex;align-items:center;gap:8px;}
.tip-logo{
  width:32px;height:32px;border-radius:7px;border:1.5px solid var(--border);
  flex-shrink:0;font-size:20px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:#fff8f5;position:relative;
}
.tip-logo img{width:100%;height:100%;object-fit:contain;border-radius:6px;display:block;opacity:0;transition:opacity .25s;}
.tip-logo img.loaded{opacity:1;}
.tip-title-wrap{display:flex;flex-direction:column;gap:1px;min-width:0;padding-right:22px;}
.tip-title{font-family:'Fredoka One',cursive;font-size:13px;color:var(--red-dark);line-height:1.2;word-break:break-word;}
.tip-date-badge{font-size:9.5px;font-weight:800;color:var(--text-mid);opacity:.8;}
.tip-close{
  position:absolute;top:7px;right:9px;font-size:13px;font-weight:900;color:var(--red-dark);
  cursor:pointer;line-height:1;width:20px;height:20px;
  display:flex;align-items:center;justify-content:center;border-radius:50%;
  background:rgba(217,48,32,.1);z-index:10;border:1.5px solid rgba(217,48,32,.2);
  transition:background .15s,transform .15s;user-select:none;
}
.tip-close:hover{background:rgba(217,48,32,.2);transform:scale(1.15);}

/* scroll body */
.tip-scroll{
  overflow-y:auto;
  flex:1;
  scrollbar-width:thin;
  scrollbar-color:rgba(217,48,32,.3) transparent;
  display:flex;
  flex-direction:column;
}
.tip-scroll::-webkit-scrollbar{width:4px;}
.tip-scroll::-webkit-scrollbar-track{background:transparent;}
.tip-scroll::-webkit-scrollbar-thumb{background:rgba(217,48,32,.3);border-radius:2px;}

/* scroll fade */
.tip-fade{
  height:14px;
  background:linear-gradient(to top,rgba(255,255,255,.95),transparent);
  flex-shrink:0;pointer-events:none;
  margin-top:-14px;position:relative;z-index:5;
}

/* ── SHEET EVENT BLOCKS ── */
.evt-block{
  padding:9px 13px 10px;
  display:flex;flex-direction:column;gap:5px;
  flex-shrink:0;
}
.evt-block+.evt-block{border-top:1.5px solid var(--border);}
.evt-block-name{font-family:'Fredoka One',cursive;font-size:12px;color:var(--red-dark);line-height:1.2;}
.tip-time-badge{font-size:9px;font-weight:800;color:var(--text-mid);opacity:.7;}

/* Countdown pill */
.tip-countdown{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:900;padding:3px 9px;border-radius:999px;border:1.5px solid;width:fit-content;}
.tip-countdown .cd-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.status-upcoming{color:#1565c0;background:#e3f2fd;border-color:#90caf9;}
.status-soon{color:#2e7d32;background:#e8f5e9;border-color:#a5d6a7;}
.status-live{color:#b71c1c;background:#fce4ec;border-color:#ef9a9a;}
.status-ended{color:#424242;background:#f5f5f5;border-color:#ccc;}

.tip-detail{font-size:10px;font-weight:700;color:var(--text-mid);line-height:1.55;}
.tip-quote-block{background:#fff;border:1.5px solid #eee;border-radius:9px;padding:0;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.tip-quote-block-bar{height:3px;width:100%;}
.tip-quote-block-bar.bar-organizer{background:linear-gradient(90deg,#d93020,#ef6640);}
.tip-quote-block-bar.bar-admin{background:linear-gradient(90deg,#6a0dad,#b042f5);}
.tip-quote-inner{padding:6px 9px 7px;}
.tip-quote-label{display:flex;align-items:center;gap:5px;font-size:8.5px;font-weight:900;letter-spacing:.7px;text-transform:uppercase;color:#aaa;margin-bottom:4px;}
.tip-quote-label-icon{display:flex;align-items:center;flex-shrink:0;}
.tip-quote-text{font-size:10.5px;font-weight:700;color:#3a3a3a;line-height:1.55;}
.mention-link{color:#d93020;font-weight:900;text-decoration:none;border-bottom:1px dotted rgba(217,48,32,.4);}
.mention-link:hover{color:#a01808;}
.tip-bottom-row{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.tip-btn{display:inline-block;font-size:10px;font-weight:900;color:#fff;background:linear-gradient(135deg,#d93020,#e85535);padding:4px 12px;border-radius:999px;text-decoration:none;box-shadow:0 2px 0 #8c1a10;pointer-events:auto;white-space:nowrap;flex-shrink:0;}
.tip-organizer{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:900;color:var(--text-mid);background:#fff0eb;border:1.5px solid var(--border);border-radius:999px;padding:3px 8px 3px 6px;text-decoration:none;white-space:nowrap;transition:background .15s;pointer-events:auto;}
.tip-organizer:hover{background:#fce0d5;border-color:var(--red-mid);}

/* ── MATCH CARDS ── */
.match-card{
  padding:10px 12px 10px;
  display:flex;flex-direction:column;gap:6px;
  flex-shrink:0;
}
.match-card+.match-card{border-top:1.5px solid var(--border);}

/* match header: team names text line */
.mc-title{font-family:'Fredoka One',cursive;font-size:12px;color:var(--red-dark);line-height:1.3;text-align:center;}

/* logos + score row */
.mc-teams-row{
  display:flex;align-items:center;justify-content:center;
  gap:8px;padding:4px 0 2px;
}
.mc-logo{
  width:36px;height:36px;border-radius:8px;
  background:rgba(255,240,235,.9);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;overflow:hidden;position:relative;
}
.mc-logo img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;border-radius:7px;display:block;opacity:0;transition:opacity .25s;}
.mc-logo img.loaded{opacity:1;}
.mc-logo-skel{position:absolute;inset:0;border-radius:7px;background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;}
.mc-vs-block{display:flex;flex-direction:column;align-items:center;gap:1px;flex-shrink:0;}
.mc-vs-label{font-family:'Fredoka One',cursive;font-size:9px;color:#e8a090;letter-spacing:.5px;}
.mc-score-row{display:flex;align-items:center;gap:5px;}
.mc-score-num{font-family:'Fredoka One',cursive;font-size:18px;min-width:22px;text-align:center;line-height:1;}
.mc-score-num.winning{color:#2e7d32;}
.mc-score-num.losing{color:#c62828;}
.mc-score-num.tied{color:var(--text-mid);}
.mc-score-dash{color:#e8a090;font-weight:900;font-size:13px;}

<script>
/* ════════════════════════════════════════════
   CONFIG
════════════════════════════════════════════ */
const SHEET_API_URL  = 'https://script.google.com/macros/s/AKfycbwLWbOvhgA9aiwEpatPngrRZCsUaGbBNNYDQR3KK5sm-p8lQjx1eili_e4IGUWM9cCL9w/exec';
const CLUB_SLUG      = 'hot-chilli-checkmate';
const CLUB_MATCH_URL = `https://api.chess.com/pub/club/${CLUB_SLUG}/matches`;
const MATCH_DETAIL   = id => `https://api.chess.com/pub/match/${id}`;

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
// Day headers: label only (no emoji per request)
const DAY_LABELS=['MON','TUE','WED','THU','FRI','SAT','SUN'];

const today = new Date();
let viewYear = today.getFullYear(), viewMonth = today.getMonth();
let eventMap = {};   // dateKey → groups[]
let matchMap  = {};  // dateKey → match[]

/* ════════════════════════════════════════════
   SKELETON — mirrors real calendar layout
════════════════════════════════════════════ */
(function(){
  const grid = document.getElementById('skelGrid'); if(!grid) return;
  const y=today.getFullYear(), m=today.getMonth();
  const first=(new Date(y,m,1).getDay()+6)%7, last=new Date(y,m+1,0).getDate();
  for(let i=0;i<42;i++){
    const c=document.createElement('div');
    c.className=(i<first||(i-first+1)>last)?'skel-cell empty':'skel-cell';
    grid.appendChild(c);
  }
})();

/* ════════════════════════════════════════════
   IMAGE CACHE
════════════════════════════════════════════ */
function proxyImageURL(raw){
  if(!raw)return null; raw=raw.trim();
  if(raw.startsWith('https://wsrv.nl'))return raw;
  const dm=raw.match(/drive\.google\.com\/(?:file\/d\/|open\?id=)([\w-]+)/);
  if(dm){const d=`https://drive.google.com/uc?export=download&id=${dm[1]}`;return `https://wsrv.nl/?url=${encodeURIComponent(d)}&w=64&h=64&fit=contain&output=webp`;}
  if(/^https?:\/\//i.test(raw))return `https://wsrv.nl/?url=${encodeURIComponent(raw)}&w=64&h=64&fit=contain&output=webp`;
  return null;
}
const imgMem=new Map(), imgCbs=new Map();
const lsKey=u=>'imgcache2:'+u;
const lsGet=u=>{try{return localStorage.getItem(lsKey(u));}catch(e){return null;}};
const lsSet=(u,v)=>{try{localStorage.setItem(lsKey(u),v);}catch(e){}};
function preloadImg(url){
  if(!url||imgMem.has(url))return;
  const c=lsGet(url);if(c==='ok'||c==='err'){imgMem.set(url,c);return;}
  imgMem.set(url,'loading');
  const img=new Image();img.crossOrigin='anonymous';img.decoding='async';
  img.onload=()=>{imgMem.set(url,'ok');lsSet(url,'ok');_notify(url,'ok');};
  img.onerror=()=>{imgMem.set(url,'err');lsSet(url,'err');_notify(url,'err');};
  img.src=url;
}
function _notify(url,st){const cbs=imgCbs.get(url)||[];imgCbs.delete(url);cbs.forEach(cb=>cb(st));}
function onImgReady(url,cb){
  const s=imgMem.get(url);if(s==='ok'||s==='err'){cb(s);return;}
  const c=lsGet(url);if(c==='ok'||c==='err'){imgMem.set(url,c);cb(c);return;}
  if(!imgCbs.has(url))imgCbs.set(url,[]);
  imgCbs.get(url).push(cb);
  if(!imgMem.has(url))preloadImg(url);
}

/* club logo fetch + cache */
const clubLogoCache = new Map();
async function fetchClubLogo(slug){
  if(!slug)return null;
  if(clubLogoCache.has(slug))return clubLogoCache.get(slug);
  clubLogoCache.set(slug, null); // mark pending
  try{
    const data=await fetchJSON(`https://api.chess.com/pub/club/${slug}`);
    const logo=data.icon||null;
    const proxied=logo?proxyImageURL(logo):null;
    clubLogoCache.set(slug, proxied||logo);
    if(proxied)preloadImg(proxied);
    return clubLogoCache.get(slug);
  }catch(e){return null;}
}

/* ════════════════════════════════════════════
   DATE UTILS
════════════════════════════════════════════ */
const pad=n=>String(n).padStart(2,'0');
const dateKey=(y,m,d)=>`${y}-${pad(m+1)}-${pad(d)}`;
const lastDay=(y,m)=>new Date(y,m+1,0).getDate();
const dowMon=(y,m,d)=>(new Date(y,m,d).getDay()+6)%7;
const ordinal=d=>{const s=['th','st','nd','rd'],v=d%100;return d+(s[(v-20)%10]||s[v]||s[0]);};
const formatDate=(y,m,d)=>`${MONTH_SHORT[m]} ${ordinal(d)}, ${y}`;
const isURL=s=>s&&(/^https?:\/\//i.test(s)||s.includes('.'));

function parseDate(str){
  if(!str)return null; str=str.trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(str)){const[y,m,d]=str.split('-').map(Number);return{y,m:m-1,d};}
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(str)){const[m,d,y]=str.split('/').map(Number);return{y,m:m-1,d};}
  const dt=new Date(str);if(!isNaN(dt))return{y:dt.getFullYear(),m:dt.getMonth(),d:dt.getDate()};
  return null;
}
function parseTime(str){
  if(!str||!str.trim())return null;
  const m=str.trim().match(/^(\d{1,2}):(\d{2})(?::\d{2})?(?:\s*(am|pm))?$/i);if(!m)return null;
  let h=parseInt(m[1]),min=parseInt(m[2]);
  if(m[3]){if(m[3].toLowerCase()==='pm'&&h<12)h+=12;if(m[3].toLowerCase()==='am'&&h===12)h=0;}
  return{h,min};
}
function buildUTC(dObj,tObj){
  if(!dObj||!tObj)return null;
  return new Date(Date.UTC(dObj.y,dObj.m,dObj.d,tObj.h,tObj.min,0));
}
function linkifyMentions(text){
  return text.split(/(@[\w-]+)/g).map(part=>{
    if(/^@[\w-]+$/.test(part)){
      const a=document.createElement('a');a.className='mention-link';
      a.href=`https://www.chess.com/member/${part.slice(1)}`;a.target='_blank';a.rel='noopener noreferrer';a.textContent=part;return a;
    }
    return document.createTextNode(part);
  });
}
function setTextWithMentions(el,text){el.innerHTML='';linkifyMentions(text).forEach(n=>el.appendChild(n));}

/* ════════════════════════════════════════════
   PHASE — SHEET EVENTS
════════════════════════════════════════════ */
function getPhase(ev){
  if(!ev.timeObj)return null;
  const s=buildUTC(ev.dateObj,ev.timeObj);if(!s)return null;
  const e=ev.duration>0?new Date(s.getTime()+ev.duration*3600000):null;
  const now=Date.now();
  if(now<s.getTime()){
    const ms=s-now,sec=Math.floor(ms/1000);
    const d=Math.floor(sec/86400),h=Math.floor((sec%86400)/3600),m=Math.floor((sec%3600)/60);
    const text='Starting in '+(d>0?`${d}d ${h}h ${m}m`:h>0?`${h}h ${m}m`:`${m}m`);
    const isSoon=ms<=3600000;
    return{status:isSoon?'soon':'upcoming',text,cssClass:isSoon?'status-soon':'status-upcoming',phase:'before'};
  }else if(e&&now<e.getTime()){
    const hL=Math.floor((e-now)/3600000),mL=Math.floor(((e-now)%3600000)/60000);
    return{status:'live',text:'🔴 Live'+(hL>0?` · ends in ${hL}h ${mL}m`:mL>0?` · ends in ${mL}m`:' · ending soon'),cssClass:'status-live',phase:'live'};
  }else if(!e&&now>=s.getTime()){
    return{status:'live',text:'🔴 Live',cssClass:'status-live',phase:'live'};
  }
  return{status:'ended',text:'✅ Ended',cssClass:'status-ended',phase:'after'};
}

/* ════════════════════════════════════════════
   PHASE — MATCH EVENTS
════════════════════════════════════════════ */
function getMatchPhase(match){
  const now=Date.now(),startMs=match.startTs*1000;
  if(match._status==='finished'||(match.endTs&&now>match.endTs*1000))
    return{status:'ended',text:'Ended',cls:'mc-ended',cdCls:'cd-ended',phase:'after'};
  if(match._status==='in_progress'||now>=startMs)
    return{status:'live',text:'🔴 Live',cls:'mc-live',cdCls:'cd-live',phase:'live'};
  const ms=startMs-now,isSoon=ms<=3600000;
  const dd=Math.floor(ms/86400000),hh=Math.floor((ms%86400000)/3600000),mm=Math.floor((ms%3600000)/60000);
  const txt='Starting in '+(dd>0?`${dd}d ${hh}h`:hh>0?`${hh}h ${mm}m`:`${mm}m`);
  return{status:isSoon?'soon':'upcoming',text:txt,cls:isSoon?'mc-soon':'mc-upcoming',cdCls:isSoon?'cd-soon':'cd-upcoming',phase:'before'};
}
function isCancelled(m){
  return m._status==='finished'&&m.ourScore!==undefined&&m.theirScore!==undefined&&Number(m.ourScore)===0&&Number(m.theirScore)===0;
}

function cellDotClass(sheetGroups,matchEvts){
  const rank={ended:1,before:2,soon:3,live:4};let best=null;
  for(const g of sheetGroups){
    for(const ev of g.events){
      if(!ev.timeObj)continue;
      const s=buildUTC(ev.dateObj,ev.timeObj);if(!s)continue;
      const e=ev.duration>0?new Date(s.getTime()+ev.duration*3600000):null;
      const now=Date.now();
      let cls=(e&&now>=e.getTime())?'ended':now>=s.getTime()?'live':(s-now<=3600000)?'soon':'before';
      if(!best||rank[cls]>rank[best])best=cls;
    }
  }
  for(const m of matchEvts){
    const p=getMatchPhase(m);
    const cls=p.status==='live'?'live':p.status==='soon'?'soon':p.status==='ended'?'ended':'before';
    if(!best||rank[cls]>rank[best])best=cls;
  }
  return best?'dot-'+best:null;
}

function pick(ev,phase,field){
  const key={before:{details:'detailsBefore',button:'buttonBefore',link:'linkBefore'},live:{details:'detailsLive',button:'buttonLive',link:'linkLive'},after:{details:'detailsAfter',button:'buttonAfter',link:'linkAfter'}};
  const fallback={before:['before'],live:['live','before'],after:['after','live','before']};
  for(const p of fallback[phase]){const val=ev[key[p][field]];if(val&&val.trim())return val.trim();}
  return '';
}

/* ════════════════════════════════════════════
   LOAD SHEET
════════════════════════════════════════════ */
async function loadSheet(){
  try{
    const res=await fetch(SHEET_API_URL,{cache:'no-store',headers:{'Accept':'application/json'}});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const rawMap={};
    data.forEach(ev=>{
      if(!ev.date||!ev.title)return;
      const dateObj=parseDate(ev.date);if(!dateObj)return;
      const key=dateKey(dateObj.y,dateObj.m,dateObj.d);
      if(!rawMap[key])rawMap[key]=[];
      const rawLogo=(ev.logo||'').trim();
      const proxiedLogo=isURL(rawLogo)?proxyImageURL(rawLogo):null;
      rawMap[key].push({
        _type:'sheet',dateObj,timeObj:parseTime(ev.time),duration:parseFloat(ev.duration)||0,
        title:(ev.title||'').trim(),
        detailsBefore:(ev.detailsBefore||'').trim(),buttonBefore:(ev.buttonBefore||'').trim(),linkBefore:(ev.linkBefore||'').trim(),
        detailsLive:(ev.detailsLive||'').trim(),buttonLive:(ev.buttonLive||'').trim(),linkLive:(ev.linkLive||'').trim(),
        detailsAfter:(ev.detailsAfter||'').trim(),buttonAfter:(ev.buttonAfter||'').trim(),linkAfter:(ev.linkAfter||'').trim(),
        rawLogo,logo:proxiedLogo||rawLogo,isProxied:!!proxiedLogo,
        organizer:(ev.organizer||'').trim(),
        quoteBefore:(ev.quoteBefore||'').trim(),quoteAfter:(ev.quoteAfter||'').trim(),
        admin:(ev.admin||'').trim().replace(/^@/,''),adminMessage:(ev.adminMessage||'').trim(),
      });
      if(proxiedLogo)preloadImg(proxiedLogo);
    });
    eventMap={};
    Object.entries(rawMap).forEach(([key,evts])=>{
      const groups=[],logoToGroup={};
      evts.forEach(ev=>{
        const logoKey=ev.rawLogo||'__none__';
        if(!logoToGroup[logoKey]){const g={logoKey,rawLogo:ev.rawLogo,logo:ev.logo,isProxied:ev.isProxied,events:[]};logoToGroup[logoKey]=g;groups.push(g);}
        logoToGroup[logoKey].events.push(ev);
      });
      eventMap[key]=groups;
    });
  }catch(e){console.error('Sheet load failed:',e);}
}

/* ════════════════════════════════════════════
   LOAD MATCHES
════════════════════════════════════════════ */
async function fetchJSON(url){
  try{const r=await fetch(url,{cache:'no-store'});if(r.ok)return r.json();throw new Error(r.status);}
  catch(e){
    try{const r2=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(url));if(!r2.ok)throw new Error('proxy');const d=await r2.json();return JSON.parse(d.contents);}
    catch(e2){throw e2;}
  }
}
function extractMatchId(u){const m=u.match(/\/match\/(\d+)$/);return m?m[1]:'';}
function slugToName(s){return s.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());}

async function loadMatches(){
  try{
    const data=await fetchJSON(CLUB_MATCH_URL);
    matchMap={};
    const process=(arr,status)=>{
      (arr||[]).forEach(m=>{
        if(!m.start_time)return;
        const id=extractMatchId(m['@id']);if(!id)return;
        const d=new Date(m.start_time*1000);
        const pp=(m.opponent||'').split('/'),slug=pp[pp.length-1]||'';
        const ev={_type:'match',id,title:m.name||`vs ${slugToName(slug)}`,opponent:slugToName(slug),opponentSlug:slug,link:`https://www.chess.com/club/matches/${id}`,_status:status,startTs:m.start_time,endTs:m.end_time||undefined,timeClass:m.time_class||'daily',result:m.result||undefined,ourScore:undefined,theirScore:undefined,ourName:undefined,theirName:undefined,ourLogo:undefined,theirLogo:undefined,boards:undefined};
        const key=dateKey(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate());
        if(!matchMap[key])matchMap[key]=[];matchMap[key].push(ev);
      });
    };
    process(data.registered,'upcoming');
    process(data.in_progress,'in_progress');
    process(data.finished,'finished');
    enrichMatches();
  }catch(e){console.error('Match load failed:',e);}
}

async function enrichMatches(){
  const all=[];Object.values(matchMap).forEach(arr=>arr.forEach(m=>all.push(m)));
  if(!all.length)return;
  for(let i=0;i<all.length;i+=6){
    const batch=all.slice(i,i+6);
    await Promise.allSettled(batch.map(async m=>{
      try{
        const det=await fetchJSON(MATCH_DETAIL(m.id));
        if(det.teams){
          const t1=det.teams.team1,t2=det.teams.team2;
          let our,their;
          if((t1['@id']||'').includes(CLUB_SLUG)){our=t1;their=t2;}
          else if((t2['@id']||'').includes(CLUB_SLUG)){our=t2;their=t1;}
          else{our=t1;their=t2;}
          m.ourName=our.name;m.theirName=their.name;m.ourScore=our.score;m.theirScore=their.score;
          // extract slugs from @id for logo fetch
          const ourSlug=(our['@id']||'').split('/').pop();
          const theirSlug=(their['@id']||'').split('/').pop();
          m.ourSlug=ourSlug;m.theirSlug=theirSlug;
          // pre-fetch logos in background
          if(ourSlug)fetchClubLogo(ourSlug);
          if(theirSlug)fetchClubLogo(theirSlug);
        }
        if(det.boards)m.boards=det.boards;if(det.url)m.link=det.url;
      }catch(e){}
    }));
  }
}

function applyCellWidth(){
  const cells=calBody.querySelectorAll('.cal-cell');if(!cells.length)return;
  const r=cells[0].getBoundingClientRect(),cellW=r.width,cellH=r.height;if(cellW<1||cellH<1)return;
  cells.forEach(cell=>{
    cell.querySelectorAll('.evt-icons').forEach(wrap=>{
      const n=parseInt(wrap.dataset.count)||1;const icons=wrap.querySelectorAll('.evt');
      const ratio=cellW<cellH?(n===1?.58:n===2?.43:.28):(n===1?.50:n===2?.43:.28);
      const base=Math.min(cellW,cellH);const ico=base*ratio;const space=(cellW-ico*n)/(n+1);
      icons.forEach((el,i)=>{el.style.setProperty('--ico',ico.toFixed(2)+'px');el.style.marginLeft=space.toFixed(2)+'px';el.style.marginRight=(i===n-1?space:0).toFixed(2)+'px';});
    });
  });
}

const monthLabel=document.getElementById('monthLabel');
const calHead=document.getElementById('calHead');
const calBody=document.getElementById('calBody');

function buildCalendar(){
  monthLabel.textContent=MONTHS[viewMonth]+' '+viewYear;
  calHead.innerHTML='';
  DAY_LABELS.forEach(lbl=>{
    const c=document.createElement('div');c.className='cal-head-cell';
    c.innerHTML=`<span class="cal-head-label">${lbl}</span>`;
    calHead.appendChild(c);
  });
  calBody.innerHTML='';
  const first=dowMon(viewYear,viewMonth,1),last=lastDay(viewYear,viewMonth);
  const pM=viewMonth===0?11:viewMonth-1,pY=viewMonth===0?viewYear-1:viewYear;
  const nM=viewMonth===11?0:viewMonth+1,nY=viewMonth===11?viewYear+1:viewYear;
  for(let i=0;i<first;i++)calBody.appendChild(makeCell(pY,pM,lastDay(pY,pM)-first+1+i,true));
  for(let d=1;d<=last;d++)calBody.appendChild(makeCell(viewYear,viewMonth,d,false));
  const filled=first+last;
  for(let d=1;filled+d-1<42;d++)calBody.appendChild(makeCell(nY,nM,d,true));
  requestAnimationFrame(applyCellWidth);
}

function makeCell(y,m,d,overflow){
  const isToday=(!overflow&&d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear());
  const cell=document.createElement('div');
  cell.className='cal-cell'+(isToday?' today':'')+(overflow?' overflow':'');

  const wrap0=document.createElement('div');wrap0.className='day-num-wrap';
  const num=document.createElement('div');num.className='day-num';num.textContent=d;
  wrap0.appendChild(num);

  const sheetGroups=(!overflow&&eventMap[dateKey(y,m,d)])||[];
  const rawMatchEvts=(!overflow&&matchMap[dateKey(y,m,d)])||[];
  const matchEvts=rawMatchEvts.filter(mv=>!isCancelled(mv));

  if(!overflow&&(sheetGroups.length||matchEvts.length)){
    const dotCls=cellDotClass(sheetGroups,matchEvts);
    if(dotCls){const dot=document.createElement('div');dot.className='status-dot '+dotCls;wrap0.appendChild(dot);}
  }
  cell.appendChild(wrap0);

  const icons=[];
  sheetGroups.forEach(g=>icons.push({kind:'sheet',group:g}));
  const matchSuppressed=sheetGroups.length>=2;
  if(matchEvts.length&&!matchSuppressed)icons.push({kind:'matches',matches:matchEvts});

  if(icons.length){
    const wrap=document.createElement('div');wrap.className='evt-icons';
    const displayIcons=icons.slice(0,3);
    wrap.dataset.count=String(displayIcons.length);

    displayIcons.forEach(item=>{
      const ico=document.createElement('div');
      if(item.kind==='matches'){
        ico.className='evt evt-match';
        const em=document.createElement('span');em.className='evt-emoji';em.textContent='☀️';ico.appendChild(em);
        if(!overflow){
          ico.addEventListener('mouseenter',e=>{cancelLeave();if(!sheetPinned&&!matchPinned){renderMatchTip(item.matches,y,m,d);matchTipEl.classList.add('show');posMatchTip(e);}});
          ico.addEventListener('mouseleave',()=>{if(!matchPinned)scheduleMatchLeave();});
          ico.addEventListener('mousemove',e=>{if(!matchPinned)posMatchTip(e);});
          ico.addEventListener('click',e=>{e.stopPropagation();pinMatchTip(e,item.matches,y,m,d);});
          ico.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();pinMatchTip(e.changedTouches[0],item.matches,y,m,d);},{passive:false});
        }
      }else{
        const g=item.group;ico.className='evt';
        if(g.isProxied){
          const skel=document.createElement('div');skel.className='evt-skeleton';ico.appendChild(skel);
          const img=document.createElement('img');img.alt=g.events[0].title;img.loading='eager';img.decoding='async';ico.appendChild(img);
          onImgReady(g.logo,state=>{
            if(state==='ok'){img.src=g.logo;const fin=()=>{img.classList.add('loaded');skel.style.opacity='0';setTimeout(()=>skel.remove(),250);};img.onload=fin;if(img.complete&&img.naturalWidth>0)fin();}
            else{skel.remove();const em=document.createElement('span');em.className='evt-emoji';em.textContent='📅';ico.appendChild(em);}
          });
        }else{
          const em=document.createElement('span');em.className='evt-emoji';em.textContent=(g.rawLogo&&g.rawLogo.trim())?g.rawLogo:'📅';ico.appendChild(em);
        }
        if(!overflow){
          ico.addEventListener('mouseenter',e=>{cancelLeave();if(!sheetPinned&&!matchPinned){renderSheetGroupTip(g,y,m,d);sheetTipEl.classList.add('show');posTip(e);}});
          ico.addEventListener('mouseleave',()=>{if(!sheetPinned)scheduleLeave();});
          ico.addEventListener('mousemove',e=>{if(!sheetPinned)posTip(e);});
          ico.addEventListener('click',e=>{e.stopPropagation();pinSheetGroupTip(e,g,y,m,d);});
          ico.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();pinSheetGroupTip(e.changedTouches[0],g,y,m,d);},{passive:false});
        }
      }
      wrap.appendChild(ico);
    });

    if(icons.length>3){
      const more=document.createElement('div');more.className='evt';
      more.style.cssText='background:rgba(217,48,32,.12);border-color:rgba(217,48,32,.3);';
      const em=document.createElement('span');em.className='evt-emoji';em.style.cssText="font-size:8px;font-family:'Fredoka One',cursive;color:#c73520;";em.textContent=`+${icons.length-3}`;
      more.appendChild(em);wrap.appendChild(more);
      wrap.dataset.count=String(Math.min(4,icons.length));
    }
    cell.appendChild(wrap);
  }
  return cell;
}

function buildEvtBlock(ev){

    const cd=document.createElement('div');cd.className='tip-countdown '+st.cssClass;
    cd.innerHTML=`<span class="cd-dot"></span><span class="cd-txt">${st.text}</span>`;block.appendChild(cd);
    const t=setInterval(()=>{const s=getPhase(ev);if(!s)return;cd.className='tip-countdown '+s.cssClass;cd.querySelector('.cd-txt').textContent=s.text;},st.status==='live'?60000:30000);
    sheetCountdownTimers.push(t);
  }
  const phase=st?st.phase:'before';
  const details=pick(ev,phase,'details');
  if(details){const det=document.createElement('div');det.className='tip-detail';det.textContent=details;block.appendChild(det);}
  const quote=phase==='after'?ev.quoteAfter:ev.quoteBefore;

    setTextWithMentions(qb.querySelector('.tip-quote-text'),quote);block.appendChild(qb);
  }
  if(ev.adminMessage){
    const ab=document.createElement('div');ab.className='tip-quote-block';
    ab.innerHTML=`<div class="tip-quote-block-bar bar-admin"></div><div class="tip-quote-inner"><div class="tip-quote-label"><span class="tip-quote-label-icon" style="font-size:11px;line-height:1;">🛡️</span><span>${ev.admin?`From @${ev.admin}`:'Admin message'}</span></div><div class="tip-quote-text"></div></div>`;
    setTextWithMentions(ab.querySelector('.tip-quote-text'),ev.adminMessage);block.appendChild(ab);
  }
  const btnText=pick(ev,phase,'button'),btnLink=pick(ev,phase,'link');
  if(ev.organizer||btnText){
    const row=document.createElement('div');row.className='tip-bottom-row';
    if(ev.organizer){const a=document.createElement('a');a.className='tip-organizer';a.href=`https://www.chess.com/member/${ev.organizer}`;a.target='_blank';a.rel='noopener noreferrer';a.innerHTML=`<span style="font-size:11px;line-height:1;">♟</span>@${ev.organizer}`;row.appendChild(a);}
    if(btnText&&btnLink){const a=document.createElement('a');a.className='tip-btn';a.href=btnLink;a.target='_blank';a.rel='noopener noreferrer';a.textContent=btnText;row.appendChild(a);}
    block.appendChild(row);
  }
  return block;
}

function renderMatchTip(matches,y,m,d){
  matchCountdownTimers.forEach(t=>clearInterval(t));matchCountdownTimers=[];

  matchTipDate.textContent=formatDate(y,m,d);

  matches.forEach((match,idx)=>{

    /* ── Phase badge ── */
    const phRow=document.createElement('div');phRow.style.cssText='display:flex;align-items:center;gap:6px;flex-wrap:wrap;';

    const titleEl=document.createElement('div');titleEl.className='mc-title';
    titleEl.textContent=`${ourDisplayName} vs ${theirDisplayName}`;

    /* ── Logo pair row: [our logo col] [vs block] [their logo col] ── */
    const teamsRow=document.createElement('div');teamsRow.className='mc-teams-row';

    // Our team column
    const ourCol=document.createElement('div');ourCol.className='mc-team-col';
    const ourLogo=buildMatchLogo(match.ourSlug, ourDisplayName);
    const ourLabel=document.createElement('div');ourLabel.className='mc-team-name';
    ourLabel.textContent=ourDisplayName;
    ourCol.appendChild(ourLogo);ourCol.appendChild(ourLabel);

    // VS + score block in the middle
    const vsBlock=document.createElement('div');vsBlock.className='mc-vs-block';
    if(match.ourScore!==undefined&&match.theirScore!==undefined){
      const scoreRow=document.createElement('div');scoreRow.className='mc-score-row';
      const ourCls=match.ourScore>match.theirScore?' winning':match.ourScore<match.theirScore?' losing':' tied';
      const theirCls=match.theirScore>match.ourScore?' winning':match.theirScore<match.ourScore?' losing':' tied';
      scoreRow.innerHTML=`<span class="mc-score-num${ourCls}">${match.ourScore}</span><span class="mc-score-dash">–</span><span class="mc-score-num${theirCls}">${match.theirScore}</span>`;

    }else{

    }

    // Their team column
    const theirCol=document.createElement('div');theirCol.className='mc-team-col';
    const theirLogo=buildMatchLogo(match.theirSlug||match.opponentSlug, theirDisplayName);
    const theirLabel=document.createElement('div');theirLabel.className='mc-team-name';
    theirLabel.textContent=theirDisplayName;
    theirCol.appendChild(theirLogo);theirCol.appendChild(theirLabel);

    teamsRow.appendChild(ourCol);teamsRow.appendChild(vsBlock);teamsRow.appendChild(theirCol);
    card.appendChild(teamsRow);

    /* ── Result pill (finished) ── */
    if(match._status==='finished'&&match.result){
      const rb=document.createElement('div');rb.className='mc-result '+(match.result==='win'?'win':match.result==='lose'||match.result==='loss'?'loss':'draw');
      rb.textContent=match.result==='win'?'✓ WIN':match.result==='lose'||match.result==='loss'?'✗ LOSS':'⬛ DRAW';card.appendChild(rb);
    }

    /* ── Meta: time class + boards ── */
    const meta=document.createElement('div');meta.className='mc-meta';
    const tcText=match.timeClass==='daily'?'☀️ Daily':match.timeClass==='rapid'?'⚡ Rapid':'⚡ Live';
    meta.innerHTML=`<span>${tcText}</span>${match.boards?`<span>♟ ${match.boards} boards</span>`:''}`;
    card.appendChild(meta);

    /* ── CTA button ── */
    if(match.link){
      const a=document.createElement('a');a.className='mc-btn';
      if(ph.status==='ended'){a.className+=' view';a.textContent='View';}
      else if(ph.status==='live'){a.textContent='👁 Watch';}
      else a.textContent='⚔️ Join';
      a.href=match.link;a.target='_blank';a.rel='noopener noreferrer';card.appendChild(a);
    }

    matchTipScroll.appendChild(card);

    /* Countdown auto-refresh for first card */
    if(idx===0){
      const t=setInterval(()=>{
        const p=getMatchPhase(match);
        badge.className='mc-phase '+p.cls;
        badge.querySelector('.cd-txt').textContent=p.text;
      },ph.status==='live'?60000:30000);
      matchCountdownTimers.push(t);
    }
  });

  requestAnimationFrame(()=>{matchTipScroll.scrollTop=0;updateMatchFade();});
  matchTipScroll.onscroll=updateMatchFade;
}
