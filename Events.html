<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Chilli CheckMate – Home</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --sidebar-height: 460px;
  --red-dark:#d93020;--red-mid:#e85535;--red-border:#e8553a;
  --bg:#fff5f0;--card:#fff;--border:#f5c5b8;--shadow:#e8aa98;
  --text-dark:#c73520;--text-mid:#9a2010;
  --fs-xs:10px;--fs-sm:11px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;background:transparent;font-family:'Nunito',sans-serif;}

.page-sb{
  width:100%;height:var(--sidebar-height);background:var(--bg);
  border-radius:28px;border:3px solid var(--red-border);
  overflow:hidden;display:flex;flex-direction:column;
}
.page-top{
  background:linear-gradient(135deg,#d93020 0%,#e85535 60%,#ef6640 100%);
  border-radius:24px 24px 0 0;padding:14px 16px 10px;
  text-align:center;position:relative;overflow:hidden;flex-shrink:0;
}
.page-top::before{content:'';position:absolute;bottom:-10px;left:-10%;width:120%;height:20px;background:var(--bg);border-radius:50%;}
.page-top::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-55deg,transparent,transparent 14px,rgba(255,255,255,.04) 14px,rgba(255,255,255,.04) 28px);pointer-events:none;}
.page-title{font-family:'Fredoka One',cursive;font-size:19px;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.18);position:relative;z-index:1;}
.page-sub{font-size:var(--fs-sm);font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.9px;text-transform:uppercase;margin-top:2px;position:relative;z-index:1;}

.inner{padding:10px 10px 14px;flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
.cal-month-label{font-family:'Fredoka One',cursive;font-size:clamp(13px,3.5vw,17px);color:var(--red-dark);text-align:center;flex:1;white-space:nowrap;}
.nav-btn{
  width:28px;height:28px;min-width:28px;border-radius:50%;border:2px solid var(--border);
  background:var(--card);box-shadow:0 3px 0 var(--shadow);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;color:var(--red-dark);font-weight:900;
  transition:all .15s;user-select:none;flex-shrink:0;line-height:1;
}
.nav-btn:hover{background:#fce8e0;border-color:var(--red-dark);transform:translateY(-2px);box-shadow:0 5px 0 var(--red-dark);}
.nav-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--red-dark);}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px;}
.cal-head-cell{text-align:center;font-size:clamp(7px,1.6vw,10px);font-weight:900;color:var(--text-mid);text-transform:uppercase;letter-spacing:.4px;padding:2px 0;}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{
  background:var(--card);border:1.5px solid var(--border);border-radius:7px;
  padding:2px 2px 2px;display:flex;flex-direction:column;
  align-items:flex-start;gap:1px;overflow:visible;
  height:clamp(40px,8.5vw,56px);
}
.cal-cell.empty{background:transparent;border-color:transparent;}
.cal-cell.overflow{opacity:.3;pointer-events:none;}
.cal-cell.today{background:linear-gradient(135deg,rgba(217,48,32,.09),rgba(239,102,64,.05));border-color:var(--red-dark);box-shadow:0 0 0 2px rgba(217,48,32,.2);}
.day-num{font-family:'Fredoka One',cursive;font-size:clamp(8px,2vw,12px);color:var(--text-dark);line-height:1;padding-left:2px;flex-shrink:0;}
.cal-cell.today .day-num{
  display:inline-flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#d93020,#e85535);color:#fff;border-radius:50%;
  width:clamp(14px,3.2vw,20px);height:clamp(14px,3.2vw,20px);
  padding:0;margin-left:2px;box-shadow:0 2px 0 #8c1a10;text-align:center;flex-shrink:0;
}
.evt-icons{
  display:flex;flex-direction:row;flex-wrap:wrap;
  align-items:center;justify-content:center;
  gap:2px;width:100%;flex:1;
}
.evt{
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  width:clamp(13px,3.4vw,20px);height:clamp(13px,3.4vw,20px);
  border-radius:4px;font-size:clamp(8px,2.1vw,13px);
  flex-shrink:0;transition:transform .15s;z-index:1;
  border:1.5px solid rgba(217,48,32,.25);
  background:rgba(255,243,224,.7);
  overflow:hidden;
}
.evt:hover{transform:scale(1.3);z-index:999;}
.evt img{width:100%;height:100%;object-fit:contain;border-radius:3px;}

.legend{display:flex;flex-wrap:wrap;gap:4px 9px;margin-top:6px;justify-content:center;}
.leg-item{display:flex;align-items:center;gap:3px;font-size:clamp(7px,1.8vw,10px);font-weight:800;color:var(--text-mid);}

/* ── Status badge colors ── */
.status-upcoming{color:#1565c0;background:#e3f2fd;border-color:#90caf9;}
.status-live{color:#b71c1c;background:#fce4ec;border-color:#ef9a9a;}
.status-ended{color:#555;background:#f5f5f5;border-color:#ccc;}

/* ── Tooltip ── */
.evt-tip{
  position:fixed;background:var(--card);border:2px solid var(--red-dark);
  border-radius:14px;padding:10px 13px;box-shadow:0 8px 28px rgba(217,48,32,.25);
  pointer-events:none;opacity:0;transition:opacity .18s;z-index:99999;
  min-width:180px;max-width:240px;white-space:normal;font-family:'Nunito',sans-serif;
}
.evt-tip.show{opacity:1;pointer-events:auto;}

/* Row 1: logo + date */
.tip-row1{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.tip-logo{width:32px;height:32px;border-radius:7px;object-fit:contain;border:1.5px solid var(--border);flex-shrink:0;font-size:22px;display:flex;align-items:center;justify-content:center;}
.tip-logo img{width:100%;height:100%;object-fit:contain;border-radius:6px;}
.tip-date-wrap{display:flex;flex-direction:column;gap:2px;}
.tip-title{font-family:'Fredoka One',cursive;font-size:13px;color:var(--red-dark);line-height:1.2;}
.tip-date-badge{font-size:10px;font-weight:800;color:var(--text-mid);opacity:.8;}

/* Row 2: countdown */
.tip-countdown{
  display:flex;align-items:center;gap:5px;
  font-size:10px;font-weight:900;
  padding:4px 9px;border-radius:999px;border:1.5px solid;
  margin-bottom:6px;width:fit-content;
}
.tip-countdown .cd-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}

/* Row 3: details */
.tip-detail{font-size:10px;font-weight:700;color:var(--text-mid);line-height:1.55;margin-bottom:7px;}

/* Row 4: button */
.tip-btn{
  display:inline-block;font-size:10px;font-weight:900;color:#fff;
  background:linear-gradient(135deg,#d93020,#e85535);
  padding:4px 12px;border-radius:999px;text-decoration:none;
  box-shadow:0 2px 0 #8c1a10;pointer-events:auto;
}

/* Loading/error state */
.tip-loading{font-size:10px;color:#aaa;text-align:center;padding:8px;}

.footer{text-align:center;font-size:var(--fs-sm);font-weight:700;color:var(--red-border);padding-top:4px;margin-top:auto;}
</style>
</head>
<body>

<div class="page-sb">
  <div class="page-top">
    <div class="page-title">🏠 Hot Chilli CheckMate</div>
    <div class="page-sub">Your Chess Home ♞</div>
  </div>
  <div class="inner">
    <div class="cal-nav">
      <button class="nav-btn" id="prevBtn">‹</button>
      <div class="cal-month-label" id="monthLabel"></div>
      <button class="nav-btn" id="nextBtn">›</button>
    </div>
    <div class="cal-head" id="calHead"></div>
    <div class="cal-body" id="calBody"></div>
    <div class="footer">🌶 Hot Chilli CheckMate © 2026 ♞</div>
  </div>
</div>

<!-- Tooltip -->
<div class="evt-tip" id="globalTip">
  <div class="tip-row1">
    <div class="tip-logo" id="tipLogo"></div>
    <div class="tip-date-wrap">
      <div class="tip-title" id="tipTitle"></div>
      <div class="tip-date-badge" id="tipDateBadge"></div>
    </div>
  </div>
  <div class="tip-countdown" id="tipCountdown" style="display:none"></div>
  <div class="tip-detail" id="tipDetail"></div>
  <div id="tipBtnWrap"></div>
</div>

<script>

const SHEET_API_URL = 'https://script.googleusercontent.com/macros/echo?user_content_key=AWDtjMVoMmH2J3Kfb_l-5413coHHIuB09rukXN9mWCM2a2KIaXT4UrGRP1DnZ0dluCumDN3CTjf3RGf1JOlaGatub2KCg7SBhxt33CcZHV-HU8Sm0dnrqaxGDYkpUQ8Gws5Y4S3UcufUd-dqhUPXyglyVKJHNcu2UMODwkX6lpUDWODCKEBwm2Slfa85cvJGeouhbLqWvss9nSkhfKJRfxJoSmjjJuF9QEpR_-5TUSwvATmq_eF_uKajW_khJhKfQ83_wun067Q3EAkWarssXFiAwn87QW-05Q&lib=MBjKr55hRi_bkn0YyUiHIew5ryf6iqJdH';

// columns: date | time (UTC) | title | details | button before | button after | logo | link before | link after
const COL = {
  date:          0,
  time:          1,
  title:         2,
  details:       3,
  buttonBefore:  4,
  buttonAfter:   5,
  logo:          6,
  linkBefore:    7,
  linkAfter:     8,
};

// ─────────────────────────────────────────────────────────────
const MONTHS      = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS        = ['MON','TUE','WED','THU','FRI','SAT','SUN'];

const today    = new Date();
let viewYear   = today.getFullYear();
let viewMonth  = today.getMonth();

// Map: "YYYY-MM-DD" → [array of event objects]
let eventMap = {};
let sheetLoaded = false;


// ─── Parse date string (flexible: YYYY-MM-DD, MM/DD/YYYY, DD/MM/YYYY, etc.) ──
function parseDate(str) {
  if (!str) return null;
  str = str.trim();
  // ISO: YYYY-MM-DD
  if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
    const [y, m, d] = str.split('-').map(Number);
    return { y, m: m - 1, d };
  }
  // MM/DD/YYYY
  if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(str)) {
    const [m, d, y] = str.split('/').map(Number);
    return { y, m: m - 1, d };
  }
  // DD/MM/YYYY — also try this
  if (/^\d{1,2}-\d{1,2}-\d{4}$/.test(str)) {
    const [d, m, y] = str.split('-').map(Number);
    return { y, m: m - 1, d };
  }
  // fallback: let JS try
  const dt = new Date(str);
  if (!isNaN(dt)) return { y: dt.getFullYear(), m: dt.getMonth(), d: dt.getDate() };
  return null;
}

// ─── Parse time string "HH:MM" or "HH:MM:SS" (UTC) ─────────────────
function parseTime(str) {
  if (!str || !str.trim()) return null;
  const match = str.trim().match(/^(\d{1,2}):(\d{2})(?::\d{2})?(?:\s*(am|pm))?$/i);
  if (!match) return null;
  let h = parseInt(match[1]), min = parseInt(match[2]);
  if (match[3]) {
    if (match[3].toLowerCase() === 'pm' && h < 12) h += 12;
    if (match[3].toLowerCase() === 'am' && h === 12) h = 0;
  }
  return { h, min };
}

// ─── Build a UTC Date from parsed date + time ────────────────
function buildUTC(dateObj, timeObj) {
  if (!dateObj || !timeObj) return null;
  return new Date(Date.UTC(dateObj.y, dateObj.m, dateObj.d, timeObj.h, timeObj.min, 0));
}

// ─── Pad zero ────────────────────────────────────────────────
function pad(n) { return String(n).padStart(2, '0'); }
function dateKey(y, m, d) { return `${y}-${pad(m + 1)}-${pad(d)}`; }
function lastDay(y, m) { return new Date(y, m + 1, 0).getDate(); }
function dowMon(y, m, d) { return (new Date(y, m, d).getDay() + 6) % 7; }
function ordinal(d) { const s = ['th','st','nd','rd'], v = d % 100; return d + (s[(v-20)%10] || s[v] || s[0]); }
function formatDate(y, m, d) { return `${MONTH_SHORT[m]} ${ordinal(d)}, ${y}`; }

// ─── Load sheet ───────────────────────────────────────────────
async function loadSheet() {
  try {
    const res = await fetch(SHEET_API_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);

    const data = await res.json(); // ← already JSON
    eventMap = {};

    data.forEach(ev => {
      if (!ev.date || !ev.title) return;

      const dateObj = parseDate(ev.date);
      if (!dateObj) return;

      const key = dateKey(dateObj.y, dateObj.m, dateObj.d);

      if (!eventMap[key]) eventMap[key] = [];

      eventMap[key].push({
        dateObj,
        timeRaw: ev.time,
        timeObj: parseTime(ev.time),
        title: ev.title,
        details: ev.details,
        buttonBefore: ev.buttonBefore,
        buttonAfter: ev.buttonAfter,
        logo: ev.logo,
        linkBefore: ev.linkBefore,
        linkAfter: ev.linkAfter,
      });
    });

    sheetLoaded = true;
    buildCalendar();

  } catch (e) {
    console.error('Failed to load sheet:', e);
  }
}

// ─── Countdown ────────────────────────────────────────────────
// Returns { status:'upcoming'|'live'|'ended', text, cssClass }
function getCountdown(ev) {
  if (!ev.timeObj) return null;
  const eventUTC = buildUTC(ev.dateObj, ev.timeObj);
  if (!eventUTC) return null;
  const now = Date.now();
  const diff = eventUTC - now;
  if (diff > 0) {
    // upcoming
    const totalSec = Math.floor(diff / 1000);
    const d = Math.floor(totalSec / 86400);
    const h = Math.floor((totalSec % 86400) / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    let text = 'Starting in ';
    if (d > 0) text += `${d}d ${h}h ${m}m`;
    else if (h > 0) text += `${h}h ${m}m`;
    else text += `${m}m`;
    return { status: 'upcoming', text, cssClass: 'status-upcoming' };
  } else if (diff > -7200000) {
    // within 2 hours past: show as "Live / Started"
    const ago = Math.abs(Math.floor(diff / 60000));
    return { status: 'live', text: `Started ${ago}m ago`, cssClass: 'status-live' };
  } else {
    return { status: 'ended', text: 'Ended', cssClass: 'status-ended' };
  }
}

// ─── Calendar build ───────────────────────────────────────────
const monthLabel = document.getElementById('monthLabel');
const calHead    = document.getElementById('calHead');
const calBody    = document.getElementById('calBody');

function buildCalendar() {
  monthLabel.textContent = MONTHS[viewMonth] + ' ' + viewYear;
  calHead.innerHTML = '';
  DAYS.forEach(d => {
    const c = document.createElement('div');
    c.className = 'cal-head-cell'; c.textContent = d; calHead.appendChild(c);
  });
  calBody.innerHTML = '';

  const first    = dowMon(viewYear, viewMonth, 1);
  const last     = lastDay(viewYear, viewMonth);
  const prevM    = viewMonth === 0 ? 11 : viewMonth - 1;
  const prevY    = viewMonth === 0 ? viewYear - 1 : viewYear;
  const prevLast = lastDay(prevY, prevM);
  const nextM    = viewMonth === 11 ? 0 : viewMonth + 1;
  const nextY    = viewMonth === 11 ? viewYear + 1 : viewYear;

  for (let i = 0; i < first; i++) {
    calBody.appendChild(makeCell(prevY, prevM, prevLast - first + 1 + i, true));
  }
  for (let d = 1; d <= last; d++) {
    calBody.appendChild(makeCell(viewYear, viewMonth, d, false));
  }
  const filled = first + last;
  for (let d = 1; filled + d - 1 < 42; d++) {
    calBody.appendChild(makeCell(nextY, nextM, d, true));
  }
}

// ─── Make a calendar cell ─────────────────────────────────────
function makeCell(y, m, d, overflow) {
  const isToday = (d === today.getDate() && m === today.getMonth() && y === today.getFullYear());
  const cell    = document.createElement('div');
  cell.className = 'cal-cell' + (isToday ? ' today' : '') + (overflow ? ' overflow' : '');

  const num = document.createElement('div');
  num.className = 'day-num'; num.textContent = d; cell.appendChild(num);

  const key    = dateKey(y, m, d);
  const events = eventMap[key] || [];

  if (events.length) {
    const wrap = document.createElement('div');
    wrap.className = 'evt-icons';
    events.forEach(ev => {
      const ico = document.createElement('div');
      ico.className = 'evt';
      if (ev.logo) {
        const img = document.createElement('img');
        img.src = ev.logo; img.alt = ev.title;
        ico.appendChild(img);
      } else {
        ico.textContent = '📅';
      }
      if (!overflow) {
        ico.addEventListener('mouseenter', e => { showTip(e, ev, y, m, d, false); });
        ico.addEventListener('mouseleave', maybHideTip);
        ico.addEventListener('mousemove', moveTip);
        ico.addEventListener('click', e => { e.stopPropagation(); pinTip(e, ev, y, m, d); });
      }
      wrap.appendChild(ico);
    });
    cell.appendChild(wrap);
  }
  return cell;
}

// ─── Tooltip logic ────────────────────────────────────────────
const tip         = document.getElementById('globalTip');
const tipLogo     = document.getElementById('tipLogo');
const tipTitle    = document.getElementById('tipTitle');
const tipDateBadge= document.getElementById('tipDateBadge');
const tipCountdown= document.getElementById('tipCountdown');
const tipDetail   = document.getElementById('tipDetail');
const tipBtnWrap  = document.getElementById('tipBtnWrap');

let tipPinned = false;
let countdownTimer = null;

function renderTip(ev, y, m, d) {
  // Logo
  tipLogo.innerHTML = '';
  if (ev.logo) {
    const img = document.createElement('img');
    img.src = ev.logo; img.alt = ev.title;
    tipLogo.appendChild(img);
  } else {
    tipLogo.textContent = '📅';
  }

  // Title + date
  tipTitle.textContent = ev.title;
  const dateLine = formatDate(y, m, d);
  tipDateBadge.textContent = ev.timeObj
    ? `${dateLine} · ${pad(ev.timeObj.h)}:${pad(ev.timeObj.min)} UTC`
    : dateLine;

  // Countdown (only if time known)
  clearInterval(countdownTimer);
  const cd = getCountdown(ev);
  if (cd) {
    tipCountdown.style.display = 'flex';
    const updateCD = () => {
      const c = getCountdown(ev);
      if (!c) return;
      tipCountdown.className = 'tip-countdown ' + c.cssClass;
      tipCountdown.innerHTML = `<span class="cd-dot"></span>${c.text}`;
    };
    updateCD();
    countdownTimer = setInterval(updateCD, 30000);
  } else {
    tipCountdown.style.display = 'none';
  }

  // Details
  tipDetail.textContent = ev.details || '';
  tipDetail.style.display = ev.details ? 'block' : 'none';

  // Button — only if time is known
  tipBtnWrap.innerHTML = '';
  if (ev.timeObj) {
    const status  = cd ? cd.status : 'ended';
    const isAfter = (status === 'ended' || status === 'live');
    const btnText = isAfter ? ev.buttonAfter : ev.buttonBefore;
    const btnLink = isAfter ? ev.linkAfter   : ev.linkBefore;
    if (btnText && btnLink) {
      const a = document.createElement('a');
      a.className = 'tip-btn';
      a.href = btnLink; a.target = '_blank'; a.rel = 'noopener';
      a.textContent = btnText;
      tipBtnWrap.appendChild(a);
    }
  } else {
    // No time — always show linkBefore button if available
    if (ev.buttonBefore && ev.linkBefore) {
      const a = document.createElement('a');
      a.className = 'tip-btn';
      a.href = ev.linkBefore; a.target = '_blank'; a.rel = 'noopener';
      a.textContent = ev.buttonBefore;
      tipBtnWrap.appendChild(a);
    }
  }
}

function showTip(e, ev, y, m, d, pin) {
  if (tipPinned && !pin) return;
  renderTip(ev, y, m, d);
  tip.classList.add('show');
  posTip(e);
}

function pinTip(e, ev, y, m, d) {
  tipPinned = true;
  renderTip(ev, y, m, d);
  tip.classList.add('show');
  posTip(e);
}

function maybHideTip() {
  if (!tipPinned) hideTip();
}

function hideTip() {
  tipPinned = false;
  tip.classList.remove('show');
  clearInterval(countdownTimer);
}

function moveTip(e) {
  if (!tipPinned) posTip(e);
}

function posTip(e) {
  const TW = 255, TH = 160, vw = window.innerWidth, vh = window.innerHeight;
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + TW > vw - 8) x = e.clientX - TW - 14;
  if (y + TH > vh - 8) y = e.clientY - TH - 14;
  x = Math.max(6, x); y = Math.max(6, y);
  tip.style.left = x + 'px'; tip.style.top = y + 'px';
}

// Click outside to unpin
document.addEventListener('click', e => {
  if (!tip.contains(e.target)) hideTip();
});

// Nav buttons
document.getElementById('prevBtn').addEventListener('click', () => {
  viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } buildCalendar();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } buildCalendar();
});

// ─── Init ─────────────────────────────────────────────────────
buildCalendar(); // draw empty calendar immediately
loadSheet();     // then populate with sheet data
</script>
</body>
</html>
