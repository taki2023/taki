<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Chilli CheckMate – Home</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:ital,wght@0,400;0,700;0,800;0,900;1,700;1,800&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
<style>
:root{
  --sidebar-height:490px;
  --red-dark:#d93020;--red-mid:#e85535;--red-border:#e8553a;
  --bg:#fff5f0;--card:#fff;--border:#f5c5b8;--shadow:#e8aa98;
  --text-dark:#c73520;--text-mid:#9a2010;
  --fs-xs:10px;--fs-sm:11px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;background:transparent;font-family:'Nunito',sans-serif;}

.page-sb{
  width:100%;height:var(--sidebar-height);background:var(--bg);
  border-radius:28px;border:3px solid var(--red-border);
  overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 8px 32px rgba(217,48,32,.12);
}

/* ── BANNER ── */
.page-top{
  background:linear-gradient(135deg,#d93020 0%,#e85535 60%,#ef6640 100%);
  border-radius:24px 24px 0 0;padding:8px 16px 8px;
  text-align:center;position:relative;overflow:hidden;flex-shrink:0;
}
.page-top::before{content:'';position:absolute;bottom:-10px;left:-10%;width:120%;height:20px;background:var(--bg);border-radius:50%;}
.page-top::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-55deg,transparent,transparent 14px,rgba(255,255,255,.04) 14px,rgba(255,255,255,.04) 28px);pointer-events:none;}
.page-title{font-family:'Fredoka One',cursive;font-size:18.5px;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.22), 0 4px 10px rgba(0,0,0,.15);position:relative;z-index:1;}
.page-sub{font-size:var(--fs-sm);font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.9px;text-transform:uppercase;margin-top:1px;position:relative;z-index:1;}

.inner{padding:10px 10px 12px;flex:1;overflow-y:auto;display:flex;flex-direction:column;}

/* ── NAV ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;gap:8px;}
.cal-month-label{
  font-family:'Fredoka One',cursive;font-size:clamp(14px,3.8vw,19px);
  background:linear-gradient(135deg,#d93020,#ef6640);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-align:center;flex:1;white-space:nowrap;
  filter:drop-shadow(0 1px 0 rgba(217,48,32,.18));letter-spacing:.5px;
}
.nav-btn{
  width:32px;height:32px;min-width:32px;border-radius:10px;
  border:none;outline:none;
  background:linear-gradient(145deg,#d93020,#e85535);
  box-shadow:0 3px 0 #8c1a10, 0 4px 12px rgba(217,48,32,.3);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:#fff;font-weight:900;
  transition:all .15s;user-select:none;flex-shrink:0;line-height:1;
  position:relative;overflow:hidden;
}
.nav-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.2) 0%,rgba(255,255,255,0) 60%);
  border-radius:inherit;pointer-events:none;
}
.nav-btn svg{width:14px;height:14px;stroke:#fff;stroke-width:2.8;stroke-linecap:round;stroke-linejoin:round;fill:none;}
.nav-btn:hover{background:linear-gradient(145deg,#c42818,#d94528);transform:translateY(-2px);box-shadow:0 5px 0 #8c1a10,0 6px 16px rgba(217,48,32,.4);}
.nav-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #8c1a10,0 2px 6px rgba(217,48,32,.2);}

/* ── DAY HEADERS ── */
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:5px;}
.cal-head-cell{
  text-align:center;
  font-size:clamp(9.5px,2.2vw,12px);letter-spacing:1.2px;padding:4px 1px;
  background:linear-gradient(135deg,#d93020 0%,#e85535 60%,#ef6640 100%);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  background-color:#ffe8e0;border-radius:6px;border:1px solid rgba(232,85,53,.25);
  filter:drop-shadow(0 1px 0 rgba(180,30,10,.22));
  font-family:'Nunito',sans-serif;font-weight:900;text-transform:uppercase;
}

.cal-body{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{
  background:var(--card);border:1.5px solid var(--border);border-radius:7px;
  padding:2px;display:flex;flex-direction:column;
  align-items:flex-start;gap:0;overflow:visible;
  height:clamp(42px,9vw,58px);position:relative;
  transition:border-color .15s, box-shadow .15s;
}
.cal-cell:not(.empty):not(.overflow):hover{border-color:var(--red-mid);box-shadow:0 2px 8px rgba(217,48,32,.1);}
.cal-cell.empty{background:transparent;border-color:transparent;}
.cal-cell.overflow{opacity:.3;pointer-events:none;}
.cal-cell.today{
  background:linear-gradient(135deg,rgba(217,48,32,.09),rgba(239,102,64,.05));
  border-color:var(--red-dark);box-shadow:0 0 0 2px rgba(217,48,32,.2);
}

/* ── TOP ROW: day number + status dot ── */
.day-num-wrap{
  height:18px;width:100%;display:flex;align-items:center;
  flex-shrink:0;padding-left:2px;padding-right:3px;
  justify-content:space-between;
}
.day-num{font-family:'Fredoka One',cursive;font-size:clamp(8px,2vw,11px);color:var(--text-dark);line-height:1;display:flex;align-items:center;}
.cal-cell.today .day-num{
  display:inline-flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#d93020,#e85535);color:#fff;border-radius:50%;
  width:17px;height:17px;padding:0;box-shadow:0 2px 0 #8c1a10;font-size:clamp(8px,1.9vw,11px);
}

.status-dot{
  width:7px;height:7px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.9);flex-shrink:0;pointer-events:none;
}
.status-dot.dot-live{background:radial-gradient(circle at 35% 35%,#ff6b6b,#e53935);box-shadow:0 0 0 2.5px rgba(229,57,53,.35),0 1px 4px rgba(229,57,53,.5);animation:dot-pulse 1s ease-in-out infinite;}
.status-dot.dot-before{background:radial-gradient(circle at 35% 35%,#64b5f6,#1e88e5);box-shadow:0 0 0 2.5px rgba(30,136,229,.25),0 1px 4px rgba(30,136,229,.4);animation:dot-glow-blue 2.5s ease-in-out infinite;}
.status-dot.dot-soon{background:radial-gradient(circle at 35% 35%,#81c784,#43a047);box-shadow:0 0 0 2.5px rgba(67,160,71,.25),0 1px 4px rgba(67,160,71,.4);animation:dot-glow-green 1.8s ease-in-out infinite;}
.status-dot.dot-ended{background:radial-gradient(circle at 35% 35%,#757575,#212121);box-shadow:0 1px 3px rgba(0,0,0,.35);}
@keyframes dot-pulse{0%,100%{box-shadow:0 0 0 2.5px rgba(229,57,53,.35),0 1px 4px rgba(229,57,53,.5);transform:scale(1);}50%{box-shadow:0 0 0 5px rgba(229,57,53,.1),0 1px 6px rgba(229,57,53,.6);transform:scale(1.15);}}
@keyframes dot-glow-blue{0%,100%{box-shadow:0 0 0 2.5px rgba(30,136,229,.25),0 1px 4px rgba(30,136,229,.4);}50%{box-shadow:0 0 0 4px rgba(30,136,229,.12),0 1px 7px rgba(30,136,229,.5);}}
@keyframes dot-glow-green{0%,100%{box-shadow:0 0 0 2.5px rgba(67,160,71,.25),0 1px 4px rgba(67,160,71,.4);}50%{box-shadow:0 0 0 4.5px rgba(67,160,71,.12),0 1px 7px rgba(67,160,71,.55);}}

.status-upcoming{color:#1565c0;background:#e3f2fd;border-color:#90caf9;}
.status-soon{color:#2e7d32;background:#e8f5e9;border-color:#a5d6a7;animation:pulse-badge-green 1.6s ease-in-out infinite;}
.status-live{color:#b71c1c;background:#fce4ec;border-color:#ef9a9a;animation:pulse-badge 1.4s ease-in-out infinite;}
.status-ended{color:#555;background:#f5f5f5;border-color:#ccc;}
@keyframes pulse-badge{0%,100%{opacity:1;}50%{opacity:.6;}}
@keyframes pulse-badge-green{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(67,160,71,.3);}50%{opacity:.85;box-shadow:0 0 0 4px rgba(67,160,71,.08);}}

.evt-icons{display:flex;flex-direction:row;flex-wrap:wrap;align-items:center;justify-content:center;gap:2px;width:100%;flex:1;min-height:0;}

.evt{
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  width:clamp(15px,3.8vw,22px);height:clamp(15px,3.8vw,22px);min-width:15px;min-height:15px;
  border-radius:5px;font-size:clamp(10px,2.4vw,15px);
  flex-shrink:0;transition:transform .18s;z-index:1;
  border:1.5px solid rgba(217,48,32,.22);background:rgba(255,243,224,.7);
  overflow:hidden;line-height:1;position:relative;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
}
.evt:hover{transform:scale(1.35);z-index:10;}
.evt img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;border-radius:3px;display:block;opacity:0;transition:opacity .25s;}
.evt img.loaded{opacity:1;}
.evt-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:inherit;line-height:1;}

.evt-skeleton,.tip-logo-skeleton{
  position:absolute;inset:0;border-radius:3px;
  background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);
  background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;z-index:2;
}
.tip-logo-skeleton{border-radius:6px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-100% 0;}}

.legend{
  display:flex;align-items:center;justify-content:center;
  flex-wrap:wrap;gap:4px 12px;padding:6px 4px 2px;margin-top:5px;flex-shrink:0;
}
.legend-item{display:flex;align-items:center;gap:5px;font-family:'Fredoka One',cursive;font-size:clamp(9px,2vw,11px);letter-spacing:.4px;white-space:nowrap;}
.legend-item:nth-child(1) .legend-label{color:#1565c0;}
.legend-item:nth-child(2) .legend-label{color:#2e7d32;}
.legend-item:nth-child(3) .legend-label{color:#b71c1c;}
.legend-item:nth-child(4) .legend-label{color:#424242;}
.legend-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(255,255,255,.9);flex-shrink:0;}
.legend-dot.dot-before{background:radial-gradient(circle at 35% 35%,#64b5f6,#1e88e5);animation:dot-glow-blue 2.5s ease-in-out infinite;}
.legend-dot.dot-soon{background:radial-gradient(circle at 35% 35%,#81c784,#43a047);animation:dot-glow-green 1.8s ease-in-out infinite;}
.legend-dot.dot-live{background:radial-gradient(circle at 35% 35%,#ff6b6b,#e53935);animation:dot-pulse 1s ease-in-out infinite;}
.legend-dot.dot-ended{background:radial-gradient(circle at 35% 35%,#757575,#212121);box-shadow:0 1px 3px rgba(0,0,0,.35);}

/* ══════════════════════════════════════════
   TOOLTIP
══════════════════════════════════════════ */
.evt-tip{
  position:fixed;background:var(--card);border:2px solid var(--red-dark);
  border-radius:14px;padding:10px 13px 9px;
  box-shadow:0 8px 28px rgba(217,48,32,.25);
  pointer-events:auto;opacity:0;transition:opacity .12s;
  z-index:99999;min-width:200px;max-width:300px;white-space:normal;
  font-family:'Nunito',sans-serif;display:none;flex-direction:column;gap:0;
}
.evt-tip.show{opacity:1;display:flex;}

/* header: logo + title/date */
.tip-row1{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.tip-logo{
  width:34px;height:34px;border-radius:7px;border:1.5px solid var(--border);
  flex-shrink:0;font-size:22px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:#fff8f5;position:relative;
}
.tip-logo img{width:100%;height:100%;object-fit:contain;border-radius:6px;display:block;opacity:0;transition:opacity .25s;}
.tip-logo img.loaded{opacity:1;}
.tip-date-wrap{display:flex;flex-direction:column;gap:2px;min-width:0;}
.tip-title{font-family:'Fredoka One',cursive;font-size:13px;color:var(--red-dark);line-height:1.2;word-break:break-word;padding-right:22px;}
.tip-date-badge{font-size:10px;font-weight:800;color:var(--text-mid);opacity:.8;}

/* countdown badge */
.tip-countdown{
  display:flex;align-items:center;gap:5px;
  font-size:10px;font-weight:900;
  padding:4px 9px;border-radius:999px;border:1.5px solid;
  margin-bottom:6px;width:fit-content;
}
.tip-countdown .cd-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}

/* details */
.tip-detail{font-size:10px;font-weight:700;color:var(--text-mid);line-height:1.55;margin-bottom:6px;}

/* ── QUOTE / MESSAGE BLOCK (shared style for organizer + admin) ── */
.tip-quote-block{
  background:#fff;border:1.5px solid #eee;border-radius:9px;
  padding:0;margin-bottom:7px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.06);
}
.tip-quote-block-bar{height:3px;width:100%;}
.tip-quote-block-bar.bar-organizer{background:linear-gradient(90deg,#d93020,#ef6640);}
.tip-quote-block-bar.bar-admin{background:linear-gradient(90deg,#6a0dad,#b042f5);}
.tip-quote-inner{padding:6px 9px 7px;}
.tip-quote-label{
  display:flex;align-items:center;gap:5px;
  font-family:'Nunito',sans-serif;font-size:8.5px;font-weight:900;
  letter-spacing:.7px;text-transform:uppercase;color:#aaa;margin-bottom:4px;
}
.tip-quote-label-icon{display:flex;align-items:center;flex-shrink:0;}

/* Admin shield icon */
.admin-icon{font-size:11px;line-height:1;}

.tip-quote-text{font-family:'Nunito',sans-serif;font-size:10.5px;font-weight:700;color:#3a3a3a;line-height:1.55;}

/* ── @mention links in quotes ── */
.mention-link{
  color:#d93020;font-weight:900;text-decoration:none;
  border-bottom:1px dotted rgba(217,48,32,.4);
  transition:color .15s,border-color .15s;
}
.mention-link:hover{color:#a01808;border-bottom-color:rgba(160,24,8,.7);}

/* bottom row */
.tip-bottom-row{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:2px;}
.tip-btn{
  display:inline-block;font-size:10px;font-weight:900;color:#fff;
  background:linear-gradient(135deg,#d93020,#e85535);
  padding:4px 12px;border-radius:999px;text-decoration:none;
  box-shadow:0 2px 0 #8c1a10;pointer-events:auto;white-space:nowrap;flex-shrink:0;
}
.tip-organizer{
  display:inline-flex;align-items:center;gap:3px;
  font-size:9.5px;font-weight:900;color:var(--text-mid);
  background:#fff0eb;border:1.5px solid var(--border);
  border-radius:999px;padding:3px 8px 3px 6px;
  text-decoration:none;white-space:nowrap;
  transition:background .15s,border-color .15s;pointer-events:auto;
}
.tip-organizer:hover{background:#fce0d5;border-color:var(--red-mid);color:var(--red-dark);}
.tip-organizer-icon{font-size:11px;line-height:1;}

/* ── CLOSE BUTTON ── */
.tip-close{
  position:absolute;top:7px;right:9px;font-size:13px;font-weight:900;color:var(--red-dark);
  cursor:pointer;line-height:1;
  width:20px;height:20px;display:flex;
  align-items:center;justify-content:center;border-radius:50%;
  background:rgba(217,48,32,.1);z-index:10;
  border:1.5px solid rgba(217,48,32,.2);
  transition:background .15s,transform .15s;
  user-select:none;
}
.tip-close:hover{background:rgba(217,48,32,.2);transform:scale(1.15);}

/* ── Mobile full-screen tooltip overlay ── */
@media (hover:none) and (pointer:coarse){
  .evt-tip{
    position:fixed!important;
    left:50%!important;top:50%!important;
    transform:translate(-50%,-50%);
    width:min(88vw,300px);max-width:min(88vw,300px);
    max-height:80vh;overflow-y:auto;
    box-shadow:0 16px 48px rgba(217,48,32,.35),0 0 0 9999px rgba(0,0,0,.45);
  }
  .evt-tip.show{display:flex;}
}

.footer{
  text-align:center;font-family:'Fredoka One',cursive;font-size:11px;letter-spacing:.4px;
  background:linear-gradient(135deg,#d93020,#ef6640);
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 1px 0 rgba(217,48,32,.18));padding-top:4px;margin-top:auto;
}
</style>
</head>
<body>

<div class="page-sb">
  <div class="page-top">
    <div class="page-title">🏠 Hot Chilli CheckMate #</div>
    <div class="page-sub">Your Chess Home ♡</div>
  </div>
  <div class="inner">
    <div class="cal-nav">
      <button class="nav-btn" id="prevBtn" aria-label="Previous month">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="cal-month-label" id="monthLabel"></div>
      <button class="nav-btn" id="nextBtn" aria-label="Next month">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="cal-head" id="calHead"></div>
    <div class="cal-body" id="calBody"></div>

    <div class="legend">
      <div class="legend-item"><span class="legend-dot dot-before"></span><span class="legend-label">Upcoming</span></div>
      <div class="legend-item"><span class="legend-dot dot-soon"></span><span class="legend-label">Starting soon</span></div>
      <div class="legend-item"><span class="legend-dot dot-live"></span><span class="legend-label">Live now</span></div>
      <div class="legend-item"><span class="legend-dot dot-ended"></span><span class="legend-label">Ended</span></div>
    </div>

    <div class="footer">🌶 Hot Chilli CheckMate © 2026 ♞</div>
  </div>
</div>

<!-- Tooltip -->
<div class="evt-tip" id="globalTip">
  <div class="tip-close" id="tipClose">✕</div>

  <div class="tip-row1">
    <div class="tip-logo" id="tipLogo"></div>
    <div class="tip-date-wrap">
      <div class="tip-title" id="tipTitle"></div>
      <div class="tip-date-badge" id="tipDateBadge"></div>
    </div>
  </div>

  <div class="tip-countdown" id="tipCountdown"></div>
  <div class="tip-detail" id="tipDetail"></div>

  <!-- Organizer message block -->
  <div class="tip-quote-block" id="tipQuoteBlock" style="display:none;">
    <div class="tip-quote-block-bar bar-organizer"></div>
    <div class="tip-quote-inner">
      <div class="tip-quote-label">
        <span class="tip-quote-label-icon">
          <!-- Gmail SVG logo -->
          <svg width="13" height="10" viewBox="0 0 24 18" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 2.4C0 1.08 1.08 0 2.4 0h19.2C22.92 0 24 1.08 24 2.4v13.2C24 16.92 22.92 18 21.6 18H2.4C1.08 18 0 16.92 0 15.6V2.4z" fill="#f2f2f2"/>
            <path d="M2.4 0L12 7.8 21.6 0" fill="none"/>
            <path d="M0 3.6V15.6a2.4 2.4 0 002.4 2.4h1.2V6L12 12.6 20.4 6v12h1.2a2.4 2.4 0 002.4-2.4V3.6L12 10.8 0 3.6z" fill="#c5221f"/>
            <path d="M0 3.6L12 10.8 24 3.6 21.6 0 12 7.2 2.4 0 0 3.6z" fill="#ea4335"/>
            <path d="M0 3.6V15.6a2.4 2.4 0 002.4 2.4h1.2V6L0 3.6z" fill="#4285f4"/>
            <path d="M24 3.6V15.6a2.4 2.4 0 01-2.4 2.4h-1.2V6L24 3.6z" fill="#34a853"/>
          </svg>
        </span>
        <span id="tipQuoteLabelText">Message from organizer</span>
      </div>
      <div class="tip-quote-text" id="tipMsg"></div>
    </div>
  </div>

  <!-- Admin message block -->
  <div class="tip-quote-block" id="tipAdminBlock" style="display:none;">
    <div class="tip-quote-block-bar bar-admin"></div>
    <div class="tip-quote-inner">
      <div class="tip-quote-label">
        <span class="tip-quote-label-icon admin-icon">🛡️</span>
        <span id="tipAdminLabelText">Admin message</span>
      </div>
      <div class="tip-quote-text" id="tipAdminMsg"></div>
    </div>
  </div>

  <div class="tip-bottom-row" id="tipBottomRow"></div>
</div>

<script>
const SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbwLWbOvhgA9aiwEpatPngrRZCsUaGbBNNYDQR3KK5sm-p8lQjx1eili_e4IGUWM9cCL9w/exec';

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const DAYS_FUN=[
  ['🌙','MON'],['🔥','TUE'],['⚡','WED'],['♟','THU'],['🎯','FRI'],['🌶','SAT'],['☀️','SUN']
];

const today=new Date();
let viewYear=today.getFullYear(), viewMonth=today.getMonth(), eventMap={};

/* ══════════════════════════════════════════════
   IMAGE PROXY
   Converts Google Drive / Sheets "brut" links to
   a publicly accessible URL via wsrv.nl CDN proxy.
══════════════════════════════════════════════ */
function proxyImageURL(raw){
  if(!raw)return null;
  raw=raw.trim();

  // Already a proxied wsrv URL — don't double-proxy
  if(raw.startsWith('https://wsrv.nl'))return raw;

  // Google Drive share link  →  direct download link via wsrv proxy
  // Pattern: https://drive.google.com/file/d/FILE_ID/view...
  const driveMatch=raw.match(/drive\.google\.com\/(?:file\/d\/|open\?id=)([\w-]+)/);
  if(driveMatch){
    const fileId=driveMatch[1];
    const direct=`https://drive.google.com/uc?export=download&id=${fileId}`;
    return `https://wsrv.nl/?url=${encodeURIComponent(direct)}&w=64&h=64&fit=contain&output=webp`;
  }

  // Google Docs / Sheets exported images
  // Pattern: https://docs.google.com/...
  if(raw.includes('docs.google.com')){
    return `https://wsrv.nl/?url=${encodeURIComponent(raw)}&w=64&h=64&fit=contain&output=webp`;
  }

  // Blogger / Googleusercontent
  if(raw.includes('googleusercontent.com')||raw.includes('blogger.com')){
    return `https://wsrv.nl/?url=${encodeURIComponent(raw)}&w=64&h=64&fit=contain&output=webp`;
  }

  // Generic http/https image — still proxy to avoid CORS issues
  if(/^https?:\/\//i.test(raw)){
    return `https://wsrv.nl/?url=${encodeURIComponent(raw)}&w=64&h=64&fit=contain&output=webp`;
  }

  return null; // emoji or non-URL
}

/* ── image cache ── */
const imgMem=new Map(),imgCbs=new Map();
const lsKey=u=>'imgcache2:'+u; // v2 key to bust old cache
const lsGet=u=>{try{return localStorage.getItem(lsKey(u));}catch(e){return null;}};
const lsSet=(u,v)=>{try{localStorage.setItem(lsKey(u),v);}catch(e){}};

function preloadImg(url){
  if(!url||imgMem.has(url))return;
  const c=lsGet(url);if(c==='ok'||c==='err'){imgMem.set(url,c);return;}
  imgMem.set(url,'loading');
  const img=new Image();img.crossOrigin='anonymous';img.decoding='async';
  img.onload=()=>{imgMem.set(url,'ok');lsSet(url,'ok');notify(url,'ok');};
  img.onerror=()=>{imgMem.set(url,'err');lsSet(url,'err');notify(url,'err');};
  img.src=url;
}
function notify(url,state){const cbs=imgCbs.get(url)||[];imgCbs.delete(url);cbs.forEach(cb=>cb(state));}
function onImgReady(url,cb){
  const s=imgMem.get(url);if(s==='ok'||s==='err'){cb(s);return;}
  const c=lsGet(url);if(c==='ok'||c==='err'){imgMem.set(url,c);cb(c);return;}
  if(!imgCbs.has(url))imgCbs.set(url,[]);
  imgCbs.get(url).push(cb);
  if(!imgMem.has(url))preloadImg(url);
}

/* ── helpers ── */
const pad=n=>String(n).padStart(2,'0');
const dateKey=(y,m,d)=>`${y}-${pad(m+1)}-${pad(d)}`;
const lastDay=(y,m)=>new Date(y,m+1,0).getDate();
const dowMon=(y,m,d)=>(new Date(y,m,d).getDay()+6)%7;
const ordinal=d=>{const s=['th','st','nd','rd'],v=d%100;return d+(s[(v-20)%10]||s[v]||s[0]);};
const formatDate=(y,m,d)=>`${MONTH_SHORT[m]} ${ordinal(d)}, ${y}`;
const isURL=s=>s&&(/^https?:\/\//i.test(s)||/^\/\//.test(s)||s.includes('.'));

/* ── @mention linkifier ── */
function linkifyMentions(text){
  // Split on @username patterns, make each a clickable chess.com link
  const parts=text.split(/(@[\w-]+)/g);
  return parts.map(part=>{
    if(/^@[\w-]+$/.test(part)){
      const username=part.slice(1);
      const a=document.createElement('a');
      a.className='mention-link';
      a.href=`https://www.chess.com/member/${username}`;
      a.target='_blank';
      a.rel='noopener noreferrer';
      a.textContent=part;
      return a;
    }else{
      return document.createTextNode(part);
    }
  });
}

function setTextWithMentions(el,text){
  el.innerHTML='';
  linkifyMentions(text).forEach(node=>el.appendChild(node));
}

/* ── parsers ── */
function parseDate(str){
  if(!str)return null;str=str.trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(str)){const[y,m,d]=str.split('-').map(Number);return{y,m:m-1,d};}
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(str)){const[m,d,y]=str.split('/').map(Number);return{y,m:m-1,d};}
  if(/^\d{1,2}-\d{1,2}-\d{4}$/.test(str)){const[d,m,y]=str.split('-').map(Number);return{y,m:m-1,d};}
  const dt=new Date(str);if(!isNaN(dt))return{y:dt.getFullYear(),m:dt.getMonth(),d:dt.getDate()};
  return null;
}
function parseTime(str){
  if(!str||!str.trim())return null;
  const m=str.trim().match(/^(\d{1,2}):(\d{2})(?::\d{2})?(?:\s*(am|pm))?$/i);if(!m)return null;
  let h=parseInt(m[1]),min=parseInt(m[2]);
  if(m[3]){if(m[3].toLowerCase()==='pm'&&h<12)h+=12;if(m[3].toLowerCase()==='am'&&h===12)h=0;}
  return{h,min};
}
function buildUTC(dateObj,timeObj){
  if(!dateObj||!timeObj)return null;
  return new Date(Date.UTC(dateObj.y,dateObj.m,dateObj.d,timeObj.h,timeObj.min,0));
}

/* ── phase ── */
function getPhase(ev){
  if(!ev.timeObj)return null;
  const s=buildUTC(ev.dateObj,ev.timeObj);if(!s)return null;
  const e=new Date(s.getTime()+(ev.duration||0)*3600000);
  const now=Date.now();
  if(now<s.getTime()){
    const ms=s-now,sec=Math.floor(ms/1000);
    const d=Math.floor(sec/86400),h=Math.floor((sec%86400)/3600),m=Math.floor((sec%3600)/60);
    let text='Starting in ';
    if(d>0)text+=`${d}d ${h}h ${m}m`;else if(h>0)text+=`${h}h ${m}m`;else text+=`${m}m`;
    const isSoon=ms<=3600000;
    return{status:isSoon?'soon':'upcoming',text,cssClass:isSoon?'status-soon':'status-upcoming',phase:'before'};
  }else if(now<e.getTime()){
    return{status:'live',text:'🔴 Live',cssClass:'status-live',phase:'live'};
  }else{
    return{status:'ended',text:'✅ Ended',cssClass:'status-ended',phase:'after'};
  }
}

function cellDotClass(events){
  let best=null;const rank={ended:1,before:2,soon:3,live:4};
  for(const ev of events){
    if(!ev.timeObj)continue;
    const s=buildUTC(ev.dateObj,ev.timeObj);if(!s)continue;
    const e=new Date(s.getTime()+(ev.duration||0)*3600000);
    const now=Date.now();
    let cls;
    if(now>=e.getTime())cls='ended';
    else if(now>=s.getTime())cls='live';
    else if(s-now<=3600000)cls='soon';
    else cls='before';
    if(!best||rank[cls]>rank[best])best=cls;
  }
  return best?'dot-'+best:null;
}

function pick(ev,phase,field){
  const key={
    before:{details:'detailsBefore',button:'buttonBefore',link:'linkBefore'},
    live:  {details:'detailsLive',  button:'buttonLive',  link:'linkLive'  },
    after: {details:'detailsAfter', button:'buttonAfter', link:'linkAfter' },
  };
  const fallback={before:['before'],live:['live','before'],after:['after','live','before']};
  for(const p of fallback[phase]){const val=ev[key[p][field]];if(val&&val.trim())return val.trim();}
  return '';
}

/* ── load sheet ── */
async function loadSheet(){
  try{
    const res=await fetch(SHEET_API_URL,{cache:'no-store',headers:{'Accept':'application/json'}});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    eventMap={};
    data.forEach(ev=>{
      if(!ev.date||!ev.title)return;
      const dateObj=parseDate(ev.date);if(!dateObj)return;
      const key=dateKey(dateObj.y,dateObj.m,dateObj.d);
      if(!eventMap[key])eventMap[key]=[];
      const rawLogo=(ev.logo||'').trim();
      const proxiedLogo=isURL(rawLogo)?proxyImageURL(rawLogo):null;
      const logoDisplay=proxiedLogo||rawLogo; // fallback to emoji if not URL

      eventMap[key].push({
        dateObj,timeObj:parseTime(ev.time),duration:parseFloat(ev.duration)||0,
        title:(ev.title||'').trim(),
        detailsBefore:(ev.detailsBefore||'').trim(),buttonBefore:(ev.buttonBefore||'').trim(),linkBefore:(ev.linkBefore||'').trim(),
        detailsLive:(ev.detailsLive||'').trim(),buttonLive:(ev.buttonLive||'').trim(),linkLive:(ev.linkLive||'').trim(),
        detailsAfter:(ev.detailsAfter||'').trim(),buttonAfter:(ev.buttonAfter||'').trim(),linkAfter:(ev.linkAfter||'').trim(),
        rawLogo,
        logo:logoDisplay,
        isProxied:!!proxiedLogo,
        organizer:(ev.organizer||'').trim(),
        quoteBefore:(ev.quoteBefore||'').trim(),
        quoteAfter:(ev.quoteAfter||'').trim(),
        // ── NEW: admin columns ──
        admin:(ev.admin||'').trim().replace(/^@/,''),
        adminMessage:(ev.adminMessage||'').trim(),
      });
      if(proxiedLogo)preloadImg(proxiedLogo);
    });
    buildCalendar();
  }catch(e){console.error('Sheet load failed:',e);}
}

/* ── calendar ── */
const monthLabel=document.getElementById('monthLabel');
const calHead=document.getElementById('calHead');
const calBody=document.getElementById('calBody');

function buildCalendar(){
  monthLabel.textContent=MONTHS[viewMonth]+' '+viewYear;
  calHead.innerHTML='';
  DAYS_FUN.forEach(([,label])=>{
    const c=document.createElement('div');c.className='cal-head-cell';
    c.textContent=label;calHead.appendChild(c);
  });
  calBody.innerHTML='';
  const first=dowMon(viewYear,viewMonth,1),last=lastDay(viewYear,viewMonth);
  const prevM=viewMonth===0?11:viewMonth-1,prevY=viewMonth===0?viewYear-1:viewYear;
  const nextM=viewMonth===11?0:viewMonth+1,nextY=viewMonth===11?viewYear+1:viewYear;
  for(let i=0;i<first;i++)calBody.appendChild(makeCell(prevY,prevM,lastDay(prevY,prevM)-first+1+i,true));
  for(let d=1;d<=last;d++)calBody.appendChild(makeCell(viewYear,viewMonth,d,false));
  const filled=first+last;
  for(let d=1;filled+d-1<42;d++)calBody.appendChild(makeCell(nextY,nextM,d,true));
}

function makeCell(y,m,d,overflow){
  const isToday=(d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear());
  const cell=document.createElement('div');
  cell.className='cal-cell'+(isToday?' today':'')+(overflow?' overflow':'');

  const wrap0=document.createElement('div');wrap0.className='day-num-wrap';
  const num=document.createElement('div');num.className='day-num';num.textContent=d;
  wrap0.appendChild(num);

  const events=eventMap[dateKey(y,m,d)]||[];
  if(!overflow&&events.length){
    const dotCls=cellDotClass(events);
    if(dotCls){
      const dot=document.createElement('div');
      dot.className='status-dot '+dotCls;
      wrap0.appendChild(dot);
    }
  }
  cell.appendChild(wrap0);

  if(events.length){
    const wrap=document.createElement('div');wrap.className='evt-icons';
    events.forEach(ev=>{
      const ico=document.createElement('div');ico.className='evt';

      if(ev.isProxied){
        // Proxied image (Google Drive / generic URL)
        const skel=document.createElement('div');skel.className='evt-skeleton';ico.appendChild(skel);
        const img=document.createElement('img');img.alt=ev.title;img.loading='eager';img.decoding='async';ico.appendChild(img);
        onImgReady(ev.logo,state=>{
          if(state==='ok'){
            img.src=ev.logo;
            const finish=()=>{img.classList.add('loaded');skel.style.opacity='0';setTimeout(()=>skel.remove(),250);};
            img.onload=finish;if(img.complete&&img.naturalWidth>0)finish();
          }else{
            // Proxy failed → fall back to emoji
            skel.remove();
            const em=document.createElement('span');em.className='evt-emoji';em.textContent='📅';ico.appendChild(em);
          }
        });
      }else{
        // Emoji or empty
        const em=document.createElement('span');em.className='evt-emoji';
        em.textContent=(ev.rawLogo&&ev.rawLogo.trim())?ev.rawLogo:'📅';ico.appendChild(em);
      }

      if(!overflow){
        // Desktop hover
        ico.addEventListener('mouseenter',e=>showTip(e,ev,y,m,d));
        ico.addEventListener('mouseleave',maybHideTip);
        ico.addEventListener('mousemove',moveTip);
        // Desktop + mobile click/tap
        ico.addEventListener('click',e=>{e.stopPropagation();pinTip(e,ev,y,m,d);});
        // ── Mobile touch: touchend fires a pinTip ──
        ico.addEventListener('touchend',e=>{
          e.preventDefault();e.stopPropagation();
          const touch=e.changedTouches[0];
          pinTip(touch,ev,y,m,d);
        },{passive:false});
      }
      wrap.appendChild(ico);
    });
    cell.appendChild(wrap);
  }
  return cell;
}

/* ── tooltip ── */
const tip            =document.getElementById('globalTip');
const tipLogo        =document.getElementById('tipLogo');
const tipTitle       =document.getElementById('tipTitle');
const tipDateBadge   =document.getElementById('tipDateBadge');
const tipCountdown   =document.getElementById('tipCountdown');
const tipDetail      =document.getElementById('tipDetail');
const tipMsg         =document.getElementById('tipMsg');
const tipQuoteBlock  =document.getElementById('tipQuoteBlock');
const tipQuoteLabelText=document.getElementById('tipQuoteLabelText');
const tipAdminBlock  =document.getElementById('tipAdminBlock');
const tipAdminLabelText=document.getElementById('tipAdminLabelText');
const tipAdminMsg    =document.getElementById('tipAdminMsg');
const tipBottomRow   =document.getElementById('tipBottomRow');
const tipClose       =document.getElementById('tipClose');

let tipPinned=false,countdownTimer=null;

const hideTip=()=>{tipPinned=false;tip.classList.remove('show');clearInterval(countdownTimer);};
const showTip=(e,ev,y,m,d)=>{if(tipPinned)return;renderTip(ev,y,m,d);tip.classList.add('show');posTip(e);};
const pinTip =(e,ev,y,m,d)=>{tipPinned=true;renderTip(ev,y,m,d);tip.classList.add('show');posTip(e);};
const maybHideTip=()=>{if(!tipPinned)hideTip();};
const moveTip=(e)=>{if(!tipPinned)posTip(e);};

tipClose.addEventListener('click',e=>{e.stopPropagation();hideTip();});
tipClose.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();hideTip();},{passive:false});
tip.addEventListener('mouseleave',()=>{if(!tipPinned)hideTip();});

function renderTip(ev,y,m,d){
  /* logo */
  tipLogo.innerHTML='';
  if(ev.isProxied){
    const skel=document.createElement('div');skel.className='tip-logo-skeleton';tipLogo.appendChild(skel);
    const img=document.createElement('img');img.alt=ev.title;img.decoding='async';tipLogo.appendChild(img);
    onImgReady(ev.logo,state=>{
      if(state==='ok'){
        img.src=ev.logo;
        const finish=()=>{img.classList.add('loaded');skel.style.opacity='0';setTimeout(()=>skel.remove(),250);};
        img.onload=finish;if(img.complete&&img.naturalWidth>0)finish();
      }else{skel.remove();tipLogo.textContent='📅';}
    });
  }else{tipLogo.textContent=(ev.rawLogo&&ev.rawLogo.trim())?ev.rawLogo:'📅';}

  tipTitle.textContent=ev.title;
  tipDateBadge.textContent=ev.timeObj
    ?`${formatDate(y,m,d)} · ${pad(ev.timeObj.h)}:${pad(ev.timeObj.min)} UTC`
    :formatDate(y,m,d);

  /* countdown */
  clearInterval(countdownTimer);countdownTimer=null;
  const st=getPhase(ev);
  if(st){
    tipCountdown.style.display='flex';
    const update=()=>{const s=getPhase(ev);if(!s)return;tipCountdown.className='tip-countdown '+s.cssClass;tipCountdown.innerHTML=`<span class="cd-dot"></span>${s.text}`;};
    update();countdownTimer=setInterval(update,30000);
  }else{tipCountdown.style.display='none';}

  /* details */
  const phase=st?st.phase:'before';
  const details=pick(ev,phase,'details');
  const btnText=pick(ev,phase,'button');
  const btnLink =pick(ev,phase,'link');
  tipDetail.textContent=details;
  tipDetail.style.display=details?'block':'none';

  /* organizer quote block */
  const quote=(phase==='after')?ev.quoteAfter:ev.quoteBefore;
  if(quote){
    setTextWithMentions(tipMsg,quote);
    tipQuoteLabelText.textContent=ev.organizer?`From @${ev.organizer}`:'From the organizer';
    tipQuoteBlock.style.display='block';
  }else{
    tipQuoteBlock.style.display='none';
  }

  /* ── admin message block ── */
  if(ev.adminMessage){
    setTextWithMentions(tipAdminMsg,ev.adminMessage);
    tipAdminLabelText.textContent=ev.admin?`From @${ev.admin}`:'Admin message';
    tipAdminBlock.style.display='block';
  }else{
    tipAdminBlock.style.display='none';
  }

  /* bottom row: organizer pill + action button */
  tipBottomRow.innerHTML='';
  if(ev.organizer){
    const a=document.createElement('a');
    a.className='tip-organizer';
    a.href=`https://www.chess.com/member/${ev.organizer}`;
    a.target='_blank';a.rel='noopener noreferrer';
    a.innerHTML=`<span class="tip-organizer-icon">♟</span>@${ev.organizer}`;
    tipBottomRow.appendChild(a);
  }
  if(btnText&&btnLink){
    const a=document.createElement('a');
    a.className='tip-btn';a.href=btnLink;a.target='_blank';a.rel='noopener noreferrer';
    a.textContent=btnText;tipBottomRow.appendChild(a);
  }
}

function posTip(e){
  const TW=265,TH=200,vw=window.innerWidth,vh=window.innerHeight;
  // On touch devices, center in viewport (CSS handles this via media query)
  const isTouchDevice=('ontouchstart' in window)||navigator.maxTouchPoints>0;
  if(isTouchDevice){
    tip.style.left='';tip.style.top='';
    return;
  }
  let x=e.clientX+14,y=e.clientY+14;
  if(x+TW>vw-8)x=e.clientX-TW-14;
  if(y+TH>vh-8)y=e.clientY-TH-14;
  x=Math.max(6,x);y=Math.max(6,y);
  tip.style.left=x+'px';tip.style.top=y+'px';
}

document.addEventListener('click',e=>{if(!tip.contains(e.target))hideTip();});
document.addEventListener('touchstart',e=>{if(!tip.contains(e.target)&&tipPinned)hideTip();},{passive:true});

document.getElementById('prevBtn').addEventListener('click',()=>{hideTip();viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}buildCalendar();});
document.getElementById('nextBtn').addEventListener('click',()=>{hideTip();viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}buildCalendar();});

buildCalendar();
loadSheet();
</script>
