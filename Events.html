<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Chilli CheckMate – Home</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --sidebar-height:460px;
  --red-dark:#d93020;--red-mid:#e85535;--red-border:#e8553a;
  --bg:#fff5f0;--card:#fff;--border:#f5c5b8;--shadow:#e8aa98;
  --text-dark:#c73520;--text-mid:#9a2010;
  --fs-xs:10px;--fs-sm:11px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;background:transparent;font-family:'Nunito',sans-serif;}

.page-sb{
  width:100%;height:var(--sidebar-height);background:var(--bg);
  border-radius:28px;border:3px solid var(--red-border);
  overflow:hidden;display:flex;flex-direction:column;
}
.page-top{
  background:linear-gradient(135deg,#d93020 0%,#e85535 60%,#ef6640 100%);
  border-radius:24px 24px 0 0;padding:14px 16px 10px;
  text-align:center;position:relative;overflow:hidden;flex-shrink:0;
}
.page-top::before{content:'';position:absolute;bottom:-10px;left:-10%;width:120%;height:20px;background:var(--bg);border-radius:50%;}
.page-top::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-55deg,transparent,transparent 14px,rgba(255,255,255,.04) 14px,rgba(255,255,255,.04) 28px);pointer-events:none;}
.page-title{font-family:'Fredoka One',cursive;font-size:19px;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.18);position:relative;z-index:1;}
.page-sub{font-size:var(--fs-sm);font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.9px;text-transform:uppercase;margin-top:2px;position:relative;z-index:1;}

.inner{padding:10px 10px 14px;flex:1;overflow-y:auto;display:flex;flex-direction:column;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
.cal-month-label{font-family:'Fredoka One',cursive;font-size:clamp(13px,3.5vw,17px);color:var(--red-dark);text-align:center;flex:1;white-space:nowrap;}
.nav-btn{
  width:28px;height:28px;min-width:28px;border-radius:50%;border:2px solid var(--border);
  background:var(--card);box-shadow:0 3px 0 var(--shadow);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;color:var(--red-dark);font-weight:900;
  transition:all .15s;user-select:none;flex-shrink:0;line-height:1;
}
.nav-btn:hover{background:#fce8e0;border-color:var(--red-dark);transform:translateY(-2px);box-shadow:0 5px 0 var(--red-dark);}
.nav-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--red-dark);}

.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px;}
.cal-head-cell{text-align:center;font-size:clamp(7px,1.6vw,10px);font-weight:900;color:var(--text-mid);text-transform:uppercase;letter-spacing:.4px;padding:2px 0;}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{
  background:var(--card);border:1.5px solid var(--border);border-radius:7px;
  padding:2px;display:flex;flex-direction:column;
  align-items:flex-start;gap:1px;overflow:visible;
  height:clamp(40px,8.5vw,56px);
}
.cal-cell.empty{background:transparent;border-color:transparent;}
.cal-cell.overflow{opacity:.3;pointer-events:none;}
.cal-cell.today{background:linear-gradient(135deg,rgba(217,48,32,.09),rgba(239,102,64,.05));border-color:var(--red-dark);box-shadow:0 0 0 2px rgba(217,48,32,.2);}
.day-num{font-family:'Fredoka One',cursive;font-size:clamp(8px,2vw,12px);color:var(--text-dark);line-height:1;padding-left:2px;flex-shrink:0;}
.cal-cell.today .day-num{
  display:inline-flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#d93020,#e85535);color:#fff;border-radius:50%;
  width:clamp(14px,3.2vw,20px);height:clamp(14px,3.2vw,20px);
  padding:0;margin-left:2px;box-shadow:0 2px 0 #8c1a10;text-align:center;flex-shrink:0;
}
.evt-icons{
  display:flex;flex-direction:row;flex-wrap:wrap;
  align-items:center;justify-content:center;
  gap:2px;width:100%;flex:1;
}
.evt{
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  width:clamp(13px,3.4vw,20px);height:clamp(13px,3.4vw,20px);
  border-radius:4px;font-size:clamp(9px,2.2vw,14px);
  flex-shrink:0;transition:transform .15s;z-index:1;
  border:1.5px solid rgba(217,48,32,.25);
  background:rgba(255,243,224,.7);
  overflow:hidden;line-height:1;
}
.evt:hover{transform:scale(1.3);z-index:999;}
.evt img{width:100%;height:100%;object-fit:contain;border-radius:3px;display:block;}

/* ── Status badges ── */
.status-upcoming{color:#1565c0;background:#e3f2fd;border-color:#90caf9;}
.status-live{color:#b71c1c;background:#fce4ec;border-color:#ef9a9a;animation:pulse-badge 1.4s ease-in-out infinite;}
.status-ended{color:#555;background:#f5f5f5;border-color:#ccc;}
@keyframes pulse-badge{0%,100%{opacity:1;}50%{opacity:.6;}}

/* ── Tooltip ── */
.evt-tip{
  position:fixed;background:var(--card);border:2px solid var(--red-dark);
  border-radius:14px;padding:10px 13px 8px;box-shadow:0 8px 28px rgba(217,48,32,.25);
  pointer-events:none;opacity:0;transition:opacity .12s;z-index:99999;
  min-width:195px;max-width:255px;white-space:normal;font-family:'Nunito',sans-serif;
  display:flex;flex-direction:column;
}
.evt-tip.show{opacity:1;pointer-events:auto;}

.tip-row1{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.tip-logo{
  width:34px;height:34px;border-radius:7px;border:1.5px solid var(--border);
  flex-shrink:0;font-size:22px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:#fff8f5;
}
.tip-logo img{width:100%;height:100%;object-fit:contain;border-radius:6px;display:block;}
.tip-date-wrap{display:flex;flex-direction:column;gap:2px;min-width:0;}
.tip-title{font-family:'Fredoka One',cursive;font-size:13px;color:var(--red-dark);line-height:1.2;word-break:break-word;}
.tip-date-badge{font-size:10px;font-weight:800;color:var(--text-mid);opacity:.8;}

.tip-countdown{
  display:flex;align-items:center;gap:5px;
  font-size:10px;font-weight:900;
  padding:4px 9px;border-radius:999px;border:1.5px solid;
  margin-bottom:6px;width:fit-content;
}
.tip-countdown .cd-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}

.tip-detail{font-size:10px;font-weight:700;color:var(--text-mid);line-height:1.55;margin-bottom:7px;}

.tip-bottom-row{
  display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:2px;
}
.tip-btn{
  display:inline-block;font-size:10px;font-weight:900;color:#fff;
  background:linear-gradient(135deg,#d93020,#e85535);
  padding:4px 12px;border-radius:999px;text-decoration:none;
  box-shadow:0 2px 0 #8c1a10;pointer-events:auto;white-space:nowrap;flex-shrink:0;
}
.tip-organizer{
  display:inline-flex;align-items:center;gap:3px;
  font-size:9.5px;font-weight:900;color:var(--text-mid);
  background:#fff0eb;border:1.5px solid var(--border);
  border-radius:999px;padding:3px 8px 3px 6px;
  text-decoration:none;white-space:nowrap;
  transition:background .15s,border-color .15s;pointer-events:auto;
  margin-left:auto;
}
.tip-organizer:hover{background:#fce0d5;border-color:var(--red-mid);color:var(--red-dark);}
.tip-organizer-icon{font-size:11px;line-height:1;}

.footer{text-align:center;font-size:var(--fs-sm);font-weight:700;color:var(--red-border);padding-top:4px;margin-top:auto;}
</style>
</head>
<body>

<div class="page-sb">
  <div class="page-top">
    <div class="page-title">🏠 Hot Chilli CheckMate</div>
    <div class="page-sub">Your Chess Home ♞</div>
  </div>
  <div class="inner">
    <div class="cal-nav">
      <button class="nav-btn" id="prevBtn">‹</button>
      <div class="cal-month-label" id="monthLabel"></div>
      <button class="nav-btn" id="nextBtn">›</button>
    </div>
    <div class="cal-head" id="calHead"></div>
    <div class="cal-body" id="calBody"></div>
    <div class="footer">🌶 Hot Chilli CheckMate © 2026 ♞</div>
  </div>
</div>

<div class="evt-tip" id="globalTip">
  <div class="tip-row1">
    <div class="tip-logo"       id="tipLogo"></div>
    <div class="tip-date-wrap">
      <div class="tip-title"       id="tipTitle"></div>
      <div class="tip-date-badge"  id="tipDateBadge"></div>
    </div>
  </div>
  <div class="tip-countdown"   id="tipCountdown" style="display:none"></div>
  <div class="tip-detail"      id="tipDetail"></div>
  <div class="tip-bottom-row"  id="tipBottomRow"></div>
</div>

<script>
const SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbw6VyQPeJWGdTc4f-BbUJ7XTxs7-3BfAqo4zEF-4ZL7cC2RBgM-PUjij2suHviy9lo13A/exec';

const MONTHS      = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS        = ['MON','TUE','WED','THU','FRI','SAT','SUN'];

const today   = new Date();
let viewYear  = today.getFullYear();
let viewMonth = today.getMonth();
let eventMap  = {};

// ── Helpers ───────────────────────────────────────────────────
function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
function lastDay(y,m){ return new Date(y,m+1,0).getDate(); }
function dowMon(y,m,d){ return (new Date(y,m,d).getDay()+6)%7; }
function ordinal(d){ const s=['th','st','nd','rd'],v=d%100; return d+(s[(v-20)%10]||s[v]||s[0]); }
function formatDate(y,m,d){ return `${MONTH_SHORT[m]} ${ordinal(d)}, ${y}`; }
function isURL(s){ return s&&(/^https?:\/\//i.test(s)||/^\/\//.test(s)||s.includes('.')); }

// ── Parse date ────────────────────────────────────────────────
function parseDate(str){
  if(!str) return null;
  str=str.trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(str)){ const [y,m,d]=str.split('-').map(Number); return {y,m:m-1,d}; }
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(str)){ const [m,d,y]=str.split('/').map(Number); return {y,m:m-1,d}; }
  if(/^\d{1,2}-\d{1,2}-\d{4}$/.test(str)){ const [d,m,y]=str.split('-').map(Number); return {y,m:m-1,d}; }
  const dt=new Date(str); if(!isNaN(dt)) return {y:dt.getFullYear(),m:dt.getMonth(),d:dt.getDate()};
  return null;
}

// ── Parse time ────────────────────────────────────────────────
function parseTime(str){
  if(!str||!str.trim()) return null;
  const m=str.trim().match(/^(\d{1,2}):(\d{2})(?::\d{2})?(?:\s*(am|pm))?$/i);
  if(!m) return null;
  let h=parseInt(m[1]),min=parseInt(m[2]);
  if(m[3]){ if(m[3].toLowerCase()==='pm'&&h<12) h+=12; if(m[3].toLowerCase()==='am'&&h===12) h=0; }
  return {h,min};
}

// ── Build UTC timestamp ───────────────────────────────────────
function buildUTC(dateObj,timeObj){
  if(!dateObj||!timeObj) return null;
  return new Date(Date.UTC(dateObj.y, dateObj.m, dateObj.d, timeObj.h, timeObj.min, 0));
}

// ── Get event phase ───────────────────────────────────────────
// Returns { status: 'upcoming'|'live'|'ended', text, cssClass, phase: 'before'|'live'|'after' }
//
// Phase map:
//   now < startUTC            → 'before'   (upcoming)
//   startUTC ≤ now < endUTC   → 'live'
//   now ≥ endUTC              → 'after'    (ended)
//
// If duration = 0 → endUTC = startUTC, so the event switches to 'after'
// the moment it starts (no live window).
function getPhase(ev){
  if(!ev.timeObj) return null;
  const startUTC  = buildUTC(ev.dateObj, ev.timeObj);
  if(!startUTC) return null;
  const durationMs = (ev.duration||0) * 3600000;
  const endUTC     = new Date(startUTC.getTime() + durationMs);
  const now        = Date.now();

  if(now < startUTC.getTime()){
    // ── UPCOMING ──
    const sec=Math.floor((startUTC-now)/1000);
    const d=Math.floor(sec/86400), h=Math.floor((sec%86400)/3600), m=Math.floor((sec%3600)/60);
    let text='Starting in ';
    if(d>0) text+=`${d}d ${h}h ${m}m`;
    else if(h>0) text+=`${h}h ${m}m`;
    else text+=`${m}m`;
    return {status:'upcoming', text, cssClass:'status-upcoming', phase:'before'};

  } else if(now < endUTC.getTime()){
    // ── LIVE ──
    return {status:'live', text:'🔴 Live', cssClass:'status-live', phase:'live'};

  } else {
    // ── ENDED ──
    return {status:'ended', text:'✅ Ended', cssClass:'status-ended', phase:'after'};
  }
}

// ── Pick phase-appropriate field with fallback chain ──────────
// For each field, if the phase-specific value is empty, falls back gracefully.
function pick(ev, phase, field){
  // field = 'details' | 'button' | 'link'
  const key = {
    before: { details:'detailsBefore', button:'buttonBefore', link:'linkBefore' },
    live:   { details:'detailsLive',   button:'buttonLive',   link:'linkLive'   },
    after:  { details:'detailsAfter',  button:'buttonAfter',  link:'linkAfter'  },
  };
  // Try exact phase first, then fall back so tooltip is never empty
  const fallback = { before:['before'], live:['live','before'], after:['after','live','before'] };
  for(const p of fallback[phase]){
    const val = ev[key[p][field]];
    if(val && val.trim()) return val.trim();
  }
  return '';
}

// ── Load sheet ────────────────────────────────────────────────
async function loadSheet(){
  try{
    const res=await fetch(SHEET_API_URL,{cache:'no-store',headers:{'Accept':'application/json'}});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data=await res.json();
    eventMap={};
    data.forEach(ev=>{
      if(!ev.date||!ev.title) return;
      const dateObj=parseDate(ev.date);
      if(!dateObj) return;
      const key=dateKey(dateObj.y,dateObj.m,dateObj.d);
      if(!eventMap[key]) eventMap[key]=[];
      eventMap[key].push({
        dateObj,
        timeObj:       parseTime(ev.time),
        duration:      parseFloat(ev.duration)||0,
        title:         ev.title,
        // before
        detailsBefore: ev.detailsBefore||'',
        buttonBefore:  ev.buttonBefore ||'',
        linkBefore:    ev.linkBefore   ||'',
        // live
        detailsLive:   ev.detailsLive  ||'',
        buttonLive:    ev.buttonLive   ||'',
        linkLive:      ev.linkLive     ||'',
        // after
        detailsAfter:  ev.detailsAfter ||'',
        buttonAfter:   ev.buttonAfter  ||'',
        linkAfter:     ev.linkAfter    ||'',
        // shared
        logo:          (ev.logo||'').trim(),
        organizer:     (ev.organizer||'').trim(),
      });
    });
    buildCalendar();
  }catch(e){ console.error('Sheet load failed:',e); }
}

// ── Calendar ──────────────────────────────────────────────────
const monthLabel=document.getElementById('monthLabel');
const calHead   =document.getElementById('calHead');
const calBody   =document.getElementById('calBody');

function buildCalendar(){
  monthLabel.textContent=MONTHS[viewMonth]+' '+viewYear;
  calHead.innerHTML='';
  DAYS.forEach(d=>{ const c=document.createElement('div'); c.className='cal-head-cell'; c.textContent=d; calHead.appendChild(c); });
  calBody.innerHTML='';
  const first=dowMon(viewYear,viewMonth,1), last=lastDay(viewYear,viewMonth);
  const prevM=viewMonth===0?11:viewMonth-1, prevY=viewMonth===0?viewYear-1:viewYear;
  const nextM=viewMonth===11?0:viewMonth+1, nextY=viewMonth===11?viewYear+1:viewYear;
  for(let i=0;i<first;i++) calBody.appendChild(makeCell(prevY,prevM,lastDay(prevY,prevM)-first+1+i,true));
  for(let d=1;d<=last;d++) calBody.appendChild(makeCell(viewYear,viewMonth,d,false));
  const filled=first+last;
  for(let d=1;filled+d-1<42;d++) calBody.appendChild(makeCell(nextY,nextM,d,true));
}

function makeCell(y,m,d,overflow){
  const isToday=(d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear());
  const cell=document.createElement('div');
  cell.className='cal-cell'+(isToday?' today':'')+(overflow?' overflow':'');
  const num=document.createElement('div'); num.className='day-num'; num.textContent=d; cell.appendChild(num);
  const events=eventMap[dateKey(y,m,d)]||[];
  if(events.length){
    const wrap=document.createElement('div'); wrap.className='evt-icons';
    events.forEach(ev=>{
      const ico=document.createElement('div'); ico.className='evt';
      if(ev.logo&&isURL(ev.logo)){
        const img=document.createElement('img'); img.src=ev.logo; img.alt=ev.title; img.loading='lazy'; ico.appendChild(img);
      } else {
        ico.textContent=ev.logo||'📅';
      }
      if(!overflow){
        ico.addEventListener('mouseenter',e=>showTip(e,ev,y,m,d));
        ico.addEventListener('mouseleave',maybHideTip);
        ico.addEventListener('mousemove', moveTip);
        ico.addEventListener('click',e=>{ e.stopPropagation(); pinTip(e,ev,y,m,d); });
      }
      wrap.appendChild(ico);
    });
    cell.appendChild(wrap);
  }
  return cell;
}

// ── Tooltip ───────────────────────────────────────────────────
const tip          =document.getElementById('globalTip');
const tipLogo      =document.getElementById('tipLogo');
const tipTitle     =document.getElementById('tipTitle');
const tipDateBadge =document.getElementById('tipDateBadge');
const tipCountdown =document.getElementById('tipCountdown');
const tipDetail    =document.getElementById('tipDetail');
const tipBottomRow =document.getElementById('tipBottomRow');

let tipPinned=false, countdownTimer=null;

function renderTip(ev,y,m,d){
  // Logo
  tipLogo.innerHTML='';
  if(ev.logo&&isURL(ev.logo)){
    const img=document.createElement('img'); img.src=ev.logo; img.alt=ev.title; tipLogo.appendChild(img);
  } else {
    tipLogo.textContent=ev.logo||'📅';
  }

  // Title + date
  tipTitle.textContent=ev.title;
  tipDateBadge.textContent=ev.timeObj
    ? `${formatDate(y,m,d)} · ${pad(ev.timeObj.h)}:${pad(ev.timeObj.min)} UTC`
    : formatDate(y,m,d);

  // Status badge — updates every 30s
  clearInterval(countdownTimer);
  const st=getPhase(ev);
  if(st){
    tipCountdown.style.display='flex';
    const updateBadge=()=>{
      const s=getPhase(ev); if(!s) return;
      tipCountdown.className='tip-countdown '+s.cssClass;
      tipCountdown.innerHTML=`<span class="cd-dot"></span>${s.text}`;
    };
    updateBadge();
    countdownTimer=setInterval(updateBadge,30000);
  } else {
    tipCountdown.style.display='none';
  }

  // Phase-matched content
  const phase = st ? st.phase : 'before';   // no timeObj → treat as before
  const details = pick(ev, phase, 'details');
  const btnText = pick(ev, phase, 'button');
  const btnLink = pick(ev, phase, 'link');

  // Details
  tipDetail.textContent=details;
  tipDetail.style.display=details?'block':'none';

  // Bottom row: button + organizer
  tipBottomRow.innerHTML='';
  if(btnText&&btnLink){
    const a=document.createElement('a');
    a.className='tip-btn'; a.href=btnLink; a.target='_blank'; a.rel='noopener';
    a.textContent=btnText;
    tipBottomRow.appendChild(a);
  }
  if(ev.organizer){
    const a=document.createElement('a');
    a.className='tip-organizer';
    a.href=`https://www.chess.com/member/${ev.organizer}`;
    a.target='_blank'; a.rel='noopener';
    a.innerHTML=`<span class="tip-organizer-icon">♟</span>@${ev.organizer}`;
    tipBottomRow.appendChild(a);
  }
}

function showTip(e,ev,y,m,d){ if(tipPinned) return; renderTip(ev,y,m,d); tip.classList.add('show'); posTip(e); }
function pinTip(e,ev,y,m,d){ tipPinned=true; renderTip(ev,y,m,d); tip.classList.add('show'); posTip(e); }
function maybHideTip(){ if(!tipPinned) hideTip(); }
function hideTip(){ tipPinned=false; tip.classList.remove('show'); clearInterval(countdownTimer); }
function moveTip(e){ if(!tipPinned) posTip(e); }
function posTip(e){
  const TW=265,TH=185,vw=window.innerWidth,vh=window.innerHeight;
  let x=e.clientX+14,y=e.clientY+14;
  if(x+TW>vw-8) x=e.clientX-TW-14;
  if(y+TH>vh-8) y=e.clientY-TH-14;
  x=Math.max(6,x); y=Math.max(6,y);
  tip.style.left=x+'px'; tip.style.top=y+'px';
}

document.addEventListener('click',e=>{ if(!tip.contains(e.target)) hideTip(); });
document.getElementById('prevBtn').addEventListener('click',()=>{ viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} buildCalendar(); });
document.getElementById('nextBtn').addEventListener('click',()=>{ viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} buildCalendar(); });

buildCalendar();
loadSheet();
</script>
</body>
</html>
