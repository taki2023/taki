<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diamond Wheel Countdown</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;background:#1a1a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;}

.sb{
  font-family:'Nunito',sans-serif;
  width:100%;max-width:480px;
  background:#fff5f0;border-radius:28px;
  border:3px solid #e8553a;
}

.sb-top{
  background:linear-gradient(135deg,#d93020 0%,#e85535 60%,#ef6640 100%);
  border-radius:24px 24px 0 0;padding:18px 16px 28px;
  text-align:center;position:relative;overflow:hidden;
}
.sb-top::before{
  content:'';position:absolute;bottom:-10px;left:-10%;
  width:120%;height:20px;background:#fff5f0;border-radius:50%;
}
.chilli-deco{position:absolute;font-size:28px;opacity:.25;top:6px;}
.chilli-deco.left{left:8px;transform:rotate(-20deg);}
.chilli-deco.right{right:8px;transform:rotate(20deg);}
.club-title{font-family:'Fredoka One',cursive;font-size:19px;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.15);position:relative;z-index:1;}
.club-sub{font-size:11px;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.8px;text-transform:uppercase;margin-top:3px;}

.inner{padding:22px 24px 26px;text-align:center;}

.card{
  border:2px dashed #e8553a;border-radius:22px;
  padding:24px 20px;text-align:center;
  background:#fff;
}

.ferris{font-size:38px;margin-bottom:10px;display:block;}

.title{
  font-family:'Fredoka One',cursive;font-size:22px;
  color:#c73520;margin-bottom:6px;
}

.subtitle{
  font-size:13px;font-weight:800;color:#8c1a10;
  margin-bottom:14px;
}

.twitch-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:#9147ff;border-radius:50px;
  padding:5px 16px;margin-bottom:20px;
}
.twitch-dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:blink 1.1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.twitch-text{font-family:'Fredoka One',cursive;font-size:13px;color:#fff;letter-spacing:.5px;}

.digits-row{
  display:flex;align-items:center;justify-content:center;gap:6px;
}

.digit-box{
  background:#fff5f0;border-radius:14px;border:2px solid #f5c5b8;
  padding:12px 18px;min-width:72px;
  box-shadow:0 4px 0 #e8aa98;
}
.digit-num{
  font-family:'Fredoka One',cursive;font-size:38px;
  color:#d93020;line-height:1;
}
.digit-lbl{
  font-size:9px;font-weight:900;color:#e8aa98;
  letter-spacing:1.5px;text-transform:uppercase;margin-top:3px;
}

.colon{
  font-family:'Fredoka One',cursive;font-size:32px;
  color:#e8553a;margin-bottom:14px;
}

.footer{text-align:center;margin-top:16px;font-size:11px;font-weight:700;color:#e8553a;}
</style>
</head>
<body>

<div class="sb">

  <div class="sb-top">
    <div class="chilli-deco left">🌶</div>
    <div class="chilli-deco right">♞</div>
    <div class="club-title">🌶 Hot Chilli CheckMate</div>
    <div class="club-sub">Your chess home ♡</div>
  </div>

  <div class="inner">

    <div class="card">
      <span class="ferris">🎡</span>
      <div class="title">Diamond Membership Wheel</div>
      <div class="subtitle">March 29 · 1:00 PM UTC</div>

      <div style="margin-bottom:20px;">
        <div class="twitch-badge">
          <div class="twitch-dot"></div>
          <div class="twitch-text">Starting Soon on Twitch</div>
        </div>
      </div>

      <div class="digits-row">
        <div class="digit-box">
          <div class="digit-num" id="hh">00</div>
          <div class="digit-lbl">HRS</div>
        </div>
        <div class="colon">:</div>
        <div class="digit-box">
          <div class="digit-num" id="mm">00</div>
          <div class="digit-lbl">MIN</div>
        </div>
        <div class="colon">:</div>
        <div class="digit-box">
          <div class="digit-num" id="ss">00</div>
          <div class="digit-lbl">SEC</div>
        </div>
      </div>
    </div>

    <div class="footer">🌶 Hot Chilli CheckMate © 2026 ♞</div>

  </div>
</div>

<script>
const target = new Date('2026-03-29T12:00:00Z');

function pad(n){ return String(Math.max(0,n)).padStart(2,'0'); }

function tick(){
  const now = new Date();
  let diff = Math.floor((target - now) / 1000);
  if(diff < 0) diff = 0;
  const h = Math.floor(diff / 3600);
  const m = Math.floor((diff % 3600) / 60);
  const s = diff % 60;
  document.getElementById('hh').textContent = pad(h);
  document.getElementById('mm').textContent = pad(m);
  document.getElementById('ss').textContent = pad(s);
}

tick();
setInterval(tick, 1000);
</script>

</body>
</html>
