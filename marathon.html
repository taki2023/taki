<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vote Chess Marathon – HCC</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;background:#fff5f0;font-family:'Nunito',sans-serif;}

:root{
  --red:#d93020;--red2:#e84535;--red3:#ef6640;
  --bg:#fff5f0;--card:#fff;
  --border:#f5c5b8;--shadow:#e8aa98;
  --text:#c73520;--subtext:#9a2010;--muted:#e8aa98;
  --fs-xs:10px;--fs-sm:11px;--fs-base:12px;--fs-md:13px;
}

@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-100% 0;}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes lp{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.25);}50%{box-shadow:0 0 0 7px rgba(34,197,94,.08);}}
@keyframes dot-pulse{0%,100%{box-shadow:0 0 0 2.5px rgba(229,57,53,.35);transform:scale(1);}50%{box-shadow:0 0 0 5px rgba(229,57,53,.1);transform:scale(1.15);}}
@keyframes dot-glow-blue{0%,100%{box-shadow:0 0 0 2.5px rgba(30,136,229,.25);}50%{box-shadow:0 0 0 4px rgba(30,136,229,.12);}}
@keyframes dot-glow-green{0%,100%{box-shadow:0 0 0 2.5px rgba(67,160,71,.25);}50%{box-shadow:0 0 0 4.5px rgba(67,160,71,.12);}}
@keyframes cd-tick{0%,100%{opacity:1;}50%{opacity:.55;}}

/* ── WRAPPER ── */
.vcm{
  width:100%;background:var(--card);
  border-radius:18px;border:2px solid var(--border);
  box-shadow:0 4px 0 var(--shadow);
  font-family:'Nunito',sans-serif;
  overflow:hidden;
}

/* ── TOP BANNER ── */
.vcm-banner{
  background:linear-gradient(135deg,#d93020 0%,#e85535 55%,#ef6640 100%);
  padding:16px 16px 18px;position:relative;overflow:hidden;
  box-shadow:0 4px 0 #8c1a10;
}
.vcm-banner::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(-55deg,transparent,transparent 13px,rgba(255,255,255,.045) 13px,rgba(255,255,255,.045) 26px);
  pointer-events:none;
}
.vcm-banner-inner{display:flex;align-items:center;gap:14px;position:relative;z-index:1;}

/* Logo: big glowing card lifted out of the banner */
.vcm-logo-wrap{
  width:64px;height:64px;border-radius:16px;flex-shrink:0;
  background:#fff;
  border:3px solid rgba(255,255,255,.9);
  box-shadow:0 6px 20px rgba(0,0,0,.35), 0 0 0 4px rgba(255,255,255,.18), 0 0 28px rgba(255,200,160,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:34px;overflow:hidden;position:relative;
}
.vcm-logo-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;border-radius:13px;opacity:0;transition:opacity .25s;}
.vcm-logo-wrap img.loaded{opacity:1;}
.vcm-logo-skel{position:absolute;inset:0;border-radius:13px;background:linear-gradient(90deg,#f0d0c8 25%,#fde8e0 50%,#f0d0c8 75%);background-size:300% 100%;animation:shimmer 1s ease-in-out infinite;}

.vcm-banner-text{flex:1;min-width:0;}
.vcm-banner-pre{font-size:var(--fs-xs);font-weight:900;color:rgba(255,255,255,.78);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:3px;}
.vcm-banner-title{font-family:'Fredoka One',cursive;font-size:20px;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.22);line-height:1.1;}
.vcm-banner-date{font-size:var(--fs-sm);font-weight:800;color:rgba(255,255,255,.85);margin-top:4px;}
.vcm-banner-badge{
  background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.4);
  border-radius:999px;padding:4px 11px;font-size:var(--fs-xs);font-weight:900;
  color:#fff;white-space:nowrap;flex-shrink:0;align-self:flex-start;
}

/* ── INNER ── */
.vcm-inner{padding:14px 14px 16px;}

/* ── SKELETON STATES ── */
.vcm-skel-row{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.skel{border-radius:8px;background:linear-gradient(90deg,#fce8e0 25%,#fff5f0 50%,#fce8e0 75%);background-size:300% 100%;animation:shimmer 1.1s ease-in-out infinite;}

/* ── COUNTDOWN ── */
.vcm-countdown-wrap{
  background:var(--card);border-radius:16px;border:2px solid var(--border);
  box-shadow:0 4px 0 var(--shadow);padding:14px;margin-bottom:14px;
  text-align:center;
}
.vcm-cd-label{font-size:var(--fs-xs);font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;}
.vcm-cd-grid{display:flex;align-items:center;justify-content:center;gap:6px;}
.vcm-cd-unit{display:flex;flex-direction:column;align-items:center;gap:4px;}
.vcm-cd-num{
  font-family:'Fredoka One',cursive;font-size:28px;line-height:1;
  color:var(--red);background:var(--bg);border-radius:10px;border:2px solid var(--border);
  box-shadow:0 3px 0 var(--shadow);padding:4px 10px;min-width:48px;text-align:center;
  transition:color .3s;
}
.vcm-cd-unit-label{font-size:var(--fs-xs);font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;}
.vcm-cd-sep{font-family:'Fredoka One',cursive;font-size:24px;color:var(--muted);line-height:1;padding-bottom:14px;animation:cd-tick 1s ease-in-out infinite;}
/* live state */
.vcm-cd-num.live{color:#22c55e;}
.vcm-cd-num.ended{color:var(--muted);}

.vcm-status-pill{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:999px;border:1.5px solid;
  font-size:var(--fs-sm);font-weight:900;margin-top:10px;
}
.vcm-status-pill.upcoming{background:#e3f2fd;color:#1565c0;border-color:#90caf9;}
.vcm-status-pill.soon{background:#e8f5e9;color:#2e7d32;border-color:#a5d6a7;animation:cd-tick 1.6s ease-in-out infinite;}
.vcm-status-pill.live{background:rgba(229,57,53,.1);color:#b71c1c;border-color:#ef9a9a;animation:cd-tick 1.2s ease-in-out infinite;}
.vcm-status-pill.ended{background:#f5f5f5;color:#555;border-color:#ccc;}

.vcm-pill-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
.vcm-pill-dot.pulse-red{animation:dot-pulse 1s ease-in-out infinite;}
.vcm-pill-dot.pulse-green{animation:dot-glow-green 1.8s ease-in-out infinite;}
.vcm-pill-dot.pulse-blue{animation:dot-glow-blue 2.5s ease-in-out infinite;}

/* ── SECTION LABEL ── */
.vcm-section-label{
  font-size:var(--fs-xs);font-weight:900;color:var(--text);
  text-transform:uppercase;letter-spacing:1px;
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.vcm-section-label::after{content:'';flex:1;height:1.5px;background:var(--border);border-radius:1px;}

/* ── DETAILS ── */
.vcm-details-box{
  background:var(--bg);border-radius:12px;border:1.5px solid var(--border);
  padding:10px 12px;margin-bottom:12px;
  font-size:var(--fs-sm);font-weight:700;color:var(--subtext);line-height:1.6;
}

/* ── RULES ── */
.vcm-rules-box{
  background:var(--card);border-radius:14px;border:1.5px dashed var(--border);
  padding:11px 13px;margin-bottom:12px;
}
.vcm-rule{
  display:flex;align-items:baseline;gap:7px;
  font-size:var(--fs-sm);font-weight:700;color:var(--subtext);
  margin-bottom:6px;line-height:1.5;
}
.vcm-rule:last-child{margin-bottom:0;}
.vcm-rule-dot{
  width:6px;height:6px;border-radius:50%;background:var(--red);
  flex-shrink:0;margin-top:4px;
}

/* ── REWARDS ── */
.vcm-rewards-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.vcm-reward-item{
  display:flex;align-items:center;gap:7px;padding:8px 10px;
  border-radius:12px;background:var(--card);border:2px solid var(--border);
  font-size:var(--fs-sm);font-weight:800;color:var(--subtext);
}
.vcm-reward-icon{font-size:16px;flex-shrink:0;}

/* ── MESSAGE BLOCK ── */
.vcm-msg-block{
  border-radius:12px;border:1.5px solid var(--border);
  overflow:hidden;margin-bottom:14px;
}
.vcm-msg-bar{height:3px;background:linear-gradient(90deg,var(--red),var(--red3));}
.vcm-msg-inner{padding:9px 12px;}
.vcm-msg-label{
  font-size:var(--fs-xs);font-weight:900;color:var(--muted);
  text-transform:uppercase;letter-spacing:.9px;margin-bottom:5px;
  display:flex;align-items:center;gap:5px;
}
.vcm-msg-text{font-size:var(--fs-sm);font-weight:700;color:var(--subtext);line-height:1.6;}
.vcm-mention{color:var(--red);font-weight:900;text-decoration:none;border-bottom:1px dotted rgba(217,48,32,.4);}
.vcm-mention:hover{color:#a01808;}

/* ── ORGANIZER ── */
.vcm-organizer{
  display:inline-flex;align-items:center;gap:5px;
  font-size:var(--fs-sm);font-weight:900;color:var(--subtext);
  background:var(--bg);border:1.5px solid var(--border);
  border-radius:999px;padding:5px 12px 5px 10px;
  text-decoration:none;margin-bottom:12px;
  transition:background .15s,border-color .15s;
}
.vcm-organizer:hover{background:#fce8e0;border-color:var(--red);color:var(--text);}

/* ── CTA ── */
.vcm-cta{
  display:flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 18px;border-radius:50px;width:100%;
  background:linear-gradient(135deg,var(--red),var(--red2));
  border:none;color:#fff;
  font-family:'Nunito',sans-serif;font-size:var(--fs-md);font-weight:900;
  cursor:pointer;box-shadow:0 5px 0 #8c1a10;
  transition:all .15s ease;text-decoration:none;text-align:center;
}
.vcm-cta:hover{transform:translateY(-2px);box-shadow:0 7px 0 #8c1a10;}
.vcm-cta:active{transform:translateY(2px);box-shadow:0 3px 0 #8c1a10;}

/* ── LOADING / ERROR ── */
.vcm-loading{text-align:center;padding:24px 0;font-size:var(--fs-sm);font-weight:800;color:var(--muted);}
.vcm-loading-spin{display:inline-block;animation:spin 1s linear infinite;font-size:22px;margin-bottom:6px;}
.vcm-error{background:#fee2e2;border-radius:12px;border:1.5px solid #fca5a5;padding:10px 13px;font-size:var(--fs-sm);font-weight:800;color:#991b1b;text-align:center;margin-bottom:12px;}
</style>
</head>
<body>

<div class="vcm" id="vcmWidget">

  <!-- BANNER (always visible) -->
  <div class="vcm-banner">
    <div class="vcm-banner-inner">
      <div class="vcm-logo-wrap" id="vcmBannerLogo">
        <div class="vcm-logo-skel" id="vcmLogoSkel"></div>
        <span id="vcmLogoEmoji" style="position:relative;z-index:1;">♟️</span>
      </div>
      <div class="vcm-banner-text">
        <div class="vcm-banner-pre">🌶 Hot Chilli CheckMate</div>
        <div class="vcm-banner-title" id="vcmBannerTitle">Vote Chess Marathon</div>
        <div class="vcm-banner-date" id="vcmBannerDate">Loading event date…</div>
      </div>
      <div class="vcm-banner-badge">🔥 Event</div>
    </div>
  </div>

  <!-- INNER CONTENT -->
  <div class="vcm-inner" id="vcmInner">
    <div class="vcm-loading" id="vcmLoading">
      <div class="vcm-loading-spin">🔄</div><br>Loading event data…
    </div>
  </div>

</div>

<script>
/* ══ ALL EVENT DATA HARDCODED — zero network requests ══ */
const EV = {
  title    : 'Vote Chess Marathon !',
  dateObj  : { y:2026, m:5, d:20 },   /* month is 0-indexed: 5 = June */
  timeObj  : { h:6, min:16 },          /* 06:16 UTC */
  duration : 16,                        /* full marathon day ~16 hrs */
  details  : 'A fun and brutal event — for more info and to follow the event all along, click the button below!',
  link     : 'https://www.chess.com/clubs/forum/view/vote-chess-marathon-subscription',
  btnText  : 'join →',
};

const MARATHON_RULES = [
  'Join any of the 3–4 matches freely throughout the day',
  'Always read comments & discuss before voting',
  '⏱ No voting in first 4 min — first 4 min are for analysis only',
  'Vote only when clock drops below 6 minutes',
];
const MARATHON_REWARDS = [
  { icon:'🎉', text:'10 Cheers' },
  { icon:'🎖️', text:'Marathon Completion Card' },
];
const LOGO_URL = 'https://www.chess.com/bundles/web/images/achievements/fun_chess_marathon.f89f743d.png';

/* ── Helpers ── */
const pad = n => String(n).padStart(2,'0');
const MONTHS_FULL = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const ordinal = d => { const s=['th','st','nd','rd'],v=d%100; return d+(s[(v-20)%10]||s[v]||s[0]); };

function buildUTC(dateObj, timeObj) {
  return new Date(Date.UTC(dateObj.y, dateObj.m, dateObj.d, timeObj.h, timeObj.min, 0));
}

function formatDate(dateObj, timeObj) {
  return `${MONTHS_FULL[dateObj.m]} ${ordinal(dateObj.d)}, ${dateObj.y} · ${pad(timeObj.h)}:${pad(timeObj.min)} UTC`;
}

function getCountdownState(startUTC, durationHrs) {
  const now = Date.now(), startMs = startUTC.getTime();
  const endUTC = durationHrs > 0 ? new Date(startMs + durationHrs * 3600000) : null;
  if (now < startMs) {
    const diff = startMs - now, totalSec = Math.floor(diff / 1000);
    return {
      status: diff <= 3600000 ? 'soon' : 'upcoming',
      d: Math.floor(totalSec / 86400),
      h: Math.floor((totalSec % 86400) / 3600),
      mn: Math.floor((totalSec % 3600) / 60),
      s: totalSec % 60
    };
  } else if (endUTC && now < endUTC.getTime()) {
    const totalSec = Math.floor((endUTC.getTime() - now) / 1000);
    return { status:'live', d:0, h:Math.floor(totalSec/3600), mn:Math.floor((totalSec%3600)/60), s:totalSec%60 };
  } else if (!endUTC && now >= startMs) {
    return { status:'live', d:0, h:0, mn:0, s:0 };
  }
  return { status:'ended', d:0, h:0, mn:0, s:0 };
}

/* ══ RENDER — runs immediately, zero async ══ */
let countdownInterval = null;

(function render() {
  const inner = document.getElementById('vcmInner');
  inner.innerHTML = '';

  /* Banner */
  document.getElementById('vcmBannerTitle').textContent = EV.title;
  document.getElementById('vcmBannerDate').textContent  = formatDate(EV.dateObj, EV.timeObj);

  /* Logo */
  const logoWrap  = document.getElementById('vcmBannerLogo');
  const logoSkel  = document.getElementById('vcmLogoSkel');
  const logoEmoji = document.getElementById('vcmLogoEmoji');
  logoEmoji.style.display = 'none';
  const logoImg = document.createElement('img');
  logoImg.alt = EV.title; logoImg.decoding = 'async'; logoImg.src = LOGO_URL;
  logoImg.onload  = () => { logoImg.classList.add('loaded'); logoSkel.style.display='none'; };
  logoImg.onerror = () => { logoSkel.style.display='none'; logoEmoji.style.display=''; logoEmoji.textContent='♟️'; };
  logoWrap.appendChild(logoImg);

  /* ── Countdown ── */
  const startUTC = buildUTC(EV.dateObj, EV.timeObj);
  const cdWrap = document.createElement('div');
  cdWrap.className = 'vcm-countdown-wrap';
  cdWrap.innerHTML = `
    <div class="vcm-cd-label">Event Countdown ⏱</div>
    <div class="vcm-cd-grid">
      <div class="vcm-cd-unit" id="cdUnitD">
        <div class="vcm-cd-num" id="cdD">--</div>
        <div class="vcm-cd-unit-label">Days</div>
      </div>
      <div class="vcm-cd-sep" id="cdSepD">:</div>
      <div class="vcm-cd-unit">
        <div class="vcm-cd-num" id="cdH">--</div>
        <div class="vcm-cd-unit-label">Hours</div>
      </div>
      <div class="vcm-cd-sep">:</div>
      <div class="vcm-cd-unit">
        <div class="vcm-cd-num" id="cdM">--</div>
        <div class="vcm-cd-unit-label">Min</div>
      </div>
      <div class="vcm-cd-sep">:</div>
      <div class="vcm-cd-unit">
        <div class="vcm-cd-num" id="cdS">--</div>
        <div class="vcm-cd-unit-label">Sec</div>
      </div>
    </div>
    <div id="vcmStatusPill"></div>
  `;
  inner.appendChild(cdWrap);

  function tick() {
    const st    = getCountdownState(startUTC, EV.duration);
    const cdUnitD = document.getElementById('cdUnitD');
    const cdSepD  = document.getElementById('cdSepD');
    const cdD = document.getElementById('cdD');
    const cdH = document.getElementById('cdH');
    const cdM = document.getElementById('cdM');
    const cdS = document.getElementById('cdS');
    const pill= document.getElementById('vcmStatusPill');
    if (!cdH) { clearInterval(countdownInterval); return; }

    [cdD,cdH,cdM,cdS].forEach(el => el.className = 'vcm-cd-num');

    const showDays = st.d > 0;
    cdUnitD.style.display = showDays ? '' : 'none';
    cdSepD.style.display  = showDays ? '' : 'none';
    if (showDays) cdD.textContent = pad(st.d);
    cdH.textContent = pad(st.h);
    cdM.textContent = pad(st.mn);
    cdS.textContent = pad(st.s);

    if (st.status === 'ended') {
      [cdD,cdH,cdM,cdS].forEach(el => el.classList.add('ended'));
      pill.innerHTML = '<span class="vcm-status-pill ended"><span class="vcm-pill-dot"></span>Event Ended</span>';
      clearInterval(countdownInterval);
    } else if (st.status === 'live') {
      [cdD,cdH,cdM,cdS].forEach(el => el.classList.add('live'));
      pill.innerHTML = '<span class="vcm-status-pill live"><span class="vcm-pill-dot pulse-red"></span>🔴 Live Now!</span>';
    } else if (st.status === 'soon') {
      pill.innerHTML = '<span class="vcm-status-pill soon"><span class="vcm-pill-dot pulse-green"></span>Click here! 🔥</span>';
    } else {
      pill.innerHTML = '<span class="vcm-status-pill upcoming"><span class="vcm-pill-dot pulse-blue"></span>Upcoming</span>';
    }
  }
  tick();
  clearInterval(countdownInterval);
  countdownInterval = setInterval(tick, 1000);

  /* ── Details ── */
  const detLbl = document.createElement('div'); detLbl.className='vcm-section-label'; detLbl.textContent='About the Event 📋';
  const detBox = document.createElement('div'); detBox.className='vcm-details-box'; detBox.textContent=EV.details;
  inner.appendChild(detLbl);
  inner.appendChild(detBox);

  /* ── Rules ── */
  const rulesLbl = document.createElement('div'); rulesLbl.className='vcm-section-label'; rulesLbl.textContent='Event Rules 📜';
  inner.appendChild(rulesLbl);
  const rulesBox = document.createElement('div'); rulesBox.className='vcm-rules-box';
  MARATHON_RULES.forEach(rule => {
    const row = document.createElement('div'); row.className='vcm-rule';
    row.innerHTML = `<div class="vcm-rule-dot"></div>${rule}`;
    rulesBox.appendChild(row);
  });
  inner.appendChild(rulesBox);

  /* ── Rewards ── */
  const rewLbl = document.createElement('div'); rewLbl.className='vcm-section-label'; rewLbl.textContent='Marathon Rewards 🏆';
  inner.appendChild(rewLbl);
  const rewGrid = document.createElement('div'); rewGrid.className='vcm-rewards-grid';
  MARATHON_REWARDS.forEach(r => {
    const item = document.createElement('div'); item.className='vcm-reward-item';
    item.innerHTML = `<span class="vcm-reward-icon">${r.icon}</span>${r.text}`;
    rewGrid.appendChild(item);
  });
  inner.appendChild(rewGrid);

  /* ── CTA ── */
  const cta = document.createElement('a');
  cta.className = 'vcm-cta';
  cta.href = EV.link; cta.target = '_blank'; cta.rel = 'noopener noreferrer';
  cta.textContent = EV.btnText;
  inner.appendChild(cta);
})();
</script>
</body>
</html>
