<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <title>Float Buttons</title> <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800;900&display=swap" rel="stylesheet"> <style> * { box-sizing: border-box; margin: 0; padding: 0; } html, body { width: 80px; height: 200px; background: transparent; overflow: hidden; } .float-wrap { position: fixed; bottom: 20px; right: 0; display: flex; flex-direction: column; align-items: center; gap: 10px; } .float-btn { width: 55px; height: 55px; background: rgb(255, 252, 245); border: 4px solid rgb(249, 216, 209); border-radius: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; user-select: none; box-shadow: 0px 6px 0px rgb(249, 216, 209); transition: 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); text-decoration: none; position: relative; } .float-btn:hover { border-color: #e64a19; box-shadow: 0 8px 0 #9c3314; transform: translateY(-4px); } .float-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #9c3314; } /* Tooltip */ .float-btn::before { content: attr(data-tip); position: absolute; right: 64px; top: 50%; transform: translateY(-50%); background: #d93020; color: #fff; font-family: 'Nunito', sans-serif; font-size: 11px; font-weight: 900; padding: 5px 10px; border-radius: 10px; white-space: nowrap; box-shadow: 0 3px 0 #8c1a10; opacity: 0; pointer-events: none; transition: opacity 0.2s ease, transform 0.2s ease; transform: translateY(-50%) translateX(6px); } .float-btn::after { content: ''; position: absolute; right: 57px; top: 50%; transform: translateY(-50%); border: 6px solid transparent; border-left-color: #d93020; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; } .float-btn:hover::before { opacity: 1; transform: translateY(-50%) translateX(0); } .float-btn:hover::after { opacity: 1; } </style> </head> <body> <div class="float-wrap"> <a class="float-btn" href="https://www.chess.com/announcements/view/hot-chilli-opening-cour
