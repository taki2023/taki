<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Chilli CheckMate – Home</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:ital,wght@0,400;0,700;0,800;0,900;1,700;1,800&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
<style>
:root{
  --red-dark:#d93020;--red-mid:#e85535;--red-border:#e8553a;
  --bg:#fff5f0;--card:#fff;--border:#f5c5b8;
  --text-dark:#c73520;--text-mid:#9a2010;
  --fs-xs:10px;--fs-sm:11px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;background:transparent;font-family:'Nunito',sans-serif;}

.page-sb{width:100%;background:var(--bg);border-radius:28px;border:3px solid var(--red-border);overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(217,48,32,.12);height:492px;transition:height .3s ease;}
.page-sb.loaded{height:auto;}

/* SKELETON */
.cal-skeleton{display:flex;flex-direction:column;gap:8px;padding:10px 10px 12px;flex:1;}
.skel-nav{display:flex;align-items:center;gap:8px;height:34px;}
.skel-circle{width:34px;height:34px;min-width:34px;border-radius:50%;background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;flex-shrink:0;}
.skel-label{flex:1;height:20px;border-radius:8px;background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;}
.skel-head{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;}
.skel-head-cell{height:24px;border-radius:6px;background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;}
.skel-head-cell:nth-child(odd){animation-delay:.1s;}
.skel-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;flex:1;}
.skel-cell{border-radius:9px;background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;min-height:46px;}
.skel-cell:nth-child(3n){animation-delay:.12s;}
.skel-cell:nth-child(5n){animation-delay:.22s;}
.skel-cell:nth-child(7n){animation-delay:.07s;}
.skel-cell.empty{background:#fff5f0;animation:none;border:1.5px dashed #f5c5b8;}
.skel-legend{display:flex;align-items:center;justify-content:center;gap:12px;padding:6px 4px 2px;margin-top:auto;}
.skel-legend-item{height:12px;width:60px;border-radius:6px;background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;}
.skel-legend-item:nth-child(2){animation-delay:.1s;}
.skel-legend-item:nth-child(3){animation-delay:.2s;}
.skel-legend-item:nth-child(4){animation-delay:.3s;}
.skel-footer{height:14px;width:60%;border-radius:6px;margin:4px auto 0;background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-100% 0;}}

.page-sb.loaded .cal-skeleton{display:none;}
.cal-real{display:none;}
.page-sb.loaded .cal-real{display:flex;flex-direction:column;}

/* BANNER */
.page-top{background:linear-gradient(135deg,#d93020 0%,#e85535 60%,#ef6640 100%);border-radius:24px 24px 0 0;padding:8px 16px 14px;text-align:center;position:relative;overflow:hidden;flex-shrink:0;}
.page-top::before{content:'';position:absolute;bottom:-10px;left:-10%;width:120%;height:20px;background:var(--bg);border-radius:50%;}
.page-top::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-55deg,transparent,transparent 14px,rgba(255,255,255,.04) 14px,rgba(255,255,255,.04) 28px);pointer-events:none;}
.page-title{font-family:'Fredoka One',cursive;font-size:18.5px;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.22),0 4px 10px rgba(0,0,0,.15);position:relative;z-index:1;}
.page-sub{font-size:var(--fs-sm);font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.9px;text-transform:uppercase;margin-top:1px;position:relative;z-index:1;}

.inner{padding:10px 10px 12px;display:flex;flex-direction:column;gap:0;}

/* NAV */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;gap:8px;}
.cal-month-label{font-family:'Fredoka One',cursive;font-size:clamp(14px,3.8vw,19px);background:linear-gradient(135deg,#d93020,#ef6640);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;flex:1;white-space:nowrap;filter:drop-shadow(0 1px 0 rgba(217,48,32,.18));letter-spacing:.5px;}
.nav-btn{width:34px;height:34px;min-width:34px;border-radius:50%;border:2px solid rgba(217,48,32,.3);outline:none;background:rgba(255,255,255,.7);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s cubic-bezier(.34,1.56,.64,1);user-select:none;flex-shrink:0;position:relative;overflow:hidden;box-shadow:0 2px 8px rgba(217,48,32,.1),inset 0 1px 0 rgba(255,255,255,.8);}
.nav-btn::before{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 0%,rgba(255,255,255,.5) 0%,transparent 65%);pointer-events:none;}
.nav-btn svg{width:14px;height:14px;stroke:#d93020;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none;position:relative;z-index:1;transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
.nav-btn:hover{background:rgba(255,255,255,.95);border-color:rgba(217,48,32,.6);box-shadow:0 4px 16px rgba(217,48,32,.2),inset 0 1px 0 rgba(255,255,255,.9);transform:scale(1.1);}
.nav-btn:hover svg{stroke:#c42818;}
.nav-btn#prevBtn:hover svg{transform:translateX(-1.5px);}
.nav-btn#nextBtn:hover svg{transform:translateX(1.5px);}
.nav-btn:active{transform:scale(.93);}

/* DAY HEADERS */
.cal-head{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;margin-bottom:5px;}
.cal-head-cell{text-align:center;font-size:11px;letter-spacing:1.2px;padding:4px 1px;background:linear-gradient(135deg,#d93020 0%,#e85535 60%,#ef6640 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;background-color:#ffe8e0;border-radius:6px;border:1px solid rgba(232,85,53,.25);filter:drop-shadow(0 1px 0 rgba(180,30,10,.22));font-family:'Nunito',sans-serif;font-weight:900;text-transform:uppercase;}

/* GRID */
.cal-body{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:2px;overflow:visible;}
.cal-cell{background:var(--card);border:1.5px solid var(--border);border-radius:9px;padding:2px;display:flex;flex-direction:column;align-items:flex-start;gap:0;overflow:visible;height:46px;position:relative;min-width:0;width:100%;transition:border-color .15s,box-shadow .15s;}
.cal-cell:not(.empty):not(.overflow):hover{border-color:var(--red-mid);box-shadow:0 2px 10px rgba(217,48,32,.12);}
.cal-cell.empty{background:transparent;border-color:transparent;}
.cal-cell.overflow{opacity:.3;pointer-events:none;}
.cal-cell.today{background:linear-gradient(135deg,rgba(217,48,32,.08),rgba(239,102,64,.04));border-color:var(--red-dark);box-shadow:0 2px 8px rgba(217,48,32,.1);}

.day-num-wrap{height:18px;width:100%;display:flex;align-items:center;flex-shrink:0;padding-left:2px;padding-right:3px;justify-content:space-between;min-width:0;overflow:visible;}
.day-num{font-family:'Fredoka One',cursive;font-size:11px;color:var(--text-dark);line-height:1;display:flex;align-items:center;}
.cal-cell.today .day-num{display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#d93020,#e85535);color:#fff;border-radius:50%;width:17px;height:17px;min-width:17px;padding:0;font-size:11px;}

.status-dot{width:7px;height:7px;border-radius:50%;border:1.5px solid rgba(255,255,255,.9);flex-shrink:0;pointer-events:none;}
.status-dot.dot-live{background:radial-gradient(circle at 35% 35%,#ff6b6b,#e53935);box-shadow:0 0 0 2.5px rgba(229,57,53,.35),0 1px 4px rgba(229,57,53,.5);animation:dot-pulse 1s ease-in-out infinite;}
.status-dot.dot-before{background:radial-gradient(circle at 35% 35%,#64b5f6,#1e88e5);box-shadow:0 0 0 2.5px rgba(30,136,229,.25),0 1px 4px rgba(30,136,229,.4);animation:dot-glow-blue 2.5s ease-in-out infinite;}
.status-dot.dot-soon{background:radial-gradient(circle at 35% 35%,#81c784,#43a047);box-shadow:0 0 0 2.5px rgba(67,160,71,.25),0 1px 4px rgba(67,160,71,.4);animation:dot-glow-green 1.8s ease-in-out infinite;}
.status-dot.dot-ended{background:radial-gradient(circle at 35% 35%,#757575,#212121);box-shadow:0 1px 3px rgba(0,0,0,.35);}
@keyframes dot-pulse{0%,100%{box-shadow:0 0 0 2.5px rgba(229,57,53,.35),0 1px 4px rgba(229,57,53,.5);transform:scale(1);}50%{box-shadow:0 0 0 5px rgba(229,57,53,.1),0 1px 6px rgba(229,57,53,.6);transform:scale(1.15);}}
@keyframes dot-glow-blue{0%,100%{box-shadow:0 0 0 2.5px rgba(30,136,229,.25),0 1px 4px rgba(30,136,229,.4);}50%{box-shadow:0 0 0 4px rgba(30,136,229,.12),0 1px 7px rgba(30,136,229,.5);}}
@keyframes dot-glow-green{0%,100%{box-shadow:0 0 0 2.5px rgba(67,160,71,.25),0 1px 4px rgba(67,160,71,.4);}50%{box-shadow:0 0 0 4.5px rgba(67,160,71,.12),0 1px 7px rgba(67,160,71,.55);}}

.status-upcoming{color:#1565c0;background:#e3f2fd;border-color:#90caf9;}
.status-soon{color:#2e7d32;background:#e8f5e9;border-color:#a5d6a7;animation:pulse-badge-green 1.6s ease-in-out infinite;}
.status-live{color:#b71c1c;background:#fce4ec;border-color:#ef9a9a;animation:pulse-badge 1.4s ease-in-out infinite;}
.status-ended{color:#555;background:#f5f5f5;border-color:#ccc;}
@keyframes pulse-badge{0%,100%{opacity:1;}50%{opacity:.6;}}
@keyframes pulse-badge-green{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(67,160,71,.3);}50%{opacity:.85;box-shadow:0 0 0 4px rgba(67,160,71,.08);}}

/* EVT ICONS */
.evt-icons{display:flex;flex-direction:row;flex-wrap:nowrap;align-items:center;justify-content:center;gap:0;width:100%;flex:1;min-height:0;min-width:0;overflow:visible;padding:0 0 3px;box-sizing:border-box;}
.evt{
  --ico:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  width:var(--ico);height:var(--ico);min-width:var(--ico);min-height:var(--ico);flex-shrink:0;
  border-radius:4px;font-size:calc(var(--ico)*.76);
  transform-origin:center center;transition:transform .18s cubic-bezier(.34,1.56,.64,1);
  z-index:1;border:1.5px solid rgba(217,48,32,.22);background:rgba(255,243,224,.7);
  overflow:hidden;line-height:1;position:relative;
  -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  box-shadow:0 1px 3px rgba(217,48,32,.08);
}
.evt.is-match{
  border-color:rgba(251,192,45,.7);
  background:rgba(255,249,196,.85);
  box-shadow:0 1px 4px rgba(251,192,45,.25);
}
.evt:hover{transform:scale(1.3);z-index:100;box-shadow:0 3px 10px rgba(217,48,32,.2);}
.evt.is-match:hover{box-shadow:0 3px 10px rgba(251,192,45,.4);}
.evt.is-match:hover{box-shadow:0 3px 10px rgba(251,192,45,.4);}

.evt img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;border-radius:3px;display:block;opacity:0;transition:opacity .25s;padding:1px;}
.evt img.loaded{opacity:1;}
.evt-emoji{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:inherit;line-height:1;user-select:none;}
.evt-skeleton{position:absolute;inset:0;border-radius:4px;background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;z-index:2;}
.tip-logo-skeleton{position:absolute;inset:0;border-radius:6px;background:linear-gradient(90deg,#f0cfc4 0%,#fce5de 40%,#f9d6cd 60%,#f0cfc4 100%);background-size:300% 100%;animation:shimmer .85s ease-in-out infinite;}

.legend{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px 12px;padding:6px 4px 2px;margin-top:5px;}
.legend-item{display:flex;align-items:center;gap:5px;font-family:'Fredoka One',cursive;font-size:clamp(9px,2vw,11px);letter-spacing:.4px;white-space:nowrap;}
.legend-item:nth-child(1) .legend-label{color:#1565c0;}
.legend-item:nth-child(2) .legend-label{color:#2e7d32;}
.legend-item:nth-child(3) .legend-label{color:#b71c1c;}
.legend-item:nth-child(4) .legend-label{color:#424242;}
.legend-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(255,255,255,.9);flex-shrink:0;}
.legend-dot.dot-before{background:radial-gradient(circle at 35% 35%,#64b5f6,#1e88e5);animation:dot-glow-blue 2.5s ease-in-out infinite;}
.legend-dot.dot-soon{background:radial-gradient(circle at 35% 35%,#81c784,#43a047);animation:dot-glow-green 1.8s ease-in-out infinite;}
.legend-dot.dot-live{background:radial-gradient(circle at 35% 35%,#ff6b6b,#e53935);animation:dot-pulse 1s ease-in-out infinite;}
.legend-dot.dot-ended{background:radial-gradient(circle at 35% 35%,#757575,#212121);box-shadow:0 1px 3px rgba(0,0,0,.35);}

/* TOOLTIP */
.evt-tip{
  position:fixed;
  display:flex;flex-direction:column;gap:0;
  background:var(--card);border:2px solid var(--red-dark);
  border-radius:14px;padding:10px 13px 9px;
  box-shadow:0 8px 32px rgba(217,48,32,.22);
  pointer-events:none;
  opacity:0;
  visibility:hidden;
  transform:scale(.95) translateY(4px);
  transition:opacity .2s ease, transform .22s cubic-bezier(.34,1.4,.64,1), visibility 0s linear .22s;
  z-index:99999;min-width:200px;max-width:300px;white-space:normal;
  font-family:'Nunito',sans-serif;
}
.evt-tip.show{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
  transform:scale(1) translateY(0);
  transition:opacity .18s ease, transform .2s cubic-bezier(.34,1.4,.64,1), visibility 0s linear 0s;
}
.evt-tip.tip-match-style{border-color:#f9a825;}
.evt-tip.tip-match-style .tip-title{color:#e65100;}

.tip-row1{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.tip-logo{width:34px;height:34px;border-radius:7px;border:1.5px solid var(--border);flex-shrink:0;font-size:22px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#fffde7;position:relative;}
.tip-logo img{width:100%;height:100%;object-fit:contain;border-radius:6px;display:block;opacity:0;transition:opacity .25s;}
.tip-logo img.loaded{opacity:1;}
.tip-date-wrap{display:flex;flex-direction:column;gap:2px;min-width:0;}
.tip-title{font-family:'Fredoka One',cursive;font-size:13px;color:var(--red-dark);line-height:1.2;word-break:break-word;padding-right:22px;}
.tip-date-badge{font-size:10px;font-weight:800;color:var(--text-mid);opacity:.8;}

.tip-countdown{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:900;padding:4px 9px;border-radius:999px;border:1.5px solid;margin-bottom:6px;width:fit-content;}
.tip-countdown .cd-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;}
.tip-detail{font-size:10px;font-weight:700;color:var(--text-mid);line-height:1.55;margin-bottom:6px;}

.tip-quote-block{background:#fff;border:1.5px solid #eee;border-radius:9px;padding:0;margin-bottom:7px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.06);}
.tip-quote-block-bar{height:3px;width:100%;}
.tip-quote-block-bar.bar-organizer{background:linear-gradient(90deg,#d93020,#ef6640);}
.tip-quote-block-bar.bar-admin{background:linear-gradient(90deg,#6a0dad,#b042f5);}
.tip-quote-inner{padding:6px 9px 7px;}
.tip-quote-label{display:flex;align-items:center;gap:5px;font-family:'Nunito',sans-serif;font-size:8.5px;font-weight:900;letter-spacing:.7px;text-transform:uppercase;color:#aaa;margin-bottom:4px;}
.tip-quote-label-icon{display:flex;align-items:center;flex-shrink:0;}
.admin-icon{font-size:11px;line-height:1;}
.tip-quote-text{font-family:'Nunito',sans-serif;font-size:10.5px;font-weight:700;color:#3a3a3a;line-height:1.55;}

.mention-link{color:#d93020;font-weight:900;text-decoration:none;border-bottom:1px dotted rgba(217,48,32,.4);transition:color .15s,border-color .15s;}
.mention-link:hover{color:#a01808;border-bottom-color:rgba(160,24,8,.7);}

.tip-bottom-row{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:2px;}
.tip-btn{display:inline-block;font-size:10px;font-weight:900;color:#fff;background:linear-gradient(135deg,#d93020,#e85535);padding:4px 12px;border-radius:999px;text-decoration:none;box-shadow:0 2px 0 #8c1a10;pointer-events:auto;white-space:nowrap;flex-shrink:0;}
.tip-btn.btn-amber{background:linear-gradient(135deg,#f57f17,#fbc02d);box-shadow:0 2px 0 #e65100;color:#fff;}
.tip-organizer{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:900;color:var(--text-mid);background:#fff0eb;border:1.5px solid var(--border);border-radius:999px;padding:3px 8px 3px 6px;text-decoration:none;white-space:nowrap;transition:background .15s,border-color .15s;pointer-events:auto;}
.tip-organizer:hover{background:#fce0d5;border-color:var(--red-mid);color:var(--red-dark);}
.tip-organizer-icon{font-size:11px;line-height:1;}

.tip-close{position:absolute;top:7px;right:9px;font-size:13px;font-weight:900;color:var(--red-dark);cursor:pointer;line-height:1;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%;background:rgba(217,48,32,.1);z-index:10;border:1.5px solid rgba(217,48,32,.2);transition:background .15s,transform .15s;user-select:none;}
.tip-close:hover{background:rgba(217,48,32,.2);transform:scale(1.15);}

@media(hover:none)and(pointer:coarse){
  /* On touch devices: always centered, JS never sets left/top */
  .evt-tip{
    position:fixed!important;
    left:50%!important;top:50%!important;
    /* hidden state: centered but scaled down */
    transform:translate(-50%,-50%) scale(.9)!important;
    width:min(88vw,300px)!important;max-width:min(88vw,300px)!important;
    max-height:80vh;overflow-y:auto;
    box-shadow:0 16px 48px rgba(217,48,32,.35),0 0 0 9999px rgba(0,0,0,.45);
  }
  .evt-tip.show{
    transform:translate(-50%,-50%) scale(1)!important;
  }
  .evt-tip.tip-match-style{border-color:#f9a825;}
}

.footer{text-align:center;font-family:'Fredoka One',cursive;font-size:11px;letter-spacing:.4px;background:linear-gradient(135deg,#d93020,#ef6640);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 1px 0 rgba(217,48,32,.18));padding-top:4px;}
</style>
</head>
<body>

<div class="page-sb" id="pageSb">
  <div class="page-top">
    <div class="page-title">🏠 Hot Chilli CheckMate #</div>
    <div class="page-sub">Your Chess Home ♡</div>
  </div>

  <div class="cal-skeleton" id="calSkeleton">
    <div class="skel-nav"><div class="skel-circle"></div><div class="skel-label"></div><div class="skel-circle"></div></div>
    <div class="skel-head"><div class="skel-head-cell"></div><div class="skel-head-cell"></div><div class="skel-head-cell"></div><div class="skel-head-cell"></div><div class="skel-head-cell"></div><div class="skel-head-cell"></div><div class="skel-head-cell"></div></div>
    <div class="skel-grid" id="skelGrid"></div>
    <div class="skel-legend"><div class="skel-legend-item"></div><div class="skel-legend-item"></div><div class="skel-legend-item"></div><div class="skel-legend-item"></div></div>
    <div class="skel-footer"></div>
  </div>

  <div class="cal-real inner" id="calReal">
    <div class="cal-nav">
      <button class="nav-btn" id="prevBtn" aria-label="Previous month"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
      <div class="cal-month-label" id="monthLabel"></div>
      <button class="nav-btn" id="nextBtn" aria-label="Next month"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
    </div>
    <div class="cal-head" id="calHead"></div>
    <div class="cal-body" id="calBody"></div>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot dot-before"></span><span class="legend-label">Upcoming</span></div>
      <div class="legend-item"><span class="legend-dot dot-soon"></span><span class="legend-label">Soon</span></div>
      <div class="legend-item"><span class="legend-dot dot-live"></span><span class="legend-label">Live</span></div>

<script>
const SHEET_API_URL='https://script.google.com/macros/s/AKfycbwLWbOvhgA9aiwEpatPngrRZCsUaGbBNNYDQR3KK5sm-p8lQjx1eili_e4IGUWM9cCL9w/exec';
const CLUB_SLUG='hot-chilli-checkmate';
const CHESS_MATCHES_URL='https://api.chess.com/pub/club/'+CLUB_SLUG+'/matches';

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS_LABELS=['MON','TUE','WED','THU','FRI','SAT','SUN'];

const today=new Date();
let viewYear=today.getFullYear(),viewMonth=today.getMonth(),eventMap={};

/* ── SKELETON ── */
(function(){
  const g=document.getElementById('skelGrid');if(!g)return;
  const y=today.getFullYear(),m=today.getMonth();
  const first=(new Date(y,m,1).getDay()+6)%7,last=new Date(y,m+1,0).getDate();
  for(let i=0;i<42;i++){
    const c=document.createElement('div');
    const idx=i-first+1;
    c.className=(i<first||idx>last)?'skel-cell empty':'skel-cell';
    g.appendChild(c);
  }
})();

/* ── IMAGE CACHE ── */
function proxyImageURL(raw){
  if(!raw)return null;raw=raw.trim();
  if(raw.startsWith('https://wsrv.nl'))return raw;
  const d=raw.match(/drive\.google\.com\/(?:file\/d\/|open\?id=)([\w-]+)/);
  if(d)return'https://wsrv.nl/?url='+encodeURIComponent('https://drive.google.com/uc?export=download&id='+d[1])+'&w=64&h=64&fit=contain&output=webp';
  if(/^https?:\/\//i.test(raw))return'https://wsrv.nl/?url='+encodeURIComponent(raw)+'&w=64&h=64&fit=contain&output=webp';
  return null;
}
const imgMem=new Map(),imgCbs=new Map();
const lsKey=u=>'imgcache2:'+u;
const lsGet=u=>{try{return localStorage.getItem(lsKey(u));}catch(e){return null;}};
const lsSet=(u,v)=>{try{localStorage.setItem(lsKey(u),v);}catch(e){}};
function preloadImg(url){
  if(!url||imgMem.has(url))return;
  const c=lsGet(url);if(c){imgMem.set(url,c);return;}
  imgMem.set(url,'loading');
  const img=new Image();img.crossOrigin='anonymous';img.decoding='async';
  img.onload=()=>{imgMem.set(url,'ok');lsSet(url,'ok');notifyImg(url,'ok');};
  img.onerror=()=>{imgMem.set(url,'err');lsSet(url,'err');notifyImg(url,'err');};
  img.src=url;
}
function notifyImg(url,s){const cbs=imgCbs.get(url)||[];imgCbs.delete(url);cbs.forEach(cb=>cb(s));}
function onImgReady(url,cb){
  const s=imgMem.get(url);if(s==='ok'||s==='err'){cb(s);return;}
  const c=lsGet(url);if(c==='ok'||c==='err'){imgMem.set(url,c);cb(c);return;}
  if(!imgCbs.has(url))imgCbs.set(url,[]);imgCbs.get(url).push(cb);
  if(!imgMem.has(url))preloadImg(url);
}

/* ── DATE UTILS ── */
const pad=n=>String(n).padStart(2,'0');
const dateKey=(y,m,d)=>`${y}-${pad(m+1)}-${pad(d)}`;
const lastDay=(y,m)=>new Date(y,m+1,0).getDate();
const dowMon=(y,m,d)=>(new Date(y,m,d).getDay()+6)%7;
const ordinal=d=>{const s=['th','st','nd','rd'],v=d%100;return d+(s[(v-20)%10]||s[v]||s[0]);};
const formatDate=(y,m,d)=>`${MONTH_SHORT[m]} ${ordinal(d)}, ${y}`;
const isURL=s=>s&&(/^https?:\/\//i.test(s)||s.includes('.'));

function parseDate(str){
  if(!str)return null;str=str.trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(str)){const[y,m,d]=str.split('-').map(Number);return{y,m:m-1,d};}
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(str)){const[m,d,y]=str.split('/').map(Number);return{y,m:m-1,d};}
  if(/^\d{1,2}-\d{1,2}-\d{4}$/.test(str)){const[d,m,y]=str.split('-').map(Number);return{y,m:m-1,d};}
  const dt=new Date(str);if(!isNaN(dt))return{y:dt.getFullYear(),m:dt.getMonth(),d:dt.getDate()};
  return null;
}
function parseTime(str){
  if(!str||!str.trim())return null;
  const m=str.trim().match(/^(\d{1,2}):(\d{2})(?::\d{2})?(?:\s*(am|pm))?$/i);if(!m)return null;
  let h=parseInt(m[1]),min=parseInt(m[2]);
  if(m[3]){if(m[3].toLowerCase()==='pm'&&h<12)h+=12;if(m[3].toLowerCase()==='am'&&h===12)h=0;}
  return{h,min};
}
function buildUTC(dateObj,timeObj){
  if(!dateObj||!timeObj)return null;
  return new Date(Date.UTC(dateObj.y,dateObj.m,dateObj.d,timeObj.h,timeObj.min,0));
}

function getPhase(ev){
  if(!ev.timeObj)return null;
  const s=buildUTC(ev.dateObj,ev.timeObj);if(!s)return null;
  const e=ev.duration>0?new Date(s.getTime()+ev.duration*3600000):null;
  const now=Date.now();
  if(now<s.getTime()){
    const ms=s-now,sec=Math.floor(ms/1000);
    const d=Math.floor(sec/86400),h=Math.floor((sec%86400)/3600),mn=Math.floor((sec%3600)/60);
    let text='Starting in ';
    if(d>0)text+=`${d}d ${h}h ${mn}m`;else if(h>0)text+=`${h}h ${mn}m`;else text+=`${mn}m`;
    return{status:ms<=3600000?'soon':'upcoming',text,cssClass:ms<=3600000?'status-soon':'status-upcoming',phase:'before'};
  }else if(e&&now<e.getTime()){
    const msL=e.getTime()-now,sL=Math.floor(msL/1000),hL=Math.floor(sL/3600),mL=Math.floor((sL%3600)/60);
    const et=hL>0?` · ends in ${hL}h ${mL}m`:mL>0?` · ends in ${mL}m`:' · ending soon';
    return{status:'live',text:'🔴 Live'+et,cssClass:'status-live',phase:'live'};
  }else if(!e&&now>=s.getTime()){
    return{status:'live',text:'🔴 Live',cssClass:'status-live',phase:'live'};
  }else{
    return{status:'ended',text:'✅ Ended',cssClass:'status-ended',phase:'after'};
  }
}

function cellDotClass(events){
  let best=null;const rank={ended:1,before:2,soon:3,live:4};
  for(const ev of events){
    if(!ev.timeObj)continue;
    const s=buildUTC(ev.dateObj,ev.timeObj);if(!s)continue;
    const e=ev.duration>0?new Date(s.getTime()+ev.duration*3600000):null;
    const now=Date.now();
    let cls;
    if(e&&now>=e.getTime())cls='ended';else if(now>=s.getTime())cls='live';else if(s-now<=3600000)cls='soon';else cls='before';
    if(!best||rank[cls]>rank[best])best=cls;
  }
  return best?'dot-'+best:null;
}

function pick(ev,phase,field){
  const key={before:{details:'detailsBefore',button:'buttonBefore',link:'linkBefore'},live:{details:'detailsLive',button:'buttonLive',link:'linkLive'},after:{details:'detailsAfter',button:'buttonAfter',link:'linkAfter'}};
  const fallback={before:['before'],live:['live','before'],after:['after','live','before']};
  for(const p of fallback[phase]){const val=ev[key[p][field]];if(val&&val.trim())return val.trim();}
  return'';
}

function linkifyMentions(text){
  return text.split(/(@[\w-]+)/g).map(part=>{
    if(/^@[\w-]+$/.test(part)){const a=document.createElement('a');a.className='mention-link';a.href='https://www.chess.com/member/'+part.slice(1);a.target='_blank';a.rel='noopener noreferrer';a.textContent=part;return a;}
    return document.createTextNode(part);
  });
}
function setTextWithMentions(el,text){el.innerHTML='';linkifyMentions(text).forEach(n=>el.appendChild(n));}

/* ── CHESS.COM DAILY MATCHES ── */
function matchApiToWebUrl(apiId){
  if(!apiId)return'https://www.chess.com/clubs/upcomingevents/'+CLUB_SLUG;
  const m=apiId.match(/\/match\/(\d+)$/);
  return m?'https://www.chess.com/club/matches/daily/'+m[1]:'https://www.chess.com/clubs/upcomingevents/'+CLUB_SLUG;
}

async function loadChessMatches(){
  try{
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),5000);
    const res=await fetch(CHESS_MATCHES_URL,{signal:ctrl.signal,cache:'no-store'});
    clearTimeout(tid);
    if(!res.ok)return;
    const data=await res.json();
    const toProcess=[
      ...(data.registered||[]).map(m=>({...m,_st:'registered'})),
      ...(data.in_progress||[]).map(m=>({...m,_st:'in_progress'})),
    ];
    for(const match of toProcess){
      if(!match.start_time)continue;
      const startDate=new Date(match.start_time*1000);
      const dateObj={y:startDate.getUTCFullYear(),m:startDate.getUTCMonth(),d:startDate.getUTCDate()};
      const timeObj={h:startDate.getUTCHours(),min:startDate.getUTCMinutes()};
      const opSlug=(match.opponent||'').replace('https://api.chess.com/pub/club/','').replace(/\/$/,'');
      const matchUrl=matchApiToWebUrl(match['@id']||'');
      const key=dateKey(dateObj.y,dateObj.m,dateObj.d);
      if(!eventMap[key])eventMap[key]=[];
      if(eventMap[key].some(ev=>ev._matchUrl===matchUrl))continue;
      eventMap[key].push({
        dateObj,timeObj,duration:0,
        title:'Daily Match ☀️',
        detailsBefore:'♟ '+(match.name||'Club Match'),
        buttonBefore:'Join',linkBefore:matchUrl,
        detailsLive:'♟ '+(match.name||'Club Match'),
        buttonLive:'View',linkLive:matchUrl,
        detailsAfter:'♟ '+(match.name||'Club Match'),
        buttonAfter:'Follow',linkAfter:'https://www.chess.com/club/'+opSlug,
        rawLogo:'☀️',logo:'☀️',isProxied:false,
        organizer:'',quoteBefore:'',quoteAfter:'',admin:'',adminMessage:'',
        isMatch:true,_matchUrl:matchUrl,_opSlug:opSlug,
      });
    }
  }catch(e){/* silent */}
}

/* ── SHEET ── */
async function loadSheet(){
  const res=await fetch(SHEET_API_URL,{cache:'no-store',headers:{'Accept':'application/json'}});
  if(!res.ok)throw new Error('HTTP '+res.status);
  const data=await res.json();
  data.forEach(ev=>{
    if(!ev.date||!ev.title)return;
    const dateObj=parseDate(ev.date);if(!dateObj)return;
    const key=dateKey(dateObj.y,dateObj.m,dateObj.d);
    if(!eventMap[key])eventMap[key]=[];
    const rawLogo=(ev.logo||'').trim();
    const proxiedLogo=isURL(rawLogo)?proxyImageURL(rawLogo):null;
    eventMap[key].push({
      dateObj,timeObj:parseTime(ev.time),duration:parseFloat(ev.duration)||0,
      title:(ev.title||'').trim(),
      detailsBefore:(ev.detailsBefore||'').trim(),buttonBefore:(ev.buttonBefore||'').trim(),linkBefore:(ev.linkBefore||'').trim(),
      detailsLive:(ev.detailsLive||'').trim(),buttonLive:(ev.buttonLive||'').trim(),linkLive:(ev.linkLive||'').trim(),
      detailsAfter:(ev.detailsAfter||'').trim(),buttonAfter:(ev.buttonAfter||'').trim(),linkAfter:(ev.linkAfter||'').trim(),
      rawLogo,logo:proxiedLogo||rawLogo,isProxied:!!proxiedLogo,
      organizer:(ev.organizer||'').trim(),
      quoteBefore:(ev.quoteBefore||'').trim(),quoteAfter:(ev.quoteAfter||'').trim(),
      admin:(ev.admin||'').trim().replace(/^@/,''),adminMessage:(ev.adminMessage||'').trim(),
      isMatch:false,
    });
    if(proxiedLogo)preloadImg(proxiedLogo);
  });
}

/* ── CALENDAR ── */
function applyCellWidth(){
  const cells=calBody.querySelectorAll('.cal-cell');if(!cells.length)return;
  const r=cells[0].getBoundingClientRect();
  const cW=r.width,cH=r.height;if(cW<1||cH<1)return;
  cells.forEach(cell=>{
    cell.querySelectorAll('.evt-icons').forEach(wrap=>{
      const n=parseInt(wrap.dataset.count)||1;
      const icons=wrap.querySelectorAll('.evt');
      const ratio=cW<cH?(n===1?.58:n===2?.43:.28):(n===1?.50:n===2?.43:.28);
      const base=cW<cH?cW:cH,ico=base*ratio;
      const space=(cW-ico*n)/(n+1);
      icons.forEach((el,i)=>{el.style.setProperty('--ico',ico.toFixed(2)+'px');el.style.marginLeft=space.toFixed(2)+'px';el.style.marginRight=(i===n-1?space:0).toFixed(2)+'px';});
    });
  });
}

const monthLabel=document.getElementById('monthLabel');
const calHead=document.getElementById('calHead');
const calBody=document.getElementById('calBody');

function buildCalendar(){
  monthLabel.textContent=MONTHS[viewMonth]+' '+viewYear;
  calHead.innerHTML='';
  DAYS_LABELS.forEach(l=>{const c=document.createElement('div');c.className='cal-head-cell';c.textContent=l;calHead.appendChild(c);});
  calBody.innerHTML='';
  const first=dowMon(viewYear,viewMonth,1),last=lastDay(viewYear,viewMonth);
  const pM=viewMonth===0?11:viewMonth-1,pY=viewMonth===0?viewYear-1:viewYear;
  const nM=viewMonth===11?0:viewMonth+1,nY=viewMonth===11?viewYear+1:viewYear;
  for(let i=0;i<first;i++)calBody.appendChild(makeCell(pY,pM,lastDay(pY,pM)-first+1+i,true));
  for(let d=1;d<=last;d++)calBody.appendChild(makeCell(viewYear,viewMonth,d,false));
  const filled=first+last;for(let d=1;filled+d-1<42;d++)calBody.appendChild(makeCell(nY,nM,d,true));
  requestAnimationFrame(applyCellWidth);
}

function makeCell(y,m,d,overflow){
  const isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
  const cell=document.createElement('div');
  cell.className='cal-cell'+(isToday?' today':'')+(overflow?' overflow':'');
  const wrap0=document.createElement('div');wrap0.className='day-num-wrap';
  const num=document.createElement('div');num.className='day-num';num.textContent=d;wrap0.appendChild(num);
  const events=eventMap[dateKey(y,m,d)]||[];
  if(!overflow&&events.length){
    const dc=cellDotClass(events);
    if(dc){const dot=document.createElement('div');dot.className='status-dot '+dc;wrap0.appendChild(dot);}
  }
  cell.appendChild(wrap0);
  if(events.length){
    const wrap=document.createElement('div');wrap.className='evt-icons';wrap.dataset.count=String(events.length);
    events.forEach(ev=>{
      const ico=document.createElement('div');ico.className='evt'+(ev.isMatch?' is-match':'');
      if(!ev.isMatch&&ev.isProxied){
        const skel=document.createElement('div');skel.className='evt-skeleton';ico.appendChild(skel);
        const img=document.createElement('img');img.alt=ev.title;img.loading='eager';img.decoding='async';ico.appendChild(img);
        onImgReady(ev.logo,state=>{
          if(state==='ok'){img.src=ev.logo;const fin=()=>{img.classList.add('loaded');skel.style.opacity='0';setTimeout(()=>skel.remove(),250);};img.onload=fin;if(img.complete&&img.naturalWidth>0)fin();}
          else{skel.remove();const em=document.createElement('span');em.className='evt-emoji';em.textContent='📅';ico.appendChild(em);}
        });
      }else{
        const em=document.createElement('span');em.className='evt-emoji';
        em.textContent=ev.isMatch?'☀️':((ev.rawLogo&&ev.rawLogo.trim())?ev.rawLogo:'📅');
        ico.appendChild(em);
      }
      if(!overflow){
        ico.addEventListener('mouseenter',()=>{cancelLeave();if(!tipPinned){renderTip(ev,y,m,d);tip.classList.add('show');posTipFromRect(ico);}});
        ico.addEventListener('mouseleave',()=>{if(!tipPinned)scheduleLeave();});
        ico.addEventListener('click',e=>{e.stopPropagation();pinTip(ico,ev,y,m,d);});
        ico.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();pinTipTouch(ev,y,m,d);},{passive:false});
      }
      wrap.appendChild(ico);
    });
    cell.appendChild(wrap);
  }
  return cell;
}

/* ── TOOLTIP ── */
const tip=document.getElementById('globalTip');
const tipLogo=document.getElementById('tipLogo');
const tipTitle=document.getElementById('tipTitle');
const tipDateBadge=document.getElementById('tipDateBadge');
const tipCountdown=document.getElementById('tipCountdown');
const tipDetail=document.getElementById('tipDetail');
const tipMsg=document.getElementById('tipMsg');
const tipQuoteBlock=document.getElementById('tipQuoteBlock');
const tipQuoteLabelText=document.getElementById('tipQuoteLabelText');
const tipAdminBlock=document.getElementById('tipAdminBlock');
const tipAdminLabelText=document.getElementById('tipAdminLabelText');
const tipAdminMsg=document.getElementById('tipAdminMsg');
const tipBottomRow=document.getElementById('tipBottomRow');
const tipClose=document.getElementById('tipClose');

let tipPinned=false,countdownTimer=null,leaveTimer=null;
const LEAVE_DELAY=400;
const scheduleLeave=()=>{leaveTimer=setTimeout(()=>{leaveTimer=null;hideTip();},LEAVE_DELAY);};
const cancelLeave=()=>{if(leaveTimer){clearTimeout(leaveTimer);leaveTimer=null;}};
const hideTip=()=>{tipPinned=false;tip.classList.remove('show');clearInterval(countdownTimer);countdownTimer=null;};
const pinTip=(icoEl,ev,y,m,d)=>{cancelLeave();tipPinned=true;renderTip(ev,y,m,d);tip.classList.add('show');posTipFromRect(icoEl);};
const pinTipTouch=(ev,y,m,d)=>{cancelLeave();tipPinned=true;tip.style.left='';tip.style.top='';renderTip(ev,y,m,d);tip.classList.add('show');};

tip.addEventListener('mouseenter',cancelLeave);
tip.addEventListener('mouseleave',()=>{if(!tipPinned)scheduleLeave();});
tipClose.addEventListener('click',e=>{e.stopPropagation();hideTip();});
tipClose.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();hideTip();},{passive:false});

function renderTip(ev,y,m,d){
  ev.isMatch?tip.classList.add('tip-match-style'):tip.classList.remove('tip-match-style');
  tipLogo.innerHTML='';
  if(!ev.isMatch&&ev.isProxied){
    const skel=document.createElement('div');skel.className='tip-logo-skeleton';tipLogo.appendChild(skel);
    const img=document.createElement('img');img.alt=ev.title;img.decoding='async';tipLogo.appendChild(img);
    onImgReady(ev.logo,state=>{
      if(state==='ok'){img.src=ev.logo;const fin=()=>{img.classList.add('loaded');skel.style.opacity='0';setTimeout(()=>skel.remove(),250);};img.onload=fin;if(img.complete&&img.naturalWidth>0)fin();}
      else{skel.remove();tipLogo.textContent='📅';}
    });
  }else{
    tipLogo.textContent=ev.isMatch?'☀️':((ev.rawLogo&&ev.rawLogo.trim())?ev.rawLogo:'📅');
  }

  tipTitle.textContent=ev.title;
  tipDateBadge.textContent=ev.timeObj?`${formatDate(y,m,d)} · ${pad(ev.timeObj.h)}:${pad(ev.timeObj.min)} UTC`:formatDate(y,m,d);

  clearInterval(countdownTimer);countdownTimer=null;
  const st=getPhase(ev);
  if(st){
    tipCountdown.style.display='flex';
    const upd=()=>{const s=getPhase(ev);if(!s)return;tipCountdown.className='tip-countdown '+s.cssClass;tipCountdown.innerHTML=`<span class="cd-dot"></span>${s.text}`;};
    upd();countdownTimer=setInterval(upd,st.status==='live'?60000:30000);
  }else tipCountdown.style.display='none';

  const phase=st?st.phase:'before';
  const details=pick(ev,phase,'details');
  const btnText=pick(ev,phase,'button');
  const btnLink=pick(ev,phase,'link');
  tipDetail.textContent=details;tipDetail.style.display=details?'block':'none';

  const quote=phase==='after'?ev.quoteAfter:ev.quoteBefore;
  if(quote){setTextWithMentions(tipMsg,quote);tipQuoteLabelText.textContent=ev.organizer?`From @${ev.organizer}`:'From the organizer';tipQuoteBlock.style.display='block';}
  else tipQuoteBlock.style.display='none';

  if(ev.adminMessage){setTextWithMentions(tipAdminMsg,ev.adminMessage);tipAdminLabelText.textContent=ev.admin?`From @${ev.admin}`:'Admin message';tipAdminBlock.style.display='block';}
  else tipAdminBlock.style.display='none';

  tipBottomRow.innerHTML='';
  if(ev.organizer){
    const a=document.createElement('a');a.className='tip-organizer';a.href='https://www.chess.com/member/'+ev.organizer;a.target='_blank';a.rel='noopener noreferrer';a.innerHTML='<span class="tip-organizer-icon">♟</span>@'+ev.organizer;tipBottomRow.appendChild(a);
  }
  if(btnText&&btnLink){
    const a=document.createElement('a');a.className='tip-btn'+(ev.isMatch?' btn-amber':'');a.href=btnLink;a.target='_blank';a.rel='noopener noreferrer';a.textContent=btnText;tipBottomRow.appendChild(a);
  }
}

function posTipFromRect(icoEl){
  const isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
  if(isTouch){
    /* On touch: clear any JS-set position, CSS handles centering */
    tip.style.left='';tip.style.top='';
    return;
  }
  /* Desktop: measure real rendered size then position next to icon */
  tip.style.visibility='hidden';
  tip.style.opacity='0';
  tip.style.display='flex';
  requestAnimationFrame(()=>{
    const r=icoEl.getBoundingClientRect();
    const tw=tip.offsetWidth||280, th=tip.offsetHeight||220;
    const vw=window.innerWidth, vh=window.innerHeight;
    const GAP=10;
    /* Prefer right of icon; fall back to left */
    let x=r.right+GAP;
    if(x+tw>vw-6) x=r.left-tw-GAP;
    /* Align with icon top; nudge up if overflows bottom */
    let y=r.top;
    if(y+th>vh-6) y=Math.max(6, vh-th-6);
    x=Math.max(6,x);
    tip.style.left=x+'px';
    tip.style.top=y+'px';
    /* Release back to CSS transition */
    tip.style.visibility='';
    tip.style.opacity='';
    tip.style.display='';
  });
}

document.addEventListener('click',e=>{if(!tip.contains(e.target))hideTip();});
document.addEventListener('touchstart',e=>{if(!tip.contains(e.target)&&tipPinned)hideTip();},{passive:true});
document.getElementById('prevBtn').addEventListener('click',()=>{hideTip();viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}buildCalendar();});
document.getElementById('nextBtn').addEventListener('click',()=>{hideTip();viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}buildCalendar();});
new ResizeObserver(()=>requestAnimationFrame(applyCellWidth)).observe(calBody);

async function init(){
  const chessPromise=loadChessMatches().catch(()=>{});
  try{await loadSheet();}catch(e){console.error('Sheet failed:',e);}
  buildCalendar();
  document.getElementById('pageSb').classList.add('loaded');
  chessPromise.then(()=>buildCalendar());
}
init();
