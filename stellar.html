<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Club of 195 Countries – Match Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-void: #080b14;
      --bg-base: #0d1220;
      --bg-card: #111827;
      --bg-cell: #0f1520;
      --globe-blue: #3b82f6;
      --globe-mid: #6366f1;
      --globe-purple: #8b5cf6;
      --piece-violet: #7c3aed;
      --accent-cyan: #22d3ee;
      --accent-gold: #f59e0b;
      --accent-green: #10b981;
      --accent-red: #ef4444;
      --text-head: #e2e8f0;
      --text-body: #94a3b8;
      --text-dim: #475569;
      --text-white: #f8fafc;
      --border-subtle: rgba(99,102,241,.18);
      --border-mid: rgba(99,102,241,.35);
      --border-hot: rgba(139,92,246,.6);
      --radius: 12px;
      --radius-sm: 8px;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{background:var(--bg-void);font-family:'Rajdhani',sans-serif;min-height:100vh;width:100%;color:var(--text-body)}
    body{display:flex;align-items:flex-start;justify-content:center}
    #root{width:100%;max-width:900px}
    @keyframes spinBorder{to{transform:rotate(360deg)}}
    @keyframes pulse-green{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}
    @keyframes barPulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes cdPulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 10px currentColor}}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-100% 0}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
    @keyframes enrichSlide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
    .skel{background:linear-gradient(90deg,#0d1220 0%,#141d35 40%,#0d1220 100%);background-size:300% 100%;animation:shimmer 1.4s ease-in-out infinite;border-radius:4px}
    .cal-header{position:relative;overflow:hidden;border-bottom:1px solid rgba(99,102,241,.18);background:linear-gradient(160deg,#0d1a35 0%,#111228 50%,#0e0d22 100%);padding:20px 20px 16px}
    .header-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(99,102,241,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.06) 1px,transparent 1px);background-size:32px 32px}
    .header-glow{position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:280px;height:140px;background:radial-gradient(ellipse,rgba(99,102,241,.25) 0%,transparent 70%);pointer-events:none}
    .header-top{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .header-left{display:flex;align-items:center;gap:10px}
    .globe-icon{position:relative;width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;background:linear-gradient(135deg,var(--globe-blue),var(--globe-purple));box-shadow:0 0 24px rgba(99,102,241,.5),0 0 8px rgba(99,102,241,.3) inset}
    .globe-ring{position:absolute;inset:-3px;border-radius:50%;border:1px solid rgba(139,92,246,.35);animation:spinBorder 8s linear infinite}
    .header-info{display:flex;flex-direction:column;gap:2px}
    .header-title{font-family:'Orbitron',monospace;font-size:15px;font-weight:700;color:var(--text-white);letter-spacing:.5px;line-height:1.2}
    .header-sub{font-size:12px;font-weight:600;color:var(--text-body);letter-spacing:2px;text-transform:uppercase}
    .live-badge{display:flex;align-items:center;gap:5px;background:rgba(99,102,241,.12);border:1px solid var(--border-subtle);border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--accent-cyan);letter-spacing:.5px}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-green);box-shadow:0 0 6px var(--accent-green);animation:pulse-green 2s ease-in-out infinite}
    .header-divider{position:relative;z-index:2;height:1px;margin-top:12px;background:linear-gradient(90deg,transparent,var(--border-mid),transparent)}
    .header-deco{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;gap:6px;padding-top:8px}
    .header-deco .pawn{font-size:13px;opacity:.35}
    .header-deco .deco-text{font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:3px;text-transform:uppercase}
    .cal-wrap{width:100%;display:flex;flex-direction:column;overflow:hidden;border-bottom:1.5px solid var(--border-mid);background:var(--bg-base);box-shadow:0 0 60px rgba(99,102,241,.08) inset;position:relative;animation:fadeIn .4s ease-out}
    .cal-content{display:flex;flex-direction:column;animation:fadeIn .3s ease-out}
    .cal-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 0;gap:12px}
    .nav-btn{width:40px;height:40px;border-radius:var(--radius);border:1.5px solid var(--border-mid);background:rgba(99,102,241,.12);color:var(--text-body);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s cubic-bezier(.34,1.56,.64,1);font-size:16px;flex-shrink:0}
    .nav-btn:hover{border-color:var(--border-hot);background:rgba(139,92,246,.2);color:var(--text-white);box-shadow:0 0 12px rgba(139,92,246,.25);transform:scale(1.08)}
    .nav-btn:active{transform:scale(.95)}
    .nav-btn svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;fill:none}
    .month-label{flex:1;text-align:center;font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:var(--text-white);letter-spacing:1.5px}
    .month-label .yr{font-size:16px;font-weight:500;color:var(--text-body);margin-left:8px}
    .cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:12px 16px 6px}
    .day-hdr{text-align:center;font-size:12px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--text-body);padding:6px 0;background:rgba(99,102,241,.08);border-radius:6px}
    .day-hdr.weekend{color:var(--globe-purple);background:rgba(139,92,246,.1)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding:0 16px 16px}
    .cal-cell{background:var(--bg-cell);border-radius:8px;border:1.5px solid rgba(99,102,241,.12);min-height:80px;display:flex;flex-direction:column;align-items:center;padding:6px 4px;position:relative;overflow:hidden;cursor:default;transition:background .15s,border-color .15s,box-shadow .15s,transform .15s;min-width:0}
    .cal-cell.has-event{cursor:pointer;border-color:var(--border-subtle);background:linear-gradient(160deg,#111a2e,#0f1428)}
    .cal-cell.has-event:hover{background:linear-gradient(160deg,#162040,#131835);border-color:var(--border-hot);box-shadow:0 0 16px rgba(139,92,246,.18);transform:translateY(-1px)}
    .cal-cell.has-event:active{transform:scale(.97)}
    .cal-cell.adj{opacity:.35;pointer-events:none;border-color:transparent}
    .cal-cell.today{border-color:var(--accent-cyan);border-width:2px;background:linear-gradient(160deg,#0f1d3a,#0d1830);box-shadow:0 0 0 2px rgba(34,211,238,.15) inset,0 0 20px rgba(34,211,238,.15)}
    .cal-cell.has-event::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(139,92,246,.5),transparent)}
    .cell-num{font-family:'Orbitron',monospace;font-size:14px;font-weight:700;color:var(--text-body);line-height:1;align-self:flex-end;margin-right:4px;width:100%;text-align:right}
    .cal-cell.today .cell-num{color:var(--accent-cyan);text-shadow:0 0 10px rgba(34,211,238,.5);font-weight:900}
    .cal-cell.adj .cell-num{color:var(--text-dim);opacity:.5}
    .today-dot{position:absolute;top:4px;left:4px;width:5px;height:5px;border-radius:50%;background:var(--globe-blue);box-shadow:0 0 6px var(--globe-blue)}
    .cell-icon-wrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;gap:4px}
    .match-badge-container{position:relative;display:flex;align-items:center;justify-content:center}
    .match-badge{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,rgba(99,102,241,.3),rgba(139,92,246,.25));border:1.5px solid rgba(139,92,246,.5);display:flex;align-items:center;justify-content:center;font-size:20px;transition:transform .2s,box-shadow .2s;position:relative;box-shadow:0 3px 12px rgba(0,0,0,.4)}
    .cal-cell.has-event:hover .match-badge{transform:scale(1.15);box-shadow:0 0 20px rgba(139,92,246,.4)}
    .status-bar{position:absolute;bottom:0;left:0;right:0;height:2px;border-radius:0 0 6px 6px}
    .status-bar.upcoming{background:linear-gradient(90deg,var(--globe-blue),var(--globe-purple))}
    .status-bar.soon{background:linear-gradient(90deg,var(--accent-gold),#f97316);animation:barPulse 1.5s ease-in-out infinite}
    .status-bar.live{background:linear-gradient(90deg,var(--accent-red),#f97316);animation:barPulse .8s ease-in-out infinite}
    .status-bar.ended{background:rgba(99,102,241,.15)}
    .count-bubble{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--accent-red),#f97316);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;border:2px solid var(--bg-cell);box-shadow:0 2px 8px rgba(239,68,68,.4);z-index:10}
    .cal-legend{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:16px;padding:12px 16px 14px;border-top:1px solid var(--border-subtle);background:rgba(0,0,0,.15)}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text-body)}
    .legend-bar{width:18px;height:3px;border-radius:2px}
    .legend-bar.upcoming{background:linear-gradient(90deg,var(--globe-blue),var(--globe-purple))}
    .legend-bar.soon{background:linear-gradient(90deg,var(--accent-gold),#f97316)}
    .legend-bar.live{background:var(--accent-red)}
    .legend-bar.ended{background:rgba(99,102,241,.25)}
    .load-err{margin:8px 16px;padding:10px 14px;border-radius:var(--radius-sm);background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);font-size:13px;font-weight:600;color:#fca5a5}
    .cal-foot{padding:8px 16px 14px;display:flex;align-items:center;justify-content:center;gap:8px;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text-dim)}
    .foot-dot{opacity:.4}
    .enriching-bar{height:3px;background:rgba(99,102,241,.1);margin:0 16px;border-radius:2px;overflow:hidden}
    .enriching-progress{height:100%;width:40%;background:linear-gradient(90deg,var(--globe-blue),var(--globe-purple));border-radius:2px;animation:enrichSlide 1.2s ease-in-out infinite}
    .tip-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;animation:fadeIn .15s ease-out}
    .tip-backdrop.show{display:block}
    .tip-panel{position:fixed;z-index:600;background:#111827;border:1.5px solid var(--border-hot);border-radius:14px;padding:0;min-width:260px;max-width:min(340px,90vw);box-shadow:0 0 0 1px rgba(139,92,246,.12),0 24px 60px rgba(0,0,0,.9),0 0 30px rgba(99,102,241,.12) inset;display:none;flex-direction:column;overflow:hidden;animation:scaleIn .2s ease-out}
    .tip-panel.show{display:flex}
    .tip-panel.mobile-center{left:50%!important;top:50%!important;transform:translate(-50%,-50%)!important;max-width:min(380px,calc(100vw - 24px));max-height:85vh;overflow:hidden;display:flex;flex-direction:column}
    .tip-strip{background:linear-gradient(135deg,#141d35,#111228);padding:14px 14px 12px;border-bottom:1px solid var(--border-subtle);position:relative}
    .tip-strip::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--globe-blue),var(--globe-purple),var(--piece-violet))}
    .tip-close{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:50%;background:rgba(99,102,241,.2);border:1px solid var(--border-mid);color:var(--text-body);font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;z-index:5}
    .tip-close:hover{background:rgba(139,92,246,.35);color:#fff;transform:scale(1.1)}
    .tip-hdr-row{display:flex;align-items:center;gap:10px}
    .tip-globe{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,rgba(99,102,241,.3),rgba(139,92,246,.25));border:1px solid var(--border-mid);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .tip-info{display:flex;flex-direction:column;gap:2px;min-width:0;padding-right:26px}
    .tip-title{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:var(--text-white);line-height:1.2}
    .tip-date{font-size:11px;font-weight:600;color:var(--text-body);letter-spacing:.3px}
    .tip-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;max-height:calc(85vh - 90px);scrollbar-width:thin;scrollbar-color:var(--border-mid) transparent}
    .tip-body::-webkit-scrollbar{width:6px}
    .tip-body::-webkit-scrollbar-track{background:transparent}
    .tip-body::-webkit-scrollbar-thumb{background:var(--border-mid);border-radius:3px}
    .tip-countdown{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.3px;padding:5px 11px;border-radius:999px;border:1px solid;width:fit-content}
    .tip-countdown .cd-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0}
    .cd-upcoming{color:var(--accent-cyan);background:rgba(34,211,238,.07);border-color:rgba(34,211,238,.3)}
    .cd-soon{color:var(--accent-gold);background:rgba(245,158,11,.07);border-color:rgba(245,158,11,.3);animation:cdPulse 1.8s ease-in-out infinite}
    .cd-live{color:var(--accent-red);background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);animation:cdPulse .9s ease-in-out infinite}
    .cd-ended{color:var(--text-dim);background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.08)}
    .tip-match-name{font-size:12px;font-weight:700;color:var(--text-head);line-height:1.4}
    .tip-sep{height:2px;background:linear-gradient(90deg,transparent,var(--border-mid),var(--globe-purple),var(--border-mid),transparent);margin:8px 0;border-radius:1px}
    .tip-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px}
    .tip-opp{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:var(--text-body);background:rgba(99,102,241,.08);border:1px solid var(--border-subtle);border-radius:999px;padding:4px 10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tip-btn{display:inline-flex;align-items:center;gap:5px;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:.8px;text-decoration:none;padding:6px 14px;border-radius:6px;white-space:nowrap;flex-shrink:0;transition:all .15s;cursor:pointer}
    .btn-join{background:linear-gradient(135deg,var(--globe-blue),var(--globe-purple));color:#fff;border:none;box-shadow:0 2px 12px rgba(99,102,241,.35)}
    .btn-join:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(99,102,241,.5)}
    .btn-watch{background:linear-gradient(135deg,rgba(239,68,68,.8),rgba(249,115,22,.8));color:#fff;border:none;box-shadow:0 2px 12px rgba(239,68,68,.25)}
    .btn-watch:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(239,68,68,.35)}
    .btn-ended-link{background:rgba(255,255,255,.05);color:var(--text-body);border:1px solid var(--border-subtle)}
    .btn-ended-link:hover{background:rgba(99,102,241,.12);border-color:var(--border-mid);color:var(--text-white)}
    .match-block{display:flex;flex-direction:column;gap:8px}
    .result-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;letter-spacing:1px;padding:3px 9px;border-radius:4px;width:fit-content}
    .badge-win{background:rgba(16,185,129,.15);color:#6ee7b7;border:1px solid rgba(16,185,129,.3)}
    .badge-loss{background:rgba(239,68,68,.12);color:#fca5a5;border:1px solid rgba(239,68,68,.25)}
    .badge-draw{background:rgba(148,163,184,.08);color:#94a3b8;border:1px solid rgba(148,163,184,.2)}
    .score-display{background:rgba(99,102,241,.08);border:1px solid var(--border-subtle);border-radius:8px;padding:8px 10px;display:flex;flex-direction:column;gap:6px}
    .score-teams{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;line-height:1.3}
    .score-team-name{color:var(--text-body);flex:1;min-width:0}
    .score-team-name.our-team{color:var(--accent-cyan);text-align:left}
    .score-team-name.their-team{color:var(--text-body);text-align:right}
    .score-vs{color:var(--text-dim);font-size:9px;letter-spacing:1px;text-transform:uppercase;flex-shrink:0}
    .score-numbers{display:flex;align-items:center;justify-content:center;gap:10px}
    .score-num{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:var(--text-white);min-width:36px;text-align:center}
    .score-num.winning{color:var(--accent-green);text-shadow:0 0 10px rgba(16,185,129,.4)}
    .score-num.losing{color:var(--accent-red);text-shadow:0 0 10px rgba(239,68,68,.3)}
    .score-dash{color:var(--text-dim);font-size:16px;font-weight:700}
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    // ══════════════════════════════════════════════════════════════════════
    // CONSTANTS
    // ══════════════════════════════════════════════════════════════════════
    var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    var MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    var DAY_NAMES = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
    function ordinal(d) {
      var s = ['th','st','nd','rd'];
      var v = d % 100;
      return d + (s[(v - 20) % 10] || s[v] || s[0]);
    }
    function pad(n) { return String(n).padStart(2, '0'); }
    function dateKey(y, m, d) { return y + '-' + pad(m + 1) + '-' + pad(d); }
    // ══════════════════════════════════════════════════════════════════════
    // PHASE LOGIC
    // ══════════════════════════════════════════════════════════════════════
    function getPhase(ev) {
      var now = Date.now();
      var startMs = ev.startTs * 1000;
      if (ev._status === 'finished' || (ev.endTs && now > ev.endTs * 1000)) {
        return { status: 'ended', text: 'Ended', cls: 'cd-ended' };
      }
      if (ev._status === 'live' || now >= startMs) {
        return { status: 'live', text: '\u{1F534} In Progress', cls: 'cd-live' };
      }
      var ms = startMs - now;
      var dd = Math.floor(ms / 86400000);
      var hh = Math.floor((ms % 86400000) / 3600000);
      var mm = Math.floor((ms % 3600000) / 60000);
      var txt = 'In ';
      if (dd > 0) txt += dd + 'd ' + hh + 'h';
      else if (hh > 0) txt += hh + 'h ' + mm + 'm';
      else txt += mm + 'm';
      var isSoon = ms <= 3600000;
      return { status: isSoon ? 'soon' : 'upcoming', text: txt, cls: isSoon ? 'cd-soon' : 'cd-upcoming' };
    }
    function bestPhase(events) {
      var rank = { ended: 1, upcoming: 2, soon: 3, live: 4 };
      var best = null;
      for (var i = 0; i < events.length; i++) {
        var ph = getPhase(events[i]);
        if (!best || rank[ph.status] > rank[best.status]) best = ph;
      }
      return best;
    }
    // ══════════════════════════════════════════════════════════════════════
    // API
    // ══════════════════════════════════════════════════════════════════════
    var CLUB_API = 'https://api.chess.com/pub/club/the-club-of-195-countries/matches';
    var OUR_SLUGS = ['the-club-of-195-countries', 'the-club-of-129-countries'];
    function isOurClub(id) {
      for (var i = 0; i < OUR_SLUGS.length; i++) {
        if (id.indexOf(OUR_SLUGS[i]) !== -1) return true;
      }
      return false;
    }
    function fetchJSON(url) {
      return fetch(url, { cache: 'no-store' })
        .then(function(r) {
          if (r.ok) return r.json();
          throw new Error('HTTP ' + r.status);
        })
        .catch(function() {
          var proxy = 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
          return fetch(proxy).then(function(r2) {
            if (!r2.ok) throw new Error('Proxy ' + r2.status);
            return r2.json();
          }).then(function(d) {
            return JSON.parse(d.contents);
          });
        });
    }
    function extractMatchId(apiUrl) {
      var m = apiUrl.match(/\/match\/(\d+)$/);
      return m ? m[1] : '';
    }
    function slugToName(slug) {
      return slug.replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); });
    }
    function loadMatchList() {
      return fetchJSON(CLUB_API).then(function(data) {
        var all = [];
        (data.registered || []).forEach(function(m) { all.push(Object.assign({}, m, { _status: 'upcoming' })); });
        (data.in_progress || []).forEach(function(m) { all.push(Object.assign({}, m, { _status: 'live' })); });
        (data.finished || []).forEach(function(m) { all.push(Object.assign({}, m, { _status: 'finished' })); });
        var eventMap = {};
        var matchIds = [];
        all.forEach(function(m) {
          if (!m.start_time) return;
          var matchId = extractMatchId(m['@id']);
          if (!matchId) return;
          var d = new Date(m.start_time * 1000);
          var y = d.getUTCFullYear(), mo = d.getUTCMonth(), dy = d.getUTCDate();
          var oppParts = (m.opponent || '').split('/');
          var oppSlug = oppParts[oppParts.length - 1] || '';
          var ev = {
            id: matchId,
            title: m.name || 'Team Match',
            opponent: slugToName(oppSlug),
            opponentSlug: oppSlug,
            link: 'https://www.chess.com/club/matches/' + matchId,
            _status: m._status,
            result: m.result || undefined,
            startTs: m.start_time,
            endTs: m.end_time || undefined,
            timeClass: m.time_class || 'daily'
          };
          var key = dateKey(y, mo, dy);
          if (!eventMap[key]) eventMap[key] = [];
          eventMap[key].push(ev);
          matchIds.push(matchId);
        });
        return { eventMap: eventMap, matchIds: matchIds };
      });
    }
    function enrichMatches(eventMap, matchIds, onProgress) {
      var eventsById = {};
      Object.keys(eventMap).forEach(function(key) {
        eventMap[key].forEach(function(ev) {
          if (!eventsById[ev.id]) eventsById[ev.id] = [];
          eventsById[ev.id].push(ev);
        });
      });
      var batchSize = 8;
      var i = 0;
      function nextBatch() {
        if (i >= matchIds.length) return Promise.resolve();
        var batch = matchIds.slice(i, i + batchSize);
        i += batchSize;
        return Promise.allSettled(
          batch.map(function(id) { return fetchJSON('https://api.chess.com/pub/match/' + id); })
        ).then(function(results) {
          var anyUpdate = false;
          results.forEach(function(res, idx) {
            if (res.status === 'fulfilled') {
              var detail = res.value;
              var id = batch[idx];
              var evs = eventsById[id] || [];
              evs.forEach(function(ev) {
                if (detail.url) { ev.matchDetailUrl = detail.url; ev.link = detail.url; }
                if (detail.teams) {
                  var t1 = detail.teams.team1, t2 = detail.teams.team2;
                  var ourTeam, theirTeam;
                  if (isOurClub(t1['@id'])) { ourTeam = t1; theirTeam = t2; }
                  else if (isOurClub(t2['@id'])) { ourTeam = t2; theirTeam = t1; }
                  else { ourTeam = t1; theirTeam = t2; }
                  ev.ourName = ourTeam.name;
                  ev.theirName = theirTeam.name;
                  ev.ourScore = ourTeam.score;
                  ev.theirScore = theirTeam.score;
                  ev.boards = detail.boards;
                  ev.opponent = theirTeam.name;
                }
                anyUpdate = true;
              });
            }
          });
          if (anyUpdate) onProgress();
          return nextBatch();
        });
      }
      return nextBatch();
    }
    // ══════════════════════════════════════════════════════════════════════
    // DOM HELPERS
    // ══════════════════════════════════════════════════════════════════════
    function el(tag, cls, html) {
      var e = document.createElement(tag);
      if (cls) e.className = cls;
      if (html !== undefined) e.innerHTML = html;
      return e;
    }
    function elAttr(tag, cls, attrs) {
      var e = el(tag, cls);
      if (attrs) Object.keys(attrs).forEach(function(k) { e.setAttribute(k, attrs[k]); });
      return e;
    }
    // ══════════════════════════════════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════════════════════════════════
    var today = new Date();
    var viewYear = today.getFullYear();
    var viewMonth = today.getMonth();
    var eventMap = {};
    var loading = true;
    var enriching = false;
    var errorMsg = null;
    // ══════════════════════════════════════════════════════════════════════
    // RENDER HEADER
    // ══════════════════════════════════════════════════════════════════════
    function renderHeader() {
      var h = el('div', 'cal-header');
      h.innerHTML =
        '<div class="header-grid"></div>' +
        '<div class="header-glow"></div>' +
        '<div class="header-top">' +
          '<div class="header-left">' +
            '<div class="globe-icon">\u{1F30D}<div class="globe-ring"></div></div>' +
            '<div class="header-info">' +
              '<div class="header-title">Club of 195 Countries</div>' +
              '<div class="header-sub">Chess.com \u00B7 Est. March 2026</div>' +
            '</div>' +
          '</div>' +
          '<div class="live-badge"><span class="live-dot"></span>LIVE</div>' +
        '</div>' +
        '<div class="header-divider"></div>' +
        '<div class="header-deco">' +
          '<span class="pawn">\u265F</span>' +
          '<span class="deco-text">Play \u00B7 Learn \u00B7 Compete \u00B7 Grow</span>' +
          '<span class="pawn">\u265F</span>' +
        '</div>';
      return h;
    }
    // ══════════════════════════════════════════════════════════════════════
    // RENDER SKELETON
    // ══════════════════════════════════════════════════════════════════════
    function renderSkeleton() {
      var wrap = el('div', '', '');
      wrap.style.cssText = 'display:flex;flex-direction:column;gap:8px;padding:12px';
      var nav = el('div', '', '');
      nav.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:4px';
      var s1 = el('div', 'skel'); s1.style.cssText = 'width:30px;height:30px;border-radius:6px';
      var s2 = el('div', 'skel'); s2.style.cssText = 'flex:1;height:20px;border-radius:4px';
      var s3 = el('div', 'skel'); s3.style.cssText = 'width:30px;height:30px;border-radius:6px';
      nav.append(s1, s2, s3);
      wrap.appendChild(nav);
      var days = el('div', ''); days.style.cssText = 'display:flex;gap:3px';
      for (var i = 0; i < 7; i++) {
        var sd = el('div', 'skel'); sd.style.cssText = 'flex:1;height:18px;border-radius:4px;animation-delay:' + (i * 0.05) + 's';
        days.appendChild(sd);
      }
      wrap.appendChild(days);
      var grid = el('div', ''); grid.style.cssText = 'display:grid;grid-template-columns:repeat(7,1fr);gap:3px';
      for (var j = 0; j < 42; j++) {
        var sg = el('div', 'skel'); sg.style.cssText = 'height:62px;border-radius:6px;animation-delay:' + (j * 0.02) + 's';
        grid.appendChild(sg);
      }
      wrap.appendChild(grid);
      return wrap;
    }
    // ══════════════════════════════════════════════════════════════════════
    // RENDER TOOLTIP
    // ══════════════════════════════════════════════════════════════════════
    function showTooltip(events, year, month, day) {
      closeTooltip();
      var backdrop = el('div', 'tip-backdrop show');
      backdrop.id = 'tip-backdrop';
      backdrop.onclick = function(e) { e.stopPropagation(); closeTooltip(); };
      var panel = el('div', 'tip-panel show mobile-center');
      panel.id = 'tip-panel';
      panel.onclick = function(e) { e.stopPropagation(); };
      // Strip
      var strip = el('div', 'tip-strip');
      var closeBtn = el('div', 'tip-close', '\u2715');
      closeBtn.onclick = closeTooltip;
      var allDaily = events.every(function(e) { return e.timeClass === 'daily'; });
      var titleText = events.length === 1
        ? (events[0].timeClass === 'daily' ? 'Daily Team Match' : 'Team Match')
        : events.length + ' Team Matches';
      var hdrRow = el('div', 'tip-hdr-row');
      hdrRow.innerHTML =
        '<div class="tip-globe">' + (allDaily ? '\u2600\uFE0F' : '\u{1F30D}') + '</div>' +
        '<div class="tip-info">' +
          '<div class="tip-title">' + titleText + '</div>' +
          '<div class="tip-date">' + MONTH_SHORT[month] + ' ' + ordinal(day) + ', ' + year + '</div>' +
        '</div>';
      strip.append(closeBtn, hdrRow);
      panel.appendChild(strip);
      // Body
      var body = el('div', 'tip-body');
      events.forEach(function(ev, idx) {
        if (idx > 0) body.appendChild(el('div', 'tip-sep'));
        var block = el('div', 'match-block');
        var phase = getPhase(ev);
        // Countdown
        var cd = el('div', 'tip-countdown ' + phase.cls);
        cd.innerHTML = '<span class="cd-dot"></span>' + phase.text;
        block.appendChild(cd);
        // Name
        var name = ev.theirName
          ? (ev.ourName || 'The Club Of 195 Countries') + ' vs ' + ev.theirName
          : ev.title;
        var nameEl = el('div', 'tip-match-name', name);
        block.appendChild(nameEl);
        // Score
        if (ev.ourScore !== undefined && ev.theirScore !== undefined) {
          var scoreWrap = el('div', 'score-display');
          var ourCls = ev.ourScore > ev.theirScore ? ' winning' : (ev.ourScore < ev.theirScore ? ' losing' : '');
          var theirCls = ev.theirScore > ev.ourScore ? ' winning' : (ev.theirScore < ev.ourScore ? ' losing' : '');
          scoreWrap.innerHTML =
            '<div class="score-teams">' +
              '<span class="score-team-name our-team">' + (ev.ourName || 'Club of 195 Countries') + '</span>' +
              '<span class="score-vs">vs</span>' +
              '<span class="score-team-name their-team">' + (ev.theirName || ev.opponent) + '</span>' +
            '</div>' +
            '<div class="score-numbers">' +
              '<span class="score-num' + ourCls + '">' + ev.ourScore + '</span>' +
              '<span class="score-dash">\u2013</span>' +
              '<span class="score-num' + theirCls + '">' + ev.theirScore + '</span>' +
            '</div>';
          block.appendChild(scoreWrap);
        }
        // Result badge
        if (ev._status === 'finished' && ev.result) {
          var rb;
          if (ev.result === 'win') rb = el('span', 'result-badge badge-win', '\u2713 WIN');
          else if (ev.result === 'lose' || ev.result === 'loss') rb = el('span', 'result-badge badge-loss', '\u2717 LOSS');
          else rb = el('span', 'result-badge badge-draw', '\u2B1B DRAW');
          block.appendChild(rb);
        }
        // Bottom row
        var bottom = el('div', 'tip-bottom');
        var opp = el('div', 'tip-opp');
        opp.textContent = '\u2600\uFE0F ' + (ev.timeClass === 'daily' ? 'Daily' : ev.timeClass) + (ev.boards ? ' \u00B7 ' + ev.boards + ' boards' : '');
        bottom.appendChild(opp);
        if (ev.link) {
          var a = document.createElement('a');
          a.href = ev.link;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          if (phase.status === 'ended') {
            a.className = 'tip-btn btn-ended-link';
            a.textContent = 'VIEW';
          } else if (phase.status === 'live') {
            a.className = 'tip-btn btn-watch';
            a.textContent = '\u{1F441} WATCH';
          } else {
            a.className = 'tip-btn btn-join';
            a.textContent = '\u{1F30D} JOIN';
          }
          bottom.appendChild(a);
        }
        block.appendChild(bottom);
        body.appendChild(block);
      });
      panel.appendChild(body);
      document.body.append(backdrop, panel);
      document.addEventListener('keydown', escHandler);
    }
    function closeTooltip() {
      var b = document.getElementById('tip-backdrop');
      var p = document.getElementById('tip-panel');
      if (b) b.remove();
      if (p) p.remove();
      document.removeEventListener('keydown', escHandler);
    }
    function escHandler(e) { if (e.key === 'Escape') closeTooltip(); }
    // ══════════════════════════════════════════════════════════════════════
    // RENDER CALENDAR
    // ══════════════════════════════════════════════════════════════════════
    function render() {
      var root = document.getElementById('root');
      root.innerHTML = '';
      var wrap = el('div', 'cal-wrap');
      wrap.appendChild(renderHeader());
      if (loading) {
        wrap.appendChild(renderSkeleton());
        root.appendChild(wrap);
        return;
      }
      var content = el('div', 'cal-content');
      if (errorMsg) {
        content.appendChild(el('div', 'load-err', errorMsg));
      }
      if (enriching) {
        var ebar = el('div', 'enriching-bar');
        ebar.innerHTML = '<div class="enriching-progress"></div>';
        content.appendChild(ebar);
      }
      // Nav
      var nav = el('div', 'cal-nav');
      var prevBtn = el('button', 'nav-btn');
      prevBtn.setAttribute('aria-label', 'Previous month');
      prevBtn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>';
      prevBtn.onclick = function() { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } closeTooltip(); render(); };
      var label = el('div', 'month-label');
      label.innerHTML = MONTHS[viewMonth] + ' <span class="yr">' + viewYear + '</span>';
      var nextBtn = el('button', 'nav-btn');
      nextBtn.setAttribute('aria-label', 'Next month');
      nextBtn.innerHTML = '<svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>';
      nextBtn.onclick = function() { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } closeTooltip(); render(); };
      nav.append(prevBtn, label, nextBtn);
      content.appendChild(nav);
      // Day headers
      var daysRow = el('div', 'cal-days');
      DAY_NAMES.forEach(function(d, i) {
        var dh = el('div', 'day-hdr' + (i >= 5 ? ' weekend' : ''), d);
        daysRow.appendChild(dh);
      });
      content.appendChild(daysRow);
      // Build cells
      var firstDow = (new Date(viewYear, viewMonth, 1).getDay() + 6) % 7;
      var lastDate = new Date(viewYear, viewMonth + 1, 0).getDate();
      var pMonth = viewMonth === 0 ? 11 : viewMonth - 1;
      var pYear = viewMonth === 0 ? viewYear - 1 : viewYear;
      var prevLast = new Date(pYear, pMonth + 1, 0).getDate();
      var nMonth = viewMonth === 11 ? 0 : viewMonth + 1;
      var nYear = viewMonth === 11 ? viewYear + 1 : viewYear;
      var grid = el('div', 'cal-grid');
      for (var i = 0; i < 42; i++) {
        var cy, cm, cd, adj = false;
        if (i < firstDow) {
          cd = prevLast - firstDow + 1 + i; cm = pMonth; cy = pYear; adj = true;
        } else if (i >= firstDow + lastDate) {
          cd = i - firstDow - lastDate + 1; cm = nMonth; cy = nYear; adj = true;
        } else {
          cd = i - firstDow + 1; cm = viewMonth; cy = viewYear;
        }
        var isToday = !adj && cd === today.getDate() && cm === today.getMonth() && cy === today.getFullYear();
        var evts = !adj ? (eventMap[dateKey(cy, cm, cd)] || []) : [];
        var hasEvent = evts.length > 0;
        var phase = hasEvent ? bestPhase(evts) : null;
        var cls = 'cal-cell';
        if (adj) cls += ' adj';
        if (isToday) cls += ' today';
        if (hasEvent) cls += ' has-event';
        var cell = el('div', cls);
        // Day number
        cell.appendChild(el('div', 'cell-num', String(cd)));
        // Today dot
        if (isToday) cell.appendChild(el('div', 'today-dot'));
        // Match badge
        if (hasEvent) {
          var iconWrap = el('div', 'cell-icon-wrap');
          var badgeContainer = el('div', 'match-badge-container');
          var allD = evts.every(function(e) { return e.timeClass === 'daily'; });
          badgeContainer.appendChild(el('div', 'match-badge', allD ? '\u2600\uFE0F' : '\u26A1'));
          if (evts.length > 1) {
            badgeContainer.appendChild(el('div', 'count-bubble', String(evts.length)));
          }
          iconWrap.appendChild(badgeContainer);
          cell.appendChild(iconWrap);
          // Click handler (closure)
          (function(events, y, m, d) {
            cell.onclick = function() { showTooltip(events, y, m, d); };
          })(evts, cy, cm, cd);
        }
        // Status bar
        if (phase) {
          cell.appendChild(el('div', 'status-bar ' + phase.status));
        }
        grid.appendChild(cell);
      }
      content.appendChild(grid);
      // Legend
      var legend = el('div', 'cal-legend');
      legend.innerHTML =
        '<div class="legend-item"><div class="legend-bar upcoming"></div>Upcoming</div>' +
        '<div class="legend-item"><div class="legend-bar soon"></div>Soon</div>' +
        '<div class="legend-item"><div class="legend-bar live"></div>Live</div>' +
        '<div class="legend-item"><div class="legend-bar ended"></div>Ended</div>';
      content.appendChild(legend);
      // Footer
      var foot = el('div', 'cal-foot');
      foot.innerHTML = '<span>\u{1F30D} 195 Countries</span><span class="foot-dot">\u00B7</span><span>@Stellar_Endgame</span>';
      content.appendChild(foot);
      wrap.appendChild(content);
      root.appendChild(wrap);
    }
    // ══════════════════════════════════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════════════════════════════════
    render();
    loadMatchList()
      .then(function(result) {
        eventMap = result.eventMap;
        loading = false;
        enriching = true;
        render();
        return enrichMatches(eventMap, result.matchIds, function() {
          render();
        });
      })
      .then(function() {
        enriching = false;
        render();
      })
      .catch(function(e) {
        console.error(e);
        errorMsg = '\u26A0 Could not load matches. Showing calendar.';
        loading = false;
        render();
      });
  </script>
</body>
