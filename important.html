<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
    margin:0;
    background:transparent;
    font-family:Segoe UI,Arial,sans-serif;
    color:#f2ebe7;
}

.wrapper{
    width:92%;
    margin:8px auto;
    background:rgba(0,0,0,.35);
    border-radius:16px;
    border:2px solid rgba(255,176,120,.45);
    box-shadow:inset 0 0 10px rgba(0,0,0,.25);
    padding:12px;
}

.alert{
    background:linear-gradient(90deg,#ffb37a,#ff8a70);
    color:#1a0f0b;
    font-weight:800;
    padding:6px 10px;
    border-radius:12px;
    text-align:center;
    margin-bottom:10px;
    cursor:pointer;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 0 rgba(255,170,130,.7);}
    50%{box-shadow:0 0 15px rgba(255,170,130,1);}
    100%{box-shadow:0 0 0 rgba(255,170,130,.7);}
}

.title{
    font-weight:800;
    font-size:14px;
    color:#ffb37a;
    margin-bottom:6px;
    text-align:center;
}

.message{
    font-size:12.5px;
    line-height:1.4;
    text-align:center;
}
</style>
</head>
<body>

<div class="wrapper">
    <div id="notification" class="alert" style="display:none;">
        🔔 NEW IMPORTANT ALERT (click to dismiss)
    </div>
    <div class="title" id="title"></div>
    <div class="message" id="message"></div>
</div>

<script>
fetch("important.txt")
.then(res => res.text())
.then(data => {

    const lines = data.split("\n");

    const id = lines[0].replace("ID:","").trim();
    const title = lines[1].replace("TITLE:","").trim();
    const message = lines[2].replace("MESSAGE:","").trim();

    document.getElementById("title").innerText = title;
    document.getElementById("message").innerText = message;

    const seen = localStorage.getItem("important_seen");

    if(seen !== id){
        document.getElementById("notification").style.display="block";
    }

    document.getElementById("notification").onclick = function(){
        localStorage.setItem("important_seen", id);
        this.style.display="none";
    }

});
</script>

</body>
</html>
