<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Next Birthdays</title>
<style>
  body { font-family: Arial, sans-serif; background:#1e1e1e; color:#fff; text-align:center; padding:20px; }
  .birthday { margin:10px 0; padding:10px; background:#333; border-radius:8px; }
  input, button { padding:8px; margin:5px; border-radius:5px; border:none; }
  input { width: 80px; }
  button { background:#ff5555; color:#fff; cursor:pointer; }
</style>
</head>
<body>

<h2>Next 3 Birthdays</h2>
<div id="birthdays"></div>

<h3>Submit Your Birthday</h3>
<input type="text" id="username" placeholder="Username">
<input type="number" id="month" placeholder="Month" min="1" max="12">
<input type="number" id="day" placeholder="Day" min="1" max="31">
<input type="text" id="note" placeholder="Note">
<br>
<button onclick="submitBirthday()">Save Birthday</button>

<script>
const API_URL = 'https://sheetdb.io/api/v1/29mvil2u3pj5s';

// Fetch and show next 3 birthdays
async function loadBirthdays() {
    const res = await fetch(API_URL);
    const data = await res.json();
    const today = new Date();
    
    const upcoming = data
        .map(b => ({
            username: b.Username,
            note: b.Note,
            date: new Date(today.getFullYear(), b.Month - 1, b.Day)
        }))
        .sort((a,b) => a.date - b.date)
        .slice(0,3);
    
    const container = document.getElementById('birthdays');
    container.innerHTML = upcoming.map(b => 
        `<div class="birthday"><strong>${b.username}</strong>: ${b.date.getDate()}/${b.date.getMonth()+1} - ${b.note}</div>`
    ).join('');
}

// Submit a new birthday
async function submitBirthday() {
    const username = document.getElementById('username').value.trim();
    const month = parseInt(document.getElementById('month').value);
    const day = parseInt(document.getElementById('day').value);
    const note = document.getElementById('note').value.trim();

    if(!username || !month || !day) {
        alert("Please fill in all fields!");
        return;
    }

    await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({ data: { Username: username, Month: month, Day: day, Note: note } })
    });

    // Clear form
    document.getElementById('username').value = '';
    document.getElementById('month').value = '';
    document.getElementById('day').value = '';
    document.getElementById('note').value = '';

    loadBirthdays(); // Refresh list
}

// Initial load
loadBirthdays();
</script>
</body>
</html>
