<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:transparent!important;font-family:Inter,Segoe UI,system-ui,sans-serif;color:#f1e7df;height:460px;}
#birthdayBox{width:100%;height:100%;padding:14px 15px;background:linear-gradient(180deg, rgba(18,12,10,.92), rgba(10,8,7,.95));border:2.5px solid rgba(255,176,120,.55);border-radius:16px;box-shadow:inset 0 0 14px rgba(0,0,0,.55),0 0 14px rgba(255,176,120,.22);display:flex;flex-direction:column;}
.bHeader{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:14px;background:linear-gradient(145deg, rgba(255,176,120,.15), rgba(255,138,112,.08));border:1.5px solid rgba(255,176,120,.4);margin-bottom:8px;}
.bIcon{width:35px;height:35px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;background:linear-gradient(145deg,#ffb37a,#ff8a70);}
.bTitle{font-size:15px;font-weight:700;letter-spacing:.5px;}
.bForm{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.bRowInputs{display:flex;gap:8px;}
.bRowInputs select{flex:1;}
.bForm input,.bForm select{width:100%;padding:8px 10px;border-radius:12px;border:1px solid rgba(255,176,120,.35);background:rgba(0,0,0,.35);color:#fff;font-size:12px;transition:.2s;appearance:none;}
.bForm input:focus,.bForm select:focus{outline:none;border-color:#ffb37a;background:rgba(0,0,0,.5);}
.bForm button{align-self:flex-start;padding:7px 18px;border-radius:12px;border:1px solid rgba(255,176,120,.45);background:linear-gradient(90deg,#ffb37a,#ff8a70);font-weight:800;cursor:pointer;transition: all 0.2s ease;}
.bForm button:hover{transform:scale(1.05);}
.formRow{display:flex;align-items:center;gap:10px;}
.formMessage{font-size:11px;color:#ffb37a;min-height:14px;}
#birthdayList{flex:1;overflow:auto;}
.bRow{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:12px;background:rgba(255,176,120,0.06);margin-bottom:7px;transition:.22s;border:1px solid rgba(255,176,120,.12);}
.bRow:hover{background:rgba(255,176,120,0.22);transform:translateY(-2px);box-shadow:0 6px 14px rgba(0,0,0,.35);border-color:rgba(255,176,120,.35);}
.bRow a{display:flex;align-items:center;gap:12px;text-decoration:none;width:100%;}
.bAvatar{width:40px;height:40px;border-radius:50%;border:2.5px solid rgba(255,176,120,.9);box-shadow:0 0 0 3px rgba(255,176,120,.25),0 0 12px rgba(255,176,120,.35);transition:.25s;object-fit:cover;}
.bRow:hover .bAvatar{transform:scale(1.06);box-shadow:0 0 0 4px rgba(255,176,120,.35),0 0 18px rgba(255,176,120,.55);}
.bText{display:flex;flex-direction:column;min-width:0;}
.bName{font-size:12px;font-weight:800;color:#ffb37a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bDate{font-size:10.5px;color:#ffd9b8;}
.bNote{font-size:10.5px;color:#fff;}
</style>
</head>
<body>
<div id="birthdayBox">
  <div class="bHeader">
    <div class="bIcon">🎂</div>
    <div class="bTitle">Next Birthdays</div>
  </div>

  <div class="bForm">
    <input type="text" id="username" placeholder="Chess.com Username">
    <div class="bRowInputs">
      <select id="month"><option value="">Month</option></select>
      <select id="day"><option value="">Day</option></select>
    </div>
    <input type="text" id="note" placeholder="Note (e.g., Blunder Master)">
    <div class="formRow">
      <button onclick="saveBirthday()">Save</button>
      <div class="formMessage" id="formMessage"></div>
    </div>
  </div>

  <div id="birthdayList"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwlfeoWrelPvqRd34KHdMLjkXEjHfTRHImqCfNhY4RBjADYQOw-SHPzGJkURi3xn9kq/exec"; // <-- replace with your Web App URL
const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];

for(let i=1;i<=12;i++){const opt=document.createElement("option");opt.value=i;opt.textContent=i;document.getElementById("month").appendChild(opt);}
for(let i=1;i<=31;i++){const opt=document.createElement("option");opt.value=i;opt.textContent=i;document.getElementById("day").appendChild(opt);}

// ---------------- Save birthday ----------------
async function saveBirthday(){
  const user=document.getElementById("username").value.trim();
  const month=parseInt(document.getElementById("month").value);
  const day=parseInt(document.getElementById("day").value);
  const note=document.getElementById("note").value.trim();
  const msg=document.getElementById("formMessage");
  if(!user||!month||!day){ msg.textContent="Fill username, month and day!"; return;}
  msg.textContent="Saving...";
  try{
    const res=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({Username:user,Month:month,Day:day,Note:note})});
    const result=await res.json();
    if(result.success){
      msg.textContent="Saved successfully ✅";
      document.getElementById("username").value="";
      document.getElementById("month").value="";
      document.getElementById("day").value="";
      document.getElementById("note").value="";
      loadBirthdays();
    } else {
      msg.textContent="Error saving: "+(result.error||"Unknown error");
      console.error("Save Error:",result);
    }
  }catch(e){msg.textContent="Error saving: "+e.message;console.error(e);}
}

// ---------------- Load birthdays ----------------
function getNextDate(month,day){const today=new Date();const b=new Date(today.getFullYear(),month-1,day);if(b<today)b.setFullYear(today.getFullYear()+1);return b;}
function getDateSuffix(day){if(day>=11&&day<=13)return 'th';switch(day%10){case 1:return 'st';case 2:return 'nd';case 3:return 'rd';default:return 'th';}}

async function loadBirthdays(){
  const list=document.getElementById("birthdayList");
  list.innerHTML="Loading...";
  try{
    const res=await fetch(API_URL);
    const data=await res.json();
    if(!Array.isArray(data))throw new Error(JSON.stringify(data));

    const upcoming=data.map(b=>({username:b.Username,month:parseInt(b.Month),day:parseInt(b.Day),note:b.Note}))
      .sort((a,b)=>getNextDate(a.month,a.day)-getNextDate(b.month,b.day))
      .slice(0,3);

    const members=await Promise.all(upcoming.map(async b=>{
      let avatar="https://taki2023.github.io/taki/default-pawn.png";
      try{const pj=await fetch("https://api.chess.com/pub/player/"+b.username).then(r=>r.json());if(pj.avatar)avatar=pj.avatar;}catch(e){}
      const nextDate=getNextDate(b.month,b.day);
      const diffDays=Math.ceil((nextDate-new Date())/(1000*60*60*24));
      const suffix=getDateSuffix(b.day);
      const countdownText=diffDays===0?"TODAY 🎉":`in ${diffDays} day${diffDays>1?'s':''}`;
      return {username:b.username,avatar,note:b.note,date:`${b.day}${suffix} ${monthNames[b.month-1]} • ${countdownText}`};
    }));

    list.innerHTML=members.map(m=>`
      <div class="bRow">
        <a href="https://www.chess.com/member/${m.username}" target="_blank">
          <img class="bAvatar" src="${m.avatar}">
          <div class="bText">
            <div class="bName">@${m.username}</div>
            <div class="bDate">${m.date}</div>
            <div class="bNote">${m.note||""}</div>
          </div>
        </a>
      </div>`).join("");

  }catch(e){
    list.innerHTML=`<div style='color:#ffb37a;font-size:12px;'>Failed to load birthdays: ${e.message}</div>`;
    console.error("Load Error:",e);
  }
}

window.saveBirthday=saveBirthday;
window.addEventListener("DOMContentLoaded",loadBirthdays);
</script>
</body>
</html>
