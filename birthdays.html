<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;}
html,body{
  margin:0;
  padding:0;
  background:transparent!important;
  font-family:Inter,Segoe UI,system-ui,sans-serif;
  color:#f1e7df;
  height:100%;
}

#birthdayBox {
  width: 100%;
  padding: 14px 15px;
  background: linear-gradient(180deg, rgba(18,12,10,.92), rgba(10,8,7,.95));
  border: 2.5px solid rgba(255,176,120,.55);
  border-radius: 16px;
  box-shadow: inset 0 0 14px rgba(0,0,0,.55), 0 0 14px rgba(255,176,120,.22);
  display: flex;
  flex-direction: column;
}

/* HEADER */
.bHeader{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 12px;
  border-radius:14px;
  background:linear-gradient(145deg, rgba(255,176,120,.15), rgba(255,138,112,.08));
  border:1.5px solid rgba(255,176,120,.4);
  margin-bottom:8px;
}

.bIcon{
  width:35px;
  height:35px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  background:linear-gradient(145deg,#ffb37a,#ff8a70);
}

.bTitle{
  font-size:15px;
  font-weight:700;
  letter-spacing:.5px;
}

/* FORM */
.bForm{
  display:flex;
  flex-wrap: wrap;
  gap:8px;
  margin-bottom:12px;
}

.bForm input, .bForm select{
  flex:1 1 100px;
  padding:8px 10px;
  border-radius:12px;
  border:1px solid rgba(255,176,120,.35);
  background:rgba(0,0,0,.35);
  color:#fff;
  font-size:13px;
  transition:.2s;
  appearance:none;
  cursor:pointer;
}

.bForm input:focus, .bForm select:focus{
  outline:none;
  border-color:#ffb37a;
  background:rgba(0,0,0,.5);
}

.bForm button{
  padding:8px 16px;
  border-radius:12px;
  border:1px solid rgba(255,176,120,.45);
  background:linear-gradient(90deg,#ffb37a,#ff8a70);
  font-weight:800;
  cursor:pointer;
  transition: all 0.2s ease;
}

.bForm button:hover{
  transform:scale(1.05);
}

/* BIRTHDAY LIST */
#birthdayList{
  flex:1;
  overflow:hidden;
}

.bRow{
  display:flex;
  align-items:center;
  gap:10px;
  padding:9px 10px;
  border-radius:12px;
  background:rgba(255,176,120,0.06);
  margin-bottom:7px;
  transition:.22s;
  border:1px solid rgba(255,176,120,.12);
}

.bRow:hover{
  background:rgba(255,176,120,0.22);
  transform:translateY(-2px);
  box-shadow:0 6px 14px rgba(0,0,0,.35);
  border-color:rgba(255,176,120,.35);
}

.bRow a{
  display:flex;
  align-items:center;
  gap:12px;
  text-decoration:none;
  width:100%;
}

.bAvatar{
  width:44px;
  height:44px;
  border-radius:50%;
  border:2.5px solid rgba(255,176,120,.9);
  box-shadow:0 0 0 3px rgba(255,176,120,.25), 0 0 12px rgba(255,176,120,.35);
  transition:.25s;
  object-fit:cover;
}

.bRow:hover .bAvatar{
  transform:scale(1.06);
  box-shadow:0 0 0 4px rgba(255,176,120,.35), 0 0 18px rgba(255,176,120,.55);
}

.bText{
  display:flex;
  flex-direction:column;
  min-width:0;
}

.bName{
  font-size:13px;
  font-weight:800;
  color:#ffb37a;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.bNote{
  font-size:11.5px;
  color:#ffd9b8;
}

.bDate{
  font-size:11.5px;
  color:#fff;
}
</style>
</head>
<body>

<div id="birthdayBox">

  <div class="bHeader">
    <div class="bIcon">🎂</div>
    <div class="bTitle">Next Chillies Birthdays</div>
  </div>

  <div class="bForm">
    <input type="text" id="username" placeholder="Chess.com Username">
    
    <select id="month">
      <option value="">Month</option>
    </select>

    <select id="day">
      <option value="">Day</option>
    </select>

    <input type="text" id="note" placeholder="Note (e.g., Blunder Master)">
    <button onclick="saveBirthday()">Save</button>
  </div>

  <div id="birthdayList"></div>

</div>

<script>
const API_URL = 'https://sheetdb.io/api/v1/29mvil2u3pj5s';

// Populate month/day selects
const monthSelect = document.getElementById("month");
for(let i=1;i<=12;i++){
  const opt = document.createElement("option");
  opt.value = i;
  opt.textContent = i;
  monthSelect.appendChild(opt);
}

const daySelect = document.getElementById("day");
for(let i=1;i<=31;i++){
  const opt = document.createElement("option");
  opt.value = i;
  opt.textContent = i;
  daySelect.appendChild(opt);
}

// Save birthday
async function saveBirthday(){
  const user = document.getElementById("username").value.trim();
  const month = parseInt(document.getElementById("month").value);
  const day = parseInt(document.getElementById("day").value);
  const note = document.getElementById("note").value.trim();
  
  if(!user || !month || !day) return alert("Fill username, month and day!");

  await fetch(API_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ data: { Username:user, Month:month, Day:day, Note:note } })
  });

  document.getElementById("username").value="";
  document.getElementById("month").value="";
  document.getElementById("day").value="";
  document.getElementById("note").value="";
  loadBirthdays();
}

// Next birthday date
function getNextDate(month, day){
  const today = new Date();
  const b = new Date(today.getFullYear(), month-1, day);
  if(b < today) b.setFullYear(today.getFullYear()+1);
  return b;
}

// Load next 5 birthdays
async function loadBirthdays(){
  const res = await fetch(API_URL);
  const data = await res.json();

  const upcoming = data
    .map(b=>({username:b.Username, month:parseInt(b.Month), day:parseInt(b.Day), note:b.Note}))
    .sort((a,b)=> getNextDate(a.month,a.day) - getNextDate(b.month,b.day))
    .slice(0,5);

  const promises = upcoming.map(async b=>{
    let avatar = "https://taki2023.github.io/taki/default-pawn.png";
    try{
      const pj = await fetch("https://api.chess.com/pub/player/"+b.username).then(r=>r.json());
      if(pj.avatar) avatar = pj.avatar;
    }catch(e){}
    const nextDate = getNextDate(b.month,b.day);
    const diffDays = Math.ceil((nextDate - new Date()) / (1000*60*60*24));
    return { 
      username:b.username, 
      avatar, 
      note:b.note,
      date: `${b.month}/${b.day}`, // no year
      countdown: diffDays 
    }
  });

  const members = await Promise.all(promises);

  document.getElementById("birthdayList").innerHTML = members.map(m=>`
    <div class="bRow">
      <a href="https://www.chess.com/member/${m.username}" target="_blank">
        <img class="bAvatar" src="${m.avatar}">
        <div class="bText">
          <div class="bName">@${m.username}</div>
          <div class="bNote">${m.note || ""}</div>
          <div class="bDate">${m.date} (in ${m.countdown} day${m.countdown>1?'s':''})</div>
        </div>
      </a>
    </div>
  `).join("");
}

window.saveBirthday = saveBirthday;
window.addEventListener("DOMContentLoaded", loadBirthdays);
</script>
</body>
</html>
