<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HCC Admin Bracket Fights</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;background:#1a1a1a;font-family:'Nunito',sans-serif;}

.bracket-sb{
  width:100%;
  background:#fff5f0;
  border-radius:28px;
  border:3px solid #e8553a;
  overflow:hidden;
  position:relative;
  box-shadow:0 8px 32px rgba(217,48,32,.2);
  display:flex;
  flex-direction:column;
}

/* ── HEADER ── */
.bk-header{
  background:linear-gradient(135deg,#d93020 0%,#e85535 60%,#ef6640 100%);
  border-radius:24px 24px 0 0;
  padding:14px 16px 20px;
  text-align:center;
  position:relative;
  overflow:hidden;
  flex-shrink:0;
}
.bk-header::before{
  content:'';position:absolute;bottom:-10px;left:-10%;
  width:120%;height:20px;background:#fff5f0;border-radius:50%;
}
.chilli-deco{position:absolute;font-size:22px;opacity:.55;top:8px;}
.chilli-deco.left{left:10px;transform:rotate(-20deg);}
.chilli-deco.right{right:10px;transform:rotate(20deg);}
.bk-title{font-family:'Fredoka One',cursive;font-size:18px;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.15);position:relative;z-index:1;}
.bk-sub{font-size:11px;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.8px;text-transform:uppercase;margin-top:3px;position:relative;z-index:1;}

/* ── ARENA: full SVG canvas + absolutely positioned avatar nodes ── */
.bk-arena{
  position:relative;
  width:100%;
  /* height set by JS based on width */
  flex-shrink:0;
}
.bk-arena svg{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;z-index:0;
}

/* ── AVATAR NODE ── */
.node{
  position:absolute;
  display:flex;flex-direction:column;align-items:center;
  transform:translate(-50%,-50%); /* centered on x,y */
  z-index:2;cursor:pointer;
  transition:transform .15s cubic-bezier(.34,1.56,.64,1);
}
.node:hover{transform:translate(-50%,-50%) scale(1.12);}
.av{
  border-radius:50%;
  border:2.5px solid #f5c5b8;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  font-family:'Fredoka One',cursive;
  color:#e8aa98;
  overflow:hidden;
  box-shadow:0 3px 0 #e8aa98;
  transition:border-color .15s,box-shadow .15s;
  flex-shrink:0;
}
.node:hover .av{border-color:#d93020;box-shadow:0 5px 0 #d93020;}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;}
.aname{
  font-weight:900;color:#9a2010;
  margin-top:3px;text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  letter-spacing:.2px;
}

/* winner glow */
.node.winner .av{
  border-color:#d93020;
  box-shadow:0 0 0 4px rgba(217,48,32,.15),0 4px 0 #8c1a10;
  animation:winnerPulse 2.5s ease-in-out infinite;
}
@keyframes winnerPulse{
  0%,100%{box-shadow:0 0 0 4px rgba(217,48,32,.15),0 4px 0 #8c1a10,0 0 18px rgba(217,48,32,.2);}
  50%{box-shadow:0 0 0 7px rgba(217,48,32,.1),0 6px 0 #8c1a10,0 0 34px rgba(217,48,32,.35);}
}

/* FINAL label */
.final-label{
  position:absolute;z-index:3;
  font-family:'Fredoka One',cursive;color:#c73520;
  letter-spacing:1.5px;text-transform:uppercase;
  transform:translateX(-50%);
  white-space:nowrap;
}
/* crown */
.crown-label{
  position:absolute;z-index:3;
  transform:translate(-50%,-100%);
  font-size:20px;line-height:1;
  filter:drop-shadow(0 1px 4px rgba(217,48,32,.4));
  animation:crownBob 2s ease-in-out infinite;
  pointer-events:none;
}
@keyframes crownBob{0%,100%{transform:translate(-50%,-100%) translateY(0);}50%{transform:translate(-50%,-100%) translateY(-3px);}}

/* VS label */
.vs-label{
  position:absolute;z-index:3;
  font-family:'Fredoka One',cursive;color:#e8aa98;
  letter-spacing:2px;
  transform:translate(-50%,-50%);
  white-space:nowrap;
}

/* ── FOOTER ── */
.bk-footer{text-align:center;padding:6px 8px 10px;font-size:11px;font-weight:700;color:#e8553a;flex-shrink:0;}
</style>
</head>
<body>
<div class="bracket-sb" id="bracketSb">
  <div class="bk-header">
    <div class="chilli-deco left">🌶</div>
    <div class="chilli-deco right">🌶</div>
    <div class="bk-title">⚔️ HCC Admin Bracket Fights ⚔️</div>
    <div class="bk-sub">Who's the spiciest admin? Cast your votes!</div>
  </div>
  <div class="bk-arena" id="arena">
    <svg id="svg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="bk-footer">🌶 Hot Chilli CheckMate © 2026 ♞</div>
</div>

<script>
/* ══ DATA ══ */
const admins = [
  {name:'@Admin1',avatar:''},
  {name:'@Admin2',avatar:''},
  {name:'@Admin3',avatar:''},
  {name:'@Admin4',avatar:''},
  {name:'@Admin5',avatar:''},
  {name:'@Admin6',avatar:''},
  {name:'@Admin7',avatar:''},
  {name:'@Admin8',avatar:''},
];

/* ══ STATE ══ */
// semi[0,1] = winner of QF pair 0,1 (left side)
// semi[2,3] = winner of QF pair 2,3 (right side)
const semi    = [4,5,6,3];
const finals  = [2,3]; // finals[0]=winner of semi[0,1], finals[1]=winner of semi[2,3]
let   champion = 3;

/* ══ NODE DOM REFS ══ */
// qf[0-3]=left, qf[4-7]=right
const qfNodes   = [];
const semiNodes = [];
const finNodes  = [];
let   winNode   = null;

const arena  = document.getElementById('arena');
const svg    = document.getElementById('svg');

/* ══ CREATE NODE ══ */
function createNode(cls=''){
  const wrap = document.createElement('div');
  wrap.className = 'node'+(cls?' '+cls:'');
  const av = document.createElement('div');
  av.className = 'av';
  av.textContent = '?';
  const nm = document.createElement('div');
  nm.className = 'aname';
  nm.textContent = '?';
  wrap.appendChild(av);
  wrap.appendChild(nm);
  arena.appendChild(wrap);
  return wrap;
}

function setNodeContent(node, adminIdx){
  const av = node.querySelector('.av');
  const nm = node.querySelector('.aname');
  if(adminIdx===null||adminIdx===undefined){
    av.textContent='?'; nm.textContent='?'; return;
  }
  const a = admins[adminIdx];
  nm.textContent = a.name;
  if(a.avatar){
    const img=document.createElement('img');
    img.src=a.avatar; img.alt=a.name;
    img.onerror=()=>{img.remove();av.textContent='?';};
    av.innerHTML=''; av.appendChild(img);
  } else {
    av.textContent='?';
  }
}

/* ══ BUILD DOM NODES ONCE ══ */
function buildNodes(){
  for(let i=0;i<8;i++){
    const n=createNode();
    n.querySelector('.av').addEventListener('click',()=>clickQF(i));
    qfNodes[i]=n;
  }
  for(let i=0;i<4;i++){
    const n=createNode();
    n.querySelector('.av').addEventListener('click',()=>clickSemi(i));
    semiNodes[i]=n;
  }
  for(let i=0;i<2;i++){
    const n=createNode();
    n.querySelector('.av').addEventListener('click',()=>clickFinal(i));
    finNodes[i]=n;
  }
  winNode=createNode('winner');

  // decorative labels
  const fl=document.createElement('div');fl.className='final-label';fl.id='finalLabel';arena.appendChild(fl);
  const cr=document.createElement('div');cr.className='crown-label';cr.id='crownLabel';cr.textContent='👑';arena.appendChild(cr);
  const vs=document.createElement('div');vs.className='vs-label';vs.id='vsLabel';vs.textContent='VS';arena.appendChild(vs);

  refreshContent();
  layout();
}

/* ══ CLICK HANDLERS ══ */
function clickQF(idx){
  const si = idx<4 ? Math.floor(idx/2) : 2+Math.floor((idx-4)/2);
  semi[si]=idx;
  refreshContent(); layout();
}
function clickSemi(si){
  const fi = si<2?0:1;
  finals[fi]=semi[si];
  refreshContent(); layout();
}
function clickFinal(fi){
  champion=finals[fi];
  refreshContent(); layout();
}

function refreshContent(){
  for(let i=0;i<8;i++) setNodeContent(qfNodes[i],i);
  for(let i=0;i<4;i++) setNodeContent(semiNodes[i],semi[i]);
  for(let i=0;i<2;i++) setNodeContent(finNodes[i],finals[i]);
  setNodeContent(winNode,champion);
  winNode.querySelector('.aname').textContent = champion!==null ? admins[champion].name : 'Champion';
}

/* ══ LAYOUT — fully computed from arena width ══ */
function layout(){
  const W = arena.clientWidth;
  if(W < 10) return;

  // Responsive sizes
  const avSize  = Math.max(32, Math.min(54, W * 0.095));
  const nameSize= Math.max(7,  Math.min(9,  W * 0.016));
  const nameW   = avSize * 1.4;
  const winSize = avSize * 1.15;

  // Row heights: arena height = avSize * 9 (enough for 4 QF rows with spacing)
  const rows = 4;
  const padV = avSize * 0.6;
  const H    = avSize * rows * 2.4 + padV * 2;
  arena.style.height = H + 'px';

  // Column X centers (5 columns: LQF, LSemi, Center, RSemi, RQF)
  const colW = W / 5;
  const xLQF   = colW * 0.5;
  const xLSemi = colW * 1.5;
  const xC     = colW * 2.5;
  const xRSemi = colW * 3.5;
  const xRQF   = colW * 4.5;

  // QF Y positions: 4 slots evenly spaced
  const qfYs = [];
  for(let i=0;i<4;i++) qfYs.push(padV + (H - padV*2) * (i / 3));

  // Semi Y positions: midpoint between each pair of QF
  const semiYs = [
    (qfYs[0]+qfYs[1])/2,
    (qfYs[2]+qfYs[3])/2,
    (qfYs[0]+qfYs[1])/2,
    (qfYs[2]+qfYs[3])/2,
  ];

  // Final Y = midpoint between the two semi Y positions
  const finY   = (semiYs[0]+semiYs[1])/2;
  const finGap = avSize * 1.1;  // gap between the two finalist circles
  const finX0  = xC - finGap;
  const finX1  = xC + finGap;

  // Winner sits above finalists
  const winY   = finY - avSize * 2.4;
  const finalLabelY = finY - avSize * 0.85;
  const crownY = winY - winSize/2 - 2;

  // Apply sizes to all avatars
  function styleAv(node, size){
    const av=node.querySelector('.av');
    av.style.width=size+'px'; av.style.height=size+'px';
    av.style.fontSize=(size*0.4)+'px';
    const nm=node.querySelector('.aname');
    nm.style.fontSize=nameSize+'px';
    nm.style.maxWidth=nameW+'px';
  }
  for(let i=0;i<8;i++) styleAv(qfNodes[i], avSize);
  for(let i=0;i<4;i++) styleAv(semiNodes[i], avSize);
  for(let i=0;i<2;i++) styleAv(finNodes[i], avSize);
  styleAv(winNode, winSize);

  // Position nodes
  function pos(node, x, y){
    node.style.left = x+'px';
    node.style.top  = y+'px';
  }
  // Left QF
  pos(qfNodes[0], xLQF,  qfYs[0]);
  pos(qfNodes[1], xLQF,  qfYs[1]);
  pos(qfNodes[2], xLQF,  qfYs[2]);
  pos(qfNodes[3], xLQF,  qfYs[3]);
  // Left Semi
  pos(semiNodes[0], xLSemi, semiYs[0]);
  pos(semiNodes[1], xLSemi, semiYs[1]);
  // Right QF
  pos(qfNodes[4], xRQF, qfYs[0]);
  pos(qfNodes[5], xRQF, qfYs[1]);
  pos(qfNodes[6], xRQF, qfYs[2]);
  pos(qfNodes[7], xRQF, qfYs[3]);
  // Right Semi
  pos(semiNodes[2], xRSemi, semiYs[2]);
  pos(semiNodes[3], xRSemi, semiYs[3]);
  // Finalists
  pos(finNodes[0], finX0, finY);
  pos(finNodes[1], finX1, finY);
  // Winner
  pos(winNode, xC, winY);

  // Decorative labels
  const fl=document.getElementById('finalLabel');
  fl.style.left=xC+'px'; fl.style.top=finalLabelY+'px';
  fl.style.fontSize=Math.max(9, nameSize*1.1)+'px';

  const cr=document.getElementById('crownLabel');
  cr.style.left=xC+'px'; cr.style.top=crownY+'px';
  cr.style.fontSize=Math.max(14, avSize*0.35)+'px';

  const vs=document.getElementById('vsLabel');
  vs.style.left=xC+'px'; vs.style.top=finY+'px';
  vs.style.fontSize=Math.max(10, avSize*0.28)+'px';

  drawLines({xLQF,xLSemi,xC,xRSemi,xRQF,qfYs,semiYs,finY,finX0,finX1,winY,winSize,avSize});
}

/* ══ DRAW LINES ══ */
function drawLines(p){
  svg.innerHTML='';
  const {xLQF,xLSemi,xC,xRSemi,xRQF,qfYs,semiYs,finY,finX0,finX1,winY,winSize,avSize} = p;

  const DIM    = '#f5c5b8';
  const BRIGHT = '#d93020';
  const r = avSize/2;
  const rW= winSize/2;

  function seg(x1,y1,x2,y2,color,width=2){
    const l=document.createElementNS('http://www.w3.org/2000/svg','line');
    l.setAttribute('x1',x1);l.setAttribute('y1',y1);
    l.setAttribute('x2',x2);l.setAttribute('y2',y2);
    l.setAttribute('stroke',color);
    l.setAttribute('stroke-width',width);
    l.setAttribute('stroke-linecap','round');
    svg.appendChild(l);
  }

  // ── LEFT QF → Semi ──
  for(let p=0;p<2;p++){
    const ya=qfYs[p*2], yb=qfYs[p*2+1];
    const ys=semiYs[p];
    const midX=(xLQF+xLSemi)/2;
    const adv=semi[p]!==null;
    const wA=adv && semi[p]===p*2;
    const wB=adv && semi[p]===p*2+1;
    // from each QF avatar right edge → midX
    seg(xLQF+r, ya, midX, ya, wA?BRIGHT:DIM);
    seg(xLQF+r, yb, midX, yb, wB?BRIGHT:DIM);
    // vertical bracket
    seg(midX, ya, midX, yb, adv?BRIGHT:DIM);
    // midX at midY → semi left edge
    seg(midX, ys, xLSemi-r, ys, adv?BRIGHT:DIM);
  }

  // ── LEFT Semi → Finalist[0] ──
  {
    const ys0=semiYs[0], ys1=semiYs[1];
    const midX=(xLSemi+finX0)/2;
    const adv0 = finals[0]!==null && finals[0]===semi[0];
    const adv1 = finals[0]!==null && finals[0]===semi[1];
    const adv  = finals[0]!==null;
    // from each semi right edge → midX
    seg(xLSemi+r, ys0, midX, ys0, adv0?BRIGHT:DIM);
    seg(xLSemi+r, ys1, midX, ys1, adv1?BRIGHT:DIM);
    // vertical bracket
    seg(midX, ys0, midX, ys1, adv?BRIGHT:DIM);
    // midX at finY → finalist[0] left edge
    seg(midX, finY, finX0-r, finY, adv?BRIGHT:DIM);
  }

  // ── RIGHT QF → Semi ──
  for(let p=0;p<2;p++){
    const qi=4+p*2;
    const ya=qfYs[p*2], yb=qfYs[p*2+1];
    const ys=semiYs[2+p];
    const midX=(xRQF+xRSemi)/2;
    const adv=semi[2+p]!==null;
    const wA=adv && semi[2+p]===qi;
    const wB=adv && semi[2+p]===qi+1;
    seg(xRQF-r, ya, midX, ya, wA?BRIGHT:DIM);
    seg(xRQF-r, yb, midX, yb, wB?BRIGHT:DIM);
    seg(midX, ya, midX, yb, adv?BRIGHT:DIM);
    seg(midX, ys, xRSemi+r, ys, adv?BRIGHT:DIM);
  }

  // ── RIGHT Semi → Finalist[1] ──
  {
    const ys2=semiYs[2], ys3=semiYs[3];
    const midX=(xRSemi+finX1)/2;
    const adv2 = finals[1]!==null && finals[1]===semi[2];
    const adv3 = finals[1]!==null && finals[1]===semi[3];
    const adv  = finals[1]!==null;
    seg(xRSemi-r, ys2, midX, ys2, adv2?BRIGHT:DIM);
    seg(xRSemi-r, ys3, midX, ys3, adv3?BRIGHT:DIM);
    seg(midX, ys2, midX, ys3, adv?BRIGHT:DIM);
    seg(midX, finY, finX1+r, finY, adv?BRIGHT:DIM);
  }

  // ── Finalists → Winner ──
  // Each finalist goes up, they meet at a horizontal bridge, then up to winner bottom
  {
    const joinY  = winY + rW + 10; // just below winner circle bottom edge
    const colW   = champion!==null ? BRIGHT : DIM;
    const col0   = champion!==null && champion===finals[0] ? BRIGHT : DIM;
    const col1   = champion!==null && champion===finals[1] ? BRIGHT : DIM;
    // finalist[0] top → joinY, then across to midX
    seg(finX0, finY-r, finX0, joinY, col0);
    seg(finX0, joinY, xC, joinY, col0);
    // finalist[1] top → joinY, then across to midX
    seg(finX1, finY-r, finX1, joinY, col1);
    seg(finX1, joinY, xC, joinY, col1);
    // midX down from joinY to winner bottom
    seg(xC, joinY, xC, winY+rW, colW);
  }
}

/* ══ INIT + RESIZE ══ */
buildNodes();
const ro = new ResizeObserver(()=>layout());
ro.observe(arena);
</script>
</body>
</html>
