<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box;}

html,body{
  margin:0;
  padding:0;
  background:transparent!important;
  font-family: Georgia, serif;
  color:#f5e6c8;
  height:100%;
}

/* MAIN BOX */
#membersBox{
  width:100%;
  height:auto;
  padding:14px;
  background: rgba(60,50,40,.75);
  border-radius:18px;
  border:1px solid rgba(200,170,120,.25);
  box-shadow:0 8px 25px rgba(0,0,0,.6);
  display:flex;
  flex-direction:column;
}

/* HEADER */
.membersHeader{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 12px;
  border-radius:12px;
  background: linear-gradient(90deg,#caa85a,#e8c27a,#caa85a);
  color:#2a1f12;
  font-weight:800;
  margin-bottom:10px;
  justify-content:center;
  text-align:center;
}

.membersIcon{
  font-size:18px;
}

.membersTitle{
  font-size:14px;
  letter-spacing:.5px;
}

/* WELCOME */
.membersWelcome{
  font-size:12.5px;
  margin-bottom:12px;
  text-align:center;
  opacity:.9;
}

/* MEMBERS LIST */
#membersList{
  flex:1;
  overflow:hidden;
}

/* MEMBER ROW */
.memberRow{
  display:flex;
  align-items:center;
  gap:12px;
  padding:8px 10px;
  border-radius:12px;
  background: rgba(90,70,50,.6);
  margin-bottom:8px;
  border:1px solid rgba(200,170,120,.15);
  transition:.25s;
}

.memberRow:hover{
  background:#e8c27a;
  transform:translateY(-2px);
}

.memberLink{
  display:flex;
  align-items:center;
  gap:12px;
  text-decoration:none;
  width:100%;
  color:inherit;
}

/* AVATAR */
.memberAvatar{
  width:42px;
  height:42px;
  border-radius:50%;
  border:2px solid rgba(200,170,120,.6);
  transition:.25s;
  object-fit:cover;
}

.memberRow:hover .memberAvatar{
  transform:scale(1.05);
}

/* TEXT */
.memberText{
  display:flex;
  flex-direction:column;
  min-width:0;
}

.memberName{
  font-size:13px;
  font-weight:800;
  color:#f5e6c8;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.memberRating{
  font-size:11.5px;
  color:#f5e6c8;
  opacity:.85;
}

.memberRow:hover .memberName,
.memberRow:hover .memberRating{
  color:#2a1f12;
}
</style>
</head>

<body>
<div id="membersBox">

  <div class="membersHeader">
    <div class="membersIcon">👑</div>
    <div class="membersTitle">Newest Knights</div>
  </div>

  <div class="membersWelcome">
    The latest warriors to enter the Kingdom.
  </div>

  <div id="membersList">
    <!-- placeholders -->
    <div class="memberRow">
      <a class="memberLink">
        <img class="memberAvatar" src="https://taki2023.github.io/taki/default-pawn.png">
        <div class="memberText">
          <div class="memberName">@loading</div>
          <div class="memberRating">— : —</div>
        </div>
      </a>
    </div>
  </div>

</div>

<script>
async function loadNewest() {
  try {
    const r = await fetch("https://api.chess.com/pub/club/hot-chilli-checkmate/members");
    const d = await r.json();
    const members = [...d.weekly, ...d.monthly];
    members.sort((a, b) => b.joined - a.joined);
    const top3 = members.slice(0, 3);

    const promises = top3.map(async (m) => {
      const [pj, stats] = await Promise.all([
        fetch("https://api.chess.com/pub/player/" + m.username).then(res => res.json()),
        fetch("https://api.chess.com/pub/player/" + m.username + "/stats").then(res => res.json())
      ]);

      const ratings = [
        {type:"Rapid", value: stats.chess_rapid?.last?.rating},
        {type:"Blitz", value: stats.chess_blitz?.last?.rating},
        {type:"Bullet", value: stats.chess_bullet?.last?.rating},
        {type:"Daily", value: stats.chess_daily?.last?.rating}
      ].filter(x => x.value);

      const best = ratings.length ? ratings.sort((a,b)=>b.value-a.value)[0] : {type:"—", value:"—"};
      const avatar = pj.avatar || "https://taki2023.github.io/taki/default-pawn.png";

      return {
        username: m.username,
        avatar,
        ratingType: best.type,
        ratingValue: best.value
      };
    });

    const membersData = await Promise.all(promises);

    const box = document.getElementById("membersList");
    box.innerHTML = membersData.map(m => `
      <div class="memberRow">
        <a class="memberLink" href="https://www.chess.com/member/${m.username}" target="_blank">
          <img class="memberAvatar" src="${m.avatar}">
          <div class="memberText">
            <div class="memberName">@${m.username}</div>
            <div class="memberRating">${m.ratingType}: ${m.ratingValue}</div>
          </div>
        </a>
      </div>
    `).join("");

  } catch (err) {
    document.getElementById("membersList").innerHTML = "The Kingdom's records are temporarily unavailable.";
  }
}

window.addEventListener("DOMContentLoaded", loadNewest);
</script>

</body>
</html>
