<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
}

/* MAIN SIDEBAR CONTAINER */
#romanSidebar {
    position: relative;
    width: 100%;
    padding: 18px;
    border-radius: 20px;
    overflow: hidden;
    
    /* Ancient stone base */
    background:
        linear-gradient(rgba(20,15,12,0.85), rgba(20,15,12,0.92)),
        url('https://www.transparenttextures.com/patterns/concrete-wall.png');
    
    background-size: cover;
    
    box-shadow:
        inset 0 0 40px rgba(0,0,0,0.8),
        0 0 25px rgba(255,170,80,0.25);
}

/* GOLDEN IMPERIAL BORDER */
#romanSidebar::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 20px;
    padding: 2px;
    background: linear-gradient(
        45deg,
        #6b4a1f,
        #d4af37,
        #ffcc66,
        #6b4a1f
    );
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    animation: goldGlow 6s linear infinite;
}

/* ANIMATED GOLD GLOW */
@keyframes goldGlow {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.4); }
    100% { filter: brightness(1); }
}

/* MEDIEVAL TITLE STYLE */
.romanTitle {
    font-size: 20px;
    text-align: center;
    color: #f5d27a;
    letter-spacing: 2px;
    text-shadow:
        0 0 8px rgba(255,200,100,0.6),
        0 0 20px rgba(255,150,50,0.4);
    margin-bottom: 15px;
}

/* CONTENT TEXT */
.romanText {
    color: #e6d3a3;
    font-size: 14px;
    line-height: 1.6;
}
</style>

<div id="romanSidebar">
    <div class="romanTitle">♜ IMPERIAL CHESS REALM ♜</div>
    <div class="romanText">
        ⚔ Battle in ancient ruins<br>
        🏛 Rise through the empire<br>
        👑 Claim your throne
    </div>
</div>
