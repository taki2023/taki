<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Event Calendar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;background:transparent;
  font-family:'Segoe UI',Tahoma,Geneva,sans-serif;
  color:#eee;overflow:hidden;
}

.cal-wrap{
  background:transparent;
  padding:10px 10px 8px;
}

/* ── NAV ── */
.cal-nav{
  display:flex;align-items:center;justify-content:space-between;
  gap:6px;margin-bottom:8px;
}
.cal-month-label{
  flex:1;text-align:center;
  font-size:13px;font-weight:900;letter-spacing:1.5px;
  text-transform:uppercase;color:#ffd54f;
  text-shadow:0 0 12px rgba(255,185,0,.5);
}
.nav-btn{
  width:26px;height:26px;min-width:26px;border-radius:8px;
  border:none;outline:none;cursor:pointer;
  background:linear-gradient(145deg,#1a3a52,#0d2235);
  border:1px solid rgba(255,185,0,.3);
  color:#ffd54f;font-size:13px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;user-select:none;line-height:1;
}
.nav-btn:hover{
  background:linear-gradient(145deg,#243f5c,#122840);
  border-color:rgba(255,185,0,.6);
  box-shadow:0 0 8px rgba(255,185,0,.25);
}
.nav-btn:active{transform:scale(.93);}

/* ── DAY HEADERS ── */
.cal-head{
  display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;
}
.cal-head-cell{
  text-align:center;font-size:9px;font-weight:900;
  letter-spacing:1px;text-transform:uppercase;
  color:rgba(255,185,0,.6);padding:3px 0;
}

/* ── GRID ── */
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{
  background:rgba(255,185,0,.04);
  border:1px solid rgba(255,185,0,.08);
  border-radius:6px;
  padding:3px 2px;
  min-height:38px;
  display:flex;flex-direction:column;align-items:center;gap:1px;
  position:relative;cursor:default;
  transition:border-color .15s,background .15s;
}
.cal-cell.overflow{opacity:.25;pointer-events:none;}
.cal-cell.has-events{
  background:rgba(255,185,0,.07);
  border-color:rgba(255,185,0,.2);
  cursor:pointer;
}
.cal-cell.has-events:hover{
  background:rgba(255,185,0,.13);
  border-color:rgba(255,185,0,.45);
  box-shadow:0 0 10px rgba(255,185,0,.15);
}
.cal-cell.today{
  background:rgba(255,185,0,.1);
  border-color:rgba(255,185,0,.5);
  box-shadow:0 0 0 2px rgba(255,185,0,.18);
}

.day-num{
  font-size:9px;font-weight:700;
  color:rgba(255,210,100,.5);
  line-height:1;align-self:flex-start;padding-left:2px;
}
.cal-cell.today .day-num{
  color:#ffd54f;font-weight:900;
  background:rgba(255,185,0,.25);border-radius:50%;
  width:14px;height:14px;display:flex;align-items:center;justify-content:center;
  padding:0;
}

.evt-dots{
  display:flex;flex-wrap:wrap;gap:1px;justify-content:center;
  margin-top:1px;
}
.evt-dot{
  width:16px;height:16px;border-radius:4px;
  background:rgba(255,185,0,.12);border:1px solid rgba(255,185,0,.22);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;line-height:1;overflow:hidden;position:relative;
}
.evt-dot img{
  width:100%;height:100%;object-fit:contain;border-radius:3px;
  display:block;opacity:0;transition:opacity .2s;position:absolute;inset:0;
}
.evt-dot img.loaded{opacity:1;}
.evt-dot .dot-emoji{font-size:10px;line-height:1;}

/* ── TOOLTIP / EVENT PANEL ── */
.panel-overlay{
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.55);
  align-items:center;justify-content:center;
  padding:12px;
}
.panel-overlay.show{display:flex;}

.panel{
  background:linear-gradient(160deg,#0a1628 0%,#071020 60%,#0c1a10 100%);
  border:1.5px solid rgba(255,185,0,.4);
  border-radius:16px;
  width:100%;max-width:310px;
  max-height:80vh;overflow-y:auto;
  box-shadow:0 12px 40px rgba(0,0,0,.6),0 0 0 1px rgba(255,185,0,.1);
  padding:14px;
  position:relative;
}

.panel-close{
  position:absolute;top:9px;right:11px;
  font-size:13px;font-weight:900;
  color:rgba(255,185,0,.6);cursor:pointer;
  width:22px;height:22px;border-radius:50%;
  background:rgba(255,185,0,.08);border:1px solid rgba(255,185,0,.2);
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;user-select:none;
}
.panel-close:hover{background:rgba(255,185,0,.18);color:#ffd54f;}

.panel-date-hdr{
  font-size:10px;font-weight:900;letter-spacing:2px;
  text-transform:uppercase;color:rgba(255,185,0,.55);
  margin-bottom:10px;padding-right:24px;
}

.evt-card{
  background:rgba(255,185,0,.06);
  border:1px solid rgba(255,185,0,.15);
  border-radius:12px;padding:10px 11px;
  margin-bottom:8px;
  transition:border-color .15s;
}
.evt-card:last-child{margin-bottom:0;}
.evt-card:hover{border-color:rgba(255,185,0,.32);}

.evt-card-top{display:flex;align-items:center;gap:9px;margin-bottom:6px;}
.evt-card-logo{
  width:32px;height:32px;border-radius:8px;
  background:rgba(255,185,0,.08);border:1px solid rgba(255,185,0,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;overflow:hidden;position:relative;
}
.evt-card-logo img{
  width:100%;height:100%;object-fit:contain;border-radius:7px;
  display:block;opacity:0;transition:opacity .2s;position:absolute;inset:0;
}
.evt-card-logo img.loaded{opacity:1;}

.evt-card-info{flex:1;min-width:0;}
.evt-card-title{
  font-size:11.5px;font-weight:800;color:#ffd54f;
  line-height:1.25;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.evt-card-date{
  font-size:9.5px;font-weight:700;color:rgba(255,210,100,.5);
}

.evt-card-details{
  font-size:10px;font-weight:600;
  color:rgba(255,220,150,.7);line-height:1.5;
  margin-bottom:7px;
}

/* organizer quote */
.evt-quote{
  background:rgba(0,0,0,.25);
  border-left:3px solid rgba(255,185,0,.4);
  border-radius:0 8px 8px 0;
  padding:6px 9px;margin-bottom:7px;
}
.evt-quote-label{
  font-size:8.5px;font-weight:900;letter-spacing:.7px;
  text-transform:uppercase;color:rgba(255,185,0,.45);margin-bottom:3px;
}
.evt-quote-text{
  font-size:10px;font-weight:600;
  color:rgba(255,220,150,.75);line-height:1.5;
}
.mention-link{
  color:#ffd54f;font-weight:900;text-decoration:none;
  border-bottom:1px dotted rgba(255,185,0,.4);
}
.mention-link:hover{color:#ffe082;}

/* button */
.evt-btn{
  display:inline-block;font-size:10px;font-weight:900;
  color:#0a1628;
  background:linear-gradient(135deg,#ffd54f,#f57c00);
  padding:5px 14px;border-radius:999px;text-decoration:none;
  box-shadow:0 2px 8px rgba(255,185,0,.3);
  transition:opacity .15s,transform .15s;
}
.evt-btn:hover{opacity:.88;transform:translateY(-1px);}
</style>
</head>
<body>

<div class="cal-wrap">
  <div class="cal-nav">
    <button class="nav-btn" id="prevBtn">‹</button>
    <div class="cal-month-label" id="monthLabel"></div>
    <button class="nav-btn" id="nextBtn">›</button>
  </div>
  <div class="cal-head" id="calHead"></div>
  <div class="cal-body" id="calBody"></div>
</div>

<!-- Event panel overlay -->
<div class="panel-overlay" id="panelOverlay">
  <div class="panel" id="panel">
    <div class="panel-close" id="panelClose">✕</div>
    <div class="panel-date-hdr" id="panelDateHdr"></div>
    <div id="panelCards"></div>
  </div>
</div>

<script>
// ── REPLACE THIS WITH YOUR DEPLOYED GOOGLE APPS SCRIPT URL ──
const SHEET_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';

const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS=['M','T','W','T','F','S','S'];

const today=new Date();
let viewYear=today.getFullYear(), viewMonth=today.getMonth(), eventMap={};

// ── image proxy (same logic as original) ──
function proxyURL(raw){
  if(!raw)return null;raw=raw.trim();
  if(raw.startsWith('https://wsrv.nl'))return raw;
  const dm=raw.match(/drive\.google\.com\/(?:file\/d\/|open\?id=)([\w-]+)/);
  if(dm){const fid=dm[1];const direct=`https://drive.google.com/uc?export=download&id=${fid}`;return `https://wsrv.nl/?url=${encodeURIComponent(direct)}&w=64&h=64&fit=contain&output=webp`;}
  if(raw.includes('docs.google.com')||raw.includes('googleusercontent.com')||raw.includes('blogger.com'))
    return `https://wsrv.nl/?url=${encodeURIComponent(raw)}&w=64&h=64&fit=contain&output=webp`;
  if(/^https?:\/\//i.test(raw))return `https://wsrv.nl/?url=${encodeURIComponent(raw)}&w=64&h=64&fit=contain&output=webp`;
  return null;
}

function isURL(s){return s&&(/^https?:\/\//i.test(s)||s.includes('.'));}

const pad=n=>String(n).padStart(2,'0');
const dateKey=(y,m,d)=>`${y}-${pad(m+1)}-${pad(d)}`;
const lastDay=(y,m)=>new Date(y,m+1,0).getDate();
const dowMon=(y,m,d)=>(new Date(y,m,d).getDay()+6)%7;
const ordinal=d=>{const s=['th','st','nd','rd'],v=d%100;return d+(s[(v-20)%10]||s[v]||s[0]);};

function parseDate(str){
  if(!str)return null;str=str.trim();
  if(/^\d{4}-\d{2}-\d{2}$/.test(str)){const[y,m,d]=str.split('-').map(Number);return{y,m:m-1,d};}
  if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(str)){const[m,d,y]=str.split('/').map(Number);return{y,m:m-1,d};}
  if(/^\d{1,2}-\d{1,2}-\d{4}$/.test(str)){const[d,m,y]=str.split('-').map(Number);return{y,m:m-1,d};}
  const dt=new Date(str);if(!isNaN(dt))return{y:dt.getFullYear(),m:dt.getMonth(),d:dt.getDate()};
  return null;
}

function linkifyMentions(text){
  const parts=text.split(/(@[\w-]+)/g);
  return parts.map(p=>{
    if(/^@[\w-]+$/.test(p)){
      const a=document.createElement('a');
      a.className='mention-link';
      a.href=`https://www.chess.com/member/${p.slice(1)}`;
      a.target='_blank';a.rel='noopener noreferrer';
      a.textContent=p;return a;
    }
    return document.createTextNode(p);
  });
}
function setMentions(el,text){el.innerHTML='';linkifyMentions(text).forEach(n=>el.appendChild(n));}

// ── img cache ──
const imgMem=new Map();
function onImgReady(url,cb){
  const s=imgMem.get(url);if(s){cb(s);return;}
  imgMem.set(url,'loading');
  const img=new Image();img.crossOrigin='anonymous';
  img.onload=()=>{imgMem.set(url,'ok');cb('ok');};
  img.onerror=()=>{imgMem.set(url,'err');cb('err');};
  img.src=url;
}

async function loadSheet(){
  try{
    const res=await fetch(SHEET_URL,{cache:'no-store'});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    eventMap={};
    data.forEach(ev=>{
      if(!ev.date||!ev.title)return;
      const dateObj=parseDate(ev.date);if(!dateObj)return;
      const key=dateKey(dateObj.y,dateObj.m,dateObj.d);
      if(!eventMap[key])eventMap[key]=[];
      const rawLogo=(ev.logo||'').trim();
      const proxiedLogo=isURL(rawLogo)?proxyURL(rawLogo):null;
      eventMap[key].push({
        dateObj,
        title:(ev.title||'').trim(),
        details:(ev.detailsBefore||'').trim(),
        button:(ev.buttonBefore||'').trim(),
        link:(ev.linkBefore||'').trim(),
        rawLogo,
        logo:proxiedLogo||rawLogo,
        isProxied:!!proxiedLogo,
        organizer:(ev.organizer||'').trim().replace(/^@/,''),
        quote:(ev.quoteBefore||'').trim(),
      });
    });
    buildCalendar();
  }catch(e){console.error('Sheet error:',e);}
}

// ── calendar build ──
const monthLabel=document.getElementById('monthLabel');
const calHead=document.getElementById('calHead');
const calBody=document.getElementById('calBody');

function buildCalendar(){
  monthLabel.textContent=MONTHS[viewMonth]+' '+viewYear;
  calHead.innerHTML='';
  DAYS.forEach(d=>{const c=document.createElement('div');c.className='cal-head-cell';c.textContent=d;calHead.appendChild(c);});
  calBody.innerHTML='';
  const first=dowMon(viewYear,viewMonth,1),last=lastDay(viewYear,viewMonth);
  const prevM=viewMonth===0?11:viewMonth-1,prevY=viewMonth===0?viewYear-1:viewYear;
  const nextM=viewMonth===11?0:viewMonth+1,nextY=viewMonth===11?viewYear+1:viewYear;
  for(let i=0;i<first;i++)calBody.appendChild(makeCell(prevY,prevM,lastDay(prevY,prevM)-first+1+i,true));
  for(let d=1;d<=last;d++)calBody.appendChild(makeCell(viewYear,viewMonth,d,false));
  const filled=first+last;for(let d=1;filled+d-1<42;d++)calBody.appendChild(makeCell(nextY,nextM,d,true));

  // auto-resize parent iframe height if embedded
  requestAnimationFrame(resizeParent);
}

function resizeParent(){
  const h=document.body.scrollHeight;
  try{window.parent.postMessage({iframeHeight:h},'*');}catch(e){}
}

function makeCell(y,m,d,overflow){
  const isToday=(d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear());
  const events=(!overflow&&eventMap[dateKey(y,m,d)])||[];
  const cell=document.createElement('div');
  let cls='cal-cell'+(overflow?' overflow':'')+(isToday?' today':'')+(events.length?' has-events':'');
  cell.className=cls;

  const num=document.createElement('div');num.className='day-num';num.textContent=d;cell.appendChild(num);

  if(events.length){
    const dots=document.createElement('div');dots.className='evt-dots';
    events.slice(0,4).forEach(ev=>{
      const dot=document.createElement('div');dot.className='evt-dot';
      if(ev.isProxied){
        const img=document.createElement('img');img.alt=ev.title;
        const em=document.createElement('span');em.className='dot-emoji';em.textContent='📅';dot.appendChild(em);
        onImgReady(ev.logo,state=>{if(state==='ok'){img.src=ev.logo;dot.appendChild(img);const f=()=>{img.classList.add('loaded');em.style.display='none';};img.onload=f;if(img.complete&&img.naturalWidth>0)f();}});
      }else{
        const em=document.createElement('span');em.className='dot-emoji';
        em.textContent=(ev.rawLogo&&ev.rawLogo.trim())?ev.rawLogo:'📅';dot.appendChild(em);
      }
      dots.appendChild(dot);
    });
    cell.appendChild(dots);
    cell.addEventListener('click',()=>openPanel(y,m,d,events));
  }
  return cell;
}

// ── panel ──
const overlay=document.getElementById('panelOverlay');
const panelDateHdr=document.getElementById('panelDateHdr');
const panelCards=document.getElementById('panelCards');
document.getElementById('panelClose').addEventListener('click',closePanel);
overlay.addEventListener('click',e=>{if(e.target===overlay)closePanel();});

function closePanel(){overlay.classList.remove('show');}

function openPanel(y,m,d,events){
  panelDateHdr.textContent=`${MONTHS[m]} ${ordinal(d)}, ${y}`;
  panelCards.innerHTML='';
  events.forEach(ev=>{
    const card=document.createElement('div');card.className='evt-card';

    // top row
    const top=document.createElement('div');top.className='evt-card-top';
    const logo=document.createElement('div');logo.className='evt-card-logo';
    if(ev.isProxied){
      const img=document.createElement('img');img.alt=ev.title;
      logo.textContent='📅';
      onImgReady(ev.logo,state=>{
        if(state==='ok'){
          img.src=ev.logo;logo.appendChild(img);
          const f=()=>{img.classList.add('loaded');logo.childNodes[0].remove&&logo.childNodes[0].nodeType===3&&(logo.childNodes[0].textContent='');};
          img.onload=f;if(img.complete&&img.naturalWidth>0)f();
        }
      });
    }else{logo.textContent=(ev.rawLogo&&ev.rawLogo.trim())?ev.rawLogo:'📅';}
    top.appendChild(logo);
    const info=document.createElement('div');info.className='evt-card-info';
    const title=document.createElement('div');title.className='evt-card-title';title.textContent=ev.title;
    const dateSpan=document.createElement('div');dateSpan.className='evt-card-date';
    dateSpan.textContent=`${MONTH_SHORT[m]} ${ordinal(d)}, ${y}`;
    info.appendChild(title);info.appendChild(dateSpan);
    top.appendChild(info);card.appendChild(top);

    // details
    if(ev.details){
      const det=document.createElement('div');det.className='evt-card-details';det.textContent=ev.details;card.appendChild(det);
    }

    // quote
    if(ev.quote){
      const qb=document.createElement('div');qb.className='evt-quote';
      const ql=document.createElement('div');ql.className='evt-quote-label';
      ql.textContent=ev.organizer?`♟ From @${ev.organizer}`:'♟ From the organizer';
      const qt=document.createElement('div');qt.className='evt-quote-text';
      setMentions(qt,ev.quote);
      qb.appendChild(ql);qb.appendChild(qt);card.appendChild(qb);
    }

    // button
    if(ev.button&&ev.link){
      const btn=document.createElement('a');btn.className='evt-btn';
      btn.href=ev.link;btn.target='_blank';btn.rel='noopener noreferrer';
      btn.textContent=ev.button;card.appendChild(btn);
    }

    panelCards.appendChild(card);
  });
  overlay.classList.add('show');
}

document.getElementById('prevBtn').addEventListener('click',()=>{
  viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}buildCalendar();
});
document.getElementById('nextBtn').addEventListener('click',()=>{
  viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}buildCalendar();
});

buildCalendar();
loadSheet();
</script>
</body>
</html>
