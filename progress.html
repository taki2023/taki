<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Perfect Progress Alignment</title>

<style>

body{
  background:#f5efe8;
  font-family:Arial, Helvetica, sans-serif;
}

.container{
  width:100%;
  max-width:1000px;
  margin:40px auto;
  padding:40px;
  background:#efe3d3;
  border-radius:30px;
}

/* TITLE */
.sec-label{
  display:flex;
  align-items:center;
  font-size:28px;
  font-weight:900;
  color:#e65100;
  margin-bottom:40px;
}
.dot{
  width:16px;
  height:16px;
  border-radius:50%;
  background:#ff7043;
  margin-right:12px;
}

/* WRAPPER */
.progress-wrapper{
  position:relative;
  width:100%;
  height:260px;
}

/* SVG */
.progress-svg{
  position:absolute;
  width:100%;
  height:100%;
}

/* CIRCLES */
.milestone{
  position:absolute;
  transform:translate(-50%, -50%);
  width:110px;
  height:110px;
  border-radius:50%;
  background:#ff7043;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-weight:900;
  color:white;
  box-shadow:0 8px 0 #bf360c;
}

.milestone span{
  font-size:16px;
  margin-top:6px;
}

.milestone.locked{
  background:#f5d6a3;
  color:#e09c3f;
  box-shadow:none;
}

</style>
</head>

<body>

<div class="container">

<div class="sec-label">
  <div class="dot"></div>
  Club Progress 🎉
</div>

<div class="progress-wrapper">

<svg viewBox="0 0 1000 260" preserveAspectRatio="none" class="progress-svg">

  <!-- The curve now passes EXACTLY through circle centers -->
  <path
    d="
      M 100 90
      Q 185 200 270 90
      Q 355 200 440 90
      Q 525 200 610 90
      Q 695 200 780 90
      Q 865 200 950 90
    "
    fill="none"
    stroke="#f28c38"
    stroke-width="8"
    stroke-linecap="round"
  />

</svg>

<!-- TOP ROW (y = 90px center) -->
<div class="milestone" style="left:10%; top:90px;">10<span>Nov 21</span></div>
<div class="milestone" style="left:30%; top:90px;">100<span>Nov 27</span></div>
<div class="milestone" style="left:50%; top:90px;">300<span>Jan 11</span></div>
<div class="milestone locked" style="left:95%; top:90px;">?<span>1000+</span></div>

<!-- BOTTOM ROW (y = 200px center) -->
<div class="milestone" style="left:20%; top:200px;">50<span>Nov 23</span></div>
<div class="milestone" style="left:40%; top:200px;">200<span>Dec 12</span></div>
<div class="milestone" style="left:70%; top:200px;">500<span>Feb 06</span></div>

</div>

</div>

</body>
</html>
