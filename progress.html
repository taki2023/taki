<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Perfect Alignment</title>
<style>
body{
  background:#efe3d3;
  font-family:Arial, sans-serif;
}

.wrapper{
  max-width:1000px;
  margin:40px auto;
  padding:40px;
  background:#e8dccb;
  border-radius:25px;
}

svg{
  width:100%;
  height:auto;
}

text{
  font-weight:900;
  text-anchor:middle;
  fill:white;
}

.small{
  font-size:14px;
}

.big{
  font-size:20px;
}
</style>
</head>

<body>

<div class="wrapper">

<svg viewBox="0 0 1000 300">

<!-- THE MAGIC FIX -->
<path d="
M 100 100
Q 150 160 200 220
T 300 100
T 400 220
T 500 100
T 600 220
T 700 100
T 800 220
T 900 100
"
fill="none"
stroke="#f28c38"
stroke-width="8"
stroke-linecap="round"
/>

<!-- CIRCLES -->
<circle cx="100" cy="100" r="50" fill="#ff7043"/>
<circle cx="200" cy="220" r="50" fill="#ff7043"/>
<circle cx="300" cy="100" r="50" fill="#ff7043"/>
<circle cx="400" cy="220" r="50" fill="#ff7043"/>
<circle cx="500" cy="100" r="50" fill="#ff7043"/>
<circle cx="600" cy="220" r="50" fill="#ff7043"/>
<circle cx="700" cy="100" r="50" fill="#ff7043"/>
<circle cx="800" cy="220" r="50" fill="#ff7043"/>
<circle cx="900" cy="100" r="50" fill="#f5d6a3"/>

<!-- TEXT -->
<text x="100" y="95" class="big">10</text>
<text x="100" y="120" class="small">Nov 21</text>

<text x="200" y="215" class="big">50</text>
<text x="200" y="240" class="small">Nov 23</text>

<text x="300" y="95" class="big">100</text>
<text x="300" y="120" class="small">Nov 27</text>

<text x="400" y="215" class="big">200</text>
<text x="400" y="240" class="small">Dec 12</text>

<text x="500" y="95" class="big">300</text>
<text x="500" y="120" class="small">Jan 11</text>

<text x="600" y="215" class="big">500</text>
<text x="600" y="240" class="small">Feb 06</text>

<text x="900" y="95" class="big" fill="#e09c3f">?</text>
<text x="900" y="120" class="small" fill="#e09c3f">1000+</text>

</svg>

</div>

</body>
</html>
