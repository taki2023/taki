<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Chilli CheckMate – Home</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;background:transparent;font-family:'Nunito',sans-serif;}
:root{
  --red-dark:#d93020;--red-mid:#e85535;--red-border:#e8553a;
  --bg:#fff5f0;--card:#fff;--border:#f5c5b8;--shadow:#e8aa98;
  --text-dark:#c73520;--text-mid:#9a2010;
  --fs-xs:10px;--fs-sm:11px;
}
.page-sb{width:100%;background:var(--bg);border-radius:28px;border:3px solid var(--red-border);overflow:visible;}
.page-top{
  background:linear-gradient(135deg,#d93020 0%,#e85535 60%,#ef6640 100%);
  border-radius:24px 24px 0 0;padding:16px 16px 12px;
  text-align:center;position:relative;overflow:hidden;
}
.page-top::before{content:'';position:absolute;bottom:-10px;left:-10%;width:120%;height:20px;background:var(--bg);border-radius:50%;}
.page-top::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-55deg,transparent,transparent 14px,rgba(255,255,255,.04) 14px,rgba(255,255,255,.04) 28px);pointer-events:none;}
.page-title{font-family:'Fredoka One',cursive;font-size:20px;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.18);position:relative;z-index:1;}
.page-sub{font-size:var(--fs-sm);font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.9px;text-transform:uppercase;margin-top:3px;position:relative;z-index:1;}
.inner{padding:14px 12px 18px;}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;}
.cal-month-label{font-family:'Fredoka One',cursive;font-size:clamp(13px,3.5vw,18px);color:var(--red-dark);text-align:center;flex:1;white-space:nowrap;}
.nav-btn{
  width:32px;height:32px;min-width:32px;border-radius:50%;border:2px solid var(--border);
  background:var(--card);box-shadow:0 4px 0 var(--shadow);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;color:var(--red-dark);font-weight:900;
  transition:all .15s;user-select:none;flex-shrink:0;line-height:1;
}
.nav-btn:hover{background:#fce8e0;border-color:var(--red-dark);transform:translateY(-2px);box-shadow:0 6px 0 var(--red-dark);}
.nav-btn:active{transform:translateY(2px);box-shadow:0 2px 0 var(--red-dark);}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;}
.cal-head-cell{text-align:center;font-size:clamp(8px,1.8vw,11px);font-weight:900;color:var(--text-mid);text-transform:uppercase;letter-spacing:.4px;padding:3px 0;}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{
  background:var(--card);border:1.5px solid var(--border);border-radius:8px;
  padding:3px 2px 3px;display:flex;flex-direction:column;
  align-items:flex-start;gap:1px;overflow:visible;
  min-height:clamp(46px,10vw,70px);
}
.cal-cell.empty{background:transparent;border-color:transparent;}
.cal-cell.today{background:linear-gradient(135deg,rgba(217,48,32,.09),rgba(239,102,64,.05));border-color:var(--red-dark);box-shadow:0 0 0 2px rgba(217,48,32,.2);}
.day-num{font-family:'Fredoka One',cursive;font-size:clamp(9px,2.2vw,13px);color:var(--text-dark);line-height:1;padding-left:3px;flex-shrink:0;}
.cal-cell.today .day-num{
  display:inline-flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#d93020,#e85535);color:#fff;border-radius:50%;
  width:clamp(16px,3.5vw,22px);height:clamp(16px,3.5vw,22px);
  padding:0;margin-left:2px;box-shadow:0 2px 0 #8c1a10;text-align:center;flex-shrink:0;
}
.evt-icons{display:flex;flex-direction:column;align-items:center;gap:1px;width:100%;flex:1;align-self:stretch;}
.evt{
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  width:clamp(18px,4.5vw,28px);height:clamp(18px,4.5vw,28px);
  border-radius:6px;font-size:clamp(10px,2.8vw,16px);
  flex-shrink:0;transition:transform .15s;z-index:1;
}
.evt:hover{transform:scale(1.2);z-index:999;}
.legend{display:flex;flex-wrap:wrap;gap:5px 10px;margin-top:12px;justify-content:center;}
.leg-item{display:flex;align-items:center;gap:4px;font-size:clamp(8px,2vw,11px);font-weight:800;color:var(--text-mid);}
.leg-dot{font-size:clamp(11px,2.5vw,14px);}
.evt-tip{
  position:fixed;background:var(--card);border:2px solid var(--red-dark);
  border-radius:12px;padding:8px 11px;box-shadow:0 8px 24px rgba(217,48,32,.22);
  pointer-events:none;opacity:0;transition:opacity .18s;z-index:99999;
  min-width:130px;max-width:185px;white-space:normal;font-family:'Nunito',sans-serif;
}
.evt-tip.show{opacity:1;}
.evt-tip-name{font-family:'Fredoka One',cursive;font-size:12px;color:var(--red-dark);margin-bottom:3px;}
.evt-tip-detail{font-size:var(--fs-xs);font-weight:700;color:var(--text-mid);line-height:1.55;}
.evt-tip-icon{font-size:18px;display:block;margin-bottom:3px;}
.evt-tip-link{display:inline-block;margin-top:5px;font-size:var(--fs-xs);font-weight:900;color:#fff;background:linear-gradient(135deg,#d93020,#e85535);padding:3px 10px;border-radius:999px;text-decoration:none;box-shadow:0 2px 0 #8c1a10;pointer-events:auto;}
.footer{text-align:center;font-size:var(--fs-sm);font-weight:700;color:var(--red-border);margin-top:14px;}
</style>
</head>
<body>

<div class="page-sb">
  <div class="page-top">
    <div class="page-title">🏠 Hot Chilli CheckMate</div>
    <div class="page-sub">Your Chess Home ♞</div>
  </div>
  <div class="inner">
    <div class="cal-nav">
      <button class="nav-btn" id="prevBtn">‹</button>
      <div class="cal-month-label" id="monthLabel"></div>
      <button class="nav-btn" id="nextBtn">›</button>
    </div>
    <div class="cal-head" id="calHead"></div>
    <div class="cal-body" id="calBody"></div>
    <div class="legend">
      <div class="leg-item"><span class="leg-dot">🎯</span> Guess the Elo</div>
      <div class="leg-item"><span class="leg-dot">⚡</span> Blitz Battle</div>
      <div class="leg-item"><span class="leg-dot">🏟️</span> Multiclub Arena</div>
      <div class="leg-item"><span class="leg-dot">📊</span> Monthly Recap</div>
    </div>
    <div class="footer">🌶 Hot Chilli CheckMate © 2026 ♞</div>
  </div>
</div>

<div class="evt-tip" id="globalTip">
  <span class="evt-tip-icon" id="tipIcon"></span>
  <div class="evt-tip-name" id="tipName"></div>
  <div class="evt-tip-detail" id="tipDetail"></div>
  <div id="tipLinkWrap"></div>
</div>

<script>
const EVENTS={
  friday:{icon:'🎯',name:'Guess the Elo',detail:'Click & submit your game!',link:'https://docs.google.com/forms/d/e/1FAIpQLScq9rVAh3y4Qu5OTPh7YExqLvVU-O1u0_wcp5dE_hN4Pdl5cg/viewform',linkText:'Submit Game →',color:'#fff3e0',border:'#ef6640'},
  saturday:{icon:'⚡',name:'Blitz Battle',detail:'3+0 · 3 PM UTC',link:'https://www.chess.com/club/hot-chilli-checkmate',linkText:'Join Battle →',color:'#fff8e1',border:'#f9a825'},
  sunday:{icon:'🏟️',name:'Multiclub Arena (MCA)',detail:'3+0 · 3 PM UTC · 2h long',link:'https://www.chess.com/club/hot-chilli-checkmate',linkText:'Join Arena →',color:'#e8f5e9',border:'#43a047'},
  recap:{icon:'📊',name:'Monthly Recap',detail:'End-of-month stats & highlights!',link:'https://chesswrap.vercel.app/',linkText:'View Recap →',color:'#fce4ec',border:'#e91e63'}
};
const today=new Date();
let viewYear=today.getFullYear(),viewMonth=today.getMonth();
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS=['MON','TUE','WED','THU','FRI','SAT','SUN'];
const monthLabel=document.getElementById('monthLabel');
const calHead=document.getElementById('calHead');
const calBody=document.getElementById('calBody');
const tip=document.getElementById('globalTip');
const tipIcon=document.getElementById('tipIcon');
const tipName=document.getElementById('tipName');
const tipDetail=document.getElementById('tipDetail');
const tipLinkWrap=document.getElementById('tipLinkWrap');
function lastDay(y,m){return new Date(y,m+1,0).getDate();}
function dowMon(y,m,d){return(new Date(y,m,d).getDay()+6)%7;}
function evtsForDay(y,m,d){
  const dow=new Date(y,m,d).getDay(),last=lastDay(y,m),ev=[];
  if(dow===5)ev.push('friday');
  if(dow===6)ev.push('saturday');
  if(dow===0)ev.push('sunday');
  if(d===last)ev.push('recap');
  return ev;
}
function buildCalendar(){
  monthLabel.textContent=MONTHS[viewMonth]+' '+viewYear;
  calHead.innerHTML='';
  DAYS.forEach(d=>{const c=document.createElement('div');c.className='cal-head-cell';c.textContent=d;calHead.appendChild(c);});
  calBody.innerHTML='';
  const first=dowMon(viewYear,viewMonth,1),last=lastDay(viewYear,viewMonth);
  for(let i=0;i<first;i++){const c=document.createElement('div');c.className='cal-cell empty';calBody.appendChild(c);}
  for(let d=1;d<=last;d++){
    const isToday=(d===today.getDate()&&viewMonth===today.getMonth()&&viewYear===today.getFullYear());
    const cell=document.createElement('div');
    cell.className='cal-cell'+(isToday?' today':'');
    const num=document.createElement('div');
    num.className='day-num';num.textContent=d;cell.appendChild(num);
    const evts=evtsForDay(viewYear,viewMonth,d);
    if(evts.length){
      const wrap=document.createElement('div');wrap.className='evt-icons';
      evts.forEach(key=>{
        const ev=EVENTS[key];
        const ico=document.createElement('div');
        ico.className='evt';ico.textContent=ev.icon;
        ico.style.background=ev.color;ico.style.border='1.5px solid '+ev.border;
        ico.addEventListener('mouseenter',e=>showTip(e,key));
        ico.addEventListener('mouseleave',hideTip);
        ico.addEventListener('mousemove',moveTip);
        wrap.appendChild(ico);
      });
      cell.appendChild(wrap);
    }
    calBody.appendChild(cell);
  }
}
let activeTip=false;
function showTip(e,key){
  const ev=EVENTS[key];
  tipIcon.textContent=ev.icon;tipName.textContent=ev.name;tipDetail.textContent=ev.detail;
  tipLinkWrap.innerHTML=ev.link?`<a class="evt-tip-link" href="${ev.link}" target="_blank" rel="noopener">${ev.linkText}</a>`:'';
  activeTip=true;tip.classList.add('show');posTip(e);
}
function hideTip(){activeTip=false;tip.classList.remove('show');}
function moveTip(e){if(activeTip)posTip(e);}
function posTip(e){
  const TW=195,TH=110,vw=window.innerWidth,vh=window.innerHeight;
  let x=e.clientX+14,y=e.clientY+14;
  if(x+TW>vw-8)x=e.clientX-TW-14;
  if(y+TH>vh-8)y=e.clientY-TH-14;
  x=Math.max(6,x);y=Math.max(6,y);
  tip.style.left=x+'px';tip.style.top=y+'px';
}
document.getElementById('prevBtn').addEventListener('click',()=>{viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}buildCalendar();});
document.getElementById('nextBtn').addEventListener('click',()=>{viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}buildCalendar();});
buildCalendar();
</script>
</body>
</html>
