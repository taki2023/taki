<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Chilli CheckMate – Home</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   SIDEBAR FIXED HEIGHT
   Change --sidebar-height to resize the entire widget.
   Current value fits 6 calendar rows comfortably.
   ═══════════════════════════════════════════════════════════════ */
:root{
  --sidebar-height: 560px;   /* ← FIXED SIDEBAR HEIGHT — adjust here */

  --red-dark:#d93020;--red-mid:#e85535;--red-border:#e8553a;
  --bg:#fff5f0;--card:#fff;--border:#f5c5b8;--shadow:#e8aa98;
  --text-dark:#c73520;--text-mid:#9a2010;
  --fs-xs:10px;--fs-sm:11px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;background:transparent;font-family:'Nunito',sans-serif;}

.page-sb{
  width:100%;
  height:var(--sidebar-height);          /* fixed height applied here */
  background:var(--bg);
  border-radius:28px;
  border:3px solid var(--red-border);
  overflow:hidden;                        /* clip to fixed height */
  display:flex;
  flex-direction:column;
}
.page-top{
  background:linear-gradient(135deg,#d93020 0%,#e85535 60%,#ef6640 100%);
  border-radius:24px 24px 0 0;
  padding:14px 16px 10px;
  text-align:center;
  position:relative;
  overflow:hidden;
  flex-shrink:0;
}
.page-top::before{content:'';position:absolute;bottom:-10px;left:-10%;width:120%;height:20px;background:var(--bg);border-radius:50%;}
.page-top::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-55deg,transparent,transparent 14px,rgba(255,255,255,.04) 14px,rgba(255,255,255,.04) 28px);pointer-events:none;}
.page-title{font-family:'Fredoka One',cursive;font-size:19px;color:#fff;text-shadow:0 2px 0 rgba(0,0,0,.18);position:relative;z-index:1;}
.page-sub{font-size:var(--fs-sm);font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.9px;text-transform:uppercase;margin-top:2px;position:relative;z-index:1;}

/* .inner grows to fill remaining height and scrolls if needed */
.inner{
  padding:10px 10px 14px;
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:8px;}
.cal-month-label{font-family:'Fredoka One',cursive;font-size:clamp(13px,3.5vw,17px);color:var(--red-dark);text-align:center;flex:1;white-space:nowrap;}
.nav-btn{
  width:28px;height:28px;min-width:28px;border-radius:50%;border:2px solid var(--border);
  background:var(--card);box-shadow:0 3px 0 var(--shadow);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:14px;color:var(--red-dark);font-weight:900;
  transition:all .15s;user-select:none;flex-shrink:0;line-height:1;
}
.nav-btn:hover{background:#fce8e0;border-color:var(--red-dark);transform:translateY(-2px);box-shadow:0 5px 0 var(--red-dark);}
.nav-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--red-dark);}
.cal-head{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px;}
.cal-head-cell{text-align:center;font-size:clamp(7px,1.6vw,10px);font-weight:900;color:var(--text-mid);text-transform:uppercase;letter-spacing:.4px;padding:2px 0;}
.cal-body{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-cell{
  background:var(--card);border:1.5px solid var(--border);border-radius:7px;
  padding:2px 2px 2px;display:flex;flex-direction:column;
  align-items:flex-start;gap:1px;overflow:visible;
  height:clamp(40px,8.5vw,56px);
}
.cal-cell.empty{background:transparent;border-color:transparent;}
.cal-cell.overflow{opacity:.3;pointer-events:none;}
.cal-cell.today{background:linear-gradient(135deg,rgba(217,48,32,.09),rgba(239,102,64,.05));border-color:var(--red-dark);box-shadow:0 0 0 2px rgba(217,48,32,.2);}
.day-num{font-family:'Fredoka One',cursive;font-size:clamp(8px,2vw,12px);color:var(--text-dark);line-height:1;padding-left:2px;flex-shrink:0;}
.cal-cell.today .day-num{
  display:inline-flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#d93020,#e85535);color:#fff;border-radius:50%;
  width:clamp(14px,3.2vw,20px);height:clamp(14px,3.2vw,20px);
  padding:0;margin-left:2px;box-shadow:0 2px 0 #8c1a10;text-align:center;flex-shrink:0;
}
.evt-icons{
  display:flex;flex-direction:row;flex-wrap:wrap;
  align-items:center;justify-content:center;
  gap:2px;width:100%;flex:1;
}
.evt{
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  width:clamp(13px,3.4vw,20px);height:clamp(13px,3.4vw,20px);
  border-radius:4px;font-size:clamp(7px,2.1vw,12px);
  flex-shrink:0;transition:transform .15s;z-index:1;
}
.evt:hover{transform:scale(1.3);z-index:999;}
.legend{display:flex;flex-wrap:wrap;gap:4px 9px;margin-top:6px;justify-content:center;}
.leg-item{display:flex;align-items:center;gap:3px;font-size:clamp(7px,1.8vw,10px);font-weight:800;color:var(--text-mid);}
.leg-dot{font-size:clamp(10px,2.2vw,13px);}

/* ── Tooltip ── */
.evt-tip{
  position:fixed;background:var(--card);border:2px solid var(--red-dark);
  border-radius:12px;padding:8px 11px;box-shadow:0 8px 24px rgba(217,48,32,.22);
  pointer-events:none;opacity:0;transition:opacity .18s;z-index:99999;
  min-width:130px;max-width:200px;white-space:normal;font-family:'Nunito',sans-serif;
}
.evt-tip.show{opacity:1;}
.evt-tip-header{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:4px;}
.evt-tip-icon{font-size:18px;line-height:1;}
/* Date badge shown next to the icon */
.evt-tip-date{
  font-family:'Fredoka One',cursive;font-size:11px;
  background:linear-gradient(135deg,#d93020,#e85535);
  color:#fff;padding:2px 7px;border-radius:999px;
  box-shadow:0 2px 0 #8c1a10;white-space:nowrap;
}
.evt-tip-name{font-family:'Fredoka One',cursive;font-size:12px;color:var(--red-dark);margin-bottom:3px;}
.evt-tip-detail{font-size:var(--fs-xs);font-weight:700;color:var(--text-mid);line-height:1.55;}
.evt-tip-link{display:inline-block;margin-top:5px;font-size:var(--fs-xs);font-weight:900;color:#fff;background:linear-gradient(135deg,#d93020,#e85535);padding:3px 10px;border-radius:999px;text-decoration:none;box-shadow:0 2px 0 #8c1a10;pointer-events:auto;}

.footer{text-align:center;font-size:var(--fs-sm);font-weight:700;color:var(--red-border);padding-top:4px;}
</style>
</head>
<body>

<div class="page-sb">
  <div class="page-top">
    <div class="page-title">🏠 Hot Chilli CheckMate</div>
    <div class="page-sub">Your Chess Home ♞</div>
  </div>
  <div class="inner">
    <div class="cal-nav">
      <button class="nav-btn" id="prevBtn">‹</button>
      <div class="cal-month-label" id="monthLabel"></div>
      <button class="nav-btn" id="nextBtn">›</button>
    </div>
    <div class="cal-head" id="calHead"></div>
    <div class="cal-body" id="calBody"></div>
    <div class="legend">
      <div class="leg-item"><span class="leg-dot">🎯</span> Guess the Elo</div>
      <div class="leg-item"><span class="leg-dot">⚡</span> Blitz Battle</div>
      <div class="leg-item"><span class="leg-dot">🏟️</span> Multiclub Arena</div>
      <div class="leg-item"><span class="leg-dot">📊</span> Monthly Recap</div>
    </div>
    <div class="footer">🌶 Hot Chilli CheckMate © 2026 ♞</div>
  </div>
</div>

<div class="evt-tip" id="globalTip">
  <div class="evt-tip-header">
    <span class="evt-tip-icon" id="tipIcon"></span>
    <span class="evt-tip-date" id="tipDate"></span>
  </div>
  <div class="evt-tip-name" id="tipName"></div>
  <div class="evt-tip-detail" id="tipDetail"></div>
  <div id="tipLinkWrap"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
// DEFAULT EVENT TEMPLATES
// ─────────────────────────────────────────────────────────────────
const DEFAULTS = {
  friday:   { icon:'🎯', name:'Guess the Elo',        detail:'Click & submit your game!',        link:'https://docs.google.com/forms/d/e/1FAIpQLScq9rVAh3y4Qu5OTPh7YExqLvVU-O1u0_wcp5dE_hN4Pdl5cg/viewform', linkText:'Submit Game →', color:'#fff3e0', border:'#ef6640' },
  saturday: { icon:'⚡', name:'Blitz Battle',          detail:'3+0 · 3 PM UTC',                   link:'', linkText:'Join Battle →', color:'#fff8e1', border:'#f9a825' },
  sunday:   { icon:'🏟️', name:'Multiclub Arena (MCA)', detail:'3+0 · 3 PM UTC · 2h long',         link:'', linkText:'Join Arena →',  color:'#e8f5e9', border:'#43a047' },
  recap:    { icon:'📊', name:'Monthly Recap',         detail:'End-of-month stats & highlights!', link:'', linkText:'View Recap →',  color:'#fce4ec', border:'#e91e63' }
};

// ─────────────────────────────────────────────────────────────────
// PER-DAY OVERRIDES
// Format:  "YYYY-MM-DD": { eventType: { fields to override } }
// ─────────────────────────────────────────────────────────────────
const DAY_OVERRIDES = {
  // Add your per-day, per-event overrides here
};

// ─────────────────────────────────────────────────────────────────
const MONTHS      = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DAYS        = ['MON','TUE','WED','THU','FRI','SAT','SUN'];

const today = new Date();
let viewYear = today.getFullYear(), viewMonth = today.getMonth();

const monthLabel  = document.getElementById('monthLabel');
const calHead     = document.getElementById('calHead');
const calBody     = document.getElementById('calBody');
const tip         = document.getElementById('globalTip');
const tipIcon     = document.getElementById('tipIcon');
const tipDate     = document.getElementById('tipDate');
const tipName     = document.getElementById('tipName');
const tipDetail   = document.getElementById('tipDetail');
const tipLinkWrap = document.getElementById('tipLinkWrap');

function pad(n){ return String(n).padStart(2,'0'); }
function dateKey(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
function lastDay(y,m){ return new Date(y,m+1,0).getDate(); }
function dowMon(y,m,d){ return (new Date(y,m,d).getDay()+6)%7; }

function resolveEvent(type,y,m,d){
  const base = { ...DEFAULTS[type] };
  const over = DAY_OVERRIDES[dateKey(y,m,d)]?.[type];
  return over ? { ...base, ...over } : base;
}

function evtTypesForDay(y,m,d){
  const dow = new Date(y,m,d).getDay(), last = lastDay(y,m), ev = [];
  if(dow===5) ev.push('friday');
  if(dow===6) ev.push('saturday');
  if(dow===0) ev.push('sunday');
  if(d===last) ev.push('recap');
  return ev;
}

// Ordinal suffix: 1→"1st", 2→"2nd", etc.
function ordinal(d){
  const s=['th','st','nd','rd'], v=d%100;
  return d+(s[(v-20)%10]||s[v]||s[0]);
}

function formatDate(y,m,d){
  return `${MONTH_SHORT[m]} ${ordinal(d)}, ${y}`;
}

function buildCalendar(){
  monthLabel.textContent = MONTHS[viewMonth]+' '+viewYear;

  calHead.innerHTML='';
  DAYS.forEach(d=>{
    const c=document.createElement('div');
    c.className='cal-head-cell'; c.textContent=d; calHead.appendChild(c);
  });

  calBody.innerHTML='';
  const first=dowMon(viewYear,viewMonth,1);
  const last=lastDay(viewYear,viewMonth);
  const TOTAL=42;

  // ── prev-month overflow days ──
  const prevM = viewMonth===0?11:viewMonth-1;
  const prevY = viewMonth===0?viewYear-1:viewYear;
  const prevLast = lastDay(prevY,prevM);
  for(let i=0;i<first;i++){
    const d = prevLast - first + 1 + i;
    const cell = makeCell(prevY, prevM, d, true);
    calBody.appendChild(cell);
  }

  // ── current month days ──
  for(let d=1;d<=last;d++){
    const cell = makeCell(viewYear, viewMonth, d, false);
    calBody.appendChild(cell);
  }

  // ── next-month overflow days ──
  const nextM = viewMonth===11?0:viewMonth+1;
  const nextY = viewMonth===11?viewYear+1:viewYear;
  const filled = first + last;
  for(let d=1; filled+d-1 < TOTAL; d++){
    const cell = makeCell(nextY, nextM, d, true);
    calBody.appendChild(cell);
  }
}

function makeCell(y, m, d, overflow){
  const isToday=(d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear());
  const cell=document.createElement('div');
  cell.className='cal-cell'+(isToday?' today':'')+(overflow?' overflow':'');

  const num=document.createElement('div');
  num.className='day-num'; num.textContent=d; cell.appendChild(num);

  const types=evtTypesForDay(y,m,d);
  if(types.length){
    const wrap=document.createElement('div');
    wrap.className='evt-icons';
    types.forEach(type=>{
      const ev=resolveEvent(type,y,m,d);
      const ico=document.createElement('div');
      ico.className='evt';
      ico.textContent=ev.icon;
      ico.style.background=ev.color;
      ico.style.border='1.5px solid '+ev.border;
      const dateLabel=formatDate(y,m,d);
      if(!overflow){
        ico.addEventListener('mouseenter',e=>showTip(e,ev,dateLabel));
        ico.addEventListener('mouseleave',hideTip);
        ico.addEventListener('mousemove',moveTip);
      }
      wrap.appendChild(ico);
    });
    cell.appendChild(wrap);
  }
  return cell;
}

let activeTip=false;
function showTip(e,ev,dateLabel){
  tipIcon.textContent=ev.icon;
  tipDate.textContent=dateLabel;
  tipName.textContent=ev.name;
  tipDetail.textContent=ev.detail;
  tipLinkWrap.innerHTML=ev.link
    ?`<a class="evt-tip-link" href="${ev.link}" target="_blank" rel="noopener">${ev.linkText}</a>`
    :'';
  activeTip=true; tip.classList.add('show'); posTip(e);
}
function hideTip(){ activeTip=false; tip.classList.remove('show'); }
function moveTip(e){ if(activeTip) posTip(e); }
function posTip(e){
  const TW=205,TH=120,vw=window.innerWidth,vh=window.innerHeight;
  let x=e.clientX+14,y=e.clientY+14;
  if(x+TW>vw-8) x=e.clientX-TW-14;
  if(y+TH>vh-8) y=e.clientY-TH-14;
  x=Math.max(6,x); y=Math.max(6,y);
  tip.style.left=x+'px'; tip.style.top=y+'px';
}

document.getElementById('prevBtn').addEventListener('click',()=>{ viewMonth--; if(viewMonth<0){viewMonth=11;viewYear--;} buildCalendar(); });
document.getElementById('nextBtn').addEventListener('click',()=>{ viewMonth++; if(viewMonth>11){viewMonth=0;viewYear++;} buildCalendar(); });
buildCalendar();
</script>
</body>
</html>
