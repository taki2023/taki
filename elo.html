<!DOCTYPE html>

<title>Guess The Elo - Leaderboard</title>

<style>
body {
    background: #2b1a12;
    font-family: Arial, sans-serif;
    color: white;
}

/* CONTAINER */
.container {
    width: 600px;
    margin: 30px auto;
    background: #3a2418;
    border-radius: 10px;
    overflow: hidden;
}

/* TITLE WITH PODIUM */
.title {
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    background: #2a160f;
    border: 2px solid #d4a017;
    border-radius: 10px 10px 0 0;
}

/* PODIUM ICON */
.podium {
    display: flex;
    align-items: flex-end;
    gap: 3px;
}

.podium span {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    font-weight: bold;
    border-radius: 3px;
    color: white;
    font-size: 12px;
}

/* Podium heights */
.gold {
    background: #f1c40f;
    height: 30px;
}

.silver {
    background: #bdc3c7;
    height: 22px;
}

.bronze {
    background: #cd7f32;
    height: 18px;
}

/* Title text */
.title-text {
    font-size: 28px;
    font-weight: 800;
    color: #d6d6d6;
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
    font-weight: bold;
    background: #2a160f;
}

/* ROWS */
.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
}

.left {
    display: flex;
    align-items: center;
    gap: 12px;
}

.rank {
    width: 30px;
    height: 30px;
    text-align: center;
    line-height: 30px;
    border-radius: 6px;
    font-weight: bold;
}

.rank.gold { background: gold; color: black; }
.rank.silver { background: silver; color: black; }
.rank.bronze { background: #cd7f32; }

.points {
    font-weight: bold;
}

.row:hover {
    background: rgba(255,255,255,0.05);
}
</style>
</head>
