<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess The Elo – Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red:    #d93020;
    --red2:   #e85535;
    --red3:   #ef6640;
    --dark:   #8c1a10;
    --light:  #fff5f0;
    --card:   #fff;
    --border: #f5c5b8;
    --shadow: #e8aa98;
    --text:   #9a2010;
    --muted:  #e8aa98;
    --gold:   #f5c518;
    --silver: #bdc3c7;
    --bronze: #cd7f32;
 
    /* Fixed sidebar height — same on every device, no black flash */
    --sb-min-height: 920px;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  html, body {
    width: 100%; margin: 0; padding: 0;
    background: #1a1a1a;
    min-height: 100vh;
  }
 
  body {
    font-family: 'Nunito', sans-serif;
    display: block;
  }
 
  /* Sidebar locked to min-height from frame 0 — prevents black window */
  .sb {
    width: 100%;
    max-width: none;
    background: var(--light);
    min-height: var(--sb-min-height);
    border-radius: 0;
    border: none;
    overflow: clip;
    position: relative;
  }
 
  /* ══════════════════════════════════════════
     SKELETON LAYER — visible before JS/fonts
  ══════════════════════════════════════════ */
  .skeleton-layer {
    position: absolute;
    inset: 0;
    z-index: 10;
    background: var(--light);
    display: flex;
    flex-direction: column;
    opacity: 1;
    transition: opacity .4s ease .05s;
    pointer-events: none;
  }
  .skeleton-layer.hide { opacity: 0; }
 
  .sk-header {
    height: 130px;
    background: linear-gradient(135deg, #d93020 0%, #e85535 60%, #ef6640 100%);
    position: relative;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    padding: 20px;
  }
  .sk-header::after {
    content: '';
    position: absolute;
    bottom: -10px; left: -10%;
    width: 120%; height: 22px;
    background: var(--light);
    border-radius: 50%;
    z-index: 1;
  }
  .sk-bar {
    border-radius: 999px;
    background: rgba(255,255,255,.28);
    animation: skPulse 1.6s ease-in-out infinite;
  }
  .sk-bar.title { width: 180px; height: 20px; }
  .sk-bar.sub   { width: 130px; height: 11px; margin-top: 4px; }
  .sk-bar.pill  { width: 110px; height: 24px; margin-top: 8px; }
  @keyframes skPulse {
    0%,100% { opacity: .55; } 50% { opacity: 1; }
  }
 
  .sk-body { padding: 28px 20px 0; }
  .sk-lbl {
    height: 12px; border-radius: 999px;
    background: var(--border);
    animation: skPulse 1.6s ease-in-out infinite;
    margin-bottom: 10px;
  }
  .sk-legend {
    height: 46px; border-radius: 14px; margin-bottom: 14px;
    background: linear-gradient(90deg, var(--border) 25%, #f9ddd6 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: skSlide 1.6s ease-in-out infinite;
  }
  .sk-div {
    height: 18px; margin: 0 0 14px;
    border-radius: 999px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    animation: skPulse 1.6s ease-in-out infinite;
  }
  .sk-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 3px 0 var(--shadow);
    margin-bottom: 8px;
  }
  .sk-avatar {
    width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
    background: linear-gradient(90deg, var(--border) 25%, #f9ddd6 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: skSlide 1.6s ease-in-out infinite;
  }
  .sk-name {
    flex: 1; height: 13px; border-radius: 999px;
    background: linear-gradient(90deg, var(--border) 25%, #f9ddd6 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: skSlide 1.6s ease-in-out infinite;
  }
  .sk-pts {
    width: 28px; height: 22px; border-radius: 6px;
    background: linear-gradient(90deg, var(--border) 25%, #f9ddd6 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: skSlide 1.6s ease-in-out infinite;
  }
  /* vary name widths for realism */
  .sk-row:nth-child(1) .sk-name { max-width:155px }
  .sk-row:nth-child(2) .sk-name { max-width:120px }
  .sk-row:nth-child(3) .sk-name { max-width:140px }
  .sk-row:nth-child(4) .sk-name { max-width:100px }
  .sk-row:nth-child(5) .sk-name { max-width:170px }
  .sk-row:nth-child(6) .sk-name { max-width:115px }
  .sk-row:nth-child(7) .sk-name { max-width:145px }
  .sk-row:nth-child(8) .sk-name { max-width:130px }
  .sk-row:nth-child(9) .sk-name { max-width:160px }
  .sk-row:nth-child(10) .sk-name { max-width:125px }
  @keyframes skSlide {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
 
  /* ══════════════════════════════════════════
     REAL CONTENT — fades in once ready
  ══════════════════════════════════════════ */
  .real-content {
    opacity: 0;
    transition: opacity .4s ease .05s;
  }
  .real-content.visible { opacity: 1; }
 
  /* ── HEADER ── */
  .sb-top {
    background: linear-gradient(135deg, #d93020 0%, #e85535 60%, #ef6640 100%);
    padding: 20px 20px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .sb-top::after {
    content: '';
    position: absolute;
    bottom: -10px; left: -10%;
    width: 120%; height: 22px;
    background: var(--light);
    border-radius: 50%;
  }
  .chilli-deco { position: absolute; font-size: 44px; opacity: .65; top: 8px; }
  .chilli-deco.left  { left: 12px;  transform: rotate(-20deg); }
  .chilli-deco.right { right: 12px; transform: rotate(20deg); }
 
  .club-title {
    font-family: 'Fredoka One', cursive;
    font-size: 22px; color: #fff;
    text-shadow: 0 2px 0 rgba(0,0,0,.15);
    position: relative; z-index: 1;
  }
  .club-sub {
    font-size: 11px; font-weight: 700;
    color: rgba(255,255,255,.85);
    letter-spacing: .8px; text-transform: uppercase;
    margin-top: 4px; position: relative; z-index: 1;
  }
  .ep-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,255,255,.18);
    border: 1.5px solid rgba(255,255,255,.35);
    border-radius: 999px;
    padding: 4px 14px;
    font-size: 11px; font-weight: 900;
    color: #fff; letter-spacing: .5px;
    margin-top: 10px;
    position: relative; z-index: 1;
  }
  .ep-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 0 3px rgba(255,255,255,.25);
    animation: livePulse 1.8s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes livePulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(255,255,255,.25); }
    50%      { box-shadow: 0 0 0 6px rgba(255,255,255,.1); }
  }
 
  /* ── DIVIDER ── */
  .div {
    width: calc(100% - 40px); height: 18px;
    margin: 8px auto 12px; position: relative; opacity: .95;
  }
  .div::before, .div::after {
    content: ""; position: absolute;
    left: 0; width: 100%; height: 6px; border-radius: 999px;
  }
  .div::before {
    top: 4px;
    background: radial-gradient(circle at 2% 50%,#e89080 0 6px,transparent 7px),
      radial-gradient(circle at 98% 50%,#e89080 0 6px,transparent 7px),
      linear-gradient(90deg,transparent 0%,#e89080 4%,#e08070 12%,#e99082 24%,#e18070 37%,#e89080 50%,#e28272 63%,#e99282 77%,#e08070 90%,#e89080 96%,transparent 100%);
    transform: rotate(-0.35deg); filter: blur(.15px);
  }
  .div::after {
    top: 8px; left: 4px; width: calc(100% - 8px);
    background: radial-gradient(circle at 2% 50%,#e89080 0 5px,transparent 6px),
      radial-gradient(circle at 98% 50%,#e89080 0 5px,transparent 6px),
      linear-gradient(90deg,transparent 0%,#ea9282 5%,#df8070 16%,#e89080 28%,#e18272 41%,#e99282 56%,#e08070 71%,#e89080 86%,#ea9282 95%,transparent 100%);
    transform: rotate(0.45deg); opacity: .82;
  }
 
  /* ── INNER ── */
  .inner { padding: 10px 20px 22px; }
 
  /* ── SECTION LABEL ── */
  .sec-label {
    display: flex; align-items: center; gap: 8px;
    font-family: 'Fredoka One', cursive;
    font-size: 14px; color: var(--red);
    margin-bottom: 8px; margin-top: 4px;
  }
  .sec-label .dot {
    width: 12px; height: 10px; border-radius: 50%;
    background: var(--red); flex-shrink: 0;
  }
 
  /* ── SCORING LEGEND ── */
  .legend-bar {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 3px 0 var(--shadow);
    padding: 10px 14px;
    margin-bottom: 10px;
    display: flex; flex-wrap: wrap;
    gap: 6px 16px;
    font-size: 11px; font-weight: 800; color: var(--text);
    align-items: center;
  }
  .legend-bar .sep { color: var(--muted); font-size: 13px; }
 
  /* ── PAGINATION ── */
  .pag-bar {
    background: #fce8e0;
    border: 2px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 3px 0 var(--shadow);
    padding: 8px 12px;
    display: flex; align-items: center;
    justify-content: space-between;
    gap: 6px; margin-bottom: 8px;
    user-select: none;
  }
  .pag-bar.bottom { margin-top: 8px; margin-bottom: 0; }
  .pag-label {
    font-family: 'Fredoka One', cursive;
    font-size: 13px; color: var(--text);
    white-space: nowrap; letter-spacing: .3px;
  }
  .pag-group { display: flex; align-items: center; gap: 4px; }
  .pag-btn {
    height: 30px; min-width: 30px; padding: 0 8px;
    border-radius: 10px; border: 2px solid var(--border);
    background: var(--card); color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 900;
    cursor: pointer; transition: all .15s ease;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 0 var(--shadow);
  }
  .pag-btn:hover:not(:disabled) {
    background: #fce8e0; border-color: var(--red);
    transform: translateY(-2px); box-shadow: 0 5px 0 var(--dark);
  }
  .pag-btn.active {
    background: linear-gradient(135deg, var(--red), var(--red2));
    color: #fff; border-color: var(--red);
    box-shadow: 0 3px 0 var(--dark);
  }
  .pag-btn:disabled { opacity: .3; cursor: default; box-shadow: none; }
  .pag-dots { color: var(--muted); font-size: 13px; font-weight: 900; padding: 0 2px; }
  .pag-nav {
    height: 30px; padding: 0 12px; border-radius: 10px;
    border: 2px solid var(--border); background: var(--card);
    color: var(--text); font-family: 'Nunito', sans-serif;
    font-size: 12px; font-weight: 900; cursor: pointer;
    transition: all .15s ease;
    display: flex; align-items: center; gap: 4px;
    box-shadow: 0 3px 0 var(--shadow);
  }
  .pag-nav:hover:not(:disabled) {
    background: #fce8e0; border-color: var(--red);
    transform: translateY(-2px); box-shadow: 0 5px 0 var(--dark);
  }
  .pag-nav:disabled { opacity: .3; cursor: default; box-shadow: none; }
 
  /* ── BOARD ── */
  .board { display: flex; flex-direction: column; gap: 0; }
  .col-header {
    display: grid; grid-template-columns: 44px 1fr auto;
    gap: 0 10px; padding: 0 12px 4px;
    font-size: 10px; font-weight: 900;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted);
  }
 
  /* ── ROW WRAPPER ── */
  .row-wrap { padding: 4px 0; }
 
  /* ── ROW (now an <a> tag for links) ── */
  .row {
    display: grid;
    grid-template-columns: 44px 1fr auto;
    gap: 0 10px;
    align-items: center;
    padding: 12px 14px;
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 3px 0 var(--shadow);
    position: relative; overflow: visible;
    transition: all .15s ease;
    cursor: pointer;
    text-decoration: none; /* remove link underline */
    animation: fadeUp .3s ease both;
  }
  .row:hover {
    background: #fce8e0;
    border-color: var(--red);
    transform: translateY(-2px);
    box-shadow: 0 6px 0 var(--dark);
    z-index: 1;
  }
 
  /* ── LEFT ACCENT BAR (improved) ── */
  .row::before {
    content: ''; position: absolute;
    left: 0; top: 4px; bottom: 4px; width: 5px;
    border-radius: 3px;
    background: transparent;
  }
  .row.rank-1::before {
    background: linear-gradient(180deg, #ffe866 0%, #f5c518 50%, #d4a010 100%);
    box-shadow: 0 0 8px rgba(245,197,24,.55);
  }
  .row.rank-2::before {
    background: linear-gradient(180deg, #e0e6f0 0%, #bdc3c7 50%, #9aa0a8 100%);
    box-shadow: 0 0 6px rgba(189,195,199,.45);
  }
  .row.rank-3::before {
    background: linear-gradient(180deg, #f0b060 0%, #cd7f32 50%, #a06020 100%);
    box-shadow: 0 0 7px rgba(205,127,50,.45);
  }
 
  /* ── RANK-THEMED BASE STYLES ── */
  .row.rank-1 { background: linear-gradient(90deg, #fffae8, var(--card)); border-color: #e8d080; box-shadow: 0 3px 0 #c8a830; }
  .row.rank-2 { background: linear-gradient(90deg, #f2f4f7, var(--card)); border-color: #cdd4db; box-shadow: 0 3px 0 #aab0b8; }
  .row.rank-3 { background: linear-gradient(90deg, #fff0e4, var(--card)); border-color: #d4a878; box-shadow: 0 3px 0 #a07048; }
 
  /* ── RANK-THEMED HOVER ── */
  .row.rank-1:hover { background: linear-gradient(90deg, #fff5c0, #fffae8); border-color: #d4a010; box-shadow: 0 6px 0 #a07010; }
  .row.rank-2:hover { background: linear-gradient(90deg, #e4e8ef, #f2f4f7); border-color: #9098a8; box-shadow: 0 6px 0 #606878; }
  .row.rank-3:hover { background: linear-gradient(90deg, #ffe4c8, #fff0e4); border-color: #a06020; box-shadow: 0 6px 0 #704010; }
 
  /* ── GHOST ROW ── */
  .row-ghost {
    display: grid; grid-template-columns: 44px 1fr auto;
    gap: 0 10px; align-items: center;
    padding: 12px 14px; background: transparent;
    border: 2px solid transparent; border-radius: 16px;
    pointer-events: none; visibility: hidden;
  }
 
  /* ── RANK BADGE ── */
  .rank-badge {
    width: 34px; height: 34px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900; font-size: 13px;
    background: #fce8e0; border: 2px solid var(--border);
    color: var(--muted); box-shadow: 0 3px 0 var(--shadow);
    flex-shrink: 0;
  }
  .rank-badge.gold   { background: linear-gradient(135deg,#f5c518,#e8b010); color: #7a5500; border-color: #d4a010; font-size: 18px; box-shadow: 0 3px 0 #a07010; }
  .rank-badge.silver { background: linear-gradient(135deg,#d0d8e8,#bdc3c7); color: #444;    border-color: #a0a8b0; font-size: 18px; box-shadow: 0 3px 0 #909898; }
  .rank-badge.bronze { background: linear-gradient(135deg,#e8a060,#cd7f32); color: #fff;    border-color: #a06020; font-size: 18px; box-shadow: 0 3px 0 #805010; }
 
  /* ── PLAYER NAME — exactly original ── */
  .player-name {
    font-size: 13px; font-weight: 800;
    color: #c73520;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
 
  /* ── POINTS ── */
  .pts-total {
    font-family: 'Fredoka One', cursive;
    font-size: 24px; line-height: 1;
    text-align: right; min-width: 36px;
    color: var(--text);
  }
  .pts-total.gold-pts   { color: #b08010; }
  .pts-total.silver-pts { color: #7a8898; }
  .pts-total.bronze-pts { color: #a06020; }
 
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .row:nth-child(1)  { animation-delay: .03s } .row:nth-child(2)  { animation-delay: .06s }
  .row:nth-child(3)  { animation-delay: .09s } .row:nth-child(4)  { animation-delay: .12s }
  .row:nth-child(5)  { animation-delay: .15s } .row:nth-child(6)  { animation-delay: .18s }
  .row:nth-child(7)  { animation-delay: .21s } .row:nth-child(8)  { animation-delay: .24s }
  .row:nth-child(9)  { animation-delay: .27s } .row:nth-child(10) { animation-delay: .30s }
 
  /* ── FOOTER ── */
  .footer {
    text-align: center; margin-top: 14px;
    font-size: 11px; font-weight: 700; color: var(--red2);
  }
</style>
</head>

</div><!-- /sb -->

    { name: '@MR_BLUE_GUY',           pts: 1  },
    { name: '@Nin-chessy',            pts: 1  },
    { name: '@SS-Ehan',               pts: 1  },
    { name: '@charan_smaran',         pts: 2  },
    { name: '@PoppyOost',             pts: 1  },
    { name: '@ZamadaGM',              pts: 1  },
    { name: '@MAFAB_Mason',           pts: 3  },
    { name: '@Xx_Vanilla_xX',         pts: 4  },
    { name: '@RKamalanayanan',        pts: 1  },
    { name: '@chessblackbelt',        pts: 2  },
    { name: '@Aminson_Antony',        pts: 1  },
    { name: '@Freddy1201',            pts: 3  },
    { name: '@dfvffhhdty',            pts: 1  },
  ];
 
  const sorted = [...rawPlayers].sort((a, b) => b.pts - a.pts);
  const players = sorted.map((p, i, arr) => {
    const firstIdx = arr.findIndex(x => x.pts === p.pts);
    const rank = firstIdx + 1;
    let medal = '';
    if (rank === 1) medal = 'gold';
    else if (rank === 2) medal = 'silver';
    else if (rank === 3) medal = 'bronze';
    const handle = p.name.replace(/^@/, '');
    const profileUrl = 'https://www.chess.com/member/' + handle;
    return { ...p, rank, medal, profileUrl };
  });
 
  const PER_PAGE = 10;
  const totalPages = Math.ceil(players.length / PER_PAGE);
  let currentPage = 1;
 
  function ptsClass(medal) {
    if (medal === 'gold')   return 'pts-total gold-pts';
    if (medal === 'silver') return 'pts-total silver-pts';
    if (medal === 'bronze') return 'pts-total bronze-pts';
    return 'pts-total';
  }
  function rowClass(p) {
    if (p.rank === 1) return 'row rank-1';
    if (p.rank === 2) return 'row rank-2';
    if (p.rank === 3) return 'row rank-3';
    return 'row';
  }
  function badgeHtml(p) {
    if (p.medal === 'gold')   return '<div class="rank-badge gold">🥇</div>';
    if (p.medal === 'silver') return '<div class="rank-badge silver">🥈</div>';
    if (p.medal === 'bronze') return '<div class="rank-badge bronze">🥉</div>';
    return '<div class="rank-badge">' + p.rank + '</div>';
  }
 
  function renderPage(page) {
    currentPage = page;
    const slice = players.slice((page - 1) * PER_PAGE, page * PER_PAGE);
    const ghostCount = PER_PAGE - slice.length;
 
    let html = slice.map(p =>
      '<div class="row-wrap">' +
        '<a class="' + rowClass(p) + '" href="' + p.profileUrl + '" target="_blank" rel="noopener noreferrer">' +
          badgeHtml(p) +
          '<div class="player-name">' + p.name + '</div>' +
          '<div class="' + ptsClass(p.medal) + '">' + p.pts + '</div>' +
        '</a>' +
      '</div>'
    ).join('');
 
    for (let i = 0; i < ghostCount; i++) {
      html += '<div class="row-wrap"><div class="row-ghost"><div class="rank-badge"></div><div class="player-name">&nbsp;</div><div class="pts-total">&nbsp;</div></div></div>';
    }
 
    document.getElementById('rows-container').innerHTML = html;
    renderPagination();
  }
 
  function buildPageRange(cur, total) {
    if (total <= 5) return Array.from({length: total}, (_, i) => i + 1);
    if (cur <= 3) return [1, 2, 3, 4, '...', total];
    if (cur >= total - 2) return [1, '...', total-3, total-2, total-1, total];
    return [1, '...', cur-1, cur, cur+1, '...', total];
  }
 
  function pagHTML() {
    let html = '<span class="pag-label">Pages</span><div class="pag-group">';
    html += '<button class="pag-nav" onclick="changePage(' + (currentPage-1) + ')" ' + (currentPage===1?'disabled':'') + '>&#8249;</button>';
    for (const p of buildPageRange(currentPage, totalPages)) {
      if (p === '...') html += '<span class="pag-dots">…</span>';
      else html += '<button class="pag-btn ' + (p===currentPage?'active':'') + '" onclick="changePage(' + p + ')">' + p + '</button>';
    }
    html += '<button class="pag-nav" onclick="changePage(' + (currentPage+1) + ')" ' + (currentPage===totalPages?'disabled':'') + '>&#8250;</button>';
    html += '<button class="pag-nav" onclick="changePage(' + totalPages + ')" ' + (currentPage===totalPages?'disabled':'') + ' style="margin-left:2px;font-size:10px;">Last</button>';
    html += '</div>';
    return html;
  }
 
  function renderPagination() {
    document.getElementById('pag-top').innerHTML = pagHTML();
    document.getElementById('pag-bot').innerHTML = pagHTML();
  }
 
  function changePage(p) {
    if (p < 1 || p > totalPages) return;
    renderPage(p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
 
  function reveal() {
    renderPage(1);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        document.getElementById('realContent').classList.add('visible');
        setTimeout(() => {
          const sk = document.getElementById('skeleton');
          sk.classList.add('hide');
          setTimeout(() => { sk.style.display = 'none'; }, 450);
        }, 60);
      });
    });
  }
 
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(reveal);
  } else {
    window.addEventListener('load', reveal);
  }
  setTimeout(reveal, 700); // safety fallback
</script>
</body>
</html>
