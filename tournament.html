<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">

<style>
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  margin:0;
  background:#1a1a1a;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:'Nunito',sans-serif;
}

/* MAIN CARD (matched sidebar style) */
.card{
  width:340px;
  background:#fff5f0;
  border:3px solid #e8553a;
  border-radius:28px;
  box-shadow:0 10px 35px rgba(220,60,30,.25);
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  box-shadow:0 15px 50px rgba(220,60,30,.35);
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#d93020 0%,#e85535 60%,#ef6640 100%);
  padding:18px 14px;
  text-align:center;
  color:white;
  position:relative;
}

.header::after{
  content:'';
  position:absolute;
  bottom:-10px;
  left:-10%;
  width:120%;
  height:20px;
  background:#fff5f0;
  border-radius:50%;
}

.title{
  font-family:'Fredoka One',cursive;
  font-size:18px;
  text-shadow:0 2px 0 rgba(0,0,0,.15);
}

.subtitle{
  font-size:12px;
  opacity:0.9;
  margin-top:3px;
  text-transform:uppercase;
  letter-spacing:1px;
}

/* BODY */
.content{
  padding:18px;
  text-align:center;
}

/* TIMER BOXES */
.timer{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  margin-bottom:12px;
}

.box{
  width:75px;
  padding:10px 0;
  border-radius:14px;
  background:#fff;
  border:2px solid #f5c5b8;
  box-shadow:0 4px 0 #e8aa98;
}

.num{
  font-size:20px;
  font-weight:900;
  color:#d93020;
}

.label{
  font-size:10px;
  font-weight:800;
  color:#9a2010;
  margin-top:2px;
}

/* STATUS */
.status{
  font-size:13px;
  font-weight:900;
  color:#c73520;
  margin-top:8px;
}

/* BUTTON */
.join-btn{
  margin-top:14px;
  display:inline-block;
  padding:10px 18px;
  border-radius:999px;
  background:linear-gradient(135deg,#d93020,#e84535);
  color:white;
  text-decoration:none;
  font-weight:900;
  box-shadow:0 5px 0 #8c1a10;
  transition:0.15s;
}

.join-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 7px 0 #8c1a10;
}

.join-btn:active{
  transform:translateY(2px);
  box-shadow:0 3px 0 #8c1a10;
}

</style>
</head>

<body>

<div class="card">

  <div class="header">
    <div class="title">🌶 Hot Chilli Invitational</div>
    <div class="subtitle">2h MCA • 3+0 • Unrated</div>
  </div>

  <div class="content">

    <div class="timer">
      <div class="box">
        <div id="h" class="num">00</div>
        <div class="label">HRS</div>
      </div>

      <div class="box">
        <div id="m" class="num">00</div>
        <div class="label">MIN</div>
      </div>

      <div class="box">
        <div id="s" class="num">00</div>
        <div class="label">SEC</div>
      </div>
    </div>

    <div id="status" class="status">Loading...</div>

    <a class="join-btn" href="https://www.chess.com/play/arena/31121901" target="_blank">
      Join Tournament
    </a>

  </div>
</div>

<script>
function getAlgeriaNow(){
  const now = new Date();
  const utc = now.getTime() + (now.getTimezoneOffset()*60000);
  return new Date(utc + 3600000);
}

function updateTimer(){
  const now = getAlgeriaNow();

  let target = new Date(now);
  target.setHours(15,0,0,0);

  if(now >= target){
    target.setDate(target.getDate() + 1);
  }

  const diff = target - now;

  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  document.getElementById("h").innerText = String(h).padStart(2,'0');
  document.getElementById("m").innerText = String(m).padStart(2,'0');
  document.getElementById("s").innerText = String(s).padStart(2,'0');

  const status = document.getElementById("status");

  if(diff <= 3600000 && diff > 0){
    status.innerText = "🟢 Registrations OPEN";
  } else if(diff <= 0){
    status.innerText = "🔴 Tournament Started";
  } else {
    status.innerText = "⏳ Starting soon";
  }
}

setInterval(updateTimer,1000);
updateTimer();
</script>

</body>
</html>
