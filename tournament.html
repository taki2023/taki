<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hot Chilli 1K Invitational</title>

<style>
body{
  margin:0;
  background:transparent;
  font-family: 'Segoe UI', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:320px;
  padding:20px;
  border-radius:18px;
  background:linear-gradient(145deg,#0d0d0d,#1a1a1a);
  box-shadow:0 0 20px rgba(255,80,0,0.4);
  text-align:center;
  color:white;
}

.title{
  font-size:22px;
  font-weight:800;
  color:#ff4d00;
  margin-bottom:5px;
}

.subtitle{
  font-size:13px;
  opacity:0.8;
  margin-bottom:15px;
}

.timer{
  display:flex;
  justify-content:space-between;
  margin-bottom:15px;
}

.box{
  width:60px;
  padding:10px 0;
  border-radius:10px;
  background:#111;
  box-shadow:inset 0 0 8px rgba(255,80,0,0.5);
}

.num{
  font-size:20px;
  font-weight:bold;
  color:#ff4d00;
}

.label{
  font-size:10px;
  opacity:0.7;
}

.status{
  margin-top:10px;
  font-size:14px;
  font-weight:bold;
  color:#ffcc00;
}

.join-btn{
  margin-top:15px;
  display:inline-block;
  padding:10px 18px;
  border-radius:10px;
  background:#ff4d00;
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:0.2s;
}

.join-btn:hover{
  background:#ff6a1a;
  box-shadow:0 0 10px #ff4d00;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">🔥 Hot Chilli 1K Invitational</div>
  <div class="subtitle">2h MCA • 3+0 • Unrated</div>

  <div class="timer">
    <div class="box">
      <div id="hours" class="num">00</div>
      <div class="label">HRS</div>
    </div>
    <div class="box">
      <div id="minutes" class="num">00</div>
      <div class="label">MIN</div>
    </div>
    <div class="box">
      <div id="seconds" class="num">00</div>
      <div class="label">SEC</div>
    </div>
  </div>

  <div id="status" class="status">Loading...</div>

  <a class="join-btn" href="https://www.chess.com/play/arena/31121901" target="_blank">
    Join Tournament
  </a>
</div>

<script>
function updateTimer(){
  const now = new Date();

  // Algeria time = UTC+1
  const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
  const algeriaNow = new Date(utc + (1 * 60 * 60 * 1000));

  // Set target to TODAY 3:00 PM Algeria time
  let target = new Date(algeriaNow);
  target.setHours(15,0,0,0);

  // If already passed, move to next day
  if(algeriaNow > target){
    target.setDate(target.getDate() + 1);
  }

  const diff = target - algeriaNow;

  const hours = Math.floor(diff / (1000*60*60));
  const minutes = Math.floor((diff % (1000*60*60)) / (1000*60));
  const seconds = Math.floor((diff % (1000*60)) / 1000);

  document.getElementById("hours").innerText = String(hours).padStart(2,'0');
  document.getElementById("minutes").innerText = String(minutes).padStart(2,'0');
  document.getElementById("seconds").innerText = String(seconds).padStart(2,'0');

  // Registration logic
  const status = document.getElementById("status");

  if(diff <= 3600000 && diff > 0){
    status.innerText = "🟢 Registrations are OPEN";
  } else if(diff <= 0){
    status.innerText = "🔴 Tournament Started";
  } else {
    status.innerText = "⏳ Registrations opening soon";
  }
}

setInterval(updateTimer,1000);
updateTimer();
</script>

</body>
</html>
