<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  font-family: Inter, Segoe UI, system-ui, sans-serif;
  background: transparent!important;
  color: #f1e7df;
  height: 100%;
}

/* 🔥 OUTER BOX */
#outerBox {
  width: 100%;
  border-radius: 16px;
  padding: 14px;
  background: linear-gradient(180deg, rgba(18,12,10,.92), rgba(10,8,7,.95)); /* match birthday box */
  border: 2.5px solid rgba(255,176,120,.55);
  box-shadow: inset 0 0 14px rgba(0,0,0,.55), 0 0 14px rgba(255,176,120,.22);
  display: flex;
  flex-direction: column;
}

/* 🔥 MAIN BOX - transparent to match birthday style */
#box {
  width: 100%;
  border-radius: 14px;
  background: transparent;
  padding: 0;
  text-align: center;
  display: flex;
  flex-direction: column;
}

/* 💎 TITLE HEADER (like birthdays) */
.tHeader {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 14px;
  background: linear-gradient(145deg, rgba(255,176,120,.15), rgba(255,138,112,.08));
  border: 1.5px solid rgba(255,176,120,.4);
  margin-bottom: 12px;
}

/* DIAMOND ICON CIRCLE */
.tIcon {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  background: linear-gradient(145deg,#ffb37a,#ff8a70);
}

/* TITLE TEXT */
.tTitle {
  font-size: 15px;
  font-weight: 700;
  color: #fff; /* match birthday title */
  letter-spacing: .5px;
}

/* COUNTDOWN */
#countdown {
  font-size: 18px;
  font-weight: 700;
  color: #ffb37a;
  margin: 12px 0;
}

/* INFO TEXT */
.info {
  font-size: 11px;
  color: #fff;
  line-height: 1.4;
  margin-bottom: 14px;
}

/* BUTTONS */
.joinBtn, .detailsBtn {
  display: block;
  width: 70%;
  margin: 6px auto;
  padding: 10px 0;
  border-radius: 12px;
  font-weight: 700;
  text-decoration: none;
  text-align: center;
  transition: all 0.25s ease;
  border: 1px solid rgba(255,176,120,.45);
}

/* JOIN BUTTON */
.joinBtn {
  background: linear-gradient(90deg,#ffb37a,#ff8a70);
  color: #fff;
  font-size: 14px;
  box-shadow: 0 0 12px rgba(255,176,120,.35);
}

.joinBtn:hover {
  transform: scale(1.05);
}

/* DETAILS BUTTON */
.detailsBtn {
  background: rgba(0,0,0,.25);
  color: #ffb37a;
  font-size: 13px;
}

.detailsBtn:hover {
  background: rgba(255,176,120,0.22);
  box-shadow: 0 0 12px rgba(255,176,120,.35);
}
</style>

</head>
<body>

<div id="outerBox">
  <div id="box">
    <div class="tHeader">
      <div class="tIcon">💎</div>
      <div class="tTitle">Giveaway MCA</div>
    </div>

    <div id="countdown">Loading...</div>

    <div class="info">
      24h long • Unrated • 3+0 Blitz<br>
      Registration opens <b>1 hour before</b>.
    </div>

    <a class="joinBtn" href="https://www.chess.com/play/arena/31035887">JOIN</a>
    <a class="detailsBtn" href="https://www.chess.com/blog/TakieddineGOUMRI/hot-chilli-giveaway-tournament">Click for Details</a>
  </div>
</div>

<script>
const targetDate = new Date("2026-03-14T12:00:00+01:00").getTime();

function updateCountdown(){
  const now = new Date().getTime();
  const diff = targetDate - now;

  if(diff <= 0){
    document.getElementById("countdown").innerHTML = "Tournament Started!";
    return;
  }

  const hours = Math.floor(diff / (1000*60*60));
  const minutes = Math.floor((diff % (1000*60*60))/(1000*60));
  const seconds = Math.floor((diff % (1000*60))/1000);

  document.getElementById("countdown").innerHTML =
    hours + "h " + minutes + "m " + seconds + "s";
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
