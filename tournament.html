<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">

<title>Tournament Countdown</title>

<style>

body{
  margin:0;
  font-family:'Nunito',sans-serif;
  background:transparent;
}

/* CARD */
.card{
  width:100%;
  background:#fff;
  border-radius:20px;
  border:2px solid #f5c5b8;
  box-shadow:0 4px 0 #e8aa98;
  overflow:hidden;
}

/* HEADER */
.title{
  text-align:center;
  font-family:'Fredoka One',cursive;
  font-size:16px;
  color:#fff;
  padding:12px;
  background:linear-gradient(135deg,#d93020,#e85535,#ef6640);
}

/* INNER */
.inner{
  padding:14px;
  text-align:center;
}

/* TOURNAMENT NAME */
.tour-name{
  font-size:13px;
  font-weight:900;
  color:#c73520;
  margin-bottom:10px;
}

/* COUNTDOWN BOX */
.countdown{
  display:flex;
  justify-content:center;
  gap:10px;
}

/* TIME BLOCK */
.time-box{
  background:#fff8f5;
  border:2px solid #f5c5b8;
  border-radius:14px;
  padding:10px 8px;
  min-width:60px;
  box-shadow:0 3px 0 #e8aa98;
}

.time-value{
  font-size:18px;
  font-weight:900;
  color:#d93020;
}

.time-label{
  font-size:10px;
  font-weight:800;
  color:#9a2010;
}

/* FOOTER */
.footer{
  margin-top:12px;
  font-size:11px;
  font-weight:800;
  color:#e8553a;
}

</style>
</head>

<body>

<div class="card">

<div class="title">🔥 Upcoming Event</div>

<div class="inner">

<div class="tour-name">Hot Chilli 1K Invitational 🌶️</div>

<div class="countdown">
  <div class="time-box">
    <div class="time-value" id="hours">02</div>
    <div class="time-label">HRS</div>
  </div>
  <div class="time-box">
    <div class="time-value" id="minutes">23</div>
    <div class="time-label">MIN</div>
  </div>
  <div class="time-box">
    <div class="time-value" id="seconds">00</div>
    <div class="time-label">SEC</div>
  </div>
</div>

<div class="footer">⏳ Get ready to cook ♟️🔥</div>

</div>
</div>

<script>

// SET COUNTDOWN (2h 23min from now)
let endTime = new Date().getTime() + (2*60*60*1000) + (23*60*1000);

function updateCountdown(){

let now = new Date().getTime();
let diff = endTime - now;

if(diff <= 0){
  document.getElementById("hours").innerHTML = "00";
  document.getElementById("minutes").innerHTML = "00";
  document.getElementById("seconds").innerHTML = "00";
  return;
}

let h = Math.floor(diff / (1000*60*60));
let m = Math.floor((diff % (1000*60*60)) / (1000*60));
let s = Math.floor((diff % (1000*60)) / 1000);

document.getElementById("hours").innerHTML = String(h).padStart(2,'0');
document.getElementById("minutes").innerHTML = String(m).padStart(2,'0');
document.getElementById("seconds").innerHTML = String(s).padStart(2,'0');

}

setInterval(updateCountdown,1000);
updateCountdown();

</script>

</body>
</html>
