<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(180deg,#0f0f0f,#1a1a1a);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
}

#box{
  text-align:center;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,0.15);
  width:320px;
}

.title{
  font-size:20px;
  font-weight:bold;
  margin-bottom:10px;
  color:#ff4d4d;
}

#countdown{
  font-size:26px;
  font-weight:bold;
  letter-spacing:2px;
  margin:15px 0 25px 0;
}

.joinBtn{
  display:inline-block;
  text-decoration:none;
  background:#ff3c3c;
  color:white;
  padding:14px 28px;
  border-radius:12px;
  font-size:18px;
  font-weight:bold;
  box-shadow:0 0 15px rgba(255,60,60,0.6);
  animation:pulse 1.5s infinite;
}

.joinBtn:hover{
  background:#ff5555;
}

@keyframes pulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.08);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<div id="box">
  <div class="title">🌶 Hot Chilli Giveaway Tournament</div>
  <div id="countdown">Loading...</div>

  <a class="joinBtn" href="https://www.chess.com/play/arena/31035887" target="_blank">
  JOIN
  </a>
</div>

<script>
const targetDate = new Date("2026-03-14T12:00:00+01:00").getTime();

function updateCountdown(){
  const now = new Date().getTime();
  const diff = targetDate - now;

  if(diff <= 0){
    document.getElementById("countdown").innerHTML = "Tournament Started!";
    return;
  }

  const hours = Math.floor(diff / (1000*60*60));
  const minutes = Math.floor((diff % (1000*60*60))/(1000*60));
  const seconds = Math.floor((diff % (1000*60))/1000);

  document.getElementById("countdown").innerHTML =
    hours + "h " + minutes + "m " + seconds + "s";
}

setInterval(updateCountdown,1000);
updateCountdown();
</script>

</body>
</html>
