<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  background:transparent;
  font-family:'Segoe UI', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:320px;
  padding:18px;
  border-radius:16px;
  background:linear-gradient(145deg,#0d0d0d,#1a1a1a);
  box-shadow:0 0 18px rgba(255,80,0,0.35);
  text-align:center;
  color:white;
}

.title{
  font-size:20px;
  font-weight:800;
  color:#ff4d00;
  margin-bottom:4px;
}

.subtitle{
  font-size:12px;
  opacity:0.85;
  margin-bottom:12px;
}

.timer{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.box{
  width:65px;
  padding:10px 0;
  border-radius:10px;
  background:#111;
  box-shadow:inset 0 0 10px rgba(255,80,0,0.6);
}

.num{
  font-size:20px;
  font-weight:bold;
  color:#ff4d00;
}

.label{
  font-size:10px;
  opacity:0.7;
}

.status{
  margin-top:8px;
  font-size:13px;
  font-weight:bold;
  color:#ffcc00;
}

.join-btn{
  margin-top:12px;
  display:inline-block;
  padding:9px 16px;
  border-radius:10px;
  background:#ff4d00;
  color:white;
  text-decoration:none;
  font-weight:bold;
  transition:0.2s;
}

.join-btn:hover{
  background:#ff6a1a;
  box-shadow:0 0 10px #ff4d00;
}
</style>
</head>

<body>

<div class="container">
  <div class="title">🔥 Hot Chilli 1K Invitational</div>
  <div class="subtitle">2h MCA • 3+0 • Unrated</div>

  <div class="timer">
    <div class="box">
      <div id="h" class="num">00</div>
      <div class="label">HRS</div>
    </div>
    <div class="box">
      <div id="m" class="num">00</div>
      <div class="label">MIN</div>
    </div>
    <div class="box">
      <div id="s" class="num">00</div>
      <div class="label">SEC</div>
    </div>
  </div>

  <div id="status" class="status">Loading...</div>

  <a class="join-btn" href="https://www.chess.com/play/arena/31121901" target="_blank">
    Join Tournament
  </a>
</div>

<script>
function getAlgeriaNow(){
  const now = new Date();
  const utc = now.getTime() + (now.getTimezoneOffset()*60000);
  return new Date(utc + 3600000); // UTC+1
}

function updateTimer(){
  const now = getAlgeriaNow();

  let target = new Date(now);
  target.setHours(15,0,0,0); // 3PM Algeria

  // if passed → tomorrow (prevents reset issue)
  if(now >= target){
    target.setDate(target.getDate() + 1);
  }

  const diff = target - now;

  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);

  document.getElementById("h").innerText = String(h).padStart(2,'0');
  document.getElementById("m").innerText = String(m).padStart(2,'0');
  document.getElementById("s").innerText = String(s).padStart(2,'0');

  const status = document.getElementById("status");

  if(diff <= 3600000 && diff > 0){
    status.innerText = "🟢 Registrations are OPEN";
  } else if(diff <= 0){
    status.innerText = "🔴 Tournament Started";
  } else {
    status.innerText = "⏳ Registrations opening soon";
  }
}

setInterval(updateTimer,1000);
updateTimer();
</script>

</body>
</html>
