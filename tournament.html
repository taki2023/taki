<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">

<title>Hot Chilli Tournament</title>

<style>

body{
  margin:0;
  font-family:'Nunito',sans-serif;
  background:transparent;
}

/* CARD */
.card{
  width:100%;
  background:#fff;
  border-radius:20px;
  border:2px solid #f5c5b8;
  box-shadow:0 4px 0 #e8aa98;
  overflow:hidden;
}

/* HEADER */
.title{
  text-align:center;
  font-family:'Fredoka One',cursive;
  font-size:16px;
  color:#fff;
  padding:12px;
  background:linear-gradient(135deg,#d93020,#e85535,#ef6640);
}

/* INNER */
.inner{
  padding:14px;
  text-align:center;
}

/* NAME */
.tour-name{
  font-size:13px;
  font-weight:900;
  color:#c73520;
  margin-bottom:10px;
}

/* STATUS */
.status{
  font-size:11px;
  font-weight:900;
  color:#d93020;
  margin-bottom:8px;
}

/* COUNTDOWN */
.countdown{
  display:flex;
  justify-content:center;
  gap:10px;
}

.time-box{
  background:#fff8f5;
  border:2px solid #f5c5b8;
  border-radius:14px;
  padding:10px 8px;
  min-width:60px;
  box-shadow:0 3px 0 #e8aa98;
}

.time-value{
  font-size:18px;
  font-weight:900;
  color:#d93020;
}

.time-label{
  font-size:10px;
  font-weight:800;
  color:#9a2010;
}

/* FOOTER */
.footer{
  margin-top:12px;
  font-size:11px;
  font-weight:800;
  color:#e8553a;
}

</style>
</head>

<body>

<div class="card">

<div class="title">🔥 Swiss Tournament</div>

<div class="inner">

<div class="tour-name">Hot Chilli 1K Invitational 🌶️</div>

<div class="status" id="status">Loading...</div>

<div class="countdown">
  <div class="time-box">
    <div class="time-value" id="hours">00</div>
    <div class="time-label">HRS</div>
  </div>
  <div class="time-box">
    <div class="time-value" id="minutes">00</div>
    <div class="time-label">MIN</div>
  </div>
  <div class="time-box">
    <div class="time-value" id="seconds">00</div>
    <div class="time-label">SEC</div>
  </div>
</div>

<div class="footer">♟️ Be ready to cook 🔥</div>

</div>
</div>

<script>

// 🟢 SET FIXED TIME → 3PM ALGERIA (UTC+1)
function getAlgeriaStartTime(){

let now = new Date();

// Create today at 15:00 Algeria time (UTC+1)
let start = new Date(Date.UTC(
  now.getUTCFullYear(),
  now.getUTCMonth(),
  now.getUTCDate(),
  14, // 15:00 Algeria = 14:00 UTC
  0,0
));

// If already passed → use tomorrow
if(now.getTime() > start.getTime()){
  start.setUTCDate(start.getUTCDate()+1);
}

return start.getTime();
}

let startTime = getAlgeriaStartTime();

function update(){

let now = new Date().getTime();
let diff = startTime - now;

let status = document.getElementById("status");

// 🔥 REGISTRATION LOGIC
if(diff <= 3600000 && diff > 0){
  status.innerHTML = "🟢 Registrations are OPEN";
}else if(diff > 3600000){
  status.innerHTML = "🔒 Registrations open soon";
}else{
  status.innerHTML = "🚀 Tournament started!";
}

// ⏱️ COUNTDOWN
if(diff <= 0){
  document.getElementById("hours").innerHTML = "00";
  document.getElementById("minutes").innerHTML = "00";
  document.getElementById("seconds").innerHTML = "00";
  return;
}

let h = Math.floor(diff / (1000*60*60));
let m = Math.floor((diff % (1000*60*60)) / (1000*60));
let s = Math.floor((diff % (1000*60)) / 1000);

document.getElementById("hours").innerHTML = String(h).padStart(2,'0');
document.getElementById("minutes").innerHTML = String(m).padStart(2,'0');
document.getElementById("seconds").innerHTML = String(s).padStart(2,'0');

}

setInterval(update,1000);
update();

</script>

</body>
</html>
