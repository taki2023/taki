<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Just Joined</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{margin:0;padding:0;background:#0b1711;}
 
@keyframes shimmer{0%{background-position:200% center;}100%{background-position:-200% center;}}
@keyframes orb-float{0%,100%{transform:translateY(0) scale(1);opacity:.16;}50%{transform:translateY(-18px) scale(1.08);opacity:.28;}}
@keyframes border-pulse{0%,100%{border-color:rgba(168,124,67,.18);}50%{border-color:rgba(198,154,95,.42);}}
@keyframes title-pulse{0%,100%{filter:drop-shadow(0 0 6px rgba(120,90,52,.24));}50%{filter:drop-shadow(0 0 18px rgba(198,154,95,.45));}}
@keyframes skeleton-pulse{0%,100%{opacity:.35;}50%{opacity:.65;}}
 
.at-wrap{
  position:relative;
  width:100%;
  padding:16px;
  background:linear-gradient(180deg,#102017 0%,#14291d 45%,#193222 100%);
  border-radius:24px;
  border:1px solid rgba(168,124,67,0.22);
  color:#f3e8d7;
  font-family:'Segoe UI',Arial,Helvetica,sans-serif;
  overflow:hidden;
  box-shadow:0 0 40px rgba(12,24,17,.45),inset 0 0 60px rgba(0,0,0,.35);
}
 
.at-orb{position:absolute;border-radius:50%;pointer-events:none;z-index:0;filter:blur(28px);}
.at-orb-1{width:90px;height:90px;background:rgba(104,74,42,.20);top:8%;left:-18%;animation:orb-float 7s ease-in-out infinite;}
.at-orb-2{width:70px;height:70px;background:rgba(64,102,72,.18);top:28%;right:-14%;animation:orb-float 9s ease-in-out infinite 2s;}
.at-orb-3{width:80px;height:80px;background:rgba(130,96,54,.16);top:58%;left:-12%;animation:orb-float 8s ease-in-out infinite 1s;}
.at-orb-4{width:60px;height:60px;background:rgba(70,108,78,.14);top:78%;right:-10%;animation:orb-float 10s ease-in-out infinite 3s;}
 
.at-content{position:relative;z-index:2;}
 
.at-title{
  text-align:center;font-size:22px;font-weight:900;letter-spacing:1px;margin-bottom:14px;
  background:linear-gradient(90deg,#f0dfc2,#c69a5f,#f0dfc2);
  background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 5s linear infinite,title-pulse 3s ease-in-out infinite;
}
 
.at-card{
  background:rgba(12,24,17,.55);border-radius:20px;padding:14px;
  border:1px solid rgba(168,124,67,.18);
  animation:border-pulse 5s ease-in-out infinite;
  position:relative;overflow:hidden;
}
.at-card::before{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(135deg,rgba(198,154,95,.05) 0%,transparent 60%);
  pointer-events:none;
}
 
.at-section-title{
  text-align:center;background:linear-gradient(135deg,#4d3822,#6e4f2f);
  color:#f3e8d7;font-weight:800;padding:8px 12px;border-radius:14px;
  margin-bottom:13px;font-size:12.5px;letter-spacing:.5px;
  border:1px solid rgba(198,154,95,.3);position:relative;overflow:hidden;
}
.at-section-title::after{
  content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.08),transparent);
  animation:shimmer 3s linear infinite;
}
 
/* Fixed-height rows — no layout shift */
.nm-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;
  height:62px;
  border-radius:14px;
  background:rgba(21,38,27,.75);
  border:1px solid rgba(168,124,67,.18);
  text-decoration:none;transition:.2s;margin-bottom:8px;
  overflow:hidden;
}
.nm-item:last-child{margin-bottom:0;}
.nm-item:hover{background:rgba(38,60,44,.85);border-color:rgba(198,154,95,.4);transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.28);}
 
.nm-avatar{
  width:42px;height:42px;border-radius:50%;
  border:2px solid rgba(198,154,95,.55);
  box-shadow:0 0 10px rgba(90,64,38,.25);
  object-fit:cover;flex-shrink:0;transition:.25s;
  background:rgba(40,60,45,.8);
}
.nm-item:hover .nm-avatar{transform:scale(1.07);box-shadow:0 0 18px rgba(198,154,95,.35);}
 
.nm-info{display:flex;flex-direction:column;flex:1;min-width:0;overflow:hidden;}
.nm-name{font-size:11px;font-weight:700;color:#f0dfc2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.nm-meta{display:flex;align-items:center;margin-top:2px;font-size:9.5px;font-weight:700;gap:4px;}
.nm-rating{color:#d2b690;flex-shrink:0;}
.nm-joined{margin-left:auto;color:#b59a75;white-space:nowrap;flex-shrink:0;}
.nm-item:hover .nm-name{text-decoration:underline;}
 
/* Skeleton bars */
.skel{
  display:block;border-radius:6px;
  background:rgba(198,154,95,.22);
  animation:skeleton-pulse 1.5s ease-in-out infinite;
}
.skel-name{width:120px;height:10px;margin-bottom:5px;}
.skel-meta{width:72px;height:8px;}
.skel-joined{width:52px;height:8px;margin-left:auto;}
 
.at-msg{text-align:center;color:#b59a75;font-size:12px;padding:10px;}
</style>
</head>
<body>
 
<div class="at-wrap" id="at-wrap">
  <div class="at-orb at-orb-1"></div>
  <div class="at-orb at-orb-2"></div>
  <div class="at-orb at-orb-3"></div>
  <div class="at-orb at-orb-4"></div>
 
  <div class="at-content">
    <div class="at-title">Just Joined</div>
 
    <div class="at-card">
      <div class="at-section-title">🍀 ✦ NEWEST MEMBERS ✦</div>
 
      <!-- 3 skeleton rows — same height as real rows, zero layout shift on load -->
      <div id="nm-list">
        <div class="nm-item">
          <div class="nm-avatar"></div>
          <div class="nm-info">
            <span class="skel skel-name"></span>
            <div class="nm-meta"><span class="skel skel-meta"></span><span class="skel skel-joined"></span></div>
          </div>
        </div>
        <div class="nm-item">
          <div class="nm-avatar"></div>
          <div class="nm-info">
            <span class="skel skel-name"></span>
            <div class="nm-meta"><span class="skel skel-meta"></span><span class="skel skel-joined"></span></div>
          </div>
        </div>
        <div class="nm-item">
          <div class="nm-avatar"></div>
          <div class="nm-info">
            <span class="skel skel-name"></span>
            <div class="nm-meta"><span class="skel skel-meta"></span><span class="skel skel-joined"></span></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
 
<script>
(function(){
  var CLUB_SLUG = 'the-green-dragon-inn';
  var LIMIT     = 3;
  var FALLBACK  = 'https://www.chess.com/bundles/web/images/user-image.007dad08.svg';
 
  function timeAgo(ts){
    var diff = Math.floor((Date.now() - ts * 1000) / 1000);
    if(diff < 60) return diff + 's ago';
    var m = Math.floor(diff / 60); if(m < 60) return m + 'm ago';
    var h = Math.floor(m / 60);   if(h < 24) return h + 'h ago';
    var d = Math.floor(h / 24);   if(d < 7)  return d + 'd ago';
    var w = Math.floor(d / 7);    if(w < 4)  return w + 'w ago';
    return Math.floor(d / 30) + 'mo ago';
  }
 
  async function loadNewest(){
    try{
      var r = await fetch('https://api.chess.com/pub/club/' + CLUB_SLUG + '/members');
      if(!r.ok) throw new Error('HTTP ' + r.status);
      var d = await r.json();
 
      var all = [...(d.weekly||[]), ...(d.monthly||[]), ...(d.all_time||[])];
      var seen = new Map();
      all.forEach(function(m){
        if(!m || !m.username || !m.joined) return;
        var cur = seen.get(m.username);
        if(!cur || m.joined > cur.joined) seen.set(m.username, m);
      });
 
      var top = Array.from(seen.values())
        .sort(function(a,b){ return b.joined - a.joined; })
        .slice(0, LIMIT);
 
      if(!top.length){
        document.getElementById('nm-list').innerHTML = '<div class="at-msg">No members found.</div>';
        return;
      }
 
      var results = await Promise.all(top.map(async function(m){
        var pj = null, stats = null;
        try{ pj    = await fetch('https://api.chess.com/pub/player/'+m.username).then(function(r){ return r.ok ? r.json() : null; }); }catch(e){}
        try{ stats = await fetch('https://api.chess.com/pub/player/'+m.username+'/stats').then(function(r){ return r.ok ? r.json() : null; }); }catch(e){}
 
        var ratings = [
          {type:'Rapid',  value: stats && stats.chess_rapid  && stats.chess_rapid.last  && stats.chess_rapid.last.rating},
          {type:'Blitz',  value: stats && stats.chess_blitz  && stats.chess_blitz.last  && stats.chess_blitz.last.rating},
          {type:'Bullet', value: stats && stats.chess_bullet && stats.chess_bullet.last && stats.chess_bullet.last.rating},
          {type:'Daily',  value: stats && stats.chess_daily  && stats.chess_daily.last  && stats.chess_daily.last.rating}
        ].filter(function(x){ return x.value; });
 
        var best = ratings.length
          ? ratings.sort(function(a,b){ return b.value - a.value; })[0]
          : {type:'—', value:'—'};
 
        return {
          username:    m.username,
          avatar:      (pj && pj.avatar) ? pj.avatar : FALLBACK,
          ratingType:  best.type,
          ratingValue: best.value,
          joined:      m.joined
        };
      }));
 
      document.getElementById('nm-list').innerHTML = results.map(function(m){
        return '<a class="nm-item" href="https://www.chess.com/member/'+m.username+'" target="_blank" rel="noopener">'
          + '<img class="nm-avatar" src="'+m.avatar+'" onerror="this.src=\''+FALLBACK+'\'" alt=""/>'
          + '<div class="nm-info">'
          + '<div class="nm-name">@'+m.username+'</div>'
          + '<div class="nm-meta">'
          + '<span class="nm-rating">'+m.ratingType+': '+m.ratingValue+'</span>'
          + '<span class="nm-joined">⏱ '+timeAgo(m.joined)+'</span>'
          + '</div></div></a>';
      }).join('');
 
      /* Lock the wrapper height to whatever it settled at after load */
      var wrap = document.getElementById('at-wrap');
      wrap.style.maxHeight = wrap.offsetHeight + 'px';
 
    } catch(e){
      document.getElementById('nm-list').innerHTML = '<div class="at-msg">Unable to load members.</div>';
    }
  }
 
  loadNewest();
})();
</script>
</body>
</html>
